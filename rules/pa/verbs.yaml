---
language: "pa"

expansion_rules:
  # turn on (SOV: follows the object)
  turn_on: "(ਚਾਲੂ ਕਰੋ|ਚਾਲੂ ਕਰਦੋ|ਚਲਾਓ|ਚਲਾਦੋ|ਚਾਲੂ ਕਰ ਦਿਓ|ਆਨ ਕਰੋ)"
  # turn off
  turn_off: "(ਬੰਦ ਕਰੋ|ਬੰਦ ਕਰਦੋ|ਬੰਦ ਕਰ ਦਿਓ|ਆਫ ਕਰੋ)"
  # open a cover
  open: "(ਖੋਲ੍ਹੋ|ਖੋਲ੍ਹ ਦਿਓ|ਖੋਲੋ|ਖੋਲ ਦਿਓ)"
  # close a cover
  close: "(ਬੰਦ ਕਰੋ|ਬੰਦ ਕਰਦੋ|ਬੰਦ ਕਰ ਦਿਓ)"
  # lock
  lock: "(ਜਿੰਦਾ ਲਾਓ|ਲਾਕ ਕਰੋ|ਤਾਲਾ ਲਾਓ)"
  # unlock
  unlock: "(ਜਿੰਦਾ ਖੋਲ੍ਹੋ|ਅਨਲਾਕ ਕਰੋ|ਤਾਲਾ ਖੋਲ੍ਹੋ)"
  # activate / run (scenes & scripts)
  activate: "(ਸਰਗਰਮ ਕਰੋ|ਚਾਲੂ ਕਰੋ|ਚਲਾਓ)"
  run: "(ਚਲਾਓ|ਸ਼ੁਰੂ ਕਰੋ|ਰਨ ਕਰੋ)"
