---
language: "pa"

expansion_rules:
  # the / my / our (optional possessive)
  the: "(ਮੇਰਾ|ਮੇਰੀ|ਮੇਰੇ|ਸਾਡਾ|ਸਾਡੀ|ਸਾਡੇ)"
  # postposition "in / inside" (follows the area/floor noun in Punjabi)
  in: "(ਵਿੱਚ|ਵਿਚ|ਅੰਦਰ|ਦੇ ਵਿੱਚ)"
  # all / every
  all: "(ਸਾਰੀਆਂ|ਸਾਰੇ|ਸਭ|ਸਾਰਾ|ਹਰ)"
  # here / in this room
  here: "(ਇੱਥੇ|ਏਥੇ|ਇਸ ਕਮਰੇ ਵਿੱਚ|ਇਸ ਖੇਤਰ ਵਿੱਚ)"
  # everywhere / in the whole house
  everywhere: "(ਹਰ ਥਾਂ|ਹਰ ਜਗ੍ਹਾ|ਸਾਰੇ ਘਰ ਵਿੱਚ|ਪੂਰੇ ਘਰ ਵਿੱਚ|ਘਰ ਭਰ ਵਿੱਚ)"
