language: ro
expansion_rules:
  # Units
  ore: ([de ]ore|or(ă|a))
  minute: ([de ]minute|minut)
  secunde: ([de ]secunde|secund(ă|a))

  # Nouns
  temporizatorul: "(un temporizator|temporizator[ul]|o temporizare|temporizare[a]|un cronometru|cronometru[l])"
  temporizatorului: "(temporizatorului|temporiz(ă|a)rii|cronometrului)"

  # Verbs
  porneste_timer: "(start|porne(ș|s)te|activeaz(ă|a)|(i|î)ncepe)"
  opreste_timer: "(stop|opre(ș|s)te|dezactiveaz(ă|a)|anuleaz(ă|a)|(i|î)nceteaz(a|ă))"
  reia_timer: "(re(start|porne(ș|s)te|activeaz(ă|a)|(i|î)ncepe)|reia)"
  adauga_timer: "[mai] (adaug(ă|a)|pune)"
