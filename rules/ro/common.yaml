language: ro
expansion_rules:
  # Placeholders
  area: "{area}"
  floor: "[(etajul|nivelul) ]{floor}"
  name: "({name})"
  din_zona: "[<din>] <area>"

  # Quantities
  la_suta: ([ ]%| la sut(ă|a)| [de ]procent[e])

  # Prepositions
  in: ((î|i)n)
  din: (din|(î|i)n|pentru|[de ]la|[de ]pe|de)
  la: (la|(î|i)n)
  pana_la: ([p(ână|ana) ]la)
  de: ([(î|i)n valoare ]de|pentru)
  cu: (pe|cu|folosind)

  # Questions
  cate: (c(â|a)te|c(âț|at)i)
  cat_quant: (c(â|a)t)
  cat: (<cat_quant>|cum)
  care: (care|ce)

  # Other
  de_aici: "[de] aici"
  peste_tot: (peste tot|pretutindeni|(î|i)n toat(ă|a) (casa|locuin(ț|t)a)|(î|i)n toate (camerele|spa(ț|t)iile|(î|i)nc(ă|a)perile))
  urmatorul: (urm(a|ă)to(are[a]|r[ul]))
  precedentul: (precedent(a|ă|[ul])|anterio(ar(ă|a)|r[ul]))
  numit: (numit[(ă|a)]|cu numele|pe nume|intitulat[(ă|a)])
  azi: (azi|ast(ă|a)zi)
