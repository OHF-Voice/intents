language: et
expansion_rules:
  # Contiguous "turn on" verbs (no separable particle)
  turn_on: "(lülita sisse|pane (põlema|tööle)|süüta|käivita)"
  # Contiguous "turn off" verbs (no separable particle)
  turn_off: "(lülita välja|kustuta|pane (kinni|välja)|seiska)"
  open: "(ava|tõsta [üles])"
  close: "(sulge|pane kinni|lase alla)"
