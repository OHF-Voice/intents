language: ar
expansion_rules:
  timer: "[丕賱](賲丐賯鬲賷|賲丐賯鬲|賲賳亘賴|賲賳亘賴賷|賲丐賯鬲丕鬲|賲賳亘賴丕鬲|賲賳亘賴丕鬲賷|賲丐賯鬲丕鬲賷|毓丿丕丿)"
  timer_set: (<turn_on>|<turn>|<create>)
  timer_cancel: (<turn_off>|<cancel>|<remove>)
  timer_pause: <pause>
  timer_resume: (賲鬲丕亘毓丞|鬲賰賲賱丞|<a>爻鬲賲乇|<a>賰賲賱|<a>爻鬲卅賳賮|<a>爻鬲卅賳丕賮|<a>毓丕丿丞 (鬲賳卮賷胤|鬲賮毓賷賱))
  timer_seconds_short: ({timer_three_quarters:seconds}|{timer_half:seconds}|{timer_quarter:seconds})
  timer_minutes_short: ({timer_three_quarters:minutes}|{timer_half:minutes}|{timer_quarter:minutes})
  timer_duration_seconds: ([丕賱]{timer_second:seconds}|[丕賱]{timer_seconds:seconds} <second>|[丕賱]<timer_seconds_short> [<minute>])
  timer_duration_minutes: ([丕賱]{timer_minute:minutes}|[丕賱]{timer_minutes:minutes} <minute>|[丕賱]<timer_minutes_short> [<hour>])
  timer_duration_hours: ([丕賱]{timer_hour:hours}|[丕賱]{timer_hours:hours} <hour>)
  timer_start_seconds_short: ({timer_three_quarters:start_seconds}|{timer_half:start_seconds}|{timer_quarter:start_seconds})
  timer_start_minutes_short: ({timer_three_quarters:start_minutes}|{timer_half:start_minutes}|{timer_quarter:start_minutes})
  timer_start_seconds: ([丕賱]{timer_second:start_seconds}|[丕賱]{timer_seconds:start_seconds} <second>|[丕賱]<timer_start_seconds_short> [<minute>])
  timer_start_minutes: ([丕賱]{timer_minute:start_minutes}|[丕賱]{timer_minutes:start_minutes} <minute>|[丕賱]<timer_start_minutes_short> [<hour>])
  timer_start_hours: ([丕賱]{timer_hour:start_hours}|[丕賱]{timer_hours:start_hours} <hour>)
