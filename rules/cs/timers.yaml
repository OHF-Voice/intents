language: cs
expansion_rules:
  casovac: (časovač[e|i|ů]|odpoč(et|ítávání|ej|tu|ty)|minut(ku|ce|ky))
  timer_cancel: (zastav[it]|zruš[it]|vypn(i|out))
  timer_pause: (pozastav[it]|přeruš[it]|pauza na)
  timer_unpause: (znovu spus(ť|tit)|obnov[it])
  dur_seconds: ({timer_range_seconds:seconds}|{numbers_fonetic:seconds}) (sekund[(a|u|y)]|vteřin[(a|u|y)])
  dur_minutes: ({timer_range_minutes:minutes}|{numbers_fonetic:minutes}) minut[(a|u|y)]
  dur_hours: ({timer_range_hours:hours}|{numbers_fonetic:hours}) hodin[(a|u|y)]
  start_seconds: ({timer_range_seconds:start_seconds}|{numbers_fonetic:start_seconds}) (sekund[(a|u|y)]|vteřin[(a|u|y)])
  start_minutes: ({timer_range_minutes:start_minutes}|{numbers_fonetic:start_minutes}) minut[(a|u|y)]
  start_hours: ({timer_range_hours:start_hours}|{numbers_fonetic:start_hours}) hodin[(a|u|y)]
