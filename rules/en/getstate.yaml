language: en
expansion_rules:
  what_is: (what's|whats|what is|tell me)
  how_is: (how is|how's|hows)
  where_is: (where's|wheres|where is)
  which: (which|what) [of <the>]
  are: <is>
  any: (any|some) [of <the>]
  are_any: "[<are>] <any>"
  are_all: "[<are>] <all>"
  how_many: how many [of <the>]
  lockable: "[<the>] (lock|door|window|gate|garage door|shutter)[s]"
