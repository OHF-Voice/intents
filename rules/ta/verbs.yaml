---
language: "ta"

expansion_rules:
  # "turn on / switch on" (polite imperative)
  turn_on: "ஆன் (செய்யவும்|செய்யுங்கள்|செய்|பண்ணவும்|பண்ணுங்கள்)"
  # "turn off / switch off"
  turn_off: "ஆஃப் (செய்யவும்|செய்யுங்கள்|செய்|பண்ணவும்|பண்ணுங்கள்)"
  # "open / raise" (covers, valves)
  open: "(திறக்கவும்|திறங்கள்|திற|உயர்த்தவும்|உயர்த்துங்கள்)"
  # "close / lower" (covers, valves)
  close: "(மூடவும்|மூடுங்கள்|மூடு|தாழ்த்தவும்|தாழ்த்துங்கள்)"
  # "activate" (scenes, scripts)
  activate: "(இயக்கவும்|இயக்குங்கள்|இயக்கு|செயல்படுத்தவும்|செயல்படுத்துங்கள்)"
  # "lock"
  lock: "(பூட்டவும்|பூட்டுங்கள்|பூட்டு)"
  # "unlock"
  unlock: "(திறக்கவும்|திறங்கள்|பூட்டைத் திறக்கவும்|பூட்டைத் திற)"
