---
language: "ta"

expansion_rules:
  # "all / every"
  all: "(எல்லா|அனைத்து|எல்லாம்)"
  # "here / in this area" (voice satellite's current area)
  here: "(இங்கே|இங்கு|இந்த (அறையில்|இடத்தில்|பகுதியில்))"
  # "everywhere / in the whole house"
  everywhere: "(எங்கும்|எல்லா இடங்களிலும்|வீடு முழுவதும்|வீட்டில் முழுவதும்)"
