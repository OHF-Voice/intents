language: it
expansion_rules:
  is: "(Ăš|sono|sta|stanno|risulta|risultano|si trova|si trovano)"
  what_is: (qual[e] Ăš | qual'Ăš | quant(o |')Ăš | com(e |')Ăš | che | dimmi | sai dirmi)
  how_is: (com(e |')Ăš | come (sta|stanno|va|vanno))
  where_is: (dove Ăš|dov'Ăš|dov'e'|dove sono|dove si trova[no])
  which: (qual[e|i] | che) [<of>]
  how_many: quant(i|e) [<of>]
  are_any: (c'Ăš|c'e'|ci sono|ci sta[nno]) [qualche|alcun(e|i)|de(i|gli|lle)]
  are_all: "<all> [<the>]"
  lockable: "[<the>] (port(a|e)|porton(e|i)|cancell(o|i)|serratur(a|e)|lucchett(o|i))"
