language: nl
expansion_rules:
  state: (status|staat|stand|waarde)
  what_is: (wat (is|zijn)|hoeveel (is|zijn)|hoe (hoog|laag) (is|zijn))
  how_is: (hoe (is|zijn)|hoe staat het met)
  where_is: (waar (is|zijn))
  which: welk[e]
  how_many: hoe[ ]veel
  are_any: <is> [er] [een]
  are_all: <is> [<all>] [de]
  lockable: "[de|het] (slot|deur|poort|rolluik)[en]"
  switch: "[de|het] (schakelaar[s]|switch[es]|stopcontact[en])"
