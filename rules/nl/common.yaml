language: nl
expansion_rules:
  name: "[de|het] {name}"
  area: "[de|het] {area}"
  floor: "[de|het] {floor}"
  area_floor: (<area>|<floor>)
  in_area_floor: "[<in>] <area_floor>"
  by: (door|met|bij)
  of: (van|bij|voor|op)
  here: (hier|in de[ze] (kamer|ruimte))
  name_area: "(\n  <name> [<in> <area>]\n  |<in> <area> <name>\n  |<area>[ ]<name>\n)\n"
  change: (zet|mag|mogen|doe|verander|maak|schakel)
  change_infinitive: "[kunnen] (zetten|doen|veranderen|maken|aanpassen)"
  numeric_value_set_infinitive: "[kunnen] (zetten|doen|veranderen|aanpassen|maken|draaien|verhogen|verlagen|instellen)"
  to: (naar|op)
  is: (zijn|is|staa(n|t)|zit[ten]|word[t|en]|lig(t|gen))
  all: (alle|elke|iedere|overal)
  switch: "[de|een] (schakelaar[s]|switch[es]|plug[gen])"
  my: (de|mijn|m'n)
