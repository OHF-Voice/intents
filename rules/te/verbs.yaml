language: "te"
expansion_rules:
  turn_on: "(వెలిగించు|వెలిగించండి|ఆన్ చెయ్యి|ఆన్ చెయ్|on (చెయ్యి|చెయ్|చెయ్యండి))"
  turn_off: "(ఆర్పు|ఆర్పివేయి|ఆపివేయి|ఆఫ్ చెయ్యి|ఆఫ్ చెయ్|off (చెయ్యి|చెయ్|చెయ్యండి))"
  open: "(తెరువు|తెరవండి|open (చెయ్యి|చెయ్|చెయ్యండి))"
  close: "(మూసివేయి|మూయి|మూయండి|close (చెయ్యి|చెయ్|చెయ్యండి))"
