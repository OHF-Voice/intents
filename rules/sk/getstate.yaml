language: sk
expansion_rules:
  what_is: ((ak(á|é|ý|o)[ je])|je)
  where_is: (kde je|kde sa nachádza)
  any: (nejak(ý|á|é)|niektor(ý|á|é))
  which: (ktor(ý|í|á|é|ú)|ak(ý|á|é|ú))
  how_many: koľko[ je]
  are_any: "[<is>] <any>"
  are_all: "[<is>] <all>"
  lockable: (zámok|zámk(y|ov)|dvere|dverí|brán(a|u|y)|okn(o|á|ien)|okenic(a|e|u))
