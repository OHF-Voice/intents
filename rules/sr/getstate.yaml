language: sr
expansion_rules:
  is: (да ли (је|су|се)|је ли|јесу ли|да ли)
  are_any: да ли (је|су|се) (нека|неки|неке|неко|било која|било који|било које) [од]
  are_all: да ли (је|су|се) (све|сва|сви) [од]
  which: (кој(и|е|а)|шта)
  how_many: колико [(је|има)] [од]
  where_is: где (је|се налази)
  lockable: (брав[а|е|у|их]|врат[а]|прозор[и|а|е]|капиј[а|е|у]|ролетн[а|е|и|у])
