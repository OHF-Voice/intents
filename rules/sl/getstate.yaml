language: sl
expansion_rules:
  kakšno_je: (kakšno je|povej [mi])
  what_is: (kakšn[a|o|e] (je|so)|kakšen je|povej [mi]|[ali] [morda] veš)
  how_is: (kako (je|so)|v kakšnem stanju (je|so))
  where_is: (kje je|kje|kje so|kje se nahaja[jo|ta])
  is: "[ali] (je|so)"
  are_any: "[ali] (je|so) [kak(šn[a|e|i|o]|er[a|e|i|o])]"
  are_all: "[ali] (je|so) (vse|vsa|vsi)"
  which: (kater[i|e|a|o])
  how_many: "[povej [mi]] koliko"
  lockable: (ključavnic[a|e|o]|vrat[a]|okn[o|a]|garažn[a|ih] vrat[a])
