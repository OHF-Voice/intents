language: af
expansion_rules:
  # Verb stems for the separable "skakel/sit/maak ... aan/af" constructions.
  switch: (skakel | sit | draai | maak)
  activate: (aktiveer | aktifeer)
  deactivate: (deaktiveer | deaktifeer)
  # Non-separable single-token verbs.
  # Separable forms ("maak ... oop", "maak ... toe", "sluit ... oop") are
  # written inline in the templates because the particle trails the object.
  open: (open)
  lock: (sluit | grendel)
  unlock: (ontsluit)
