language: "kn"
expansion_rules:
  chalu: "(ಆನ್ ಮಾಡಿ | ಆನ್ ಮಾಡು | ಚಾಲು ಮಾಡಿ | ಚಾಲು ಮಾಡು | ಹಚ್ಚಿ | ಹಚ್ಚು | ಹೊತ್ತಿಸಿ | ಹೊತ್ತಿಸು)"
  bandh: "(ಆಫ್ ಮಾಡಿ | ಆಫ್ ಮಾಡು | ಬಂದ್ ಮಾಡಿ | ಬಂದ್ ಮಾಡು | ಆರಿಸಿ | ಆರಿಸು | ನಂದಿಸಿ | ನಂದಿಸು)"
  tere: "(ತೆರೆಯಿರಿ | ತೆರೆ | ತೆಗೆಯಿರಿ | ತೆಗೆ)"
  muchu: "(ಮುಚ್ಚಿ | ಮುಚ್ಚು | ಮಡಚಿ | ಮಡಚು)"
