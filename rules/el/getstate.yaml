language: el
expansion_rules:
  what_is: (ποια είναι | ποιο είναι | ποιος είναι | τι είναι | τι | πώς είναι | πώς)
  how_is: (πώς είναι | πώς)
  where_is: (πού είναι | πού βρίσκεται)
  is: (είναι | έχει)
  which: (ποια | ποιες | ποιοι | ποιο) [από <the>]
  any: (κάποιο | κάποια | κάποιος | κάποιοι | κάποιες | μερικά | μερικές | μερικοί) [από <the>]
  are_any: "[(υπάρχει | υπάρχουν | είναι)] <any>"
  are_all: "[(είναι | έχουν)] <all>"
  how_many: (πόσα | πόσες | πόσοι) [από <the>]
  lockable: "[<the>] (κλειδαριά | κλειδαριές | πόρτα | πόρτες | παράθυρο | παράθυρα | πύλη | πύλες | γκαραζόπορτα | γκαραζόπορτες)"
