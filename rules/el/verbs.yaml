language: el
expansion_rules:
  turn_on: (άνοιξε | άναψε | ενεργοποίησε | άρχισε | ξεκίνα | τρέξε | σήκωσε | ανοίξεις | ενεργοποιήσεις | ενεργοποιηθεί | αρχίσεις | ξεκινήσεις)
  turn_off: (κλείσε | σβήσε | απενεργοποίησε | σταμάτα | σταμάτησε | κατέβασε | κλείσεις | σταματήσεις | απενεργοποιήσεις | απενεργοποιηθεί)
  set: (όρισε | ρύθμισε | άλλαξε | βάλε | κάνε | βάψε)
  numeric_value_set: (όρισε | ρύθμισε | άλλαξε | αύξησε | μείωσε | βάλε)
  open: (άνοιξε | σήκωσε | ανέβασε) [πάνω]
  close: (κλείσε | κατέβασε) [(πάνω | κάτω)]
  clean: (καθάρισε | σκούπισε | ηλεκτρική σκούπα)
