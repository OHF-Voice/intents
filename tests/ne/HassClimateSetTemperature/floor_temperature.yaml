---
# HassClimateSetTemperature - floor_temperature

language: "ne"
floors:
  - name: "पहिलो तल्ला"

tests:
  - sentences:
      - "पहिलो तल्लाको तापक्रम 20 डिग्री बनाउनु"
      - "पहिलो तल्ला भित्रको तापक्रमलाई 20 डिग्री पार्नु"
      - "पहिलो तल्लाको तापक्रम 20° बनाउनु"
    slots:
      floor: "पहिलो तल्ला"
      temperature: 20
    response: "20 डिग्री बनाईदिएको छु"
