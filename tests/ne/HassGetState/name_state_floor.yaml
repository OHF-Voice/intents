---
# HassGetState - name_state_floor

language: "ne"
floors:
  - name: "पहिलो"
  - name: "दोस्रो"

areas:
  - name: "ग्यारेज"
    floor: "पहिलो"
  - name: "प्रवेशद्वार"
    floor: "पहिलो"
  - name: "सुत्ने कोठा"
    floor: "दोस्रो"
  - name: "अफिस"
    floor: "दोस्रो"

entities:
  - name: "ग्यारेजको ढोका"
    domain: "cover"
    state: "open"
    area: "ग्यारेज"
  - name: "अगाडिको ढोका"
    domain: "lock"
    state: "locked"
    area: "प्रवेशद्वार"
  - name: "झ्याल"
    domain: "binary_sensor"
    state: "on"
    area: "सुत्ने कोठा"
  - name: "मोसन सेन्सर"
    domain: "binary_sensor"
    state: "on"
    area: "अफिस"

tests:
  - sentences:
      - "के पहिलो तल्लामा ग्यारेजको ढोका खुल्ला छ"
    slots:
      name: "ग्यारेजको ढोका"
      state: "open"
      floor: "पहिलो"
    response: "छ"

  - sentences:
      - "के पहिलो तल्लामा अगाडिको ढोका बन्द छ"
    slots:
      name: "अगाडिको ढोका"
      state: "locked"
      floor: "पहिलो"
    response: "छ"

  - sentences:
      - "के दोस्रो तल्लामा झ्याल खुल्ला छ"
    slots:
      name: "झ्याल"
      state: "on"
      floor: "दोस्रो"
    response: "छ"

  - sentences:
      - "के दोस्रो तल्लामा मोसन सेन्सर उपस्थित छ"
    slots:
      name: "मोसन सेन्सर"
      state: "on"
      floor: "दोस्रो"
    response: "छ"
