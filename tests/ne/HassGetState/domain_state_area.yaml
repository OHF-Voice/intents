---
# HassGetState - domain_state_area

language: "ne"
areas:
  - name: "भान्सा"
  - name: "बैठक"
  - name: "दलान"

entities:
  - name: "बत्ती ए"
    domain: "light"
    state: "on"
    area: "भान्सा"
  - name: "पंखा ए"
    domain: "fan"
    state: "on"
    area: "भान्सा"
  - name: "स्विच ए"
    domain: "switch"
    state: "on"
    area: "भान्सा"
  - name: "अगाडिको ढोका"
    domain: "lock"
    state: "unlocked"
    area: "दलान"

tests:
  # ---- lights ----
  - sentences: ["के भान्सामा कुनै बत्ती अन छ"]
    slots: { state: "on", area: "भान्सा" }
