  - sentences: ["भान्सामा कुन पंखा अन छन्"]
    slots: { state: "on", area: "भान्सा" }
    response: "पंखा ए"
  - sentences: ["भान्सामा कति ओटा पंखा अन छन्"]
    slots: { state: "on", area: "भान्सा" }
