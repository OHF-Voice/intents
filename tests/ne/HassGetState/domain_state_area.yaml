  - sentences: ["के भान्सामा सबै बत्ती अफ छन्"]
    slots: { state: "off", area: "भान्सा" }
    response: "छैन, बत्ती ए"
  - sentences: ["भान्सामा कुन बत्ती अन छन्"]
    slots: { state: "on", area: "भान्सा" }
    response: "बत्ती ए"
  - sentences: ["भान्सामा कति ओटा बत्ती अन छन्"]
    slots: { state: "on", area: "भान्सा" }
    response: "1 ओटा"

  # ---- fans ----
  - sentences: ["के भान्सामा कुनै पंखा अन छ"]
