---
# HassLightSet - brightness_only

language: "ne"
tests:
  - sentences:
      - "उज्यालोपन 50 प्रतिशत बनाउनु"
      - "यहाँको सबै बत्तीको उज्यालोपन 50 प्रतिशत बनाउनु"
      - "उज्यालोपन 50 प्रतिशतमा बढाउनु"
    slots:
      brightness: 50
    response: "उज्यालोपन 50 प्रतिशत बनाईदिएको छु"
  - sentences:
      - "उज्यालोपन अधिकतम प्रतिशत बनाउनु"
      - "यहाँको सबै बत्तीको उज्यालोपन अधिकतम प्रतिशतमा बढाउनु"
    slots:
      brightness: 100
    response: "उज्यालोपन अधिकतम प्रतिशत बनाईदिएको छु"
