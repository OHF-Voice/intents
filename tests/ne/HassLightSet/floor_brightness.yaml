---
# HassLightSet - floor_brightness

language: "ne"
floors:
  - name: "पहिलो तल्ला"

tests:
  - sentences:
      - "पहिलो तल्लाको उज्यालोपन 50 प्रतिशत बनाउनु"
      - "पहिलो तल्लाको सबै बत्तीको उज्यालोपन 50 प्रतिशत बनाउनु"
      - "पहिलो तल्लाको उज्यालोपन 50 प्रतिशतमा बढाउनु"
      - "पहिलो तल्लालाई 50 प्रतिशत उज्यालो बनाउनु"
    slots:
      floor: "पहिलो तल्ला"
      brightness: 50
    response: "पहिलो तल्लाको उज्यालोपन 50 प्रतिशत बनाईदिएको छु"
  - sentences:
      - "पहिलो तल्लाको उज्यालोपन अधिकतम प्रतिशत बनाउनु"
      - "पहिलो तल्लाको उज्यालोपन अधिकतम प्रतिशतमा बढाउनु"
      - "पहिलो तल्लालाई अधिकतम प्रतिशत उज्यालो बनाउनु"
    slots:
      floor: "पहिलो तल्ला"
      brightness: 100
    response: "पहिलो तल्लाको उज्यालोपन अधिकतम प्रतिशत बनाईदिएको छु"
