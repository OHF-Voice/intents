---
# HassRespond - default

language: da
tests:
  - sentences:
      - hej home assistant
      - hallo
      - halløj home assistant
    response: Hej fra Home Assistant.
  - sentences:
      - lytter du altid
      - optager du hele tiden
    response: Nej, jeg lytter kun, når du siger vågn-op-ordet.
  - sentences:
      - hvor sendes det jeg siger hen
      - hvad sker der med mine data
      - hvad sker der med det du optager
      - hvor sendes optagelserne hen
    response: Dine data sendes til din Home Assistant server.
  - sentences:
      - hvad kan jeg sige
      - hvad kan jeg spørge om
      - hvilke kommandoer forstår du
      - hvad for kommandoer kan jeg bruge
    response:
      For at lære hvad du kan spørge om, besøg home bindestreg assistant punktum
      i.o. skråstreg voice.
  - sentences:
      - hvem har skabt dig
      - hvem lavede dig
    response:
      Jeg blev skabt af det vidunderlige Home Assistant-fællesskab, som består
      af entusiaster fra hele verden.
