---
# HassGetState - domain_state

language: da
entities:
  - name: Loftslys
    domain: light
    state: "on"
  - name: Bordlampe
    domain: light
    state: "off"
  - name: Loftsventilator
    domain: fan
    state: "on"
  - name: Badeværelsesventilator
    domain: fan
    state: "off"
  - name: Stikkontakt
    domain: switch
    state: "on"
  - name: Verandakontakt
    domain: switch
    state: "off"
  - name: Hoveddør
    domain: lock
    state: locked
  - name: Bagdør
    domain: lock
    state: unlocked
  - name: Søren
    domain: person
    state: hjemme
  - name: Mette
    domain: person
    state: arbejde
tests:
  # lights
  - sentences: ["er nogen lys tændt"]
    slots: { domain: light, state: "on" }
    response: "Ja, Loftslys"
  - sentences: ["er alle lys slukket"]
    slots: { domain: light, state: "off" }
    response: "Nej, ikke Loftslys"
  - sentences: ["hvilke lys er tændt"]
    slots: { domain: light, state: "on" }
    response: "Loftslys"
  - sentences: ["hvor mange lys er tændt"]
    slots: { domain: light, state: "on" }
    response: "1"
  # fans
  - sentences: ["er nogen ventilatorer tændt"]
    slots: { domain: fan, state: "on" }
    response: "Ja, Loftsventilator"
  - sentences: ["er alle ventilatorer slukket"]
    slots: { domain: fan, state: "off" }
    response: "Nej, ikke Loftsventilator"
  - sentences: ["hvilke ventilatorer er tændt"]
    slots: { domain: fan, state: "on" }
    response: "Loftsventilator"
  - sentences: ["hvor mange ventilatorer er tændt"]
    slots: { domain: fan, state: "on" }
    response: "1"
  # switches
  - sentences: ["er nogen kontakter tændt"]
    slots: { domain: switch, state: "on" }
    response: "Ja, Stikkontakt"
  - sentences: ["er alle kontakter tændt"]
    slots: { domain: switch, state: "on" }
    response: "Nej, ikke Verandakontakt"
  - sentences: ["hvilke kontakter er tændt"]
    slots: { domain: switch, state: "on" }
    response: "Stikkontakt"
  - sentences: ["hvor mange kontakter er tændt"]
    slots: { domain: switch, state: "on" }
    response: "1"
  # locks
  - sentences: ["er nogen døre ulåst"]
    slots: { domain: lock, state: unlocked }
    response: "Ja, Bagdør"
  - sentences: ["er alle døre låst"]
    slots: { domain: lock, state: locked }
    response: "Nej, ikke Bagdør"
  - sentences: ["hvilke døre er låst"]
    slots: { domain: lock, state: locked }
    response: "Hoveddør"
  - sentences: ["hvor mange døre er låst"]
    slots: { domain: lock, state: locked }
    response: "1"
  # people / zone
  - sentences: ["er nogen hjemme"]
    slots: { domain: person, state: hjemme }
    response: "Ja, Søren"
  - sentences: ["er alle hjemme"]
    slots: { domain: person, state: hjemme }
    response: "Nej, ikke Mette"
  - sentences: ["hvem er hjemme"]
    slots: { domain: person, state: hjemme }
    response: "Søren"
  - sentences: ["hvor mange personer er hjemme"]
    slots: { domain: person, state: hjemme }
    response: "1"
