---
# HassTimerStatus - minutes_only

language: da
timers:
  - is_active: true
    total_seconds_left: 180
    rounded_hours_left: 0
    rounded_minutes_left: 3
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - 5 minutter nedtælling status
      - status på 5 minutter nedtælling
      - tid igen på 5 minutter nedtælling
    slots:
      start_minutes: 5
    response: 3 minutter tilbage.
