# HassTimerStatus - hours_only

language: da
timers:
  - is_active: true
    total_seconds_left: 600
    rounded_hours_left: 0
    rounded_minutes_left: 10
    rounded_seconds_left: 0
    start_hours: 1
tests:
  - sentences:
      - 1 time nedtælling status
      - status på 1 time nedtælling
      - tid igen på 1 time nedtælling
    slots:
      start_hours: 1
    response: 10 minutter tilbage.
