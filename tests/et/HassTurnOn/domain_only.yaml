---
# HassTurnOn - domain_only

language: "et"
tests:
  # lights
  - sentences:
      - "süüta tuled"
      - "lülita siin tuled sisse"
      - "lülita kõik tuled sisse"
      - "tuled põlema"
    slots:
      domain: "light"
    response: "Tuled lülitatud sisse"

  # fans
  - sentences:
      - "süüta ventilaatorid"
      - "lülita ventilaatorid sisse"
      - "lülita kõik ventilaatorid sisse"
    slots:
      domain: "fan"
    response: "Ventilaatorid lülitatud sisse"
