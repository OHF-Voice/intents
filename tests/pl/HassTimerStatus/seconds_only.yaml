---
# HassTimerStatus - seconds_only

language: pl
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_seconds: 30
tests:
  - sentences:
      - status 30 sekund minutnika
      - ile czasu zostało na 30 sekund minutniku
    slots:
      start_seconds: 30
    response: "Pozostało 5 minut do zakończenia."
