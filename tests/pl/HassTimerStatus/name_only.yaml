---
# HassTimerStatus - name_only

language: pl
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
    name: pizza
tests:
  - sentences:
      - status minutnika o nazwie pizza
      - ile czasu zostało na minutniku o nazwie pizza
    slots:
      name: pizza
    response: "Pozostało 5 minut do zakończenia."
