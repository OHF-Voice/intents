---
# HassTimerStatus - minutes_only

language: pl
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - status 5 minut minutnika
      - ile czasu zostało na 5 minut minutniku
    slots:
      start_minutes: 5
    response: "Pozostało 5 minut do zakończenia."
