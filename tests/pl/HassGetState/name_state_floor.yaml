# HassGetState - name_state_floor

language: pl
floors:
  - name: Parter
entities:
  - name: Roleta
    domain: cover
    state: open
  - name: Zamek
    domain: lock
    state: locked
  - name: Okno
    domain: binary_sensor
    state: "on"
tests:
  - sentences:
      - czy Roleta jest otwórz Parter
    slots:
      name: Roleta
      state: open
      floor: Parter
    response: Tak
  - sentences:
      - czy Zamek jest zablokowane Parter
    slots:
      name: Zamek
      state: locked
      floor: Parter
    response: Tak
  - sentences:
      - czy Okno jest otwarty Parter
    slots:
      name: Okno
      state: "on"
      floor: Parter
    response: Tak
