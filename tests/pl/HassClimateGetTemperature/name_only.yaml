---
# HassClimateGetTemperature - name_only

language: pl
entities:
  - name: Termostat
    domain: climate
    attributes:
      current_temperature: 20.2
tests:
  - sentences:
      - jaka jest temperatura Termostat
      - ile jest stopni Termostat
      - jaka jest Termostat temperatura
    slots:
      name: Termostat
    response: Temperatura wynosi 20,2 stopnia
