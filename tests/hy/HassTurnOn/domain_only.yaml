---
# HassTurnOn - domain_only

language: hy

tests:
  - sentences:
      - "միացրու լույսերը"
      - "լույսերը միացրու"
      - "ակտիվացրու լույսերը"
      - "միացրու բոլոր լույսերը այստեղ"
    slots:
      domain: "light"
    response: "Միացրեցի լույսերը"

  - sentences:
      - "միացրու օդափոխիչները"
      - "օդափոխիչները միացրու"
      - "ակտիվացրու օդափոխիչները"
      - "միացրու բոլոր օդափոխիչները այստեղ"
    slots:
      domain: "fan"
    response: "Միացրեցի օդափոխիչները"
