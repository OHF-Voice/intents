---
# HassTurnOn - area_domain

language: hy

areas:
  - name: "խոհանոց"

tests:
  - sentences:
      - "միացրու լույսերը խոհանոցում"
      - "միացրու խոհանոցի լույսերը"
      - "խոհանոցի լույսերը միացրու"
      - "ակտիվացրու խոհանոցի լույսերը"
    slots:
      area: "խոհանոց"
      domain: "light"
    response: "Միացրեցի լույսերը"

  - sentences:
      - "միացրու օդափոխիչները խոհանոցում"
      - "միացրու խոհանոցի օդափոխիչները"
      - "խոհանոցի օդափոխիչները միացրու"
      - "ակտիվացրու խոհանոցի օդափոխիչները"
    slots:
      area: "խոհանոց"
      domain: "fan"
    response: "Միացրեցի օդափոխիչները"
