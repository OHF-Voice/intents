---
# HassLightSet - floor_brightness

language: hy
floors:
  - name: "առաջին հարկ"
tests:
  - sentences:
      - "դիր առաջին հարկի պայծառությունը 50 տոկոս"
      - "դիր պայծառությունը առաջին հարկում 50 տոկոս"
    slots:
      floor: "առաջին հարկ"
      brightness: 50
    response: "Պայծառությունը դարձրեցի"
  - sentences:
      - "դիր առաջին հարկի պայծառությունը առավելագույն"
    slots:
      floor: "առաջին հարկ"
      brightness: 100
    response: "Պայծառությունը դարձրեցի"
