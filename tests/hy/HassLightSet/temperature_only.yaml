    slots:
      temperature: 2700
    response: "Գույնի ջերմաստիճանը դարձրեցի"
  - sentences:
      - "դիր գույնի ջերմաստիճանը տաք սպիտակ"
    slots:
      temperature: 2700
    response: "Գույնի ջերմաստիճանը դարձրեցի"
