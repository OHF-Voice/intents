---
# HassLightSet - brightness_only

language: hy
tests:
  - sentences:
      - "դիր պայծառությունը 50 տոկոս"
      - "դիր այստեղ պայծառությունը 50 տոկոս"
    slots:
      brightness: 50
    response: "Պայծառությունը դարձրեցի"
  - sentences:
      - "դիր պայծառությունը առավելագույն"
    slots:
      brightness: 100
    response: "Պայծառությունը դարձրեցի"
