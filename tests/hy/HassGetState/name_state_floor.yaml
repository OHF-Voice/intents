tests:
  - sentences:
      - "ավտոտնակի դուռը բացված առաջին հարկում"
    slots:
      name: "ավտոտնակի դուռ"
      state: "open"
      floor: "առաջին հարկ"
    response: "Այո"

  - sentences:
      - "մուտքի դուռը կողպված առաջին հարկում"
    slots:
      name: "մուտքի դուռ"
      state: "locked"
      floor: "առաջին հարկ"
    response: "Այո"

  - sentences:
      - "լուսամուտը բացված երկրորդ հարկում"
    slots:
      name: "լուսամուտ"
      state: "on"
      floor: "երկրորդ հարկ"
    response: "Այո"

  - sentences:
      - "ներկայության սենսորը զբաղված երկրորդ հարկում"
    slots:
      name: "ներկայության սենսոր"
      state: "on"
      floor: "երկրորդ հարկ"
    response: "Այո"
