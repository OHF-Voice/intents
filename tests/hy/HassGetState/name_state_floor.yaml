---
# HassGetState - name_state_floor

language: hy
entities:
  - name: "ավտոտնակի դուռ"
    domain: "cover"
    state: "open"
  - name: "մուտքի դուռ"
    domain: "lock"
    state: "locked"
  - name: "լուսամուտ"
    domain: "binary_sensor"
    state: "on"
  - name: "ներկայության սենսոր"
    domain: "binary_sensor"
    state: "on"
floors:
  - name: "առաջին հարկ"
