---
# HassTurnOff - area_domain

language: hy

areas:
  - name: "խոհանոց"

tests:
  - sentences:
      - "անջատիր լույսերը խոհանոցում"
      - "անջատիր խոհանոցի լույսերը"
      - "խոհանոցի լույսերը անջատիր"
      - "ապաակտիվացրու խոհանոցի լույսերը"
    slots:
      area: "խոհանոց"
      domain: "light"
    response: "Անջատեցի լույսերը"

  - sentences:
      - "անջատիր օդափոխիչները խոհանոցում"
      - "անջատիր խոհանոցի օդափոխիչները"
      - "խոհանոցի օդափոխիչները անջատիր"
      - "ապաակտիվացրու խոհանոցի օդափոխիչները"
    slots:
      area: "խոհանոց"
      domain: "fan"
    response: "Անջատեցի օդափոխիչները"
