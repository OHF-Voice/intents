---
# HassTurnOff - domain_only

language: hy

tests:
  - sentences:
      - "անջատիր լույսերը"
      - "լույսերը անջատիր"
      - "ապաակտիվացրու լույսերը"
      - "անջատիր բոլոր լույսերը այստեղ"
    slots:
      domain: "light"
    response: "Անջատեցի լույսերը"

  - sentences:
      - "անջատիր օդափոխիչները"
      - "օդափոխիչները անջատիր"
      - "ապաակտիվացրու օդափոխիչները"
      - "անջատիր բոլոր օդափոխիչները այստեղ"
    slots:
      domain: "fan"
    response: "Անջատեցի օդափոխիչները"
