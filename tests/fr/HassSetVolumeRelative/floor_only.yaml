---
# HassSetVolumeRelative - floor_only

language: fr
floors:
  - name: "Rez-De-Chaussée"
  - name: "Premier Étage"

tests:
  - sentences:
      - "Monte le volume au Rez-De-Chaussée"
    slots:
      volume_step: "up"
      floor: "Rez-De-Chaussée"
    response: "Volume ajusté"

  - sentences:
      - "Baisse le volume au Premier Étage"
    slots:
      volume_step: "down"
      floor: "Premier Étage"
    response: "Volume ajusté"
