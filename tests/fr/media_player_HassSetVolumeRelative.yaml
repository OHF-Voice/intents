language: fr
tests:
  - sentences:
      - "Monte le volume"
      - "Augmente le volume"
    intent:
      name: HassSetVolumeRelative
      context:
        area: salon
      slots:
        volume_step: "up"
        area: salon
    response: "Volume ajusté"

  - sentences:
      - "Baisse le volume"
      - "Diminue le volume"
    intent:
      name: HassSetVolumeRelative
      context:
        area: salon
      slots:
        volume_step: "down"
        area: salon
    response: "Volume ajusté"

  - sentences:
      - "Monte le volume dans la cuisine"
      - "Augmente le volume dans la cuisine"
    intent:
      name: HassSetVolumeRelative
      slots:
        volume_step: "up"
        area: "cuisine"
    response: "Volume ajusté"

  - sentences:
      - "Baisse le volume dans la cuisine"
    intent:
      name: HassSetVolumeRelative
      slots:
        volume_step: "down"
        area: "cuisine"
    response: "Volume ajusté"

  - sentences:
      - "Monte le volume au Rez-De-Chaussée"
    intent:
      name: HassSetVolumeRelative
      slots:
        volume_step: "up"
        floor: "Rez-De-Chaussée"
    response: "Volume ajusté"

  - sentences:
      - "Baisse le volume au Premier Étage"
    intent:
      name: HassSetVolumeRelative
      slots:
        volume_step: "down"
        floor: "Premier Étage"
    response: "Volume ajusté"
