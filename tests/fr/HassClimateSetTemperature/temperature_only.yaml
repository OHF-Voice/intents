---
# HassClimateSetTemperature - temperature_only
language: fr
tests:
  - sentences:
      - "Règle la température sur 30 degrés"
      - "Règle la température à 30"
    slots:
      temperature: 30
    response: "Température réglée sur 30 degrés"

  - sentences:
      - "Règle la température sur 20.5 degrés"
      - "Règle la température à 20.5°"
    slots:
      temperature: 20.5
    response: "Température réglée sur 20.5 degrés"
