---
# HassClimateSetTemperature - name_temperature
language: fr
entities:
  - name: "sèche-serviettes"
    domain: "climate"
tests:
  - sentences:
      - "Change la température du sèche-serviettes sur 19"
      - "Met le sèche-serviettes à 19 degrés"
    slots:
      name: "sèche-serviettes"
      temperature: 19
    response: "Température réglée sur 19 degrés"
