      - "règle la lampe de chevet en rouge"
      - "règle la couleur de la lampe de chevet en rouge"
      - "allume la lampe de chevet en rouge"
      - "régler la lampe de chevet en rouge"
    slots:
      color: "red"
      name: "lampe de chevet"
    response: "Couleur réglée"
