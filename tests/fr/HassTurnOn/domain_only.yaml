---
# HassTurnOn - domain_only
# example: allume les lumières
# context_area: true

language: fr
tests:
  # lights
  - sentences:
      - "allume toutes les lumières ici"
      - "allume les lumières"
      - "éclaire cette pièce"
      - "jour"
    slots:
      domain: "light"
    response: "Allumé"

  # fans
  - sentences:
      - "allume les ventilateurs"
      - "allume tous les ventilateurs"
    slots:
      domain: "fan"
    response: "Ventilateurs allumés"
