---
# HassTurnOn - floor_device_class_cover
language: fr
floors:
  - name: "premier étage"
  - name: "rez-de-chaussée"

tests:
  - sentences:
      - "ouvre les rideaux du premier étage"
      - "ouvre tous les rideaux dans le premier étage"
    slots:
      floor: "premier étage"
      device_class: "curtain"
    response: "Ouverture en cours"

  - sentences:
      - "ouvre les volets du rez-de-chaussée"
    slots:
      floor: "rez-de-chaussée"
      device_class: "shutter"
    response: "Ouverture en cours"
