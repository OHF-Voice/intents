---
# HassTurnOff - name_only

language: "tr"
entities:
  - name: "Yatak Odası Lambası"
    domain: "light"
  - name: "Mutfak Düğmesi"
    domain: "switch"
  - name: "Tavan Fanı"
    domain: "fan"
  - name: "Sol Perde"
    domain: "cover"
  - name: "Ana Vana"
    domain: "valve"
  - name: "Ön Kapı"
    domain: "lock"

tests:
  # off-able domains
  - sentences:
      - "Yatak Odası Lambasını kapat"
      - "Yatak Odası Lambasını kapa"
      - "Yatak Odası Lambasını söndür"
    slots:
      name: "Yatak Odası Lambası"
    response: "Yatak Odası Lambası kapatıldı"

  - sentences:
      - "Mutfak Düğmesini kapat"
    slots:
      name: "Mutfak Düğmesi"
    response: "Mutfak Düğmesi kapatıldı"

  - sentences:
      - "Tavan Fanını kapat"
    slots:
      name: "Tavan Fanı"
    response: "Tavan Fanı kapatıldı"

  # covers
  - sentences:
      - "Sol Perdeyi kapat"
      - "Sol Perdeyi indir"
    slots:
      name: "Sol Perde"
    response: "Sol Perde kapatıldı"

  # valves
  - sentences:
      - "Ana Vanayı kapat"
    slots:
      name: "Ana Vana"
    response: "Ana Vana kapatıldı"

  # locks
  - sentences:
      - "Ön Kapının kilidini aç"
    slots:
      name: "Ön Kapı"
    response: "Ön Kapı kilidi açıldı"
