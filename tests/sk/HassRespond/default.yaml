language: sk
tests:
  - sentences:
      - "ahoj"
      - "čau"
      - "ahoj home assistant"
    response: "Ahoj od Home Assistant."
  - sentences:
      - "počúvaš stále"
    response: "Nie, nahrávam len keď vyslovíš aktivačné slovo."
  - sentences:
      - "kam idú moje dáta"
    response: "Tvoje dáta sú odoslané na tvoj Home Assistant server."
  - sentences:
      - "čo ti môžem povedať"
      - "čo ti môžem prikázať"
      - "čo ti môžem rozkázať"
      - "čo sa ťa môžem spýtať"
      - "čo sa ťa môžem opýtať"
    response: "Ak sa chceš dozvedieť, čo sa ma môžeš opýtať, navštív H.O.M.E pomlčka A.S.S.I.S.T.A.N.T bodka I.O. lomka voice."
  - sentences:
      - "kto ťa vytvoril"
    response: "Bol som vytvorený úžasnou komunitou Home Assistant, zloženou z nadšencov z celého sveta."
