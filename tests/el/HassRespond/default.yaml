language: el
tests:
  - sentences:
      - γεια σου
      - χαίρετε
    response: Γεια σου από το Home Assistant.
  - sentences:
      - ακούς πάντα όσα λέω
      - καταγράφεις πάντα ότι λέω
    response: Όχι, καταγράφω μόνο όταν λες τη λέξη αφύπνισης.
  - sentences:
      - πού πηγαίνουν τα δεδομένα μου
    response: Τα δεδομένα σου αποστέλλονται στον διακομιστή (server) του Home Assistant.
  - sentences:
      - τι μπορώ να ρωτήσω
      - ποιες είναι οι διαθέσιμες εντολές
    response: Για να δεις τι μπορείς να ρωτήσεις, επισκέψου το home dash assistant τελεία I.O κάθετος voice.
  - sentences:
      - ποιος σε έφτιαξε
    response: Δημιουργήθηκα από την υπέροχη κοινότητα του Home Assistant, η οποία αποτελείται από λάτρεις της τεχνολογίας παγκοσμίως.
