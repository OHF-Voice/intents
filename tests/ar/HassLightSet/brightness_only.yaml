      brightness: 50
    response: تم ضبط السطوع إلى 50
  - sentences:
      - اضبط سطوع جميع الاضواء الى قصوى
      - أضبط جميع الاضواء الى سطوع قصوى
    slots:
      brightness: 100
    response: تم ضبط السطوع إلى قصوى
  - sentences:
      - اضبط سطوع جميع الاضواء الى منخفض
      - أضبط جميع الاضواء الى سطوع منخفض
    slots:
      brightness: 1
    response: تم ضبط السطوع إلى منخفض
