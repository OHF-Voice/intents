---
# HassTimerStatus - minutes_only
language: ar
timers:
  - is_active: true
    rounded_minutes_left: 5
    total_seconds_left: 300
    start_minutes: 10
tests:
  - sentences:
      - حالة مؤقت 5 دقائق
      - كم تبقى على مؤقت 5 دقائق
    slots:
      start_minutes: 5
    response: "تبقى 5 دقائق ."
