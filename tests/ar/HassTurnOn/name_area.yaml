---
# HassTurnOn - name_area

language: ar
areas:
  - name: غرفة المعيشة
  - name: المطبخ
entities:
  - name: الضوء العلوي
    domain: light
    area: المطبخ
  - name: الستارة اليسرى
    domain: cover
    attributes:
      device_class: curtain
    area: غرفة المعيشة
  - name: الباب الأمامي
    domain: lock
    area: المطبخ
tests:
  # on-able domains (light)
  - sentences:
      - شغل الضوء العلوي في المطبخ
      - شغل المطبخ الضوء العلوي
    slots:
      name: الضوء العلوي
      area: المطبخ
    response: تم تشغيل الضوء
  # cover
  - sentences:
      - افتح الستارة اليسرى في غرفة المعيشة
    slots:
      name: الستارة اليسرى
      area: غرفة المعيشة
    response: تم الفتح
  # lock
  - sentences:
      - اقفل الباب الأمامي في المطبخ
      - اقفل الباب الأمامي داخل المطبخ
    slots:
      name: الباب الأمامي
      area: المطبخ
    response: تم القفل
