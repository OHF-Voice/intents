  - sentences:
      - شغل جميع المراوح في غرفة النوم
      - شغل مراوح غرفة النوم
      - شغل في غرفة النوم المراوح
    slots:
      area: غرفة النوم
      domain: fan
    response: تم تشغيل المراوح
