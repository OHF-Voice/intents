# HassTurnOn - name_floor

language: ar
floors:
  - name: الطابق الأول
entities:
  - name: الضوء العلوي
    domain: light
  - name: الستارة اليسرى
    domain: cover
  - name: الصمام الرئيسي
    domain: valve
tests:
  # on-able domains (light)
  - sentences:
      - شغل الضوء العلوي في الطابق الأول
    slots:
      name: الضوء العلوي
      floor: الطابق الأول
    response: تم تشغيل الضوء
    # cover
  - sentences:
      - افتح الستارة اليسرى في الطابق الأول
    slots:
      name: الستارة اليسرى
      floor: الطابق الأول
    response: تم الفتح
    # valve
  - sentences:
      - افتح الصمام الرئيسي في الطابق الأول
    slots:
      name: الصمام الرئيسي
      floor: الطابق الأول
    response: تم الفتح
