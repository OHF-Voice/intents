# HassTurnOff - name_only

language: ar
entities:
  - name: مروحة السقف
    domain: fan
  - name: زاوية اللعب
    domain: light
  - name: الستارة اليسرى
    domain: cover
  - name: الصمام الرئيسي
    domain: valve
  - name: الباب الأمامي
    domain: lock
tests:
  # off-able domains (fan)
  - sentences:
      - اطفئ مروحة السقف
      - اغلق مفتاح مروحة السقف
      - اطفئ مفتاح مروحة السقف
    slots:
      name: مروحة السقف
    response: تم إطفاء المروحة
    # light named with trailing light word
  - sentences:
      - اطفئ زاوية اللعب ضوء
    slots:
      name: زاوية اللعب
    response: تم إطفاء الضوء
    # cover
  - sentences:
      - اغلق الستارة اليسرى
    slots:
      name: الستارة اليسرى
    response: تم الاغلاق
    # valve
  - sentences:
      - اغلق الصمام الرئيسي
    slots:
      name: الصمام الرئيسي
    response: تم الفتح
    # lock
  - sentences:
      - افتح الباب الأمامي
    slots:
      name: الباب الأمامي
    response: تم الفتح
