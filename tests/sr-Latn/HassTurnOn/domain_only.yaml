---
# HassTurnOn - domain_only

language: "sr-Latn"
entities:
  - name: "Kuhinjski plafon"
    domain: "light"
  - name: "plafonsk(i|og) ventilator[a]"
    domain: "fan"

tests:
  - sentences:
      - "uključi svetla"
      - "uključi sva svetla ovde"
      - "sva svetla uključeno"
    slots:
      domain: "light"
    response: "Svetla su uključena"

  - sentences:
      - "uključi ventilatore"
      - "uključi sve ventilatore u ovoj prostoriji"
    slots:
      domain: "fan"
    response: "Ventilatori su uključeni"
