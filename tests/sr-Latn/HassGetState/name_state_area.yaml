---
# HassGetState - name_state_area

language: "sr-Latn"
areas:
  - name: "garaži"
  - name: "spavaćoj sobi"

entities:
  - name: "garažna vrata"
    domain: "cover"
    state: "open"
    area: "garaži"
  - name: "ulazna vrata"
    domain: "lock"
    state: "locked"
    area: "garaži"
  - name: "prozor"
    domain: "binary_sensor"
    state: "on"
    area: "spavaćoj sobi"
  - name: "senzor pokreta"
    domain: "binary_sensor"
    state: "on"
    area: "garaži"

tests:
  - sentences:
      - "da li su garažna vrata otvorena u garaži"
    slots:
      name: "garažna vrata"
      state: "open"
      area: "garaži"
    response: "Da"

  - sentences:
      - "da li su ulazna vrata zaključana u garaži"
    slots:
      name: "ulazna vrata"
      state: "locked"
      area: "garaži"
    response: "Da"

  - sentences:
      - "da li je prozor otvoren u spavaćoj sobi"
    slots:
      name: "prozor"
      state: "on"
      area: "spavaćoj sobi"
    response: "Da"

  - sentences:
      - "da li je senzor pokreta zauzet u garaži"
    slots:
      name: "senzor pokreta"
      state: "on"
      area: "garaži"
    response: "Da"
