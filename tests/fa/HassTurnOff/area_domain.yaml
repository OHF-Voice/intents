    response: "چراغ‌ها خاموش شدند"

  # fans
  - sentences:
      - "پنکه‌ها را در Living Room خاموش کن"
      - "پنکه‌ها Living Room را خاموش کن"
    slots:
      area: "Living Room"
    response: "پنکه‌ها خاموش شدند"
