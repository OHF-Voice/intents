---
# HassRespond - default

language: it
tests:
  - sentences:
      - ciao home assistant
    response: Ciao da Home Assistant.
  - sentences:
      - Ascolti sempre ?
      - Registri sempre ?
    response: No, registro solamente quando usi la wake word.
  - sentences:
      - dove finiscono i miei dati?
    response: I tuoi dati sono inviati al tuo server Home Assistant.
  - sentences:
      - cosa posso chiederti?
      - cosa posso domandare?
    response:
      Per conoscere cosa puoi chiedere, visita il sito home trattino assistant
      punto IO slash voice trattino basso control.
  - sentences:
      - chi ti ha creato?
      - chi ti ha fatto?
    response:
      Sono stato creato dalla fantastica community di Home Assistant, formata
      da appassionati di domotica di tutto il mondo.
