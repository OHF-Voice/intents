---
# HassTurnOn - name_floor

language: "it"
floors:
  - name: Primo piano
entities:
  - name: Luce Centrale
    domain: light
    floor: Primo piano
  - name: Angolo Gioco
    domain: light
    floor: Primo piano
  - name: Porta Scorrevole
    domain: cover
    floor: Primo piano
  - name: Valvola Principale
    domain: valve
    floor: Primo piano
tests:
  # on-able domains
  - sentences:
      - "accendi la luce centrale al primo piano"
    slots:
      name: Luce Centrale
      floor: Primo piano
    response: "Ho acceso Luce Centrale"

  # lights named with a "light(s)" word
  - sentences:
      - "accendi le luci dell'angolo gioco al primo piano"
    slots:
      name: Angolo Gioco
      floor: Primo piano
    response: "Ho acceso Angolo Gioco"

  # covers
  - sentences:
      - "apri la porta scorrevole al primo piano"
    slots:
      name: Porta Scorrevole
      floor: Primo piano
    response: "Ho aperto Porta Scorrevole"

  # valves
  - sentences:
      - "apri la valvola principale al primo piano"
    slots:
      name: Valvola Principale
      floor: Primo piano
    response: "Sto aprendo"
