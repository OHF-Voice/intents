      - quanto è caldo il soggiorno?
      - dimmi quanto è freddo il soggiorno?
      - quanto caldo fa in soggiorno?
      - quanto freddo fa in soggiorno?
      - puoi dirmi che temperatura c'è in soggiorno?
      - quanto fa caldo in soggiorno?
      - com'è la temperatura in soggiorno?
      - quanti gradi ci sono in soggiorno?
    slots:
      area: Soggiorno
    response: 20 gradi
