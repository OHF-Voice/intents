language: kn
entities:
  - name: ಮಲಗುವ ಕೋಣೆ ಲೈಟ್
    domain: light
  - name: ಅಡುಗೆಮನೆ ಸ್ವಿಚ್
    domain: switch
  - name: ಆಟದ ಮೂಲೆ
    domain: light
  - name: ಜಾರುವ ಬಾಗಿಲು
    domain: cover
  - name: ಮುಖ್ಯ ಕವಾಟ
    domain: valve
  - name: ಮುಂಬಾಗಿಲು
    domain: lock
tests:
  # on-able domains - light
  - sentences:
      - ಆನ್ ಮಾಡಿ ಮಲಗುವ ಕೋಣೆ ಲೈಟ್
      - ಮಲಗುವ ಕೋಣೆ ಲೈಟ್ ಆನ್ ಮಾಡಿ
    slots:
      name: ಮಲಗುವ ಕೋಣೆ ಲೈಟ್
    response: "ಲೈಟ್ ಆನ್ ಮಾಡಲಾಗಿದೆ"
  # on-able domains - switch
  - sentences:
      - ಆನ್ ಮಾಡಿ ಅಡುಗೆಮನೆ ಸ್ವಿಚ್
      - ಅಡುಗೆಮನೆ ಸ್ವಿಚ್ ಆನ್ ಮಾಡಿ
    slots:
      name: ಅಡುಗೆಮನೆ ಸ್ವಿಚ್
    response: "ಸ್ವಿಚ್ ಆನ್ ಮಾಡಲಾಗಿದೆ"
  # light with trailing light word
  - sentences:
      - ಹಚ್ಚಿ ಆಟದ ಮೂಲೆ ಲೈಟ್
      - ಆಟದ ಮೂಲೆ ಲೈಟ್ ಹಚ್ಚಿ
    slots:
      name: ಆಟದ ಮೂಲೆ
    response: "ಲೈಟ್ ಆನ್ ಮಾಡಲಾಗಿದೆ"
  # cover
  - sentences:
      - ತೆರೆಯಿರಿ ಜಾರುವ ಬಾಗಿಲು
      - ಜಾರುವ ಬಾಗಿಲು ತೆರೆಯಿರಿ
    slots:
      name: ಜಾರುವ ಬಾಗಿಲು
    response: "ತೆರೆಯಲಾಗುತ್ತಿದೆ"
  # valve
  - sentences:
      - ತೆರೆಯಿರಿ ಮುಖ್ಯ ಕವಾಟ
      - ಮುಖ್ಯ ಕವಾಟ ತೆರೆಯಿರಿ
    slots:
      name: ಮುಖ್ಯ ಕವಾಟ
    response: "ತೆರೆಯಲಾಗುತ್ತಿದೆ"
  # lock
  - sentences:
      - ಮುಂಬಾಗಿಲು ಗೆ ಬೀಗ ಹಾಕಿ
      - ಮುಂಬಾಗಿಲು ಬೀಗ ಹಾಕಿ
      - ಮುಂಬಾಗಿಲು ಲಾಕ್ ಮಾಡಿ
    slots:
      name: ಮುಂಬಾಗಿಲು
    response: "ಬೀಗ ಹಾಕಲಾಗುತ್ತಿದೆ"
