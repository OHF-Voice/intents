language: "lv"

entities:
  - name: "Garāžas vārti"
    domain: "cover"
    state: "closed"
    attributes:
      device_class: garage
  - name: "Viesistabas aizkari"
    domain: "cover"
    state: "closed"
    attributes:
      device_class: curtain

tests:
  - sentences:
      - "atver garāžas durvis"
      - "atver visas garāžas durvis"
    slots:
      domain: "cover"
      device_class: garage
    response: "Atvēru garage"

  - sentences:
      - "atver aizkarus"
      - "atver visus aizkarus"
    slots:
      domain: "cover"
      device_class: curtain
    response: "Atvēru curtain"
