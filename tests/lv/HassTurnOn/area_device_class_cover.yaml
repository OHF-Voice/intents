language: "lv"

areas:
  - name: "garāžā"
  - name: "viesistabā"

entities:
  - name: "Garāžas vārti"
    domain: "cover"
    area: "garāžā"
    state: "closed"
    attributes:
      device_class: garage
  - name: "Viesistabas aizkari"
    domain: "cover"
    area: "viesistabā"
    state: "closed"
    attributes:
      device_class: curtain

tests:
  - sentences:
      - "atver garāžas durvis garāžā"
      - "atver garāžā garāžas durvis"
    slots:
      domain: "cover"
      device_class: garage
      area: "garāžā"
    response: "Atvēru garage"

  - sentences:
      - "atver aizkarus viesistabā"
      - "atver visus aizkarus viesistabā"
      - "atver viesistabā aizkarus"
    slots:
      domain: "cover"
      device_class: curtain
      area: "viesistabā"
    response: "Atvēru curtain"
