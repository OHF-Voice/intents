language: "lv"

entities:
  - name: "Garāžas vārti"
    domain: "cover"
    state: "open"
    attributes:
      device_class: garage
  - name: "Viesistabas aizkari"
    domain: "cover"
    state: "open"
    attributes:
      device_class: curtain

tests:
  - sentences:
      - "aizver garāžas durvis"
      - "aizver visas garāžas durvis"
    slots:
      domain: "cover"
      device_class: garage
    response: "Aizvēru garage"

  - sentences:
      - "aizver aizkarus"
      - "aizver visus aizkarus"
    slots:
      domain: "cover"
      device_class: curtain
    response: "Aizvēru curtain"
