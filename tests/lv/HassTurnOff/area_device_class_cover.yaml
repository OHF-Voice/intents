language: "lv"

areas:
  - name: "garāžā"
  - name: "viesistabā"

entities:
  - name: "Garāžas vārti"
    domain: "cover"
    area: "garāžā"
    state: "open"
    attributes:
      device_class: garage
  - name: "Viesistabas aizkari"
    domain: "cover"
    area: "viesistabā"
    state: "open"
    attributes:
      device_class: curtain

tests:
  - sentences:
      - "aizver garāžas durvis garāžā"
      - "aizver garāžā garāžas durvis"
    slots:
      domain: "cover"
      device_class: garage
      area: "garāžā"
    response: "Aizvēru garage"

  - sentences:
      - "aizver aizkarus viesistabā"
      - "aizver visus aizkarus viesistabā"
      - "aizver viesistabā aizkarus"
    slots:
      domain: "cover"
      device_class: curtain
      area: "viesistabā"
    response: "Aizvēru curtain"
