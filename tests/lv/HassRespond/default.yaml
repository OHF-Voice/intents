language: "lv"
tests:
  - sentences:
      - "Sveiks home assistant"
    response: "Sveicieni no Home Assistant."

  - sentences:
      - "vai tu vienmēr klausies"
    response: "Nē, Es klausos tikai tad, kad tu mani uzrunā ar modināšanas frāzi."

  - sentences:
      - "kur nokļūst mani dati"
    response: "Jūsu dati tiek nosūtīti uz Home Assistant serveri."

  - sentences:
      - "ko es varu jautāt"
    response: "Lai uzzinātu ko jūs varat man jautāt, apmeklējiet H.A. punkts I.O. slīpsvītra voice."

  - sentences:
      - "kas tevi izveidoja"
    response: "Mani izveidoja brīnišķīgā Home Assistant kopiena, kas sastāv no domātājiem visā pasaulē."
