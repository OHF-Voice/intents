      name: "Doras Tosaigh"
      state: "locked"
    response: "Tá"

  - sentences:
      - "an bhfuil Doras an Phaitió oscailte"
    slots:
      name: "Doras an Phaitió"
      state: "on"
    response: "Tá"

  - sentences:
      - "an bhfuil Braiteoir na hOifige áitithe"
