# HassLightSet - area_brightness

language: ca
areas:
  - name: Dormitori
tests:
  - sentences:
      - posa la brillantor del dormitori al 50%
      - posa els llums del dormitori al 50% de brillantor
    slots:
      area: Dormitori
      brightness: 50
    response: Brillantor ajustada
  - sentences:
      - posa la brillantor del dormitori al màxim
    slots:
      area: Dormitori
      brightness: 100
    response: Brillantor ajustada
