---
language: "th"
floors:
  - name: "ชั้นหนึ่ง"
tests:
  - sentences:
      - "เพิ่มเสียงในชั้นหนึ่ง"
      - "เร่งระดับเสียงในชั้นหนึ่ง"
    slots:
      floor: "ชั้นหนึ่ง"
      volume_step: up
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "เพิ่มเสียงในชั้นหนึ่งขึ้น20เปอร์เซ็นต์"
      - "เร่งระดับเสียงในชั้นหนึ่งขึ้น20%"
    slots:
      floor: "ชั้นหนึ่ง"
      volume_step: 20
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "ลดเสียงในชั้นหนึ่ง"
      - "เบาระดับเสียงในชั้นหนึ่ง"
    slots:
      floor: "ชั้นหนึ่ง"
      volume_step: down
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "ลดเสียงในชั้นหนึ่งลง20เปอร์เซ็นต์"
      - "เบาระดับเสียงในชั้นหนึ่งลง20%"
    slots:
      floor: "ชั้นหนึ่ง"
      volume_step: -20
    response: "ปรับระดับเสียงแล้ว"
