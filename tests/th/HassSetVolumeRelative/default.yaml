---
language: "th"
tests:
  - sentences:
      - "เพิ่มเสียง"
      - "เร่งระดับเสียง"
    slots:
      volume_step: up
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "เพิ่มเสียงขึ้น20เปอร์เซ็นต์"
      - "เร่งระดับเสียงขึ้น20%"
    slots:
      volume_step: 20
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "ลดเสียง"
      - "เบาระดับเสียง"
    slots:
      volume_step: down
    response: "ปรับระดับเสียงแล้ว"
  - sentences:
      - "ลดเสียงลง20เปอร์เซ็นต์"
      - "เบาระดับเสียงลง20%"
    slots:
      volume_step: -20
    response: "ปรับระดับเสียงแล้ว"
