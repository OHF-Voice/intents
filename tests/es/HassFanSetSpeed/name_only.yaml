---
# HassFanSetSpeed - name_only

language: "es"
entities:
  - name: "Ventilador de techo"
    domain: "fan"

tests:
  - sentences:
      - "pon el ventilador de techo al 50%"
      - "establece la velocidad del ventilador de techo al 50 por ciento"
      - "cambia el ventilador de techo al 50%"
      - "ventilador de techo 50%"
    slots:
      name: "Ventilador de techo"
      percentage: 50
    response: "Velocidad establecida"
