---
# HassSetVolumeRelative - default

language: "es"
tests:
  - sentences:
      - "sube el volumen"
      - "subir el volumen"
      - "aumenta el volumen"
      - "incrementa el volumen"
      - "más volumen"
      - "sube la música"
      - "aumenta la música"
    slots:
      volume_step: "up"
    response: "Volumen ajustado"
  - sentences:
      - "sube el volumen 20%"
      - "sube el volumen un 20%"
      - "subir el volumen 20 por ciento"
      - "subir el volumen un 20 por ciento"
      - "aumenta el volumen en 20%"
      - "incrementa el volumen en un 20 por ciento"
      - "sube la música un 20%"
    slots:
      volume_step: 20
    response: "Volumen ajustado"
  - sentences:
      - "baja el volumen"
      - "bajar el volumen"
      - "reduce el volumen"
      - "disminuye el volumen"
      - "menos volumen"
      - "baja la música"
    slots:
      volume_step: "down"
    response: "Volumen ajustado"
  - sentences:
      - "baja el volumen 20%"
      - "baja el volumen un 20%"
      - "bajar el volumen 20 por ciento"
      - "reduce el volumen en 20%"
      - "disminuye el volumen en un 20 por ciento"
    slots:
      volume_step: -20
    response: "Volumen ajustado"
