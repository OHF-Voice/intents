---
# HassStartTimer - name_minutes_seconds

language: "es"
tests:
  - sentences:
      - "iniciar temporizador de 5 minutos y 30 segundos con nombre pizza"
      - "cuenta atrás de pizza dentro de 5 minutos y 30 segundos"
    slots:
      minutes: 5
      seconds: 30
      name: "pizza"
    response: "Temporizador iniciado"
