---
# HassStartTimer - command_minutes_seconds

language: "es"
tests:
  - sentences:
      - "apaga las luces dentro de 5 minutos y 30 segundos"
      - "en 5 minutos y 30 segundos, apaga las luces"
    slots:
      minutes: 5
      seconds: 30
      conversation_command: "apaga las luces"
    response: "Orden recibida"
