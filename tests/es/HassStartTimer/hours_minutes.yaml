  - sentences:
      - "comienza una cuenta atrás de 1 hora y 15 minutos"
      - "establecer temporizador de 1 hora y cuarto"
      - "temporizador en una hora y 15 minutos"
    slots:
      hours: 1
      minutes: 15
    response: "Temporizador iniciado"
