---
# HassStartTimer - minutes_only

language: "es"
tests:
  - sentences:
      - "temporizador en 10 minutos"
    slots:
      minutes: 10
    response: "Temporizador iniciado"
  - sentences:
      - "iniciar cuenta atrás de 5 minutos"
      - "temporizador en 5 minutos"
      - "temporizador dentro de 5 minutos"
    slots:
      minutes: 5
    response: "Temporizador iniciado"
  - sentences:
      - "temporizador de media hora"
    slots:
      minutes: 30
    response: "Temporizador iniciado"
