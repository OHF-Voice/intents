---
# HassStartTimer - command_hours_seconds

language: "es"
tests:
  - sentences:
      - "apaga las luces dentro de 1 hora y 30 segundos"
      - "en 1 hora y 30 segundos, apaga las luces"
    slots:
      hours: 1
      seconds: 30
      conversation_command: "apaga las luces"
    response: "Orden recibida"
