---
# HassStartTimer - name_hours_minutes_seconds

language: "es"
tests:
  - sentences:
      - "iniciar temporizador de 1 hora 30 minutos y 30 segundos con nombre pizza"
      - "cuenta atrás de pizza dentro de 1 hora 30 minutos y 30 segundos"
    slots:
      hours: 1
      minutes: 30
      seconds: 30
      name: "pizza"
    response: "Temporizador iniciado"
