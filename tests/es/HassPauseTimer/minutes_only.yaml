---
# HassPauseTimer - minutes_only

language: "es"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
tests:
  - sentences:
      - "pausar temporizador de 5 minutos"
      - "detén temporizador para 5 minutos"
    slots:
      start_minutes: 5
    response: "Temporizador en pausa"
