---
# HassLightSet - brightness_only

language: "es"
tests:
  - sentences:
      - "establece el brillo al 50%"
      - "pon el brillo al 50%"
      - "pon la luz al 50%"
      - "ajusta la luz al 50%"
      - "baja la luz al 50%"
      - "cambia el brillo en la habitación al 50 por ciento"
      - "ajustar brillo al 50% aquí"
      - "sube el brillo al 50%"
      - "ajusta el brillo a 50%"
      - "establece la luz al 50%"
      - "pon las luces al 50%"
    slots:
      brightness: 50
    response: "Brillo establecido"

  - sentences:
      - "subir brillo al tope"
      - "cambiar el brillo a lo más alto"
      - "configurá brillo al máximo acá"
      - "pon la luz al máximo"
      - "pon las luces al máximo"
    slots:
      brightness: 100
    response: "Brillo establecido"
