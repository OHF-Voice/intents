---
# HassTurnOff - name_area

language: es
entities:
  - name: Lámpara de la mesilla
    domain: light
  - name: Rincón de juego
    domain: light
  - name: Cortina izquierda
    domain: cover
  - name: Llave de paso
    domain: valve
  - name: Puerta principal
    domain: lock
areas:
  - name: Cocina
  - name: Salón
tests:
  # lights
  - sentences:
      - apaga la lámpara de la mesilla de la cocina
      - desactiva la lámpara de la mesilla en la cocina
    slots:
      name: Lámpara de la mesilla
      area: Cocina
    response: Se ha apagado la luz

  # lights named with a leading "luces" word
  - sentences:
      - apaga las luces del rincón de juego de la cocina
    slots:
      name: Rincón de juego
      area: Cocina
    response: Se ha apagado la luz

  # covers
  - sentences:
      - cierra la cortina izquierda del salón
    slots:
      name: Cortina izquierda
      area: Salón
    response: Cortina izquierda se ha cerrado

  # valves
  - sentences:
      - cierra la llave de paso de la cocina
    slots:
      name: Llave de paso
      area: Cocina
    response: Llave de paso se ha cerrado

  # locks
  - sentences:
      - abre el cerrojo de la puerta principal de la cocina
      - quita el cerrojo de la puerta principal de la cocina
    slots:
      name: Puerta principal
      area: Cocina
    response: Puerta principal se ha abierto
