---
# HassCancelTimer - seconds_only

language: "es"
timers:
  - is_active: true
    start_seconds: 30
    total_seconds_left: 30
    rounded_hours_left: 0
    rounded_minutes_left: 0
    rounded_seconds_left: 30
tests:
  - sentences:
      - "cancelar temporizador de 30 segundos"
      - "eliminar el temporizador para 30 segundos"
    slots:
      start_seconds: 30
    response: "Temporizador cancelado"
