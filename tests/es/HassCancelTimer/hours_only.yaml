---
# HassCancelTimer - hours_only

language: "es"
timers:
  - is_active: true
    start_hours: 1
    total_seconds_left: 3600
    rounded_hours_left: 1
    rounded_minutes_left: 0
    rounded_seconds_left: 0
tests:
  - sentences:
      - "cancelar temporizador de 1 hora"
      - "eliminar el temporizador para 1 hora"
    slots:
      start_hours: 1
    response: "Temporizador cancelado"
