---
# HassMediaPlayerUnmute - name_only

language: es
entities:
  - name: TV
    domain: media_player

tests:
  - sentences:
      - quita el silencio de la TV
      - enciende el sonido de la TV
      - devuelve el sonido a la TV
      - pon el sonido en la TV
      - restaura el volumen de la TV
    slots:
      name: TV
    response: Audio restaurado
