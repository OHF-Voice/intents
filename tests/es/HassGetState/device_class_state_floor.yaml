---
# HassGetState - device_class_state_floor

language: "es"
floors:
  - name: "Primera Planta"

areas:
  - name: "Dormitorio"
    floor: "Primera Planta"
  - name: "Recibidor"
    floor: "Planta Baja"

entities:
  # on a different floor: must be EXCLUDED from Primera Planta queries
  - name: "Ventana Recibidor"
    domain: "cover"
    state: "open"
    area: "Recibidor"
    attributes:
      device_class: "window"
  - name: "Ventana Dormitorio"
    domain: "cover"
    state: "open"
    area: "Dormitorio"
    attributes:
      device_class: "window"
  - name: "Ventana Cuna"
    domain: "cover"
    state: "closed"
    area: "Dormitorio"
    attributes:
      device_class: "window"

tests:
  - sentences:
      [
        "hay alguna ventana abierta en la primera planta",
        "hay alguna ventana de la primera planta abierta",
      ]
    slots: { device_class: "window", state: "open", floor: "Primera Planta" }
    response: "Sí, el dispositivo Ventana Dormitorio"
  - sentences:
      [
        "están todas las ventanas cerradas en la primera planta",
        "están todas las ventanas de la primera planta cerradas",
      ]
    slots: { device_class: "window", state: "closed", floor: "Primera Planta" }
    response: "No, el dispositivo Ventana Dormitorio no tiene ese estado"
  - sentences:
      [
        "qué ventanas están abiertas en la primera planta",
        "qué ventanas de la primera planta están abiertas",
      ]
    slots: { device_class: "window", state: "open", floor: "Primera Planta" }
    response: "Ventana Dormitorio"
  - sentences:
      [
        "cuántas ventanas están abiertas en la primera planta",
        "cuántas ventanas de la primera planta están abiertas",
      ]
    slots: { device_class: "window", state: "open", floor: "Primera Planta" }
    response: "1"
