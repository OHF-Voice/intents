---
# HassIncreaseTimer - hours_minutes

language: "es"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - añadir 1 hora y 5 minutos al temporizador
      - aumentar el temporizador en 1 hora y 5 minutos
    slots:
      hours: 1
      minutes: 5
    response: Temporizador actualizado
  - sentences:
      - añadir 1 hora y media al temporizador
      - aumentar el temporizador en 1 hora y media
    slots:
      hours: 1
      minutes: 30
    response: Temporizador actualizado
