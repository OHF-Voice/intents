---
# HassIncreaseTimer - seconds_only

language: "es"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - añadir 30 segundos al temporizador
      - aumentar el temporizador en 30 segundos
    slots:
      seconds: 30
    response: Temporizador actualizado
  - sentences:
      - añadir medio minuto al temporizador
      - aumentar el temporizador en medio minuto
    slots:
      seconds: 30
    response: Temporizador actualizado
