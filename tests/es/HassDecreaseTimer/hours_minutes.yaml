---
# HassDecreaseTimer - hours_minutes

language: "es"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - quitar 1 hora y 5 minutos del temporizador
      - reducir el temporizador en 1 hora y 5 minutos
    slots:
      hours: 1
      minutes: 5
    response: Temporizador actualizado
  - sentences:
      - quitar 1 hora y media del temporizador
      - reducir el temporizador en 1 hora y media
    slots:
      hours: 1
      minutes: 30
    response: Temporizador actualizado
