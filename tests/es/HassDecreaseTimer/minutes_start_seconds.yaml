---
# HassDecreaseTimer - minutes_start_seconds

language: "es"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_seconds: 30
tests:
  - sentences:
      - quitar 5 minutos del temporizador de 30 segundos
      - reducir temporizador de 30 segundos en 5 minutos
    slots:
      minutes: 5
      start_seconds: 30
    response: Temporizador actualizado
  - sentences:
      - quitar media hora del temporizador de 30 segundos
      - reducir temporizador de 30 segundos en media hora
    slots:
      minutes: 30
      start_seconds: 30
    response: Temporizador actualizado
