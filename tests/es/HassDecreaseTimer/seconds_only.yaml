---
# HassDecreaseTimer - seconds_only

language: "es"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - quitar 30 segundos del temporizador
      - reducir el temporizador en 30 segundos
    slots:
      seconds: 30
    response: Temporizador actualizado
  - sentences:
      - quitar medio minuto del temporizador
      - reducir el temporizador en medio minuto
    slots:
      seconds: 30
    response: Temporizador actualizado
