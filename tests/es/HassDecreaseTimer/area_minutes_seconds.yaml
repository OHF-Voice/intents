---
# HassDecreaseTimer - area_minutes_seconds

language: "es"
areas:
  - name: Cocina
    floor: Planta baja
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    area: Cocina
    start_minutes: 5
tests:
  - sentences:
      - quitar 5 minutos y 30 segundos al temporizador de la cocina
      - reducir temporizador de la cocina en 5 minutos y 30 segundos
    slots:
      minutes: 5
      seconds: 30
      area: Cocina
    response: Temporizador actualizado
  - sentences:
      - quitar 5 minutos y medio al temporizador de la cocina
      - reducir temporizador de la cocina en 5 minutos y medio
    slots:
      minutes: 5
      seconds: 30
      area: Cocina
    response: Temporizador actualizado
