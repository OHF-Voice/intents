---
# HassSetPosition - name_only

language: "es"
entities:
  - name: "Cortina dormitorio"
    domain: "cover"
  - name: "Llave de paso"
    domain: "valve"

tests:
  - sentences:
      - "abre la cortina dormitorio al 50%"
    slots:
      name: "Cortina dormitorio"
      position: 50
    response: "Posición establecida"

  - sentences:
      - "ajusta llave de paso al 100"
      - "incrementar posición de llave de paso a 100%"
      - "abrir llave de paso al 100 por cien"
    slots:
      name: "Llave de paso"
      position: 100
    response: "Posición establecida"
