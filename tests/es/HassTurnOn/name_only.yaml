---
# HassTurnOn - name_only

language: es
entities:
  - name: Lámpara de la mesilla
    domain: light
  - name: Rincón de juego
    domain: light
  - name: Ventilador de techo
    domain: fan
  - name: Cortina izquierda
    domain: cover
  - name: Llave de paso
    domain: valve
  - name: Puerta principal
    domain: lock
tests:
  # lights
  - sentences:
      - enciende la lámpara de la mesilla
      - activa la lámpara de la mesilla
      - prende lámpara de la mesilla
      - lámpara de la mesilla
    slots:
      name: Lámpara de la mesilla
    response: Se ha activado la luz

  # lights named with a leading "luces" word
  - sentences:
      - enciende las luces del rincón de juego
      - activa las luces del rincón de juego
    slots:
      name: Rincón de juego
    response: Se ha activado la luz

  # fans
  - sentences:
      - enciende el ventilador de techo
      - encienda ventilador de techo
      - conecta ventilador de techo
      - por favor conecte ventilador de techo
      - podrías conectar ventilador de techo
    slots:
      name: Ventilador de techo
    response: Se ha activado el ventilador

  # covers
  - sentences:
      - abre la cortina izquierda
    slots:
      name: Cortina izquierda
    response: Cortina izquierda se ha abierto

  # valves
  - sentences:
      - abre la llave de paso
    slots:
      name: Llave de paso
    response: Llave de paso se ha abierto

  # locks
  - sentences:
      - cierra con pestillo la puerta principal
      - echa el cerrojo en la puerta principal
    slots:
      name: Puerta principal
    response: Puerta principal se ha cerrado
