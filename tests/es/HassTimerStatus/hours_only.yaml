---
# HassTimerStatus - hours_only

language: "es"
timers:
  - is_active: false
    start_hours: 1
    total_seconds_left: 100
    rounded_hours_left: 0
    rounded_minutes_left: 1
    rounded_seconds_left: 40
tests:
  - sentences:
      - estado del temporizador de 1 hora
      - tiempo restante para cuenta atrás de 1 hora
      - qué le queda al temporizador de 1 hora
    slots:
      start_hours: 1
    response: "El temporizador está en pausa. Le quedan 1 minuto y 40 segundos."
