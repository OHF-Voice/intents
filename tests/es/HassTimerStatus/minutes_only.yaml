# HassTimerStatus - minutes_only

language: "es"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
tests:
  - sentences:
      - estado del temporizador de 5 minutos
      - cuánto le queda al temporizador de 5 minutos
    slots:
      start_minutes: 5
    response: "Le quedan 5 minutos."
