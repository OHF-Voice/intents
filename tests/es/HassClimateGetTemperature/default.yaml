      - ¿qué temperatura hace ahora mismo?
      - ¿qué temperatura hay?
      - ¿cuánto calor hace?
      - ¿a qué temperatura estamos actualmente?
      - ¿a cuántos grados estamos?
      - ¿cuántos grados hace?
    response: "22 grados"
