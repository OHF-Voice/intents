language: "nb"
tests:
  - sentences:
      - "hei home assistant"
      - "hallo"
    response: "Hei fra Home Assistant."
  - sentences:
      - "lytter du alltid"
      - "hører du alltid på meg"
    response: "Nei, jeg tar bare opp når du sier våkneordet."
  - sentences:
      - "hvor går mine data"
      - "hvor går dataene mine"
      - "hvor sendes dataene mine"
    response: "Dine data sendes til din Home Assistant-server."
  - sentences:
      - "hva kan jeg si"
      - "hva kan jeg spørre om"
    response: "For å lære hva du kan spørre om, besøk H.A. dot I.O. slash voice."
  - sentences:
      - "hvem lagde deg"
      - "hvem skapte deg"
    response: "Jeg ble laget av det fantastiske Home Assistant-samfunnet, bestående av entusiaster over hele verden."
