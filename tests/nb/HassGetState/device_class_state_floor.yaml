language: "nb"
floors:
  - name: "første"
areas:
  - name: "Kjøkken"
    floor: "første"
entities:
  - name: "Gardin A"
    domain: "cover"
    state: "open"
    area: "Kjøkken"
    attributes:
      device_class: "curtain"
  - name: "Gardin B"
    domain: "cover"
    state: "closed"
    area: "Kjøkken"
    attributes:
      device_class: "curtain"
tests:
  - sentences:
      [
        "er noen gardiner åpne i første etasje",
        "er noen første etasje gardiner åpne",
      ]
    slots: { floor: "første", state: "open", device_class: "curtain" }
    response: "Ja, Gardin A"
  - sentences:
      [
        "er alle gardiner lukket i første etasje",
        "er alle første etasje gardiner lukket",
      ]
    slots: { floor: "første", state: "closed", device_class: "curtain" }
    response: "Nei, ikke Gardin A"
  - sentences:
      [
        "hvilke gardiner er åpne i første etasje",
        "hvilke første etasje gardiner er åpne",
      ]
    slots: { floor: "første", state: "open", device_class: "curtain" }
    response: "Gardin A"
  - sentences:
      [
        "hvor mange gardiner er åpne i første etasje",
        "hvor mange første etasje gardiner er åpne",
      ]
    slots: { floor: "første", state: "open", device_class: "curtain" }
    response: "1"
