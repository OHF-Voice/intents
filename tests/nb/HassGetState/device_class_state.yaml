language: "nb"
entities:
  - name: "Gardin A"
    domain: "cover"
    state: "open"
    attributes:
      device_class: "curtain"
  - name: "Gardin B"
    domain: "cover"
    state: "closed"
    attributes:
      device_class: "curtain"
tests:
  - sentences: ["er noen gardiner åpne"]
    slots: { state: "open", device_class: "curtain" }
    response: "Ja, Gardin A"
  - sentences: ["er alle gardiner lukket"]
    slots: { state: "closed", device_class: "curtain" }
    response: "Nei, ikke Gardin A"
  - sentences: ["hvilke gardiner er åpne"]
    slots: { state: "open", device_class: "curtain" }
    response: "Gardin A"
  - sentences: ["hvor mange gardiner er åpne"]
    slots: { state: "open", device_class: "curtain" }
    response: "1"
