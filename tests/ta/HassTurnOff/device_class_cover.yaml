---
# HassTurnOff - device_class_cover
# example: இங்கே ஜன்னல்கள் மூடவும்
# slots: {domain}, {device_class}
# context_area: true

language: "ta"
tests:
  - sentences:
      - "இங்கே ஜன்னல்கள் மூடவும்"
      - "ஜன்னல்கள் மூடவும்"
    slots:
      domain: "cover"
      device_class: "window"
    response: "window மூடுகிறேன்"

  - sentences:
      - "இங்கே திரைச்சீலைகள் மூடவும்"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "curtain மூடுகிறேன்"
