---
# HassTurnOn - device_class_cover
# example: இங்கே ஜன்னல்கள் திறக்கவும்
# slots: {domain}, {device_class}
# context_area: true

language: "ta"
tests:
  - sentences:
      - "இங்கே ஜன்னல்கள் திறக்கவும்"
      - "ஜன்னல்கள் திறக்கவும்"
    slots:
      domain: "cover"
      device_class: "window"
    response: "window திறக்கிறேன்"

  - sentences:
      - "இங்கே திரைச்சீலைகள் திறக்கவும்"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "curtain திறக்கிறேன்"
