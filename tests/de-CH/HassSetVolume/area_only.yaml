---
# HassSetVolume - area_only

language: de-CH
areas:
  - name: "Stube"

tests:
  - sentences:
      - "Setz d Lutschterchi ir Stube uf 50%"
    slots:
      area: "Stube"
      volume_level: 50
    response: "Ha d Lutschterchi yygschteut"
  - sentences:
      - "Setz ds Volume ir Stube uf maximal"
    slots:
      area: "Stube"
      volume_level: 100
    response: "Ha d Lutschterchi yygschteut"
