---
# HassCancelTimer - name_only

language: "de-CH"
timers:
  - is_active: true
    name: "Pizza"
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Stopp my Pizza-Timer"
      - "Haut der Timer Pizza aa"
      - "Stop der Pizza-Wecker"
      - "Brich der Wecker Pizza ab"
    slots:
      name: "Pizza"
    response: "Timer abbroche"
