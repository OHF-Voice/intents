---
# HassCancelTimer - default

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Stop der Wecker"
      - "Haut der Timer aa"
      - "Brich mi Wecker ab"
      - "Lösch der Timer"
    response: "Timer abbroche"
