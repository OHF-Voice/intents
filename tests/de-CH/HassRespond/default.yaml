---
# HassRespond - default

language: de-CH
tests:
  - sentences:
      - Hallo
      - Hi Home Assistant
    response: Hallo vom Home Assistant.
  - sentences:
      - Losisch eigentlech geng zue?
      - Nimmsch du di ganzi Zyt uuf?
    response: Nei, I nime nume uf, we de ds Aktivierigswort gseit hesch.
  - sentences:
      - Wo schpycherisch eigentlech mini Date hin?
    response: Dini Date wärde zu dim Home Assistant Server gschickt.
  - sentences:
      - Was chan i di aues frage?
    response: Für usezfinde was d aues chasch frage, gang uf home-assistant.io/voice_control.
  - sentences:
      - Wär het di eigentlech erfunde?
    response:
      I bi vor e wunderbare Home Assistant Gmeinschaft us Programmierer u
      Baschtler uf der ganze Wäut gmacht worde.
