---
# HassUnpauseTimer - minutes_only

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Fahr mit em 5 Minute Timer wyter"
      - "Fahr mit em Timer für 5 Minute wyter"
    slots:
      start_minutes: 5
    response: "Timer wider gschtartet"
