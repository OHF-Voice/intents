---
# HassUnpauseTimer - area_only

language: "de-CH"
areas:
  - name: "Chuchi"
timers:
  - is_active: true
    area: "Chuchi"
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Mach mit em Chuchi-Timer wyter"
      - "Fahr mit em Wecker ir Chuchi wyter"
    slots:
      area: Chuchi
    response: "Timer wider gschtartet"
