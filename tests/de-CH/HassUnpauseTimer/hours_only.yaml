---
# HassUnpauseTimer - hours_only

language: "de-CH"
timers:
  - is_active: true
    start_hours: 1
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Fahr mit em 1 Schtund Timer wyter"
      - "Fahr mit em Timer für 1 Schtund wyter"
    slots:
      start_hours: 1
    response: "Timer wider gschtartet"
