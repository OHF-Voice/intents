---
# HassUnpauseTimer - seconds_only

language: "de-CH"
timers:
  - is_active: true
    start_seconds: 30
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Fahr mit em 30 Sekunde Timer wyter"
      - "Fahr mit em Timer für 30 Sekunde wyter"
    slots:
      start_seconds: 30
    response: "Timer wider gschtartet"
