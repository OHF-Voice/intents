---
# HassUnpauseTimer - name_only

language: "de-CH"
timers:
  - is_active: true
    name: "Pizza"
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Mach mit em Pizza-Timer wyter"
      - "Fahr mit em Wecker Pizza wyter"
    slots:
      name: "Pizza"
    response: "Timer wider gschtartet"
