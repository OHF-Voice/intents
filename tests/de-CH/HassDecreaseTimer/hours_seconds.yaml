---
# HassDecreaseTimer - hours_seconds

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Zieh 1 Schtund u 30 Sekunde vom Wecker ab"
      - "Verchürze der Timer um 1 Schtund u 30 Sekunde"
    slots:
      hours: 1
      seconds: 30
    response: "Timer aapasst"
