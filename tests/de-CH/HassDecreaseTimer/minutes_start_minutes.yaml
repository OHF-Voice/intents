      - "Zieh 5 Minute vom 5 Minute-Wecker ab"
      - "Zieh 5 Minute vom Wecker für 5 Minute ab"
      - "Verchürz der 5 Minute Timer um 5 Minute"
      - "Verchürz der Timer für 5 Minute um 5 Minute"
    slots:
      minutes: 5
      start_minutes: 5
    response: "Timer aapasst"
