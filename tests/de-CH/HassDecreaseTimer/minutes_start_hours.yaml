---
# HassDecreaseTimer - minutes_start_hours

language: "de-CH"
timers:
  - is_active: true
    start_hours: 1
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Zieh 5 Minute vom 1 Schtund-Wecker ab"
      - "Zieh 5 Minute vom Wecker für 1 Schtund ab"
      - "Verchürze der 1 Schtund Timer um 5 Minute"
      - "Verchürze der Timer für 1 Schtund um 5 Minute"
    slots:
      minutes: 5
      start_hours: 1
    response: "Timer aapasst"
