---
# HassDecreaseTimer - hours_only

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Zieh 1 Schtund vom Wecker ab"
      - "Verchürz der Timer um 1 Schtund"
    slots:
      hours: 1
    response: "Timer aapasst"
