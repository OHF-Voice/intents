---
# HassDecreaseTimer - minutes_only

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Zieh 5 Minute vom Wecker ab"
      - "Verchürze der Timer um 5 Minute"
    slots:
      minutes: 5
    response: "Timer aapasst"
