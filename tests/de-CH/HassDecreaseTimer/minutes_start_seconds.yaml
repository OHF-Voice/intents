---
# HassDecreaseTimer - minutes_start_seconds

language: "de-CH"
timers:
  - is_active: true
    start_seconds: 30
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Zieh 5 Minute vom 30 Sekunde-Wecker ab"
      - "Zieh 5 Minute vom Wecker für 30 Sekunde ab"
      - "Verchürz der 30 Sekunde Timer um 5 Minute"
      - "Verchürz der Timer für 30 Sekunde um 5 Minute"
    slots:
      minutes: 5
      start_seconds: 30
    response: "Timer aapasst"
