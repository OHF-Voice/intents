---
# HassClimateGetTemperature - name_only

language: de-CH

entities:
  - name: "Wohnzimmer Thermostat"
    domain: climate
    state: heat
    attributes:
      current_temperature: 20

tests:
  - sentences:
      # Weli Temperatur (het|zeigt) <name>
      - "Weli Temperatur zeigt dr Wohnzimmer Thermostat?"
      - "Weli Temperatur het d Wohnzimmer Thermostat"
    slots:
      name: "Wohnzimmer Thermostat"
    response: "D Temparatur vo Wohnzimmer thermostat isch 20 Grad."
