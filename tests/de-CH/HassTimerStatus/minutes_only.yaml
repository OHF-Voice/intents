---
# HassTimerStatus - minutes_only

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
tests:
  - sentences:
      - "5 Minute Timer status"
      - "Status vom 5 Minute Wecker"
      - "Status vom Wecker für 5 Minute"
      - "Wie lang geit der 5 Minute Wecker no"
    slots:
      start_minutes: 5
    response: "Es sy no 5 Minute übrig."
