---
# HassTimerStatus - hours_only

language: "de-CH"
timers:
  - is_active: true
    start_hours: 1
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
tests:
  - sentences:
      - "1 Schtund Timer status"
      - "Status vom 1 Schtund Wecker"
      - "Status vom Wecker für 1 Schtund"
      - "Wie lang geit der 1 Schtund Wecker no"
    slots:
      start_hours: 1
    response: "Es sy no 5 Minute übrig."
