---
# HassTimerStatus - default

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
tests:
  - sentences:
      - "Timer status"
      - "Was isch der Wecker-Status"
      - "Status vom Wecker"
      - "Wie lang geit der Wecker no"
      - "Weli Zyt verblybt no uf em Wecker"
    response: "Es sy no 5 Minute übrig."
