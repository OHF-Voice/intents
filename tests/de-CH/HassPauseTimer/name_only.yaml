---
# HassPauseTimer - name_only

language: "de-CH"
timers:
  - is_active: true
    name: "Pizza"
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Pousier der Pizza-Timer"
      - "Pousier der Timer Pizza"
    slots:
      name: "Pizza"
    response: "Timer pousiert"
