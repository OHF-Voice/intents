---
# HassPauseTimer - hours_only

language: "de-CH"
timers:
  - is_active: true
    start_hours: 1
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Pousier der 1 Schtund Timer"
      - "Pousier der Timer für 1 Schtund"
    slots:
      start_hours: 1
    response: "Timer pousiert"
