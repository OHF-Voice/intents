---
# HassPauseTimer - seconds_only

language: "de-CH"
timers:
  - is_active: true
    start_seconds: 30
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Pousier der 30 Sekunde Timer"
      - "Pousier der Timer für 30 Sekunde"
    slots:
      start_seconds: 30
    response: "Timer pousiert"
