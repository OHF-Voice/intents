---
# HassPauseTimer - minutes_only

language: "de-CH"
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Pousier der 5 Minute Timer"
      - "Pousier der Timer für 5 Minute"
    slots:
      start_minutes: 5
    response: "Timer pousiert"
