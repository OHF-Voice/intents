---
# HassPauseTimer - area_only

language: "de-CH"
areas:
  - name: "Chuchi"
timers:
  - is_active: true
    area: "Chuchi"
    start_minutes: 5
    total_seconds_left: 300
    rounded_minutes_left: 5
tests:
  - sentences:
      - "Pousier der Chuchi-Timer"
      - "Pousier der Timer ir Chuchi"
    slots:
      area: Chuchi
    response: "Timer pousiert"
