---
# HassDecreaseTimer - area_minutes_seconds

language: "gl"
areas:
  - name: Cociña
    floor: Planta baixa
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    area: Cociña
    start_minutes: 5
tests:
  - sentences:
      - "baixar 5 minutos e 30 segundos ao temporizador da cociña"
      - "reducir temporizador da cociña en 5 minutos e 30 segundos"
    slots:
      minutes: 5
      seconds: 30
      area: Cociña
    response: "Temporizador actualizado"
  - sentences:
      - "baixar 5 minutos e medio ao temporizador da cociña"
      - "reducir temporizador da cociña en 5 minutos e medio"
    slots:
      minutes: 5
      seconds: 30
      area: Cociña
    response: "Temporizador actualizado"
