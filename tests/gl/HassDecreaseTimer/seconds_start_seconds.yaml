---
# HassDecreaseTimer - seconds_start_seconds

language: "gl"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_seconds: 30
tests:
  - sentences:
      - "baixar 30 segundos do temporizador de 30 segundos"
      - "reducir temporizador de 30 segundos en 30 segundos"
    slots:
      seconds: 30
      start_seconds: 30
    response: "Temporizador actualizado"
  - sentences:
      - "baixar medio minuto do temporizador de 30 segundos"
      - "reducir temporizador de 30 segundos en medio minuto"
    slots:
      seconds: 30
      start_seconds: 30
    response: "Temporizador actualizado"
