---
# HassDecreaseTimer - name_minutes

language: "gl"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    name: pizza
    start_minutes: 5
tests:
  - sentences:
      - "baixar 5 minutos do temporizador pizza"
      - "reducir temporizador chamado pizza en 5 minutos"
      - "reducir temporizador pizza en 5 minutos"
    slots:
      minutes: 5
      name: pizza
    response: "Temporizador actualizado"
  - sentences:
      - "baixar media hora do temporizador pizza"
      - "reducir temporizador chamado pizza en media hora"
      - "reducir temporizador pizza en media hora"
    slots:
      minutes: 30
      name: pizza
    response: "Temporizador actualizado"
