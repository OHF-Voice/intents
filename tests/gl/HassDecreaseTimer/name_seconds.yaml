---
# HassDecreaseTimer - name_seconds

language: "gl"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    name: pizza
    start_minutes: 5
tests:
  - sentences:
      - "baixar 30 segundos do temporizador pizza"
      - "reducir temporizador chamado pizza en 30 segundos"
      - "reducir temporizador pizza en 30 segundos"
    slots:
      seconds: 30
      name: pizza
    response: "Temporizador actualizado"
  - sentences:
      - "baixar medio minuto do temporizador pizza"
      - "reducir temporizador chamado pizza en medio minuto"
      - "reducir temporizador pizza en medio minuto"
    slots:
      seconds: 30
      name: pizza
    response: "Temporizador actualizado"
