---
# HassDecreaseTimer - name_hours_minutes

language: "gl"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    name: pizza
    start_minutes: 5
tests:
  - sentences:
      - "baixar 1 hora e 5 minutos do temporizador pizza"
      - "reducir temporizador chamado pizza en 1 hora e 5 minutos"
      - "reducir temporizador pizza en 1 hora e 5 minutos"
    slots:
      hours: 1
      minutes: 5
      name: pizza
    response: "Temporizador actualizado"
  - sentences:
      - "baixar 1 hora e media do temporizador pizza"
      - "reducir temporizador chamado pizza en 1 hora e media"
      - "reducir temporizador pizza en 1 hora e media"
    slots:
      hours: 1
      minutes: 30
      name: pizza
    response: "Temporizador actualizado"
