---
# HassDecreaseTimer - minutes_only

language: "gl"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - "baixar 5 minutos do temporizador"
      - "reducir o temporizador en 5 minutos"
    slots:
      minutes: 5
    response: "Temporizador actualizado"
  - sentences:
      - "baixar media hora do temporizador"
      - "reducir o temporizador en media hora"
    slots:
      minutes: 30
    response: "Temporizador actualizado"
