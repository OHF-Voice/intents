---
# HassGetWeather - name_only

language: gl
entities:
  - name: Coruña
    domain: weather
    state: rainy
    attributes:
      temperature: "15"
      temperature_unit: °C
  - name: Ourense
    domain: weather
    state: clear
    attributes:
      temperature: "2"
      temperature_unit: °C
tests:
  - sentences:
      - que tempo vai na Coruña
    slots:
      name: Coruña
    response: Chuvia, con 15 °C de temperatura
  - sentences:
      - que tempo fai en Ourense
    slots:
      name: Ourense
    response: Despexado, con 2 °C de temperatura
