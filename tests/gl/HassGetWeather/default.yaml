---
# HassGetWeather - default

language: gl
entities:
  - name: Casa
    domain: weather
    state: rainy
    attributes:
      temperature: "15"
      temperature_unit: °C
tests:
  - sentences:
      - que tempo quedou
      - que tempo vai
      - que tempo fai
    response: Chuvia, con 15 °C de temperatura
