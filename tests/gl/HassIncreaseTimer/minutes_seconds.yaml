---
# HassIncreaseTimer - minutes_seconds

language: "gl"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - "engade 5 minutos e 30 segundos ao temporizador"
      - "aumentar o temporizador en 5 minutos e 30 segundos"
    slots:
      minutes: 5
      seconds: 30
    response: "Temporizador actualizado"
  - sentences:
      - "engade 5 minutos e medio ao temporizador"
      - "aumentar o temporizador en 5 minutos e medio"
    slots:
      minutes: 5
      seconds: 30
    response: "Temporizador actualizado"
