---
# HassIncreaseTimer - name_seconds

language: "gl"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    name: pizza
    start_minutes: 5
tests:
  - sentences:
      - "engade 30 segundos ao temporizador pizza"
      - "engade 30 segundos ao temporizador con nome pizza"
      - "incrementar temporizador pizza en 30 segundos"
      - "aumentar temporizador para pizza en 30 segundos"
    slots:
      seconds: 30
      name: pizza
    response: "Temporizador actualizado"
