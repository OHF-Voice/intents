---
# HassIncreaseTimer - seconds_only

language: "gl"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - "engade 30 segundos ao temporizador"
      - "aumentar o temporizador en 30 segundos"
    slots:
      seconds: 30
    response: "Temporizador actualizado"
  - sentences:
      - "engade medio minuto ao temporizador"
      - "aumentar o temporizador en medio minuto"
    slots:
      seconds: 30
    response: "Temporizador actualizado"
