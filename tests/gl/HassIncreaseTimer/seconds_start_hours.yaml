---
# HassIncreaseTimer - seconds_start_hours

language: "gl"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_hours: 1
tests:
  - sentences:
      - "engade 30 segundos a temporizador de 1 hora"
      - "aumentar temporizador para 1 hora en 30 segundos"
    slots:
      seconds: 30
      start_hours: 1
    response: "Temporizador actualizado"
