---
# HassIncreaseTimer - minutes_start_seconds

language: "gl"
timers:
  - is_active: True
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_seconds: 30
tests:
  - sentences:
      - "engade 5 minutos a temporizador de 30 segundos"
      - "aumentar temporizador para 30 segundos en 5 minutos"
    slots:
      minutes: 5
      start_seconds: 30
    response: "Temporizador actualizado"
