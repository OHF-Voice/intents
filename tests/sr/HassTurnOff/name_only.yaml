    domain: "light"
  - name: "Кутак за игру"
    domain: "light"
  - name: "Прекидач за спаваћу собу"
    domain: "switch"
  - name: "лев(а|у) завес(а|у)"
    domain: "cover"
  - name: "главни вентил"
    domain: "valve"
