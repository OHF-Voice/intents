      - "искључи плафонско светло"
      - "плафонско светло на искључено"
    slots:
      name: "плафонско светло"
    response: "light је исључено"

  - sentences:
      - "искључи Кутак за игру светла"
    slots:
      name: "Кутак за игру"
    response: "light је исључено"

  - sentences:
      - "затвори леву завесу"
    slots:
      name: "лев(а|у) завес(а|у)"
    response: "Затворено"

  - sentences:
      - "затвори главни вентил"
    slots:
      name: "главни вентил"
    response: "Затварам"

  - sentences:
      - "откључај улазна врата"
    slots:
      name: "улазна врата"
    response: "Откључано"
