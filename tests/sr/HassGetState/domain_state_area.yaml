    domain: "light"
    state: "on"
    area: "кухињи"
  - name: "Светло Б"
    domain: "light"
    state: "off"
    area: "кухињи"
  - name: "Вентилатор А"
    domain: "fan"
    state: "on"
    area: "кухињи"
  - name: "Вентилатор Б"
    domain: "fan"
    state: "off"
    area: "кухињи"
  - name: "Прекидач А"
    domain: "switch"
    state: "on"
    area: "кухињи"
  - name: "Прекидач Б"
    domain: "switch"
    state: "off"
    area: "кухињи"
