  - sentences: ["колико прекидача је укључено у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "1"

  # ---- locks ----
  - sentences: ["да ли су нека врата откључана у кухињи"]
    slots: { state: "unlocked", area: "кухињи" }
    response: "Да, Задња брава"
  - sentences: ["да ли су сва врата закључана у кухињи"]
    slots: { state: "locked", area: "кухињи" }
    response: "Не, Задња брава није"
  - sentences: ["која врата су откључана у кухињи"]
    slots: { state: "unlocked", area: "кухињи" }
    response: "Задња брава"
  - sentences: ["колико врата је закључано у кухињи"]
    slots: { state: "locked", area: "кухињи" }
