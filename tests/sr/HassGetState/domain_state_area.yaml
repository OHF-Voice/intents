    slots: { state: "off", area: "кухињи" }
    response: "Не, Светло А није"
  - sentences: ["која светла су укључена у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "Светло А"
  - sentences: ["колико светала је укључено у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "1"

  # ---- fans ----
  - sentences: ["да ли је неки вентилатор укључен у кухињи"]
    slots: { state: "on", area: "кухињи" }
