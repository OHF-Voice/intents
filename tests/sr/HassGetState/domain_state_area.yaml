  - sentences: ["да ли су сви вентилатори искључени у кухињи"]
    slots: { state: "off", area: "кухињи" }
    response: "Не, Вентилатор А није"
  - sentences: ["који вентилатори су укључени у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "Вентилатор А"
  - sentences: ["колико вентилатора је укључено у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "1"

  # ---- switches ----
  - sentences: ["да ли је неки прекидач укључен у кухињи"]
    slots: { state: "on", area: "кухињи" }
    response: "Да, Прекидач А"
  - sentences: ["да ли су сви прекидачи искључени у кухињи"]
    slots: { state: "off", area: "кухињи" }
    response: "Не, Прекидач А није"
  - sentences: ["који прекидачи су укључени у кухињи"]
    slots: { state: "on", area: "кухињи" }
