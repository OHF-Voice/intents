---
# HassGetState - device_class_state_area

language: "sr"
areas:
  - name: "спаваћој соби"

entities:
  - name: "Прозор А"
    domain: "cover"
    state: "open"
    area: "спаваћој соби"
    attributes:
      device_class: "window"
  - name: "Прозор Б"
    domain: "cover"
    state: "closed"
    area: "спаваћој соби"
    attributes:
      device_class: "window"

tests:
  - sentences: ["да ли је неки прозор отворен у спаваћој соби"]
    slots: { device_class: "window", state: "open", area: "спаваћој соби" }
    response: "Да, Прозор А"
  - sentences: ["да ли су сви прозори затворени у спаваћој соби"]
    slots: { device_class: "window", state: "closed", area: "спаваћој соби" }
    response: "Не, Прозор А није"
  - sentences: ["који прозори су отворени у спаваћој соби"]
    slots: { device_class: "window", state: "open", area: "спаваћој соби" }
    response: "Прозор А"
  - sentences: ["колико прозора је отворено у спаваћој соби"]
    slots: { device_class: "window", state: "open", area: "спаваћој соби" }
    response: "1"
