# HassRespond - default

language: "sr"
tests:
  - sentences:
      - "здраво хоме ассистант"
      - "Ћао"
    response: "Поздрав од Хоме Ассистант."

  - sentences:
      - "да ли увек слушаш"
      - "да ли увек снимаш"
    response: "Не, снимам само када изговорите реч за буђење."

  - sentences:
      - "где иду моји подаци"
    response: "Ваши подаци се шаљу вашем Хоме Ассистант серверу."

  - sentences:
      - "шта могу да кажем"
      - "шта могу да питам"
    response: "Да бисте сазнали шта можете да питате, посетите Хоме цртица Ассистант тачка И.О. коса црта војс."

  - sentences:
      - "ко те је направио"
      - "ко те је створио"
    response: "Створила ме је дивна заједница Хоме Ассистант, састављена од мајстора из целог света."
