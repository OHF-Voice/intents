language: "ja"
entities:
  - name: "寝室照明"
    domain: "light"
  - name: "台所スイッチ"
    domain: "switch"
  - name: "セーリングファン"
    domain: "fan"
  - name: "テレビ"
    domain: "media_player"
  - name: "おやすみモード"
    domain: "input_boolean"
  - name: "玄関のドア"
    domain: "cover"

tests:
  # on-able domains
  - sentences:
      - "寝室照明を点けて"
      - "寝室照明を起動して"
    slots:
      name: "寝室照明"
    response: "ライトがオンになりました"

  - sentences:
      - "台所スイッチをオンにして"
    slots:
      name: "台所スイッチ"
    response: "スイッチがオンになりました"

  - sentences:
      - "セーリングファンをオンにして"
      - "セーリングファンをオンにしてください"
      - "セーリングファン起動して"
      - "セーリングファン点けて"
    slots:
      name: "セーリングファン"
    response: "ファンがオンになりました"

  - sentences:
      - "テレビをオンにして"
    slots:
      name: "テレビ"
    response: "メディアプレーヤーがオンになりました"

  - sentences:
      - "おやすみモードをオンにして"
    slots:
      name: "おやすみモード"
    response: "スイッチがオンになりました"

  # lights named with a trailing "light(s)" word
  - sentences:
      - "寝室照明のライトをオンにして"
    slots:
      name: "寝室照明"
    response: "ライトがオンになりました"

  # covers
  - sentences:
      - "玄関のドアを開けて"
    slots:
      name: "玄関のドア"
    response: "開けています"
