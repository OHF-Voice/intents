language: "ja"
tests:
  # brightness percentage
  - sentences:
      - "明るさを30%に設定して"
      - "30%の明るさに変更して"
      - "30%に調整して"
    slots:
      brightness: 30
    response: "明るさを設定しました"

  # brightness level (max/min)
  - sentences:
      - "明るさを最大に設定して"
      - "最高の明るさに変更して"
      - "最大に調整して"
    slots:
      brightness: 100
    response: "明るさを設定しました"
