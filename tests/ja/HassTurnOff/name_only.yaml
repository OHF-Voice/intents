language: "ja"
entities:
  - name: "寝室照明"
    domain: "light"
  - name: "台所スイッチ"
    domain: "switch"
  - name: "セーリングファン"
    domain: "fan"
  - name: "テレビ"
    domain: "media_player"
  - name: "おやすみモード"
    domain: "input_boolean"
  - name: "玄関のドア"
    domain: "cover"

tests:
  # off-able domains
  - sentences:
      - "寝室照明を消して"
      - "寝室照明を停止して"
    slots:
      name: "寝室照明"
    response: "ライトがオフになりました"

  - sentences:
      - "台所スイッチをオフにして"
    slots:
      name: "台所スイッチ"
    response: "スイッチがオフになりました"

  - sentences:
      - "セーリングファンをオフにして"
      - "セーリングファンをオフにしてください"
      - "セーリングファン停止して"
      - "セーリングファン消して"
    slots:
      name: "セーリングファン"
    response: "ファンがオフになりました"

  - sentences:
      - "テレビをオフにして"
    slots:
      name: "テレビ"
    response: "メディアプレーヤーがオフになりました"

  - sentences:
      - "おやすみモードをオフにして"
    slots:
      name: "おやすみモード"
    response: "スイッチがオフになりました"

  # lights named with a trailing "light(s)" word
  - sentences:
      - "寝室照明のライトをオフにして"
    slots:
      name: "寝室照明"
    response: "ライトがオフになりました"

  # covers
  - sentences:
      - "玄関のドアを閉めて"
    slots:
      name: "玄関のドア"
    response: "閉めています"
