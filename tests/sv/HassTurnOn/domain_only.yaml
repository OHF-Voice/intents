language: "sv"

areas:
  - name: "Köket"

tests:
  # lights in the satellite's area
  - sentences:
      - "tänd lamporna"
      - "tänd alla lampor"
      - "tänd ljuset"
    slots:
      domain: "light"
    response: "Tände lamporna"

    # fans in the satellite's area
  - sentences:
      - "starta fläktarna"
      - "slå på alla fläktar"
    slots:
      domain: "fan"
    response: "Startade fläktarna"
