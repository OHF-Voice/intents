language: "sv"

entities:
  - name: "Sänglampan"
    domain: "light"
  - name: "Sovrumsbrytaren"
    domain: "switch"
  - name: "Takfläkten"
    domain: "fan"
  - name: "Sovrumsgardinen"
    domain: "cover"
  - name: "Huvudventilen"
    domain: "valve"
  - name: "Ytterdörren"
    domain: "lock"

tests:
  # on-able domains
  - sentences:
      - "tänd sänglampan"
      - "sänglampan på"
    slots:
      name: "Sänglampan"
    response: "Slog på lampan"

  - sentences:
      - "starta takfläkten"
    slots:
      name: "Takfläkten"
    response: "Slog på fläkten"

    # lights named with a trailing "light/lamp" word
  - sentences:
      - "tänd lampan sänglampan"
    slots:
      name: "Sänglampan"
    response: "Slog på lampan"

    # covers
  - sentences:
      - "öppna sovrumsgardinen"
    slots:
      name: "Sovrumsgardinen"
    response: "Öppnar"

    # valves
  - sentences:
      - "öppna huvudventilen"
    slots:
      name: "Huvudventilen"
    response: "Öppnar"

    # locks
  - sentences:
      - "lås ytterdörren"
    slots:
      name: "Ytterdörren"
    response: "Låser"
