language: "sv"

entities:
  - name: "Vardagsrumsfönster"
    domain: "cover"
    state: "open"
    attributes:
      device_class: "window"
  - name: "Köksfönster"
    domain: "cover"
    state: "closed"
    attributes:
      device_class: "window"

tests:
  - sentences:
      - "är något fönster öppet"
    slots:
      domain: "cover"
      device_class: "window"
      state: "open"
    response: "Ja, Vardagsrumsfönster"

  - sentences:
      - "är alla fönster stängda"
    slots:
      domain: "cover"
      device_class: "window"
      state: "closed"
    response: "Nej, inte Vardagsrumsfönster"

  - sentences:
      - "vilka fönster är öppna"
    slots:
      domain: "cover"
      device_class: "window"
      state: "open"
    response: "Vardagsrumsfönster"

  - sentences:
      - "hur många fönster är öppna"
    slots:
      domain: "cover"
      device_class: "window"
      state: "open"
    response: "1"
