language: "sv"

entities:
  - name: "Taklampa"
    domain: "light"
    state: "on"
  - name: "Sänglampa"
    domain: "light"
    state: "off"
  - name: "Sovrumsbrytaren"
    domain: "switch"
    state: "on"
  - name: "Ytterdörren"
    domain: "lock"
    state: "locked"
  - name: "Bakdörren"
    domain: "lock"
    state: "unlocked"
  - name: "Ola"
    domain: "person"
    state: "home"
  - name: "Annie"
    domain: "person"
    state: "not_home"

tests:
  # ---- on/off domains ----
  - sentences:
      - "är någon lampa tänd"
    intent:
      name: "HassGetState"
    slots:
      domain: "light"
      state: "on"
    response: "Ja, Taklampa"

  - sentences:
      - "är alla lampor släckta"
    intent:
      name: "HassGetState"
    slots:
      domain: "light"
      state: "off"
    response: "Nej, inte Taklampa"

  - sentences:
      - "vilka lampor är tända"
    intent:
      name: "HassGetState"
    slots:
      domain: "light"
      state: "on"
    response: "Taklampa"

  - sentences:
      - "hur många lampor är tända"
    intent:
      name: "HassGetState"
    slots:
      domain: "light"
      state: "on"
    response: "1"

  # ---- locks ----
  - sentences:
      - "är någon dörr olåst"
    intent:
      name: "HassGetState"
    slots:
      domain: "lock"
      state: "unlocked"
    response: "Ja, Bakdörren"

  - sentences:
      - "är alla dörrar låsta"
    intent:
      name: "HassGetState"
    slots:
      domain: "lock"
      state: "locked"
    response: "Nej, inte Bakdörren"

  - sentences:
      - "vilka dörrar är olåsta"
    intent:
      name: "HassGetState"
    slots:
      domain: "lock"
      state: "unlocked"
    response: "Bakdörren"

  - sentences:
      - "hur många dörrar är låsta"
    intent:
      name: "HassGetState"
    slots:
      domain: "lock"
      state: "locked"
    response: "1"

  # ---- people / zones ----
  - sentences:
      - "är det någon i home"
    intent:
      name: "HassGetState"
    slots:
      domain: "person"
      state: "home"
    response: "Ja, Ola"

  - sentences:
      - "är alla i home"
    intent:
      name: "HassGetState"
    slots:
      domain: "person"
      state: "home"
    response: "Nej, inte Annie"

  - sentences:
      - "vem är i home"
    intent:
      name: "HassGetState"
    slots:
      domain: "person"
      state: "home"
    response: "Ola"

  - sentences:
      - "hur många personer är i home"
    intent:
      name: "HassGetState"
    slots:
      domain: "person"
      state: "home"
    response: "1"
