---
# HassTimerStatus - seconds_only

language: sv
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
    start_seconds: 30
tests:
  - sentences:
      - 30 sekunders timer status
      - tid kvar på 30 sekunders timer
      - status på 30 sekunders timer
    slots:
      start_seconds: 30
    response: 5 minuter kvar
