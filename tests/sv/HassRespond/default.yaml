---
# HassRespond - default

language: sv
tests:
  - sentences:
      - hej home assistant
      - hallå home assistant
      - hej
      - hallå
    response: Hej från Home Assistant.
  - sentences:
      - lyssnar du alltid
      - lyssnar du jämt
      - lyssnar du ständigt
      - spelar du alltid in
      - spelar du jämt in
      - spelar du ständigt in
    response: Nej, jag spelar bara in när du säger väckningsordet.
  - sentences:
      - vart sparas data
      - vart sparas min data
      - vart sparas min data någonstans
      - vart sparas datan
      - vart sparas datan någonstans
    response: Din data skickas till din Home Assistant server.
  - sentences:
      - vad kan jag säga
      - vad kan jag fråga
    response:
      För att lära dig vad du kan fråga, besök H.A. punkt I.O. snedstreck
      voice.
  - sentences:
      - vem skapade dig
      - vem gjorde dig
    response:
      Jag skapades av det underbara Home Assistant communityt, som består
      av pysslare över hela världen.
