---
# HassSetVolume - area_only

language: "nl"
areas:
  - name: "Woonkamer"

tests:
  - sentences:
      - "zet in de woonkamer het volume naar 90 procent"
      - "zet in de woonkamer volume omhoog naar 90"
      - "verhoog het volume naar 90 in de woonkamer"
      - "in de woonkamer volume 90 procent"
      - "90% volume in de woonkamer"
    slots:
      area: "Woonkamer"
      volume_level: 90
    response: "Volume aangepast"
