---
# HassTimerStatus - minutes_only

language: nl
timers:
  - is_active: true
    start_minutes: 5
    total_seconds_left: 600
    rounded_hours_left: 0
    rounded_minutes_left: 10
    rounded_seconds_left: 0
tests:
  - sentences:
      - "5 minuten timer status"
      - "status van 5 minuten timer"
      - "tijd over op de 5 minuten timer"
      - "hoe lang is de 5 minuten timer nog"
    slots:
      start_minutes: 5
    response: "10 minuten resterend."
