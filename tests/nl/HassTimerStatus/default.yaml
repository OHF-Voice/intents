---
# HassTimerStatus - default

language: nl
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - "timer status"
      - "status van mijn timers"
      - "hoe veel tijd is er over van mijn timers"
      - "hoe lang is de timer nog"
      - "hoe lang moeten de kookwekkers nog"
    response: "5 minuten resterend."
