---
# HassTimerStatus - seconds_only

language: nl
timers:
  - is_active: true
    start_seconds: 45
    total_seconds_left: 30
    rounded_hours_left: 0
    rounded_minutes_left: 0
    rounded_seconds_left: 30
tests:
  - sentences:
      - "45 seconden timer status"
      - "status van 45 seconden timer"
      - "tijd over op de 45 seconden timer"
      - "hoe lang is de 45 seconden timer nog"
    slots:
      start_seconds: 45
    response: "30 seconden resterend."
