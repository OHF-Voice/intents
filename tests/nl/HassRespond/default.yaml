---
# HassRespond - default

language: nl
tests:
  - sentences:
      - hoi home assistant
    response: Hallo vanuit Home Assistant.
  - sentences:
      - ben je altijd aan het luisteren
      - luister je altijd
      - neem je altijd op
    response: Nee, ik neem alleen op na het wake-word.
  - sentences:
      - wat gebeurt er met mijn data
      - waar gaat de data heen
    response: Je data gaat naar je Home Assistant server.
  - sentences:
      - wat kan ik allemaal zeggen
      - wat allemaal doen
    response: Voor meer informatie over wat ik kan, ga naar home streepje assistant
      punt I O slash voice.
  - sentences:
      - wie heeft je gemaakt
    response: Ik ben gemaakt door de geweldige Home Assistant community, die bestaat
      uit mensen vanuit de hele wereld.
