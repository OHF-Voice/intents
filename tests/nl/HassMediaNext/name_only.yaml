---
# HassMediaNext - name_only

language: nl
entities:
  - name: TV
    domain: media_player
    state: idle
    attributes:
      volume_level: '50'
tests:
  - sentences:
      - volgende filmpje op TV
      - ga naar het volgende liedje op TV
      - zet TV op het volgende filmpje
      - sla het huidige liedje op TV over
      - zet het volgende nummer op de TV op
      - ga op de TV naar het volgende nummer
      - sla dit op de TV over
      - op TV de volgende track afspelen
    slots:
      name: TV
    response: Volgende wordt afgespeeld
