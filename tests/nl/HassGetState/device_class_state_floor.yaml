---
# HassGetState - device_class_state_floor

language: "nl"
floors:
  - name: "Tweede verdieping"

areas:
  - name: "Slaapkamer"
    floor: "Tweede verdieping"
  - name: "Hal"
    floor: "Eerste verdieping"

entities:
  # on a different floor: must be EXCLUDED from Tweede verdieping queries
  - name: "Halraam"
    domain: "cover"
    state: "open"
    area: "Hal"
    attributes:
      device_class: "window"
  - name: "Slaapkamerraam"
    domain: "cover"
    state: "open"
    area: "Slaapkamer"
    attributes:
      device_class: "window"
  - name: "Babykamerraam"
    domain: "cover"
    state: "closed"
    area: "Slaapkamer"
    attributes:
      device_class: "window"

tests:
  - sentences:
      [
        "is er een tweede verdieping raam open",
        "is er een raam open op de tweede verdieping",
      ]
    slots: { device_class: "window", state: "open", floor: "Tweede verdieping" }
    response: "Ja, Slaapkamerraam"
  - sentences:
      [
        "zijn alle tweede verdieping ramen dicht",
        "zijn alle ramen dicht op de tweede verdieping",
      ]
    slots:
      { device_class: "window", state: "closed", floor: "Tweede verdieping" }
    response: "Nee, Slaapkamerraam niet"
  - sentences:
      [
        "welke tweede verdieping ramen zijn open",
        "welke ramen zijn open op de tweede verdieping",
      ]
    slots: { device_class: "window", state: "open", floor: "Tweede verdieping" }
    response: "Slaapkamerraam"
  - sentences:
      [
        "hoeveel tweede verdieping ramen zijn open",
        "hoeveel ramen zijn open op de tweede verdieping",
      ]
    slots: { device_class: "window", state: "open", floor: "Tweede verdieping" }
    response: "1"
