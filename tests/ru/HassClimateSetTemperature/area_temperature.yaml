---
# HassClimateSetTemperature - area_temperature

language: "ru"

areas:
  - name: "Спальня"
  - name: "Кухня"

entities:
  - name: "Термостат"
    domain: "climate"
    state: "heat"
    area: "Спальня"

tests:
  - sentences:
      - "установи температуру в Спальня до 50 градусов"
      - "сделай в Спальня температуру 50 градусов"
      - "увеличь температуру на 50 градусов в Спальня"
    slots:
      area: "Спальня"
      temperature: 50
    response: "Температура установлена на 50 градусов"
  - sentences:
      - "сделай в Спальня температуру 24 градуса"
      - "выставь температуру в Спальня на 24 градуса"
      - "опусти температуру в Спальня до 24 градусов"
    slots:
      area: "Спальня"
      temperature: 24
    response: "Температура установлена на 24 градуса"
  - sentences:
      - "установи температуру на 20 в Кухня"
    slots:
      area: "Кухня"
      temperature: 20
    response: "Температура установлена на 20 градусов"
