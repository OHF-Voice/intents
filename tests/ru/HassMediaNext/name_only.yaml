---
# HassMediaNext - name_only

language: "ru"
entities:
  - name: "TV"
    domain: "media_player"

tests:
  - sentences:
      - "Включи следующую песню на TV"
      - "Переключи следующий трек на TV"
      - "Переключи TV на следующую песню"
      - "Следующий трек на TV"
    slots:
      name: "TV"
    response: "Переключено"
