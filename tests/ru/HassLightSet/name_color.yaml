language: ru
entities:
  - name: "Ночная лампа"
    domain: "light"
tests:
  - sentences:
      - "измени цвет Ночная лампа на красный"
      - "поставь красный цвет у Ночная лампа"
      - "сделай Ночная лампа красный цвет"
    slots:
      name: "Ночная лампа"
      color: red
    response: "Цвет Ночная лампа установлен на red"
  - sentences:
      - "измени цвет Ночная лампа на зеленый"
      - "поставь зелёный цвет у Ночная лампа"
    slots:
      name: "Ночная лампа"
      color: green
    response: "Цвет Ночная лампа установлен на green"
