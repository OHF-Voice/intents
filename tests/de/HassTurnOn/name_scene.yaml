---
# HassTurnOn - name_scene
# example: aktiviere die Szene Partymodus
# slots: {name}

language: "de"
entities:
  - name: "Partymodus"
    domain: "scene"

tests:
  - sentences:
      - "Partymodus an"
      - "die Szene Partymodus an"
      - "Szene Partymodus aktivieren"
      - "Partymodus aktivieren"
      - "Partymodus ausführen"
      - "Partymodus starten"
      - "führe die Szene Partymodus aus"
      - "führe den Partymodus aus"
      - "führe den Partymodus Szene aus"
      - "Partymodus Szene aktivieren"
      - "aktiviere den Partymodus"
      - "aktiviere die Szene Partymodus"
      - "aktiviere den Partymodus Szene"
      - "Partymodus"
    slots:
      name: "Partymodus"
    response: "Partymodus aktiviert"
