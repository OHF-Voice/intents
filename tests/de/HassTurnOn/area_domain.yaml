---
# HassTurnOn - area_domain
# example: schalte alle Lichter in der Küche an
# slots:
# - {area}
# - {domain}

language: "de"
areas:
  - name: "Küche"
  - name: "Wohnzimmer"

tests:
  # lights
  - sentences:
      - "Schalte das Licht in der Küche an"
      - "Schalte die Lichter in der Küche ein"
      - "Dreh das Licht in der Küche auf"
      - "Schalte in der Küche alle Lichter an"
      - "Schalte in der Küche die Lichter ein"
      - "Dreh in der Küche das Licht auf"
      - "Licht in der Küche an"
      - "Die Lichter aufdrehen in der Küche"
      - "In der Küche Licht an"
      - "schalte in der Küche Lichtern"
      - "Lichtern in der Küche"
      - "in der Küche Lichtern"
    slots:
      area: "Küche"
      domain: "light"
    response: "Licht eingeschaltet"

  # fans
  - sentences:
      - "schalte den Ventilator im Wohnzimmer ein"
      - "schalte im Wohnzimmer den Ventilator ein"
      - "starte den Ventilator im Wohnzimmer"
