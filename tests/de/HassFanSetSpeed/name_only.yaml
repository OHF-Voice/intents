# HassFanSetSpeed - name_only

language: de
entities:
  - name: Deckenventilator
    domain: fan
    area: Wohnzimmer
tests:
  - sentences:
      - Ändere die Geschwindigkeit des Deckenventilator auf 50%
      - Stell die Geschwindigkeit vom Deckenventilator auf 50% ein
      - Deckenventilator 50%
      - Deckenventilator auf 50%
      - Geschwindigkeit vom Deckenventilator auf 50% einstellen
      - Deckenventilator auf 50% ändern
    slots:
      name: Deckenventilator
      percentage: 50
    response: Geschwindigkeit eingestellt
