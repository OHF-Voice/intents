# HassFanSetSpeed - area_only

language: de
areas:
  - name: Wohnzimmer
    floor: Erdgeschoss
tests:
  - sentences:
      - Ändere die Geschwindigkeit der Lüfter im Wohnzimmer auf 50%
      - Stell die Geschwindigkeit des Ventilators im Wohnzimmer auf 50 Prozent ein
