---
# HassMediaPause - name_only

language: "de"
entities:
  - name: "TV"
    domain: "media_player"

tests:
  - sentences:
      - "pausiere TV"
      - "pausiere den TV"
      - "Pause TV"
      - "halte TV an"
      - "halte den TV an"
      - "TV pausieren"
      - "den TV pausieren"
      - "TV pause"
      - "TV anhalten"
      - "den TV anhalten"
      - "TV stopp"
      - "TV stoppen"
      - "TV halt"
    slots:
      name: "TV"
    response: "Pausiert"
