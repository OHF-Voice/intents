---
# HassClimateGetTemperature - default

language: "de"

areas:
  - name: "__context_area__"

entities:
  - name: "EcoBee"
    domain: "climate"
    state: "heat"
    area: "__context_area__"
    attributes:
      current_temperature: 22.0
      temperature: 23.0

tests:
  - sentences:
      - "Wie hoch ist die Temperatur?"
      - "Wie niedrig ist die Temperatur?"
      - "Wie warm ist es?"
      - "Wie kalt ist es?"
      - "Wie viel Grad hat es?"
      - "Wie viel Grad sind es?"
      - "Wie hoch ist die Temperatur hier?"
      - "Wie hoch ist hier die Temperatur?"
      - "Wie warm ist es hier?"
      - "Wie viel Grad hat es hier?"
      - "Wie hoch ist die Temperatur in diesem Raum?"
      - "Wie kalt ist es im Raum?"
      - "Wieviel Grad hat es in diesem Bereich?"
      - "Temperatur"
      - "Temperatur hier"
      - "Temperatur in diesem Raum"
    response: "22 Grad"
  - sentences:
      - "Auf wie viel Grad ist die Heizung hier eingestellt?"
      - "Auf wie viel Grad ist die Heizung eingestellt?"
      - "Auf welche Temperatur ist der Thermostat eingestellt?"
      - "Auf welche Zieltemperatur ist das Thermostat eingestellt?"
      - "Auf welche Solltemperatur ist die Heizung gestellt?"
      - "Auf wieviel Grad ist die Klimaanlage in diesem Raum eingestellt?"
      - "Wie warm ist die Heizung hier eingestellt"
      - "wie kalt ist das thermostat in diesem Raum gestellt"
      - "auf wie viel grad ist hier die Heizung eingestellt"
      - "wie warm ist hier im Raum die Klimaanlage eingestellt"
      - "Zieltemperatur"
      - "Solltemperatur"
      - "Zieltemperatur hier"
      - "Solltemperatur in diesem Raum"
    response: "23 Grad"
