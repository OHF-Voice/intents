---
# HassSetPosition - area_device_class

language: "fi"
areas:
  - name: "Makuuhuone"

tests:
  - sentences:
      - "laita makuuhuoneen verhot sijaintiin 50%"
      - "avaa makuuhuoneen verhot asentoon 50 prosenttia"
    slots:
      area: "Makuuhuone"
      domain: "cover"
      device_class: "curtain"
      position: 50
    response: "curtain asento säädetty"
  - sentences:
      - "säädä verhot makuuhuoneessa sijaintiin 50%"
    slots:
      area: "Makuuhuone"
      domain: "cover"
      device_class: "curtain"
      position: 50
    response: "curtain asento säädetty"
