---
# HassGetState - domain_state

language: "fi"
entities:
  # lights
  - name: "Olohuoneen valo"
    domain: "light"
    state: "on"
  - name: "Keittiön valo"
    domain: "light"
    state: "off"
  # fans
  - name: "Olohuoneen tuuletin"
    domain: "fan"
    state: "on"
  # switches
  - name: "Keittiön kytkin"
    domain: "switch"
    state: "on"
  # locks
  - name: "Etuovi"
    domain: "lock"
    state: "locked"
  - name: "Takaovi"
    domain: "lock"
    state: "unlocked"
  # persons
  - name: "Jane"
    domain: "person"
    state: "kotona"

tests:
  # ---- lights ----
  - sentences: ["onko jokin valo päällä"]
    slots: { state: "on" }
    response: "Kyllä, Olohuoneen valo"
  - sentences: ["ovatko kaikki valot pois päältä"]
    slots: { state: "off" }
    response: "Ei, Olohuoneen valo ei ole"
  - sentences: ["mitkä valot ovat päällä"]
    slots: { state: "on" }
    response: "Olohuoneen valo"
  - sentences: ["montako valoa on päällä"]
    slots: { state: "on" }
    response: "1"

  # ---- fans ----
  - sentences: ["onko jokin tuuletin päällä"]
    slots: { state: "on" }
    response: "Kyllä, Olohuoneen tuuletin"
  - sentences: ["ovatko kaikki tuulettimet päällä"]
    slots: { state: "on" }
    response: "Kyllä"
  - sentences: ["mitkä tuulettimet ovat päällä"]
    slots: { state: "on" }
    response: "Olohuoneen tuuletin"
  - sentences: ["montako tuuletinta on päällä"]
    slots: { state: "on" }
    response: "1"

  # ---- switches ----
  - sentences: ["onko jokin kytkin päällä"]
    slots: { state: "on" }
    response: "Kyllä, Keittiön kytkin"
  - sentences: ["ovatko kaikki kytkimet päällä"]
    slots: { state: "on" }
    response: "Kyllä"
  - sentences: ["mitkä kytkimet ovat päällä"]
    slots: { state: "on" }
    response: "Keittiön kytkin"
  - sentences: ["montako kytkintä on päällä"]
    slots: { state: "on" }
    response: "1"

  # ---- locks ----
  - sentences: ["onko jokin ovi lukitsematta"]
    slots: { state: "unlocked" }
    response: "Kyllä, Takaovi"
  - sentences: ["ovatko kaikki ovet lukossa"]
    slots: { state: "locked" }
    response: "Ei, Takaovi ei ole"
  - sentences: ["mitkä ovet on lukittu"]
    slots: { state: "locked" }
    response: "Etuovi"
  - sentences: ["montako ovea on lukittu"]
    slots: { state: "locked" }
    response: "1"

  # ---- people / zones ----
  - sentences: ["onko kukaan kotona"]
    slots: { state: "kotona" }
    response: "Kyllä, Jane"
  - sentences: ["ovatko kaikki kotona"]
    slots: { state: "kotona" }
    response: "Kyllä"
  - sentences: ["kuka on kotona"]
    slots: { state: "kotona" }
    response: "Jane"
  - sentences: ["montako ihmistä on kotona"]
    slots: { state: "kotona" }
    response: "1"
