---
# HassGetState - name_state_floor

language: "fi"
floors:
  - name: "Yksi"

areas:
  - name: "Autotalli"
    floor: "Yksi"
  - name: "Aula"
    floor: "Yksi"

entities:
  - name: "Autotallin ovi"
    domain: "cover"
    state: "open"
    area: "Autotalli"
  - name: "Etuovi"
    domain: "lock"
    state: "locked"
    area: "Aula"

tests:
  # covers
  - sentences:
      - "onko Autotallin ovi auki kerroksessa Yksi"
      - "onko kerroksen Yksi Autotallin ovi auki"
    slots:
      name: "Autotallin ovi"
      state: "open"
      floor: "Yksi"
    response: "Kyllä"

  # locks
  - sentences:
      - "onko Etuovi lukittu kerroksessa Yksi"
      - "onko kerroksen Yksi Etuovi lukittu"
    slots:
      name: "Etuovi"
      state: "locked"
      floor: "Yksi"
    response: "Kyllä"
