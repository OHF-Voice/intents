---
# HassGetState - name_state_floor

language: "fi"
floors:
  - name: "Ensimmäinen"

areas:
  - name: "Autotalli"
    floor: "Ensimmäinen"
  - name: "Aula"
    floor: "Ensimmäinen"

entities:
  - name: "Autotallin ovi"
    domain: "cover"
    state: "open"
    area: "Autotalli"
  - name: "Etuovi"
    domain: "lock"
    state: "locked"
    area: "Aula"

tests:
  # covers
  - sentences:
      - "onko Autotallin ovi auki kerroksessa Ensimmäinen"
      - "onko kerroksen Ensimmäinen Autotallin ovi auki"
    slots:
      name: "Autotallin ovi"
      state: "open"
      floor: "Ensimmäinen"
    response: "Kyllä"

  # locks
  - sentences:
      - "onko Etuovi lukittu kerroksessa Ensimmäinen"
      - "onko kerroksen Ensimmäinen Etuovi lukittu"
    slots:
      name: "Etuovi"
      state: "locked"
      floor: "Ensimmäinen"
    response: "Kyllä"
