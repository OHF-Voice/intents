---
# HassGetState - domain_state_area

language: "fi"
areas:
  - name: "Keittio"

entities:
  - name: "Keittion valo"
    domain: "light"
    state: "on"
    area: "Keittio"
  - name: "Keittion tuuletin"
    domain: "fan"
    state: "on"
    area: "Keittio"
  - name: "Keittion kytkin"
    domain: "switch"
    state: "on"
    area: "Keittio"
  - name: "Keittion ovi"
    domain: "lock"
    state: "locked"
    area: "Keittio"

tests:
  # ---- lights ----
  - sentences:
      - "onko jokin valo päällä keittiossa"
      - "onko jokin valo päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Kyllä, Keittion valo"
  - sentences:
      - "ovatko kaikki valot päällä keittiossa"
      - "ovatko kaikki valot päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Kyllä"
  - sentences:
      - "mitkä valot ovat päällä keittiossa"
      - "mitkä valot ovat päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Keittion valo"
  - sentences:
      - "montako valoa on päällä keittiossa"
      - "montako valoa on päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "1"

  # ---- fans ----
  - sentences:
      - "onko jokin tuuletin päällä keittiossa"
      - "onko jokin tuuletin päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
