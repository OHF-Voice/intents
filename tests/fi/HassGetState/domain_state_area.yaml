---
# HassGetState - domain_state_area

language: "fi"
areas:
  - name: "Keittio"

entities:
  - name: "Keittion valo"
    domain: "light"
    state: "on"
    area: "Keittio"
  - name: "Keittion tuuletin"
    domain: "fan"
    state: "on"
    area: "Keittio"
  - name: "Keittion kytkin"
    domain: "switch"
    state: "on"
    area: "Keittio"
  - name: "Keittion ovi"
    domain: "lock"
    state: "locked"
    area: "Keittio"

tests:
  # ---- lights ----
  - sentences:
      - "onko jokin keittiossa valo päällä"
      - "onko jokin valo päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Kyllä, Keittion valo"
  - sentences:
      - "ovatko kaikki keittiossa valot päällä"
      - "ovatko kaikki valot päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
