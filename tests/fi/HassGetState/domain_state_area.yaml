  - sentences:
      - "montako kytkintä on päällä keittiossa"
      - "montako kytkintä on päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "1"

  # ---- locks ----
  - sentences:
      - "onko jokin ovi lukossa keittiossa"
      - "onko jokin ovi lukossa alueella Keittio"
    slots: { state: "locked", area: "Keittio" }
