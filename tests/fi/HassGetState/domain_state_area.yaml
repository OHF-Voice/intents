      - "mitkä valot ovat päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Keittion valo"
  - sentences:
      - "montako keittiossa valoa on päällä"
      - "montako valoa on päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "1"

  # ---- fans ----
