  - sentences:
      - "mitkä tuulettimet ovat päällä keittiossa"
      - "mitkä tuulettimet ovat päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Keittion tuuletin"
  - sentences:
      - "montako tuuletinta on päällä keittiossa"
      - "montako tuuletinta on päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "1"

  # ---- switches ----
  - sentences:
      - "onko jokin kytkin päällä keittiossa"
      - "onko jokin kytkin päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
    response: "Kyllä, Keittion kytkin"
  - sentences:
      - "ovatko kaikki kytkimet päällä keittiossa"
      - "ovatko kaikki kytkimet päällä alueella Keittio"
    slots: { state: "on", area: "Keittio" }
