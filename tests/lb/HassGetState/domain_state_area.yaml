language: lb
areas:
  - name: "Kichen"

entities:
  # lights
  - name: "Kichenluucht"
    domain: "light"
    area: "Kichen"
    state: "on"
  - name: "Kicheplafong"
    domain: "light"
    area: "Kichen"
    state: "off"
  # fans
  - name: "Kicheventilator"
    domain: "fan"
    area: "Kichen"
    state: "on"
  - name: "Owesventilator"
    domain: "fan"
    area: "Kichen"
    state: "off"
  # switches
  - name: "Kachinsel"
    domain: "switch"
    area: "Kichen"
    state: "on"
  - name: "Comptoirschalter"
    domain: "switch"
    area: "Kichen"
    state: "off"

tests:
  # ---- lights ----
  - sentences:
      - "Sinn iergendeng Luuten un an der Kichen"
    slots:
      domain: "light"
      state: "on"
      area: "Kichen"
    response: "Jo, Kichenluucht"
  - sentences:
      - "Sinn all d'Luuten aus an der Kichen"
    slots:
      domain: "light"
      state: "off"
      area: "Kichen"
    response: "Nee, Kichenluucht net"
  - sentences:
      - "Wéi eng Luuchten sinn un an der Kichen"
    slots:
      domain: "light"
      state: "on"
      area: "Kichen"
    response: "Kichenluucht"
  - sentences:
      - "Wéi vill Luuchten sinn un an der Kichen"
    slots:
      domain: "light"
      state: "on"
      area: "Kichen"
    response: "1"

  # ---- fans ----
