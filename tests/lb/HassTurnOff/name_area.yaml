  # valves
  - sentences:
      - "Maach den Haaptventil an der Kichen zou"
    slots:
      name: "Haaptventil"
      area: "Kichen"
    response: "Geet zou"

  # locks
  - sentences:
      - "Spär d'Affekësdier an der Kichen of"
      - "Spär d'Affekësdier an der Kichen"
