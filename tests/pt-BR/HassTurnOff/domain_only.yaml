language: pt-BR

tests:
  # lights in this room
  - sentences:
      - "desliga as luzes"
      - "desliga a luz"
      - "apaga as luzes"
      - "desliga o candeeiro"
      - "desliga as luzes aqui"
      - "desliga todas as luzes aqui"
      - "desliga o interruptor"
    slots:
      domain: "light"
    response: "Luzes apagadas"

  # fans in this room
  - sentences:
      - "desliga as ventiladores"
      - "desliga as ventiladores aqui"
      - "desliga todas as ventiladores nesta sala"
    slots:
      domain: "fan"
    response: "Ventiladores desligados"
