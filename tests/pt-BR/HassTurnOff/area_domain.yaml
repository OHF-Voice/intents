      area: "Cozinha"
      domain: "light"
    response: "Luzes apagadas"

  - sentences:
      - "desliga as cozinha luzes"
    slots:
      area: "Cozinha"
      domain: "light"
    response: "Luzes apagadas"

  # fans
  - sentences:
      - "desliga as ventiladores da cozinha"
      - "desliga todas as ventiladores na cozinha"
    slots:
      area: "Cozinha"
      domain: "fan"
    response: "Ventiladores desligados"

  - sentences:
      - "desliga as cozinha ventiladores"
    slots:
      area: "Cozinha"
      domain: "fan"
    response: "Ventiladores desligados"
