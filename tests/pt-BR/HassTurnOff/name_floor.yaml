language: pt-BR

floors:
  - name: "Primeiro Andar"

entities:
  - name: "Luz de Teto"
    domain: "light"
  - name: "Cantinho de Leitura"
    domain: "light"
  - name: "Porta Corredica"
    domain: "cover"
  - name: "Valvula Principal"
    domain: "valve"

tests:
  # off-able domains
  - sentences:
      - "desliga a luz de teto do primeiro andar"
    slots:
      name: "Luz de Teto"
      floor: "Primeiro Andar"
    response: "luz desligado"

  # lights named with leading light word
  - sentences:
      - "desliga as luzes do cantinho de leitura do primeiro andar"
    slots:
      name: "Cantinho de Leitura"
      floor: "Primeiro Andar"
    response: "luz desligado"

  # covers
  - sentences:
      - "fecha a porta corredica do primeiro andar"
    slots:
      name: "Porta Corredica"
      floor: "Primeiro Andar"
    response: "Fechando"

  # valves
  - sentences:
      - "fecha a valvula principal do primeiro andar"
    slots:
      name: "Valvula Principal"
      floor: "Primeiro Andar"
    response: "Fechando"
