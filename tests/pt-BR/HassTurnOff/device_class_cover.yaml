language: pt-BR

entities:
  - name: "Persiana da Cozinha"
    domain: "cover"
    attributes:
      device_class: "curtain"

tests:
  - sentences:
      - "fecha as cortinas"
      - "fecha as cortinas aqui"
      - "baixa as cortinas neste cômodo"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "Fechando curtain"

  - sentences:
      - "fecha a porta da garagem"
    slots:
      domain: "cover"
      device_class: "garage"
    response: "Fechando garage"
