language: pt-BR

entities:
  - name: "Persiana da Cozinha"
    domain: "cover"
    attributes:
      device_class: "curtain"

tests:
  - sentences:
      - "abre as cortinas"
      - "abre as cortinas aqui"
      - "levanta as cortinas neste cômodo"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "Abrindo curtain"

  - sentences:
      - "abre a porta da garagem"
    slots:
      domain: "cover"
      device_class: "garage"
    response: "Abrindo garage"
