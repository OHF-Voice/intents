    domain: "light"
    area: "Cozinha"
  - name: "Exaustor"
    domain: "fan"
    area: "Cozinha"

tests:
  # lights
  - sentences:
      - "liga as luzes da cozinha"
      - "liga todas as luzes na cozinha"
      - "liga as luzes na cozinha"
      - "acende as luzes da cozinha"
    slots:
      area: "Cozinha"
      domain: "light"
    response: "Luzes acesas"

  - sentences:
      - "liga as cozinha luzes"
    slots:
      area: "Cozinha"
      domain: "light"
    response: "Luzes acesas"

  # fans
  - sentences:
      - "liga as ventiladores da cozinha"
      - "liga todas as ventiladores na cozinha"
    slots:
      area: "Cozinha"
      domain: "fan"
    response: "Ventiladores ligados"

  - sentences:
      - "liga as cozinha ventiladores"
    slots:
      area: "Cozinha"
      domain: "fan"
    response: "Ventiladores ligados"
