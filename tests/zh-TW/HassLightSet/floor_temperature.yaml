      floor: 二樓
      temperature: 2700
    response: "二樓色溫已調整為2700"
  - sentences:
      - 把二樓色溫調成暖白
      - 調整二樓燈光色溫為暖白
    slots:
      floor: 二樓
      temperature: 2700
    response: "二樓色溫已調整為暖白"
