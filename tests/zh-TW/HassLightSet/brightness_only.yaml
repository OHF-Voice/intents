language: zh-TW
tests:
  - sentences:
      - 把這裡的亮度調到50%
      - 調整這邊的亮度為百分之50
    slots:
      brightness: 50
    response: "亮度已調整"
  - sentences:
      - 把這裡的亮度調到最亮
      - 調整亮度為最亮
    slots:
      brightness: 100
    response: "亮度已調整"
  - sentences:
      - 把這邊的亮度調到最暗
      - 調整這裡的亮度為最低
    slots:
      brightness: 1
    response: "亮度已調整"
