language: zh-TW
entities:
  - name: 吊扇
    domain: fan
  - name: 遊戲區
    domain: light
  - name: 左側窗簾
    domain: cover
    attributes:
      device_class: curtain
  - name: 大門
    domain: lock
tests:
  # light / switch / fan / media_player / input_boolean
  - sentences:
      - 打開吊扇
      - 把吊扇打開
      - 開啟吊扇
    slots:
      name: 吊扇
    response: "吊扇已打開"
  - sentences:
      - 打開遊戲區燈光
      - 把遊戲區燈光打開
    slots:
      name: 遊戲區
    response: "遊戲區已打開"

  # covers
  - sentences:
      - 打開左側窗簾
      - 把左側窗簾打開
    slots:
      name: 左側窗簾
    response: "左側窗簾已打開"

  # locks
  - sentences:
      - 鎖上大門
      - 把大門鎖上
    slots:
      name: 大門
    response: "大門已上鎖"
