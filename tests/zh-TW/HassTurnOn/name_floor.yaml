      name: 吊扇
      floor: 二樓
    response: "吊扇已打開"
  - sentences:
      - 打開二樓的左側窗簾
      - 把二樓的左側窗簾打開
    slots:
      name: 左側窗簾
      floor: 二樓
    response: "左側窗簾已打開"
