language: zh-TW
floors:
  - name: 二樓
areas:
  - name: 二樓臥室
    floor: 二樓
entities:
  - name: 臥室吸頂燈
    domain: light
    area: 二樓臥室
    state:
      in: 開啟
      out: "on"
  - name: 臥室檯燈
    domain: light
    area: 二樓臥室
    state:
      in: 關閉
      out: "off"
tests:
  - sentences:
      - 二樓有任何燈是開著的嗎？
    slots:
      floor: 二樓
      domain: light
      state: "on"
    response: 是的、臥室吸頂燈
  - sentences:
      - 二樓所有的燈都是開著嗎？
    slots:
      floor: 二樓
      domain: light
      state: "on"
    response: 沒有、臥室檯燈不是
  - sentences:
      - 哪一盞二樓的燈是開著的？
    slots:
      floor: 二樓
      domain: light
      state: "on"
    response: 臥室吸頂燈
  - sentences:
      - 二樓有多少盞燈是打開的？
    slots:
      floor: 二樓
      domain: light
      state: "on"
    response: "1"
