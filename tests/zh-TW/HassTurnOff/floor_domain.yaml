language: zh-TW
floors:
  - name: 二樓
areas:
  - name: 二樓臥室
    floor: 二樓
entities:
  - name: 臥室吸頂燈
    domain: light
    area: 二樓臥室
    state:
      in: 開啟
      out: "on"
tests:
  - sentences:
      - 關閉二樓的燈
      - 把所有二樓的燈關閉
      - 關掉所有二樓的燈
      - 把二樓的燈關閉
    slots:
      domain: light
      floor: 二樓
    response: "二樓的燈光已關閉"
