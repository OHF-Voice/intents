---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "en"
entities:
  - name: "Party Mode"
    domain: "scene"

tests:
  - sentences:
      - "activate party mode scene"
      - "turn party mode on"
      - "party mode on"
      - "change to the party mode scene"
      - "transition to party mode"
      - "transition to scene party mode"
    slots:
      name: "Party Mode"
    response: "Activated"
