---
# HassClimateSetTemperature - area_temperature

language: "en"
areas:
  - name: "Bedroom"

tests:
  - sentences:
      - "set temp in bedroom to 50 degrees"
      - "set bedroom temp to 50 degrees"
    slots:
      area: "Bedroom"
      temperature: 50
    response: "Temperature set to 50 degrees"
