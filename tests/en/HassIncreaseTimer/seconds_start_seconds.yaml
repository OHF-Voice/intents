---
language: "en"
tests:
  - sentences:
      - "add 30 seconds to 30 seconds timer"
      - "increase 30 seconds timer by 30 seconds"
      - "add 30 seconds to timer for 30 seconds"
      - "increase timer for 30 seconds by 30 seconds"
    slots:
      seconds: 30
      start_seconds: 30
    response: "30 seconds added to timer"
