---
language: "en"
tests:
  - sentences:
      - "add 5 minutes 30 seconds to timer"
      - "increase timer by 5 minutes 30 seconds"
    slots:
      minutes: 5
      seconds: 30
    response: "5 minutes and 30 seconds added to timer"
  - sentences:
      - "add 5 and a half minutes to timer"
      - "increase timer by 5 and a half minutes"
    slots:
      minutes: 5
      seconds: 30
    response: "5 minutes and 30 seconds added to timer"
