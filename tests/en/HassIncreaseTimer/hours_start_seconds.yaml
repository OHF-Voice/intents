---
language: "en"
tests:
  - sentences:
      - "add 1 hour to 30 seconds timer"
      - "increase 30 seconds timer by 1 hour"
      - "add 1 hour to timer for 30 seconds"
      - "increase timer for 30 seconds by 1 hour"
    slots:
      hours: 1
      start_seconds: 30
    response: "1 hour added to timer"
