---
language: "en"
tests:
  - sentences:
      - "add 30 seconds to 5 minutes timer"
      - "increase 5 minutes timer by 30 seconds"
      - "add 30 seconds to timer for 5 minutes"
      - "increase timer for 5 minutes by 30 seconds"
    slots:
      seconds: 30
      start_minutes: 5
    response: "30 seconds added to timer"
