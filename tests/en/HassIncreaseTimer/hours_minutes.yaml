---
language: "en"
tests:
  - sentences:
      - "add 1 hour 5 minutes to timer"
      - "increase timer by 1 hour 5 minutes"
    slots:
      hours: 1
      minutes: 5
    response: "1 hour and 5 minutes added to timer"
  - sentences:
      - "add 1 and a half hours to timer"
      - "increase timer by 1 and a half hours"
    slots:
      hours: 1
      minutes: 30
    response: "1 hour and 30 minutes added to timer"
