---
language: "en"
tests:
  - sentences:
      - "add 5 minutes to 1 hour timer"
      - "increase 1 hour timer by 5 minutes"
      - "add 5 minutes to timer for 1 hour"
      - "increase timer for 1 hour by 5 minutes"
    slots:
      minutes: 5
      start_hours: 1
    response: "5 minutes added to timer"
