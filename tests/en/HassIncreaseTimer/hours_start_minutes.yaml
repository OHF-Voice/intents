---
language: "en"
tests:
  - sentences:
      - "add 1 hour to 5 minutes timer"
      - "increase 5 minutes timer by 1 hour"
      - "add 1 hour to timer for 5 minutes"
      - "increase timer for 5 minutes by 1 hour"
    slots:
      hours: 1
      start_minutes: 5
    response: "1 hour added to timer"
