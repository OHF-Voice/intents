---
language: "en"
tests:
  - sentences:
      - "add 30 seconds to pizza timer"
      - "increase pizza timer by 30 seconds"
      - "add 30 seconds to timer named pizza"
      - "increase timer named pizza by 30 seconds"
    slots:
      seconds: 30
      name: "pizza"
    response: "30 seconds added to timer named pizza"
