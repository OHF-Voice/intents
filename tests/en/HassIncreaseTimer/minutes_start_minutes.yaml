---
language: "en"
tests:
  - sentences:
      - "add 5 minutes to 5 minutes timer"
      - "increase 5 minutes timer by 5 minutes"
      - "add 5 minutes to timer for 5 minutes"
      - "increase timer for 5 minutes by 5 minutes"
    slots:
      minutes: 5
      start_minutes: 5
    response: "5 minutes added to timer"
