---
language: "en"
tests:
  - sentences:
      - "add 5 minutes to timer"
      - "increase timer by 5 minutes"
    slots:
      minutes: 5
    response: "5 minutes added to timer"
  - sentences:
      - "add half an hour to timer"
      - "increase timer by half an hour"
    slots:
      minutes: 30
    response: "30 minutes added to timer"
