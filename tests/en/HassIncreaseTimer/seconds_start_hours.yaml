---
language: "en"
tests:
  - sentences:
      - "add 30 seconds to 1 hour timer"
      - "increase 1 hour timer by 30 seconds"
      - "add 30 seconds to timer for 1 hour"
      - "increase timer for 1 hour by 30 seconds"
    slots:
      seconds: 30
      start_hours: 1
    response: "30 seconds added to timer"
