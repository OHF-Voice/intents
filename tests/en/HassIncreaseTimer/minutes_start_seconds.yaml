---
language: "en"
tests:
  - sentences:
      - "add 5 minutes to 30 seconds timer"
      - "increase 30 seconds timer by 5 minutes"
      - "add 5 minutes to timer for 30 seconds"
      - "increase timer for 30 seconds by 5 minutes"
    slots:
      minutes: 5
      start_seconds: 30
    response: "5 minutes added to timer"
