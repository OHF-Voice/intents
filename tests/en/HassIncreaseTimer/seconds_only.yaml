---
language: "en"
tests:
  - sentences:
      - "add 30 seconds to timer"
      - "increase timer by 30 seconds"
    slots:
      seconds: 30
    response: "30 seconds added to timer"
  - sentences:
      - "add half a minute to timer"
      - "increase timer by half a minute"
    slots:
      seconds: 30
    response: "30 seconds added to timer"
