---
# HassGetWeather - default

language: "en"
entities:
  - name: "Home"
    domain: "weather"
    state: "rainy"
    attributes:
      temperature: 47
      temperature_unit: "°F"

tests:
  - sentences:
      - "what's the weather?"
      - "what is the weather like"
    response: "47 °F and raining"
