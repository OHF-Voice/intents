---
# HassMediaNext - name_only

language: "en"
entities:
  - name: "TV"
    domain: "media_player"

tests:
  - sentences:
      - "next item on TV"
      - "skip song on the TV"
      - "skip track on the TV"
      - "skip to the next song on the TV"
      - "skip to next track on the TV"
      - "skip this song on the TV"
      - "skip the track on the TV"
      - "skip on the TV"
      - "skip this on the TV"
      - "TV skip this"
    slots:
      name: "TV"
    response: "Playing next"
