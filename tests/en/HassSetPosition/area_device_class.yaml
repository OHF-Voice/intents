---
# HassSetPosition - area_device_class

language: "en"
areas:
  - name: "Bedroom"

tests:
  - sentences:
      - "set the curtains to 50% in the bedroom"
      - "open the curtains to 50% in the bedroom"
      - "set the bedroom curtains to 50%"
    slots:
      area: "Bedroom"
      domain: "cover"
      device_class: "curtain"
      position: 50
    response: "curtain position set"
