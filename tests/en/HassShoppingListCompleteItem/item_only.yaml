---
# HassShoppingListCompleteItem - item_only
# example: check off apples from my shopping list

language: "en"
tests:
  - sentences:
      - "check off apples from my shopping list"
      - "complete apples on my shopping list"
      - "delete apples in my shopping list"
      - "remove apples on my shopping list"
      - "check apples off from my shopping list"
      - "check apples off my list"
    slots:
      item: "apples"
    response: "Checked off apples"
  - sentences:
      - "check off Does Not Exist from my shopping list"
    slots:
      item: "Does Not Exist"
    response: "No matching item found on your shopping list."
