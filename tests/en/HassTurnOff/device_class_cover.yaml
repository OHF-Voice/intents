---
# HassTurnOff - device_class_cover
# example: close the windows in here
# slots:
# - {domain}
# - {device_class}
# context_area: true

language: "en"
tests:
  - sentences:
      - "close the garage door"
    slots:
      domain: "cover"
      device_class: "garage"
    response: "Closing the garage"

  - sentences:
      - "close the curtains"
      - "close the curtains in here"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "Closing the curtain"
