---
# HassTurnOff - name_floor
# example: turn off the overhead light on the first floor
# slots:
# - {name}
# - {floor}

language: "en"
entities:
  - name: "Overhead Light"
    domain: "light"
  - name: "Play Corner"
    domain: "light"
  - name: "Sliding Door"
    domain: "cover"
  - name: "Main Valve"
    domain: "valve"
floors:
  - name: "First Floor"

tests:
  # lights
  - sentences:
      - "turn off the overhead light on the first floor"
      - "turn the overhead light on the first floor off"
      - "deactivate the overhead light on the first floor"
    slots:
      name: "Overhead Light"
      floor: "First Floor"
    response: "Turned off the light"

  # lights named with a trailing "light(s)" word
  - sentences:
      - "turn off play corner lights on the first floor"
      - "turn play corner lights on the first floor off"
      - "deactivate play corner lights on the first floor"
    slots:
      name: "Play Corner"
      floor: "First Floor"
    response: "Turned off the light"

  # covers
  - sentences:
      - "close the sliding door on the first floor"
    slots:
      name: "Sliding Door"
      floor: "First Floor"
    response: "Closing"
