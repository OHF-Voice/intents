---
# HassFanSetSpeed - area_only
# example: set kitchen fans to 50%

language: "en"
areas:
  - name: "Kitchen"

entities:
  - name: "Ceiling Fan"
    domain: "fan"

tests:
  - sentences:
      - "set kitchen fan speed to 50%"
      - "set the speed of the kitchen fans to 50%"
      - "set the speed of fans in the kitchen to 50%"
      - "make kitchen fans 50%"
      - "kitchen fans 50%"
    slots:
      area: "Kitchen"
      percentage: 50
    response: "Speed set"
