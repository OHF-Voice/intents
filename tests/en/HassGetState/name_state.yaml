---
# HassGetState - name_state

language: "en"
entities:
  - name: "Kitchen Light"
    domain: "light"
    state: "on"
  - name: "Garage Door"
    domain: "cover"
    state: "open"
  - name: "Front Door"
    domain: "lock"
    state: "locked"
  - name: "Patio Door"
    domain: "binary_sensor"
    state: "on"
  - name: "Office Sensor"
    domain: "binary_sensor"
    state: "on"
  - name: "Hallway Light"
    domain: "light"
    state: "off"

tests:
  - sentences:
      - "is the kitchen light on"
    slots:
      name: "Kitchen Light"
      state: "on"
    response: "Yes"

  # one_yesno "No" branch: entity is in the opposite state
  - sentences:
      - "is the hallway light on"
    slots:
      name: "Hallway Light"
      state: "on"
    response: "No, off"

  - sentences:
      - "is the garage door open"
    slots:
      name: "Garage Door"
      state: "open"
    response: "Yes"

  - sentences:
      - "is the front door locked"
    slots:
      name: "Front Door"
      state: "locked"
    response: "Yes"

  - sentences:
      - "is the patio door open"
    slots:
      name: "Patio Door"
      state: "on"
    response: "Yes"

  - sentences:
      - "is the office sensor occupied"
    slots:
      name: "Office Sensor"
      state: "on"
    response: "Yes"
