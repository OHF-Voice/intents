---
language: "en"
tests:
  - sentences:
      - "remove 5 minutes from 30 seconds timer"
      - "decrease 30 seconds timer by 5 minutes"
      - "remove 5 minutes from timer for 30 seconds"
      - "decrease timer for 30 seconds by 5 minutes"
    slots:
      minutes: 5
      start_seconds: 30
    response: "5 minutes removed from timer"
