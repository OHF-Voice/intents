---
language: "en"
tests:
  - sentences:
      - "remove 5 minutes from 1 hour timer"
      - "decrease 1 hour timer by 5 minutes"
      - "remove 5 minutes from timer for 1 hour"
      - "decrease timer for 1 hour by 5 minutes"
    slots:
      minutes: 5
      start_hours: 1
    response: "5 minutes removed from timer"
