---
language: "en"
tests:
  - sentences:
      - "remove 30 seconds from pizza timer"
      - "decrease pizza timer by 30 seconds"
      - "remove 30 seconds from timer named pizza"
      - "decrease timer named pizza by 30 seconds"
    slots:
      seconds: 30
      name: "pizza"
    response: "30 seconds removed from timer named pizza"
