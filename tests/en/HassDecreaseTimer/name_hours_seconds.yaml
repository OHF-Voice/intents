---
language: "en"
tests:
  - sentences:
      - "remove 1 hour 30 seconds from pizza timer"
      - "decrease pizza timer by 1 hour 30 seconds"
      - "remove 1 hour 30 seconds from timer named pizza"
      - "decrease timer named pizza by 1 hour 30 seconds"
    slots:
      hours: 1
      seconds: 30
      name: "pizza"
    response: "1 hour and 30 seconds removed from timer named pizza"
