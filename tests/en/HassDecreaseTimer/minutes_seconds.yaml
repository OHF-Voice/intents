---
language: "en"
tests:
  - sentences:
      - "remove 5 minutes 30 seconds from timer"
      - "decrease timer by 5 minutes 30 seconds"
    slots:
      minutes: 5
      seconds: 30
    response: "5 minutes and 30 seconds removed from timer"
  - sentences:
      - "remove 5 and a half minutes from timer"
      - "decrease timer by 5 and a half minutes"
    slots:
      minutes: 5
      seconds: 30
    response: "5 minutes and 30 seconds removed from timer"
