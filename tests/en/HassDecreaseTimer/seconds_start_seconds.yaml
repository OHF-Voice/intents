---
language: "en"
tests:
  - sentences:
      - "remove 30 seconds from 30 seconds timer"
      - "decrease 30 seconds timer by 30 seconds"
      - "remove 30 seconds from timer for 30 seconds"
      - "decrease timer for 30 seconds by 30 seconds"
    slots:
      seconds: 30
      start_seconds: 30
    response: "30 seconds removed from timer"
