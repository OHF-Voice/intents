---
language: "en"
tests:
  - sentences:
      - "remove 1 hour from 30 seconds timer"
      - "decrease 30 seconds timer by 1 hour"
      - "remove 1 hour from timer for 30 seconds"
      - "decrease timer for 30 seconds by 1 hour"
    slots:
      hours: 1
      start_seconds: 30
    response: "1 hour removed from timer"
