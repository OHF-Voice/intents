---
language: "en"
tests:
  - sentences:
      - "remove 5 minutes from timer"
      - "decrease timer by 5 minutes"
    slots:
      minutes: 5
    response: "5 minutes removed from timer"
  - sentences:
      - "remove half an hour from timer"
      - "decrease timer by half an hour"
    slots:
      minutes: 30
    response: "30 minutes removed from timer"
