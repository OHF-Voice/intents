---
language: "en"
tests:
  - sentences:
      - "remove 5 minutes from 5 minutes timer"
      - "decrease 5 minutes timer by 5 minutes"
      - "remove 5 minutes from timer for 5 minutes"
      - "decrease timer for 5 minutes by 5 minutes"
    slots:
      minutes: 5
      start_minutes: 5
    response: "5 minutes removed from timer"
