---
language: "en"
tests:
  - sentences:
      - "remove 1 hour from 5 minutes timer"
      - "decrease 5 minutes timer by 1 hour"
      - "remove 1 hour from timer for 5 minutes"
      - "decrease timer for 5 minutes by 1 hour"
    slots:
      hours: 1
      start_minutes: 5
    response: "1 hour removed from timer"
