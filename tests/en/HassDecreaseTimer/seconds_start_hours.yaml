---
language: "en"
tests:
  - sentences:
      - "remove 30 seconds from 1 hour timer"
      - "decrease 1 hour timer by 30 seconds"
      - "remove 30 seconds from timer for 1 hour"
      - "decrease timer for 1 hour by 30 seconds"
    slots:
      seconds: 30
      start_hours: 1
    response: "30 seconds removed from timer"
