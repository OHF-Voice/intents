---
language: "en"
tests:
  - sentences:
      - "remove 30 seconds from 5 minutes timer"
      - "decrease 5 minutes timer by 30 seconds"
      - "remove 30 seconds from timer for 5 minutes"
      - "decrease timer for 5 minutes by 30 seconds"
    slots:
      seconds: 30
      start_minutes: 5
    response: "30 seconds removed from timer"
