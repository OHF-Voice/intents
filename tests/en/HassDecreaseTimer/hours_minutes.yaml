---
language: "en"
tests:
  - sentences:
      - "remove 1 hour 5 minutes from timer"
      - "decrease timer by 1 hour 5 minutes"
    slots:
      hours: 1
      minutes: 5
    response: "1 hour and 5 minutes removed from timer"
  - sentences:
      - "remove 1 and a half hours from timer"
      - "decrease timer by 1 and a half hours"
    slots:
      hours: 1
      minutes: 30
    response: "1 hour and 30 minutes removed from timer"
