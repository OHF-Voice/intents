---
language: "en"
tests:
  - sentences:
      - "remove 30 seconds from timer"
      - "decrease timer by 30 seconds"
    slots:
      seconds: 30
    response: "30 seconds removed from timer"
  - sentences:
      - "remove half a minute from timer"
      - "decrease timer by half a minute"
    slots:
      seconds: 30
    response: "30 seconds removed from timer"
