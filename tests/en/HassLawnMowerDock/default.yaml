---
# HassLawnMowerDock - default
# example: stop mowing

language: "en"
entities:
  - name: "Clippy"
    domain: "lawn_mower"

tests:
  - sentences:
      - "stop mowing"
      - "stop mowing the lawn"
      - "cancel mowing"
      - "stop mower"
      - "dock the mower"
      - "return the mower to base"
      - "return to base"
    response: "Docking"
