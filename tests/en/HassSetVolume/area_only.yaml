---
# HassSetVolume - area_only

language: "en"
areas:
  - name: "Living Room"

tests:
  - sentences:
      - "set living room volume to 90 percent"
      - "turn living room volume up to 90"
      - "turn volume down to 90 percent in living room"
      - "set the volume to 90 in the living room"
      - "change the volume in the living room to 90"
      - "in the living room turn the volume down to 90 percent"
    slots:
      area: "Living Room"
      volume_level: 90
    response: "Volume set"
