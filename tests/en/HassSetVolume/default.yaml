---
# HassSetVolume - default

language: "en"
tests:
  - sentences:
      - "set volume to 90 percent"
      - "change the volume to 90"
      - "turn volume down to 90 percent"
      - "increase the volume to 90 percent"
      - "turn the volume down to 90 percent"
      - "turn up the volume to 90"
    slots:
      volume_level: 90
    response: "Volume set"
