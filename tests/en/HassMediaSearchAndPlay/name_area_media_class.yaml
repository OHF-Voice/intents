---
# HassMediaSearchAndPlay - name_area_media_class

language: "en"
entities:
  - name: "TV"
    domain: "media_player"
areas:
  - name: "Kitchen"
media:
  - title: "The Office"

tests:
  - sentences:
      - "play the artist Queen on the TV in the Kitchen"
    slots:
      search_query: "Queen"
      name: "TV"
      area: "Kitchen"
      media_class: "artist"
    response: "Playing media"
