---
language: "en"
tests:
  - sentences:
      - "set a timer for 1 hour 5 minutes"
      - "set a 1 hour 5 minutes timer"
      - "1 hour 5 minutes timer"
      - "timer for 1 hour 5 minutes"
    slots:
      hours: 1
      minutes: 5
    response: "Timer set for 1 hour and 5 minutes"
  - sentences:
      - "set a timer for 1 and a half hours"
      - "timer for 1 and a half hours"
    slots:
      hours: 1
      minutes: 30
    response: "Timer set for 1 hour and 30 minutes"
