---
# HassLightSet - area_color

language: "en"
areas:
  - name: "Bedroom"

tests:
  - sentences:
      - "set the bedroom color to red"
      - "change the color of the bedroom to red"
      - "bedroom color red"
      - "bedroom red"
      - "set the color of all the lights in the bedroom to red"
    slots:
      color: "red"
      area: "Bedroom"
    response: "Color set"
