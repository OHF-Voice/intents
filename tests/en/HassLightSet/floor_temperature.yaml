---
# HassLightSet - floor_temperature

language: "en"
floors:
  - name: "First Floor"

tests:
  - sentences:
      - "set the first floor color temperature to 2700 Kelvin"
      - "set the first floor color temperature to warm white"
    slots:
      temperature: 2700
      floor: "First Floor"
    response: "Color temperature set"
