# HassLightSet - temperature_only

language: "en"
tests:
  - sentences:
      - "set the color temperature to 2700 Kelvin"
      - "change the color temperature in here to 2700 Kelvin"
      - "turn color temperature to 2700 Kelvin in here"
      - "set the color temperature to warm white"
      - "change the color temperature in here to warm white"
    slots:
      temperature: 2700
    response: "Color temperature set"
