    slots:
      temperature: 30
    response: "താപനില 30 ഡിഗ്രികൾ ആയി ക്രമീകരിച്ചു"
  - sentences:
      - "25° ആയി തണുപ്പ് ക്രമീകരിക്കുക"
    slots:
      temperature: 25
