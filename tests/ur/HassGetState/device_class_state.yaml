language: "ur"
areas:
  - name: Living Room
  - name: Bedroom
entities:
  - name: Curtain Left
    domain: cover
    area: Living Room
    state:
      in: "کھلاوا"
      out: "open"
    attributes:
      device_class: curtain
  - name: Curtain Right
    domain: cover
    area: Living Room
    state:
      in: "بند"
      out: "closed"
    attributes:
      device_class: curtain
  - name: Bedroom Curtain
    domain: cover
    area: Bedroom
    state:
      in: "بند"
      out: "closed"
    attributes:
      device_class: curtain
tests:
  - sentences:
      - "کیا کوئی پردے کھلی ہوی ہے"
    slots:
      device_class: curtain
      state: "open"
    response: "جی، Curtain Left"
  - sentences:
      - "سارے پردے کھلاوا ہے"
    slots:
      device_class: curtain
      state: "open"
    response: "نہیں، Bedroom Curtain اور Curtain Right نہیں ھیں"
  - sentences:
      - "کونسی پردے بند وی ہے"
    slots:
      device_class: curtain
      state: "closed"
    response: "Bedroom Curtain اور Curtain Right"
  - sentences:
      - "کتنے پردے بند ہوئی ہے"
    slots:
      device_class: curtain
      state: "closed"
    response: "2"
