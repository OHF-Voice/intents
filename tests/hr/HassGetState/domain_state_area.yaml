---
# HassGetState - domain_state_area

language: "hr"

entities:
  - name: "kuhinjsko svjetlo"
    domain: "light"
    state: "on"
    area: "kuhinja"
  - name: "stropni ventilator"
    domain: "fan"
    state: "on"
    area: "kuhinja"
  - name: "zidni prekidač"
    domain: "switch"
    state: "on"
    area: "kuhinja"
  - name: "ulazna vrata"
    domain: "lock"
    state: "locked"
    area: "hodnik"

areas:
  - name: "kuhinja"
  - name: "hodnik"

tests:
  # ---- lights ----
  - sentences:
      - "je li koje svjetlo uključeno u kuhinja"
    slots:
      domain: "light"
      state: "on"
      area: "kuhinja"
    response: "Da, kuhinjsko svjetlo"
  - sentences:
      - "jesu li sva svjetla isključena u kuhinja"
    slots:
      domain: "light"
      state: "off"
      area: "kuhinja"
    response: "Ne, nije kuhinjsko svjetlo"
  - sentences:
      - "koja svjetla su uključena u kuhinja"
    slots:
      domain: "light"
      state: "on"
      area: "kuhinja"
    response: "kuhinjsko svjetlo"
  - sentences:
      - "koliko je svjetala uključeno u kuhinja"
    slots:
      domain: "light"
      state: "on"
      area: "kuhinja"
    response: "1"

  # ---- fans ----
  - sentences:
      - "je li koji ventilator uključen u kuhinja"
    slots:
      domain: "fan"
      state: "on"
      area: "kuhinja"
    response: "Da, stropni ventilator"
  - sentences:
      - "jesu li svi ventilatori isključeni u kuhinja"
    slots:
      domain: "fan"
      state: "off"
      area: "kuhinja"
    response: "Ne, nije stropni ventilator"
  - sentences:
      - "koji ventilatori su uključeni u kuhinja"
    slots:
      domain: "fan"
      state: "on"
      area: "kuhinja"
    response: "stropni ventilator"
  - sentences:
      - "koliko je ventilatora uključeno u kuhinja"
    slots:
      domain: "fan"
      state: "on"
      area: "kuhinja"
    response: "1"

  # ---- switches ----
  - sentences:
      - "je li koji prekidač uključen u kuhinja"
    slots:
      domain: "switch"
      state: "on"
      area: "kuhinja"
    response: "Da, zidni prekidač"
  - sentences:
      - "jesu li svi prekidači isključeni u kuhinja"
    slots:
      domain: "switch"
      state: "off"
      area: "kuhinja"
    response: "Ne, nije zidni prekidač"
  - sentences:
      - "koji prekidači su uključeni u kuhinja"
    slots:
      domain: "switch"
      state: "on"
      area: "kuhinja"
    response: "zidni prekidač"
  - sentences:
      - "koliko je prekidača uključeno u kuhinja"
    slots:
      domain: "switch"
      state: "on"
      area: "kuhinja"
    response: "1"

  # ---- locks ----
  - sentences:
      - "je li koja vrata zaključana u hodnik"
    slots:
      domain: "lock"
      state: "locked"
      area: "hodnik"
    response: "Da, ulazna vrata"
  - sentences:
      - "jesu li sva vrata otključana u hodnik"
    slots:
      domain: "lock"
      state: "unlocked"
      area: "hodnik"
    response: "Ne, nije ulazna vrata"
  - sentences:
      - "koja vrata su zaključana u hodnik"
    slots:
      domain: "lock"
      state: "locked"
      area: "hodnik"
    response: "ulazna vrata"
  - sentences:
      - "koliko je vrata zaključano u hodnik"
    slots:
      domain: "lock"
      state: "locked"
      area: "hodnik"
    response: "1"
