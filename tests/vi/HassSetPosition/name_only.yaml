      - đặt rèm cửa phòng ngủ ở mức 50%
    slots:
      name: rèm cửa phòng ngủ
      position: 50
    response: đã thiết lập vị trí
  - sentences:
      - đặt van chính ở mức 100
    slots:
      name: van chính
      position: 100
    response: đã thiết lập vị trí
  - sentences:
      - đặt vị trí của van chính ở mức 100
    slots:
      name: van chính
      position: 100
    response: đã thiết lập vị trí
