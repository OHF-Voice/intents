---
# HassLightSet - area_brightness

language: vi
areas:
  - name: phòng ngủ
tests:
  - sentences:
      - đặt độ sáng của đèn trong phòng ngủ lên 50%
      - đặt phòng ngủ lên 50% độ sáng
    slots:
      brightness: 50
      area: phòng ngủ
    response: đã thiết lập độ sáng
  - sentences:
      - đặt độ sáng của tất cả đèn trong phòng ngủ lên tối đa
      - đặt phòng ngủ lên mức sáng tối đa
    slots:
      brightness: 100
      area: phòng ngủ
    response: đã thiết lập độ sáng
