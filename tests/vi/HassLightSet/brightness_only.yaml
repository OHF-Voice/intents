---
# HassLightSet - brightness_only

language: vi
areas:
  - name: phòng ngủ
tests:
  - sentences:
      - đặt độ sáng lên 50%
      - đặt độ sáng ở đây lên 50 phần trăm
    slots:
      brightness: 50
    response: đã thiết lập độ sáng
  - sentences:
      - đặt độ sáng lên tối đa
      - đặt mức độ sáng ở đây lên cao nhất
    slots:
      brightness: 100
    response: đã thiết lập độ sáng
