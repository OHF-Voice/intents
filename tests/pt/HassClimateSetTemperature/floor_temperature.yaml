---
# HassClimateSetTemperature - floor_temperature
language: pt
floors:
  - name: "Rés do Chão"
areas:
  - name: "Sala de Estar"
    floor: "Rés do Chão"
entities:
  - name: "Termostato Sala"
    domain: "climate"
    state: "heat"
    area: "Sala de Estar"
    attributes:
      current_temperature: 19
tests:
  - sentences:
      - "põe a temperatura do piso Rés do Chão a 19 graus"
      - "define a temperatura do Rés do Chão para 19 graus"
    slots:
      floor: "Rés do Chão"
      temperature: 19
    response: "Temperatura definida para 19 graus"
