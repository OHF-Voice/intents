language: "pt"

entities:
  - name: "Persiana da Cozinha"
    domain: "cover"
    attributes:
      device_class: "curtain"

tests:
  - sentences:
      - "fecha as cortinas"
      - "fecha as cortinas aqui"
      - "baixa as cortinas nesta divisão"
    slots:
      domain: "cover"
      device_class: "curtain"
    response: "Fechado curtain"

  - sentences:
      - "fecha a porta da garagem"
    slots:
      domain: "cover"
      device_class: "garage"
    response: "Fechado garage"
