language: "pt"

tests:
  # lights in this room
  - sentences:
      - "desliga as luzes"
      - "desliga a luz"
      - "apaga as luzes"
      - "desliga o candeeiro"
      - "desliga as luzes aqui"
      - "desliga todas as luzes aqui"
      - "desliga o interruptor"
    slots:
      domain: "light"
    response: "Luzes desligadas"

  # fans in this room
  - sentences:
      - "desliga as ventoinhas"
      - "desliga as ventoinhas aqui"
      - "desliga todas as ventoinhas nesta sala"
    slots:
      domain: "fan"
    response: "Ventoinhas desligadas"
