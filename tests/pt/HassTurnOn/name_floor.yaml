language: "pt"

floors:
  - name: "Primeiro Andar"

entities:
  - name: "Luz de Teto"
    domain: "light"
  - name: "Cantinho de Leitura"
    domain: "light"
  - name: "Porta Corredica"
    domain: "cover"
  - name: "Valvula Principal"
    domain: "valve"

tests:
  # on-able domains
  - sentences:
      - "liga a luz de teto do primeiro andar"
    slots:
      name: "Luz de Teto"
      floor: "Primeiro Andar"
    response: "Ligado"

  # lights named with leading light word
  - sentences:
      - "liga as luzes do cantinho de leitura do primeiro andar"
    slots:
      name: "Cantinho de Leitura"
      floor: "Primeiro Andar"
    response: "Ligado"

  # covers
  - sentences:
      - "abre a porta corredica do primeiro andar"
    slots:
      name: "Porta Corredica"
      floor: "Primeiro Andar"
    response: "Aberto"

  # valves
  - sentences:
      - "abre a valvula principal do primeiro andar"
    slots:
      name: "Valvula Principal"
      floor: "Primeiro Andar"
    response: "Aberto"
