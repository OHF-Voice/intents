      temperature: 2700
    response: "Temperatura da cor definida"

  - sentences:
      - "põe a temperatura da cor a branco quente"
      - "põe a temperatura da cor aqui a branco quente"
    slots:
      temperature: 2700
    response: "Temperatura da cor definida"
