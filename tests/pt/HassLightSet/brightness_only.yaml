---
# HassLightSet - brightness_only
language: pt
tests:
  - sentences:
      - "põe o brilho a 50%"
      - "põe o brilho aqui a 50%"
      - "põe as luzes a 50%"
      - "põe todas as luzes a 50%"
    slots:
      brightness: 50
    response: "Brilho definido"

  - sentences:
      - "põe o brilho a máximo"
      - "põe o brilho aqui ao máximo"
    slots:
      brightness: 100
    response: "Brilho definido"
