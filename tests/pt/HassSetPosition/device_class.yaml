---
# HassSetPosition - device_class
language: pt
entities:
  - name: "Cortina Esquerda"
    domain: "cover"
    attributes:
      device_class: curtain
tests:
  - sentences:
      - "põe as cortinas a 50%"
      - "muda as cortinas para 50%"
      - "abre as cortinas aqui a 50%"
    slots:
      domain: "cover"
      device_class: "curtain"
      position: 50
    response: "Posição alterada"
