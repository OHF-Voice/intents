---
# HassGetState - domain_state
#
# Cardinalities exercise the response rendering:
#   luzes        = 5 on / 1 off  -> ">4" truncation ("... e mais N")
#   ventoinhas   = 2 on / 1 off  -> multi-entity join ("A e B", "não estão")
#   interruptores = 1 on / 1 off -> single entity ("não está")

language: "pt"
entities:
  - name: "Luz A"
    domain: "light"
    state: "on"
  - name: "Luz B"
    domain: "light"
    state: "on"
  - name: "Luz C"
    domain: "light"
    state: "on"
  - name: "Luz D"
    domain: "light"
    state: "on"
  - name: "Luz E"
    domain: "light"
    state: "on"
  - name: "Luz F"
    domain: "light"
    state: "off"
  - name: "Ventoinha Sotao"
    domain: "fan"
    state: "on"
  - name: "Ventoinha Teto"
    domain: "fan"
    state: "on"
  - name: "Ventoinha Casa de Banho"
    domain: "fan"
    state: "off"
  - name: "Tomada Sala"
    domain: "switch"
    state: "on"
  - name: "Tomada Varanda"
    domain: "switch"
    state: "off"
  - name: "Porta da Frente"
    domain: "lock"
    state: "locked"
  - name: "Porta de Tras"
    domain: "lock"
    state: "unlocked"
  - name: "Ana"
    domain: "person"
    state: "casa"
  - name: "Joao"
    domain: "person"
    state: "not_home"

tests:
  # ---- lights: >4 matches -> truncated "e mais N" ----
  - sentences: ["há alguma luz ligada"]
    slots: { state: "on" }
    response: "Sim, Luz A, Luz B, Luz C e mais 2"
  - sentences: ["estão todas as luzes desligadas"]
    slots: { state: "off" }
    response: "Não, Luz A, Luz B, Luz C e mais 2 não estão"
  - sentences: ["que luzes estão ligadas"]
    slots: { state: "on" }
    response: "Luz A, Luz B, Luz C e mais 2"
  - sentences: ["quantas luzes estão ligadas"]
    slots: { state: "on" }
    response: "5"

  # ---- fans: 2 matches -> "A e B" join + plural "não estão" ----
  - sentences: ["há alguma ventoinha ligada"]
    slots: { state: "on" }
    response: "Sim, Ventoinha Sotao e Ventoinha Teto"
  - sentences: ["estão todas as ventoinhas desligadas"]
    slots: { state: "off" }
    response: "Não, Ventoinha Sotao e Ventoinha Teto não estão"
  - sentences: ["que ventoinhas estão ligadas"]
    slots: { state: "on" }
    response: "Ventoinha Sotao e Ventoinha Teto"
  - sentences: ["quantas ventoinhas estão ligadas"]
    slots: { state: "on" }
    response: "2"

  # ---- switches: single match -> singular "não está" ----
  - sentences: ["há algum interruptor ligado"]
    slots: { state: "on" }
    response: "Sim, Tomada Sala"
  - sentences: ["estão todos os interruptores desligados"]
    slots: { state: "off" }
    response: "Não, Tomada Sala não está"
  - sentences: ["que interruptores estão ligados"]
    slots: { state: "on" }
    response: "Tomada Sala"
  - sentences: ["quantos interruptores estão ligados"]
    slots: { state: "on" }
    response: "1"

  # ---- locks ----
  - sentences: ["há alguma porta destrancada"]
    slots: { state: "unlocked" }
    response: "Sim, Porta de Tras"
  - sentences: ["estão todas as portas trancadas"]
    slots: { state: "locked" }
    response: "Não, Porta de Tras não está"
  - sentences: ["que portas estão destrancadas"]
    slots: { state: "unlocked" }
    response: "Porta de Tras"
  - sentences: ["quantas portas estão trancadas"]
    slots: { state: "locked" }
    response: "1"

  # ---- people / zones ----
  - sentences: ["está alguém em casa"]
    slots: { state: "casa" }
    response: "Sim, Ana"
  - sentences: ["estão todos em casa"]
    slots: { state: "casa" }
    response: "Não, Joao não está"
  - sentences: ["quem está em casa"]
    slots: { state: "casa" }
    response: "Ana"
  - sentences: ["quantas pessoas estão em casa"]
    slots: { state: "casa" }
    response: "1"
