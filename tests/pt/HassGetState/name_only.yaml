---
# HassGetState - name_only

language: "pt"
entities:
  - name: "Temperatura exterior"
    domain: "sensor"
    state: "25"
    attributes:
      unit_of_measurement: "°C"

tests:
  - sentences:
      - "qual é a temperatura exterior"
      - "qual o estado da temperatura exterior"
      - "diz-me a temperatura exterior"
      - "como está a temperatura exterior"
    slots:
      name: "Temperatura exterior"
    response: "Temperatura exterior está 25 °C"
