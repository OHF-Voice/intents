      - kakšna je temperatura v Dnevna soba
      - koliko stopinj je v Dnevna soba
      - povej mi temperatura v Dnevna soba
      - ali je vroče v Dnevna soba
      - temperatura v Dnevna soba
    slots:
      area: Dnevna soba
    response: 21,2 stopinje
