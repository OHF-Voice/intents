language: sl
entities:
  - name: Kuhinjska luč
    domain: light
    state: "on"
  - name: Pisarniški ventilator
    domain: fan
    state: "on"
  - name: Stikalo bojlerja
    domain: switch
    state: "on"
  - name: Vhodna vrata
    domain: lock
    state: unlocked
  - name: Jana
    domain: person
    state: doma
tests:
  # lights
  - sentences:
      - ali so kakšne luči prižgane
    slots:
      state: "on"
    response: Da, Kuhinjska luč
  - sentences:
      - ali so vse luči prižgane
    slots:
      state: "on"
    response: Da
  - sentences:
      - katere luči so prižgane
    slots:
      state: "on"
    response: Kuhinjska luč
  - sentences:
      - koliko luči je prižganih
    slots:
      state: "on"
    response: "1"
    # fans
  - sentences:
      - ali so kakšni ventilatorji prižgani
    slots:
      state: "on"
    response: Da, Pisarniški ventilator
  - sentences:
      - ali so vsi ventilatorji prižgani
    slots:
      state: "on"
    response: Da
  - sentences:
      - kateri ventilatorji so prižgani
    slots:
      state: "on"
    response: Pisarniški ventilator
  - sentences:
      - koliko ventilatorji je prižganih
    slots:
      state: "on"
    response: "1"
    # switches
  - sentences:
      - ali so kakšna stikala prižgana
    slots:
      state: "on"
    response: Da, Stikalo bojlerja
  - sentences:
      - ali so vsa stikala prižgana
    slots:
      state: "on"
    response: Da
  - sentences:
      - katera stikala so prižgana
    slots:
      state: "on"
    response: Stikalo bojlerja
  - sentences:
      - koliko stikala je prižganih
    slots:
      state: "on"
    response: "1"
    # locks
  - sentences:
      - ali so kakšna vrata odklenjena
    slots:
      state: unlocked
    response: Da, Vhodna vrata
  - sentences:
      - ali so vsa vrata odklenjena
    slots:
      state: unlocked
    response: Da
  - sentences:
      - katera vrata so odklenjena
    slots:
      state: unlocked
    response: Vhodna vrata
  - sentences:
      - koliko vrata je odklenjenih
    slots:
      state: unlocked
    response: "1"
    # person
  - sentences:
      - ali je kdo doma
    slots:
      state: doma
    response: Da, Jana
  - sentences:
      - ali so vsi doma
    slots:
      state: doma
    response: Da
  - sentences:
      - kdo je doma
    slots:
      state: doma
    response: Jana
  - sentences:
      - koliko ljudi je doma
    slots:
      state: doma
    response: "1"
