---
# HassRespond - default
# example: привіт

language: "uk"
tests:
  - sentences:
      - "привіт"
      - "вітаю home assistant"
    response: "Вітаю з Home Assistant."

  - sentences:
      - "ти завжди слухаєш"
      - "ти завжди записуєш мене"
    response: "Ні, я записую лише після того, як ви говорите ключове слово."

  - sentences:
      - "куди надсилаються мої дані"
      - "куди відправляються дані"
    response: "Ваші дані надсилаються на сервер Home Assistant."

  - sentences:
      - "що я можу сказати"
      - "що я можу спитати в тебе"
    response: "Щоб дізнатися, що можна запитати, відвідайте H.A. крапка I.O. слеш voice."

  - sentences:
      - "хто розробив тебе"
      - "хто створив тебе"
    response: "Мене створила чудова спільнота Home Assistant, яка складається з ентузіастів з усього світу."
