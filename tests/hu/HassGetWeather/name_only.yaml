      name: Szolnok
    response: "23,0 °C és esős idő van."
  - sentences:
      - "Szolnokon milyen az időjárás ma?"
      - "Mondj időjárásjelentést Szolnokra"
      - "Mondd meg a mai részletes időjárást Szolnokon"
    slots:
