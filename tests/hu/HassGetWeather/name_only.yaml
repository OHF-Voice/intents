      - "Mekkora sebességgel fúj a szél ma Szolnokon"
      - "Mennyi a szél sebessége most Szolnokon"
    slots:
      name: Szolnok
    response: "A szélsebesség 8,06 km/h - mérsékelt szél, melynek iránya észak-keleti, 12,98 km/h sebességű széllökésekkel."
