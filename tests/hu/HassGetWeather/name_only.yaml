      temperature_unit: "°C"
      humidity: 78
      pressure: 1028.0
      pressure_unit: "hPa"
      wind_speed: 8.06
      wind_speed_unit: "km/h"
      wind_bearing: 45.0
      wind_gust_speed: 12.98
      uv_index: 7

tests:
