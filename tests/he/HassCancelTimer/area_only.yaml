---
# HassCancelTimer - area_only

language: "he"
areas:
  - name: "מטבח"
timers:
  - is_active: true
    area: "מטבח"
    total_seconds_left: 300
    start_minutes: 5

tests:
  - sentences:
      - "בטל את הטיימר במטבח"
      - "בטל את הטיימר של מטבח"
    slots:
      area: "מטבח"
    response: "הטיימר בוטל"
