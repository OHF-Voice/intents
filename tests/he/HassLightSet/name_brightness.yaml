---
# HassLightSet - name_brightness

language: "he"
entities:
  - name: "מנורת שינה"
    domain: "light"

tests:
  - sentences:
      - "קבע את הבהירות של מנורת שינה ל50%"
      - "שנה את הבהירות מנורת שינה ל50 אחוז"
    slots:
      name: "מנורת שינה"
      brightness: 50
    response: "מנורת שינה בהירות שונתה ל-50"
