---
# HassClimateGetTemperature - area_only

language: "he"
areas:
  - name: "סלון"

entities:
  - name: "תרמוסטט סלון"
    domain: "climate"
    area: "סלון"
    state: "20"
    attributes:
      current_temperature: 20

tests:
  - sentences:
      - "מה הטמפרטורה בסלון"
      - "כמה חם בסלון"
      - "כמה קר בסלון"
    slots:
      area: "סלון"
    response: "בסלון 20 מעלות"
