---
# HassTimerStatus - default

language: "he"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5

tests:
  - sentences:
      - "מצב הטיימר"
      - "מצב טיימר"
      - "כמה זמן נשאר"
    response: "5 דקות נשאר."
