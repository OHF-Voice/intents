---
# HassTimerStatus - default

language: "cs"
timers:
  - is_active: true
    total_seconds_left: 300
    rounded_hours_left: 0
    rounded_minutes_left: 5
    rounded_seconds_left: 0
    start_minutes: 5
tests:
  - sentences:
      - "stav časovače"
      - "kolik zbývá času na časovači"
      - "zbývající čas časovače"
    response: "Zbývající čas 5 minut"
