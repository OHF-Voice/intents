---
# HassGetState - device_class_state_floor

language: "cs"
floors:
  - name: "prvním"
areas:
  - name: "ložnici"
    floor: "prvním"
entities:
  - name: "Levé okno"
    domain: "cover"
    state: "open"
    attributes:
      device_class: "window"
    area: "ložnici"

tests:
  - sentences:
      - "jsou některá okna v prvním patře otevřená"
    slots:
      domain: cover
      device_class: window
      floor: "prvním"
      state: "open"
    response: "Ano, Levé okno"
  - sentences:
      - "jsou všechna okna v prvním patře otevřená"
    slots:
      domain: cover
      device_class: window
      floor: "prvním"
      state: "open"
    response: "Ano"
  - sentences:
      - "která okna v prvním patře jsou otevřená"
    slots:
      domain: cover
      device_class: window
      floor: "prvním"
      state: "open"
    response: "Levé okno"
  - sentences:
      - "kolik oken v prvním patře je otevřených"
    slots:
      domain: cover
      device_class: window
      floor: "prvním"
      state: "open"
    response: "1"
