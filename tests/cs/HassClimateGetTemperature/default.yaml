      - "jaká je teplota"
      - "jaká je tady teplota"
      - "jaká je tu teplota"
      - "kolik je stupňů"
      - "kolik je tady stupňů"
      - "jak je tu teplo"
      - "jak je tu chladno"
    response: "20 stupňů"
