  - sentences:
      - "Roztáhni zde závěsy na 40%"
    slots:
      domain: cover
      device_class: curtain
      position: 40
    response: "Pozice nastavena"
  - sentences:
      - "Nastav úhel žaluzií na 40%"
      - "Nastav sklon žaluzií na 40%"
    slots:
      domain: cover
      device_class: blind
      position: 40
    response: "Pozice nastavena"
  - sentences:
      - "Nastav tady pozici markýzy na 40%"
    slots:
      domain: cover
      device_class: awning
      position: 40
    response: "Pozice nastavena"
