      - ce temperatura e in dormitor
      - care e temperatura din dormitor
      - cate grade sunt in dormitor
      - cat de cald este in dormitor
      - cat e de racoare in dormitor
      - este rece in dormitor
    slots:
      area: Dormitor
    response: 1 grad
