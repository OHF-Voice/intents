---
# HassGetWeather - name_only

language: ro
entities:
  - name: Bucuresti
    domain: weather
    state: rainy
    attributes:
      temperature: "18.5"
      temperature_unit: °C
  - name: Brasov
    domain: weather
    state: clear
    attributes:
      temperature: "22"
      temperature_unit: °C
tests:
  - sentences:
      - cum e vremea la Bucuresti?
      - cate grade sunt la Bucuresti?
      - cat de frig este in Bucuresti?
    slots:
      name: Bucuresti
    response: 18,5 grade cu ploaie
  - sentences:
      - cum este vremea in Brasov?
      - cate grade sunt afara la Brasov?
      - cat este de cald la Brasov
    slots:
      name: Brasov
    response: 22 de grade cu cer senin
