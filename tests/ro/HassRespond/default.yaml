---
# HassRespond - default

language: ro
tests:
  - sentences:
      - salut home assistant
      - buna
    response: Salutare din Home Assistant.
  - sentences:
      - asculti mereu?
      - inregistrezi in permanenta?
      - inregistrezi incontinuu?
      - asculti tot ce zic?
    response: Nu, înregistrez doar după ce rostești convocatorul sau cuvântul de trezire.
  - sentences:
      - unde se duc datele mele?
      - unde ajung datele mele?
      - unde ajunge ce spun
    response: Datele sunt trimise către serverul tău Home Assistant.
  - sentences:
      - ce pot sa iti cer?
      - ce pot sa intreb?
      - ce pot sa-ti comand?
    response:
      Pentru a afla ce solicitări sunt disponibile, vizitează home cratimă
      assistant punct I.O., slash voice.
  - sentences:
      - cine te-a creat?
      - cine te-a facut?
    response:
      Am fost creat de minunata comunitate Home Assistant, alcătuită din persoane
      abile de pretutindeni.
