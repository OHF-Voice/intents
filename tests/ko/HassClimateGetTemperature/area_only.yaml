      - "거실 온도 몇 도야"
      - "거실 온도 얼마야"
      - "거실 온도 몇이야"
      - "거실 온도 알려줘"
      - "거실 온도 뭐야"
      - "거실 얼마나 더워"
      - "거실 더워"
    slots:
      area: "거실"
    response: "20입니다"
