---
# HassClimateSetTemperature - area_temperature

language: "ko"
areas:
  - name: "침실"

entities:
  - name: "침실 온도조절기"
    domain: "climate"
    area: "침실"
    state: "20"
    attributes:
      current_temperature: 20

tests:
  - sentences:
      - "침실 온도 50도로 설정"
      - "침실 온도 50 로 설정"
    slots:
      area: "침실"
      temperature: 50
    response: "온도가 설정되었습니다"
