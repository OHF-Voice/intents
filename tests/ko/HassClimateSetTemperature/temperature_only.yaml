---
# HassClimateSetTemperature - temperature_only

language: "ko"
entities:
  - name: "온도조절기"
    domain: "climate"
    state: "20"
    attributes:
      current_temperature: 20

tests:
  - sentences:
      - "온도 30도로 설정"
      - "온도 30도로 맞춰"
      - "온도 30 로 설정"
    slots:
      temperature: 30
    response: "온도가 설정되었습니다"
