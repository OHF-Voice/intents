---
# HassTurnOff - area_device_class_cover

language: "ko"
areas:
  - name: "주방"
  - name: "침실"

entities:
  - name: "주방 가리개"
    domain: "cover"
    device_class: "window"
    area: "주방"
  - name: "침실 차양"
    domain: "cover"
    device_class: "blind"
    area: "침실"

tests:
  - sentences:
      - "주방에 창문 닫아"
      - "주방 창문 닫아"
    slots:
      area: "주방"
      domain: "cover"
      device_class: "window"
    response: "window 닫았습니다"

  - sentences:
      - "침실에 블라인드 닫아"
      - "침실 블라인드 닫아"
    slots:
      area: "침실"
      domain: "cover"
      device_class: "blind"
    response: "blind 닫았습니다"
