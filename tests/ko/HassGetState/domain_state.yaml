---
# HassGetState - domain_state
# Each domain: 1 matching + 1 non-matching entity to exercise all four responses.

language: "ko"
entities:
  - name: "거실 조명"
    domain: "light"
    state: "on"
  - name: "주방 조명"
    domain: "light"
    state: "off"
  - name: "거실 팬"
    domain: "fan"
    state: "on"
  - name: "주방 팬"
    domain: "fan"
    state: "off"
  - name: "거실 스위치"
    domain: "switch"
    state: "on"
  - name: "주방 스위치"
    domain: "switch"
    state: "off"
  - name: "현관문"
    domain: "lock"
    state: "locked"
  - name: "뒷문"
    domain: "lock"
    state: "unlocked"

tests:
  # ---- lights ----
  - sentences:
      - "조명이 켜져있어"
      - "조명이 켜져있는지 알아"
    slots:
      state: "on"
    response: "네, 거실 조명 기기가 그렇습니다"
  - sentences:
      - "모든 조명이 켜져있어"
    slots:
      state: "on"
    response: "아니요, 주방 조명 기기는 그렇지 않습니다"
  - sentences:
      - "어떤 조명이 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "거실 조명 기기가 그렇습니다"
  - sentences:
      - "얼마나 많은 조명이 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "1개의 기기가 그렇습니다"

  # ---- fans ----
  - sentences:
      - "팬이 켜져있어"
      - "팬이 켜져있는지 알아"
    slots:
      state: "on"
    response: "네, 거실 팬 기기가 그렇습니다"
  - sentences:
      - "모든 팬이 켜져있어"
    slots:
      state: "on"
    response: "아니요, 주방 팬 기기는 그렇지 않습니다"
  - sentences:
      - "어떤 팬이 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "거실 팬 기기가 그렇습니다"
  - sentences:
      - "얼마나 많은 팬이 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "1개의 기기가 그렇습니다"

  # ---- switches ----
  - sentences:
      - "스위치가 켜져있어"
      - "스위치가 켜져있는지 알아"
    slots:
      state: "on"
    response: "네, 거실 스위치 기기가 그렇습니다"
  - sentences:
      - "모든 스위치가 켜져있어"
    slots:
      state: "on"
    response: "아니요, 주방 스위치 기기는 그렇지 않습니다"
  - sentences:
      - "어떤 스위치가 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "거실 스위치 기기가 그렇습니다"
  - sentences:
      - "얼마나 많은 스위치가 켜져있는지 알려줘"
    slots:
      state: "on"
    response: "1개의 기기가 그렇습니다"

  # ---- locks ----
  - sentences:
      - "잠겨있는 문이 있어"
    slots:
      state: "locked"
    response: "네, 현관문 기기가 그렇습니다"
  - sentences:
      - "모든 문 잠겨있어"
    slots:
      state: "locked"
    response: "아니요, 뒷문 기기는 그렇지 않습니다"
  - sentences:
      - "어떤 문이 잠겨있어"
    slots:
      state: "locked"
    response: "현관문 기기가 그렇습니다"
  - sentences:
      - "얼마나 많은 문이 잠겨있어"
    slots:
      state: "locked"
    response: "1개의 기기가 그렇습니다"
