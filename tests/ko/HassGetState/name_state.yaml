---
# HassGetState - name_state

language: "ko"
entities:
  - name: "거실 조명"
    domain: "light"
    state: "on"
  - name: "왼쪽 커튼"
    domain: "cover"
    state: "closed"
  - name: "현관문"
    domain: "lock"
    state: "locked"
  # binary sensors (one per predicate group)
  - name: "휴대폰"
    domain: "binary_sensor"
    attributes:
      device_class: "battery_charging"
    state: "on"
  - name: "주방 모션 센서"
    domain: "binary_sensor"
    attributes:
      device_class: "motion"
    state: "on"
  - name: "수도관"
    domain: "binary_sensor"
    attributes:
      device_class: "cold"
    state: "on"
  - name: "창고 창문"
    domain: "binary_sensor"
    attributes:
      device_class: "window"
    state: "on"
  - name: "표시등"
    domain: "binary_sensor"
    attributes:
      device_class: "light"
    state: "on"
  - name: "길"
    domain: "binary_sensor"
    attributes:
      device_class: "safety"
    state: "on"
  - name: "노트북"
    domain: "binary_sensor"
    attributes:
      device_class: "update"
    state: "on"

tests:
  # on/off domain
  - sentences:
      - "거실 조명 켜져있어"
      - "거실 조명 상태가 켜져있어"
    slots:
      name: "거실 조명"
      state: "on"
    response: "네"

  # cover
  - sentences:
      - "왼쪽 커튼 닫혀있어"
    slots:
      name: "왼쪽 커튼"
      state: "closed"
    response: "네"

  # lock
  - sentences:
      - "현관문 잠겨있어"
    slots:
      name: "현관문"
      state: "locked"
    response: "네"

  # binary sensor - 이야 group
  - sentences:
      - "휴대폰 충전 중이야"
    slots:
      name: "휴대폰"
      state: "on"
    response: "네"

  # binary sensor - 됐어 group
  - sentences:
      - "주방 모션 센서 감지됐어"
    slots:
      name: "주방 모션 센서"
      state: "on"
    response: "네"

  # binary sensor - 워 group
  - sentences:
      - "수도관 차가워"
    slots:
      name: "수도관"
      state: "on"
    response: "네"

  # binary sensor - 있어 group
  - sentences:
      - "창고 창문 열려있어"
    slots:
      name: "창고 창문"
      state: "on"
    response: "네"

  # binary sensor - 져있어 group
  - sentences:
      - "표시등이 켜져있어"
    slots:
      name: "표시등"
      state: "on"
    response: "네"

  # binary sensor - 해 group
  - sentences:
      - "길 위험해"
    slots:
      name: "길"
      state: "on"
    response: "네"

  # binary sensor - 야 group
  - sentences:
      - "노트북 업데이트 가능야"
    slots:
      name: "노트북"
      state: "on"
    response: "네"
