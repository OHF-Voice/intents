      - "침실 밝기를 50%로 설정"
      - "침실의 밝기를 50%로 변경"
      - "침실을 50% 밝기로 변경"
      - "침실 50%로 설정"
      - "침실 50%로"
      - "침실 50%로 변경"
    slots:
      brightness: 50
      area: "침실"
    response: "밝기가 설정되었습니다"

  - sentences:
      - "침실 밝기를 최대로 설정"
      - "침실의 밝기를 가장 밝게 변경"
