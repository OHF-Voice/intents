  - sentences:
      - "침실 밝기를 최소로 설정"
      - "침실의 밝기를 가장 어둡게 변경"
      - "침실 밝기 최소로 설정"
      - "침실 최소 밝기로"
      - "침실 최소 밝기"
      - "침실 가장 어둡게"
    slots:
      brightness: 1
      area: "침실"
    response: "밝기가 설정되었습니다"
