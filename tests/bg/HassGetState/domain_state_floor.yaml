language: "bg"
floors:
  - name: "Първи етаж"
  - name: "Втори етаж"
areas:
  - name: "Кухня"
    floor: "Първи етаж"
  - name: "Хол"
    floor: "Първи етаж"
  - name: "Коридор"
    floor: "Втори етаж"
  - name: "Антре"
    floor: "Втори етаж"
entities:
  - name: "Кухненска лампа"
    domain: "light"
    state: "on"
    area: "Кухня"
  - name: "Хол вентилатор"
    domain: "fan"
    state: "on"
    area: "Хол"
  - name: "Коридор ключ"
    domain: "switch"
    state: "on"
    area: "Коридор"
  - name: "Антре врата"
    domain: "lock"
    state: "unlocked"
    area: "Антре"
tests:
  # ---- lights ----
  - sentences: ["има ли включени лампи на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "Да, Кухненска лампа"
  - sentences: ["всички лампи на първи етаж ли са изключени"]
    slots: { state: "off", floor: "Първи етаж" }
    response: "Не, Кухненска лампа не е"
  - sentences: ["кои лампи са включени на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "Кухненска лампа"
  - sentences: ["колко лампи са включени на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "1"

  # ---- fans ----
  - sentences: ["има ли включени вентилатори на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "Да, Хол вентилатор"
  - sentences: ["всички вентилатори на първи етаж ли са изключени"]
    slots: { state: "off", floor: "Първи етаж" }
    response: "Не, Хол вентилатор не е"
  - sentences: ["кои вентилатори са включени на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "Хол вентилатор"
  - sentences: ["колко вентилатори са включени на първи етаж"]
    slots: { state: "on", floor: "Първи етаж" }
    response: "1"

  # ---- switches ----
  - sentences: ["има ли включени ключове на втори етаж"]
    slots: { state: "on", floor: "Втори етаж" }
    response: "Да, Коридор ключ"
  - sentences: ["всички ключове на втори етаж ли са изключени"]
    slots: { state: "off", floor: "Втори етаж" }
    response: "Не, Коридор ключ не е"
  - sentences: ["кои ключове са включени на втори етаж"]
    slots: { state: "on", floor: "Втори етаж" }
    response: "Коридор ключ"
  - sentences: ["колко ключове са включени на втори етаж"]
    slots: { state: "on", floor: "Втори етаж" }
    response: "1"

  # ---- locks ----
  - sentences: ["има ли отключени врати на втори етаж"]
    slots: { state: "unlocked", floor: "Втори етаж" }
    response: "Да, Антре врата"
  - sentences: ["всички врати на втори етаж ли са заключени"]
    slots: { state: "locked", floor: "Втори етаж" }
    response: "Не, Антре врата не е"
  - sentences: ["кои врати са отключени на втори етаж"]
    slots: { state: "unlocked", floor: "Втори етаж" }
    response: "Антре врата"
  - sentences: ["колко врати са отключени на втори етаж"]
    slots: { state: "unlocked", floor: "Втори етаж" }
    response: "1"
