language: "kw"

floors:
  - name: "Kynsa"

entities:
  - name: "Lugarn Chambour"
    domain: "light"
  - name: "Kornell Gwari"
    domain: "light"
  - name: "Korglen Esedhva"
    domain: "cover"
  - name: "Stankell Dowr"
    domain: "valve"

tests:
  # on-able domains
  - sentences:
      - "skwych yn fyw an lugarn chambour war an kynsa leur"
      - "an lugarn chambour war an kynsa leur dhe yn fyw"
      - "bywha an lugarn chambour war an kynsa leur"
    slots:
      name: "Lugarn Chambour"
      floor: "Kynsa"
    response: "Skwychis yn fyw an golow"

  # lights named with a trailing light word
  - sentences:
      - "skwych yn fyw an kornell gwari golow war an kynsa leur"
      - "an kornell gwari golow war an kynsa leur dhe yn fyw"
      - "bywha an kornell gwari golow war an kynsa leur"
    slots:
      name: "Kornell Gwari"
      floor: "Kynsa"
    response: "Skwychis yn fyw an golow"

  # covers
  - sentences:
      - "ygor an korglen esedhva war an kynsa leur"
    slots:
      name: "Korglen Esedhva"
      floor: "Kynsa"
    response: "Ygerys"

  # valves
  - sentences:
      - "ygor an stankell dowr war an kynsa leur"
    slots:
      name: "Stankell Dowr"
      floor: "Kynsa"
    response: "Ygerys"
