language: cy
areas:
  - name: Gegin
  - name: Ystafell Fyw
entities:
  - name: Golau Uwchben
    domain: light
    area: Gegin
  - name: Gornel Chwarae
    domain: light
    area: Gegin
  - name: Llen Chwith
    domain: cover
    area: Ystafell Fyw
  - name: Falf Brif
    domain: valve
    area: Gegin
  - name: Drws Ffrynt
    domain: lock
    area: Gegin
tests:
  # off-able domains
  - sentences:
      - troi'r Golau Uwchben i ffwrdd yn y Gegin
      - diffodd y Golau Uwchben yn y Gegin
    slots:
      name: Golau Uwchben
      area: Gegin
    response: Turned off the light
  # lights with trailing light word
  - sentences:
      - troi'r Gornel Chwarae golau i ffwrdd yn y Gegin
      - diffodd y Gornel Chwarae golau yn y Gegin
    slots:
      name: Gornel Chwarae
      area: Gegin
    response: Turned off the light
  # covers
  - sentences:
      - cau y Llen Chwith yn yr Ystafell Fyw
    slots:
      name: Llen Chwith
      area: Ystafell Fyw
    response: Wrthi'n cau
  # valves
  - sentences:
      - cau y Falf Brif yn y Gegin
    slots:
      name: Falf Brif
      area: Gegin
    response: Wrthi'n cau
  # locks
  - sentences:
      - datgloi'r Drws Ffrynt yn y Gegin
    slots:
      name: Drws Ffrynt
      area: Gegin
    response: Wrthi'n datgloi
