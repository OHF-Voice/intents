language: zh-CN
tests:
  - sentences:
      - "你好家庭助手"
      - "嗨家庭助手"
      - "你好"
      - "在吗"
    intent:
      name: HassRespond
    response: 你好，我是家庭助手

  - sentences:
      - "你一直在监听吗"
      - "你是不是总在听我说话"
      - "你总在听吗"
    intent:
      name: HassRespond
    response: 不，我只在你说出唤醒词时才监听

  - sentences:
      - "我的数据去哪了"
      - "我的数据发送到哪里"
      - "数据发送到哪里"
    intent:
      name: HassRespond
    response: 你的数据只保存在本地，不会发送到云端

  - sentences:
      - "我能说什么"
      - "我可以问什么"
      - "可以说什么"
    intent:
      name: HassRespond
    response: 你可以问我天气、时间、日期，或者控制你的智能设备

  - sentences:
      - "谁创造了你"
      - "你是谁做的"
      - "谁开发了你"
    intent:
      name: HassRespond
    response: 我是由 Home Assistant 社区开发的
