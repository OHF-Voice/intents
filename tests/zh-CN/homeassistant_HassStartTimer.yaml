language: zh-CN
tests:
  - sentences:
      - "计时器 10 分钟"
      - "设置计时器 10 分钟"
      - "10 分钟计时器"
      - "开始计时器 10 分钟"
      - "创建计时器 10 分钟"
      - "设置我的计时器 10 分钟"
      - "10 分钟后开始计时器"
    intent:
      name: HassStartTimer
      slots:
        minutes: 10
    response: 计时已开始

  - sentences:
      - "煮面计时器 10 分钟"
      - "设置煮面计时器 10 分钟"
      - "开始煮面计时器 10 分钟"
      - "创建煮面计时器 10 分钟"
      - "设置我的煮面计时器 10 分钟"
    intent:
      name: HassStartTimer
      slots:
        name: 煮面
        minutes: 10
    response: 计时已开始
