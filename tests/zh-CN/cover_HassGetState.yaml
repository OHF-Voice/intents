language: zh-CN
tests:
  - sentences:
      - "左侧窗帘是打开的吗"
      - "左侧窗帘是开着的吗"
    intent:
      name: HassGetState
      slots:
        domain: cover
        device_class: curtain
        name: 左侧窗帘
        state: open
    response: 是的

  - sentences:
      - "左侧窗帘是关着的吗"
      - "左侧窗帘是关闭的吗"
    intent:
      name: HassGetState
      slots:
        domain: cover
        device_class: curtain
        name: 左侧窗帘
        state: closed
    response: 不，打开

  - sentences:
      - "有没有门没锁"
      - "有门没锁吗"
    intent:
      name: HassGetState
      slots:
        domain: lock
        state: unlocked
    response: 是的，后门没锁
