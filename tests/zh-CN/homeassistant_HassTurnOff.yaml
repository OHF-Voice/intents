language: zh-CN
tests:
  # 按名称关闭设备
  - sentences:
      - "关闭易来吸顶灯"
      - "把易来吸顶灯关掉"
      - "停用易来吸顶灯"
    intent:
      name: HassTurnOff
      slots:
        name: 易来吸顶灯
    response: "易来吸顶灯已关闭"

  - sentences:
      - "关闭吊扇"
      - "把吊扇关掉"
      - "吊扇停用"
    intent:
      name: HassTurnOff
      slots:
        name: 吊扇
    response: "吊扇已关闭"
