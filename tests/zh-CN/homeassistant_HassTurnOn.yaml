language: zh-CN
tests:
  # 按名称打开设备
  - sentences:
      - "打开吊扇"
      - "把吊扇打开"
      - "激活吊扇"
    intent:
      name: HassTurnOn
      slots:
        name: 吊扇
    response: "吊扇已打开"

  - sentences:
      - "打开易来吸顶灯"
      - "易来吸顶灯打开"
      - "激活易来吸顶灯"
    intent:
      name: HassTurnOn
      slots:
        name: 易来吸顶灯
    response: "易来吸顶灯已打开"
