language: zh-CN
tests:
  - sentences:
      - "设置 TV 音量为 50"
      - "TV 音量设为 50"
    intent:
      name: HassSetVolume
      slots:
        name: TV
        volume_level: 0.5
    response: 音量已设置

  - sentences:
      - "设置音量为 50"
      - "音量设为 50"
    intent:
      name: HassSetVolume
      slots:
        volume_level: 0.5
    response: 音量已设置
