language: zh-CN
tests:
  - sentences:
      - "设置 TV 音量为 50"
      - "TV 音量设为 50"
      - "调节 TV 音量到 50"
      - "把 TV 音量设置到 50"
    intent:
      name: HassSetVolume
      slots:
        name: TV
        volume_level: 50
    response: 音量已调整

  - sentences:
      - "设置音量为 50"
      - "音量设为 50"
      - "调节音量到 50"
    intent:
      name: HassSetVolume
      slots:
        volume_level: 50
    response: 音量已调整

  - sentences:
      - "设置客厅音量为 50"
      - "客厅音量设为 50"
      - "调节客厅音量到 50"
    intent:
      name: HassSetVolume
      slots:
        area: 客厅
        volume_level: 50
    response: 音量已调整
