language: zh-CN
tests:
  # 当前区域（依赖上下文）
  - sentences:
      - "播放周杰伦"
      - "我想听周杰伦"
      - "放周杰伦"
    intent:
      name: HassMediaSearchAndPlay
      slots:
        area: 客厅
        search_query: 周杰伦
      context:
        area: 客厅
    response: "好的，正在播放"

  # 当前区域 + 媒体类型
  - sentences:
      - "播放歌曲周杰伦"
      - "播放周杰伦歌曲"
      - "放歌曲周杰伦"
    intent:
      name: HassMediaSearchAndPlay
      slots:
        area: 客厅
        search_query: 周杰伦
        media_class: track
      context:
        area: 客厅
    response: "好的，正在播放"

  # 按区域名
  - sentences:
      - "在客厅播放音乐"
