language: "zh-CN"
entities:
  - name: "北京"
    domain: "weather"
    state: "rainy"
    attributes:
      temperature: 8
      temperature_unit: "°C"
  - name: "上海"
    domain: "weather"
    state: "sunny"
    attributes:
      temperature: 76
      temperature_unit: "°C"

tests:
  - sentences:
      - "北京的天气怎么样"
      - "北京天气如何"
      - "现在北京天气怎么样"
      - "今天北京天气如何"
      - "北京那边天气怎么样"
    slots:
      name: "北京"
    response: "北京现在8°C，有雨"

  - sentences:
      - "上海的天气怎么样"
      - "上海天气如何"
      - "现在上海天气怎么样"
    slots:
      name: "上海"
    response: "上海现在76°C，晴"
