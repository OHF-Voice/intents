      - "把客厅空调温度设置为20度"
      - "客厅空调温度调到20"
      - "将客厅的温度设为20摄氏度"
    slots:
      area: 客厅
      temperature: 20
    response: 好的，已把温度调到20度
  - sentences:
      - "把卧室空调温度设置为25度"
      - "卧室空调温度调成25"
      - "将卧室的温度设为25摄氏度"
    slots:
      area: 卧室
      temperature: 25
    response: 好的，已把温度调到25度
