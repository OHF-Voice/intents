language: zh-CN
tests:
  - sentences:
      - "卧室灯状态是什么"
      - "卧室灯的状态"
    intent:
      name: HassGetState
      slots:
        name: 卧室灯
    response: 卧室灯是关闭

  - sentences:
      - "卧室灯是不是开着"
      - "卧室灯是开的吗"
    intent:
      name: HassGetState
      slots:
        name: 卧室灯
        state: on
    response: 不，关闭

  - sentences:
      - "有没有灯开着"
      - "有灯开着吗"
    intent:
      name: HassGetState
      slots:
        domain: light
        state: on
    response: 是的
