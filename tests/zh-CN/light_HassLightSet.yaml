language: zh-CN
tests:
  - sentences:
      - "把卧室灯的亮度设置为 50"
      - "卧室灯亮度调到 50"
    intent:
      name: HassLightSet
      slots:
        name: 卧室灯
        brightness: 50
    response: 亮度已设置

  - sentences:
      - "把客厅灯亮度设置为 80"
      - "客厅灯亮度调到 80"
    intent:
      name: HassLightSet
      slots:
        area: 客厅
        brightness: 80
    response: 客厅灯亮度已设置
