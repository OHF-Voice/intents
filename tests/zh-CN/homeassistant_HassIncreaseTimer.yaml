language: zh-CN
tests:
  - sentences:
      - "计时器加 5 分钟"
      - "计时器延长 5 分钟"
      - "给计时器加 5 分钟"
    intent:
      name: HassIncreaseTimer
      slots:
        minutes: 5
    response: 计时器已延长

  - sentences:
      - "煮面计时器加 2 分钟"
      - "给煮面计时器加 2 分钟"
    intent:
      name: HassIncreaseTimer
      slots:
        name: 煮面
        minutes: 2
    response: 计时器已延长
