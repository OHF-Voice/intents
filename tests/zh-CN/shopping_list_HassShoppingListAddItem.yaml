language: zh-CN
tests:
  - sentences:
      - "购物清单加个苹果"
      - "购物清单添加苹果"
    intent:
      name: HassShoppingListAddItem
      slots:
        item: 苹果
    response: 已添加苹果

  - sentences:
      - "购物清单里的苹果已买"
      - "完成购物清单里的苹果"
    intent:
      name: HassShoppingListCompleteItem
      slots:
        item: 苹果
    response: 已完成苹果
