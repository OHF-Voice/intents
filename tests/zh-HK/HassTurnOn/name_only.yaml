language: zh-HK
entities:
  - name: 吊扇
    domain: fan
  - name: 遊戲區燈
    domain: light
  - name: 左邊窗簾
    domain: cover
    attributes:
      device_class: curtain
  - name: 大門
    domain: lock
tests:
  # light / switch / fan / media_player / input_boolean
  - sentences:
      - 打開吊扇
      - 將吊扇打開
    slots:
      name: 吊扇
    response: "吊扇已打開"
  - sentences:
      - 打開遊戲區燈
      - 將遊戲區燈打開
    slots:
      name: 遊戲區燈
    response: "遊戲區燈已打開"

  # covers
  - sentences:
      - 打開左邊窗簾
      - 將左邊窗簾打開
    slots:
      name: 左邊窗簾
    response: "左邊窗簾已打開"

  # locks
  - sentences:
      - 鎖上大門
      - 將大門鎖上
    slots:
      name: 大門
    response: "大門已上鎖"
