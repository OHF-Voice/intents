language: zh-CN
responses:
  intents:
    HassGetState:
      default: "{{ slots.name }}是{{ state.state_with_unit }}"
      one: "{{ slots.name }}是{{ state.state_with_unit }}"
      one_yesno: |
        {% if query.matched %}
          是的
        {% else %}
          不，{{ state.state_with_unit }}
        {% endif %}
      any: |
        {% if query.matched %}
          是的
        {% else %}
          没有
        {% endif %}
      all: |
        {% if not query.unmatched %}
          是的
        {% else %}
          不
        {% endif %}
      which: |
        {% if not query.matched %}
          没有
        {% else %}
          {{ query.matched | map(attribute="name") | join(", ") }}
        {% endif %}
      how_many: "{{ query.matched | length }}"
      where: |
        {% if not query.matched %}
          抱歉，我不知道{{ slots.name }}在哪里
        {% else %}
          {% if state == "not_home" %}
            {{ slots.name }}不在家
          {% else %}
            {{ slots.name }}在家
          {% endif %}
        {% endif %}
