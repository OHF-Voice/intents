language: zh-CN
responses:
  intents:
    HassGetState:
      default: "{{ slots.name }}是{{ state.state_with_unit | replace(' %', '%') }}"
      one: "{{ slots.name }}是{{ state.state_with_unit | replace(' %', '%') }}"
      one_yesno: |
        {% if query.matched %}
          是的
        {% else %}
          不是，{{ state.state_with_unit }}
        {% endif %}
      any: |
        {% if query.matched %}
          是的
        {% else %}
          没有
        {% endif %}
      all: |
        {% if not query.unmatched %}
          是的
        {% else %}
          不是
        {% endif %}
      which: |
        {% if not query.matched %}
          没有
        {% else %}
          {{ query.matched | map(attribute="name") | join(", ") }}
        {% endif %}
      how_many: "{{ query.matched | length }}"
      where: |
        {% if not query.matched %}
          抱歉，我不知道{{ slots.name }}在哪里
        {% else %}
          {% if state.state == "not_home" %}
            {{ slots.name }}不在家
          {% else %}
            {{ slots.name }}在家
          {% endif %}
        {% endif %}
      bs_one_yesno: |
        {% if query.matched %}
          是的
        {% else %}
          不是，{{ state.state_with_unit }}
        {% endif %}
      bs_any: |
        {% if query.matched %}
          检测到了
        {% else %}
          没有检测到
        {% endif %}
      cover_one_yesno: |
        {% if query.matched %}
          是的，{{ slots.name }}是{{ state.state_with_unit }}
        {% else %}
          不是，{{ slots.name }}是{{ state.state_with_unit }}
        {% endif %}
      cover_any: |
        {% if query.matched %}
          有
        {% else %}
          没有
        {% endif %}
      cover_all: |
        {% if not query.unmatched %}
          是的
        {% else %}
          不是
        {% endif %}
      cover_which: |
        {% if not query.matched %}
          没有符合条件的
        {% else %}
          {{ query.matched | map(attribute="name") | join(", ") }}
        {% endif %}
      cover_how_many: "{{ query.matched | length }}"
