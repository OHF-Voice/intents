language: ja
responses:
  intents:
    HassGetCurrentTime:
      default: >
        {% set minute_str = '{0:02d}'.format(slots.time.minute) %}

        {% if slots.time.hour == 0: %}
        午前0時{{ minute_str }}分です
        {% elif slots.time.hour < 12: %}
        午前{{ slots.time.hour }}時{{ minute_str }}分です
        {% elif slots.time.hour == 12: %}
        午後12時{{ minute_str }}分です
        {% else: %}
        午後{{ slots.time.hour - 12 }}時{{ minute_str }}分です
        {% endif %}
