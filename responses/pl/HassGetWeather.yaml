language: pl
responses:
  intents:
    HassGetWeather:
      default: "{% set weather_condition = {\n  'clear': 'bez zachmurzenia',\n  'clear-night': 'bez zachmurzenia',\n  'cloudy': 'i pochmurnie',\n  'exceptional': 'i wyjątkowo',\n  'fog': 'z mgłą',\n  'hail': 'z gradem',\n  'lightning': 'z piorunami',\n  'lightning-rainy': 'z deszczem i piorunami',\n  'partlycloudy': 'z częściowym zachmurzeniem',\n  'pouring': 'i leje deszcz',\n  'rainy': 'i pada deszcz',\n  'snowy': 'i pada śnieg',\n  'snowy-rainy': 'z deszczem i śniegiem',\n  'sunny': 'i słonecznie',\n  'windy': 'i wietrznie',\n  'windy-variant': 'i wietrznie z zachmurzeniem'\n} %} {% set temperature = state.attributes.get('temperature') %} {% set temperature_unit = state.attributes.get('temperature_unit') %} {% set temperature_pl = (temperature | string).replace(\".\", \",\") %} {% set temperature_decmal = (temperature | float - temperature | int) | round(2) %} {% set negative_name = \"\" %} {% if temperature | float < 0 %}\n  {% set negative_name = \"minus \" %}\n{% endif %} {% if temperature_decmal == 0 %}\n  {% if temperature | int | abs == 1 %}\n    {% set degree_name = 'stopień' %}\n  {% elif temperature | int | abs in [2, 3, 4] %}\n    {% set degree_name = 'stopnie' %}\n  {% elif temperature | int | abs in [12, 13, 14] %}\n    {% set degree_name = 'stopni' %}\n  {% elif (temperature | int | string)[-1] | int | abs in [2, 3, 4] %}\n    {% set degree_name = 'stopnie' %}\n  {% else %}\n    {% set degree_name = 'stopni' %}\n  {% endif %}\n{% else %}\n  {% set degree_name = \"stopnia\" %}\n{% endif %} {% if temperature_unit == \"°F\" %}\n  {% set temperature_unit = degree_name ~ \" farenhajta\" %}\n{% else %}\n  {% set temperature_unit = degree_name ~ \" celsjusza\" %}\n{% endif %} {{ negative_name }}{{ temperature_pl.replace(\"-\", \"\") }} {{ temperature_unit }} {{ weather_condition.get((state.state | string).lower(), \"\") }}\n"
