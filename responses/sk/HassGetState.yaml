language: sk
responses:
  intents:
    HassGetState:
      default: "{{ state.state_with_unit }}"
      one: "{{ slots.name }} je {{ state.state_with_unit }}"
      one_yesno: "{% if query.matched: %}

        Áno

        {% else: %}

        Nie

        {% endif %}

        "
      any: '{% if query.matched: %}

        Áno, {{ query.matched | map(attribute="name") | sort | join(", ") }}

        {% else: %}

        Nie

        {% endif %}

        '
      all: '{% if not query.unmatched: %}

        Áno

        {% else %}

        {% set no_match = query.unmatched | map(attribute="name") | sort | list %}

        {% if no_match | length > 4 %}

        Nie, {{ no_match[:3] | join(", ") }} a {{ (no_match | length - 3) }} ďalšie sú v stave {{ state.state_with_unit }}

        {%- else -%}

        Nie,

        {% if state.state_with_unit == "home" %}

        {% set state_with_unit = "doma" %}

        {% elif state.state_with_unit == "not_home" %}

        {% set state_with_unit = "mimo domu" %}

        {% else %}

        {% set state_with_unit = "v stave " ~ state.state_with_unit %}

        {% endif %}

        {% for name in no_match -%}

        {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} a {% endif -%}

        {{ name }}

        {%- endfor %} {{ ''nie je'' if no_match | length == 1 else ''nie sú''}} {{ state_with_unit }}

        {% endif %}

        {% endif %}

        '
      which: "{% if not query.matched: %}\nŽiadne\n{% else: %}\n  {% set match = query.matched | map(attribute=\"name\") | sort | list %}\n  {% if match | length > 4 %}\n    {{ match[:3] | join(\", \") }} a {{ (match | length - 3) }} ďalšie\n  {%- else -%}\n    {{ query.matched | map(attribute=\"name\") | sort | join(\", \") }}\n  {% endif %}\n{% endif %}\n"
      how_many: "{% if not query.matched: %}

        0

        {% else: %}

        {{ query.matched | length }}

        {% endif %}

        "
      where: "{% if state.state == \"not_home\" %}\n  {{ slots.name | capitalize }} je mimo domu\n{% elif state.state == \"home\" %}\n  {{ slots.name | capitalize }} je doma\n{% else %}\n  {{ slots.name | capitalize }} je v zóne {{ state.state }}\n{% endif %}\n"
