language: sk
responses:
  intents:
    HassGetWeather:
      default: "{% set weather_condition = {\n  'clear': 'a jasno',\n  'clear-night': 'a jasno',\n  'cloudy': 'a oblačno',\n  'exceptional': 'a výstrahy',\n  'fog': 'a hmla',\n  'hail': 'a krúpy',\n  'lightning': 'a blesky',\n  'lightning-rainy': 's bleskami a dážďom',\n  'partlycloudy': 'a polooblačno',\n  'pouring': 'a silný dážď',\n  'rainy': 'a dážď',\n  'snowy': 'a sneží',\n  'snowy-rainy': 'so snehom a dážďom',\n  'sunny': 'a slnečno',\n  'windy': 'a veterno',\n  'windy-variant': 's vetrom a oblačno'\n} %} {% set temperature = state.attributes.get('temperature') %} {% set temperature_unit = state.attributes.get('temperature_unit') %} {% set temperature_sk = (temperature | string).replace(\".\", \",\") %} {% set temperature_decimal = (temperature | float - temperature | int) | round(2) %} {% set negative_name = \"\" %} {% if temperature | float < 0 %}\n  {% set negative_name = \"mínus \" %}\n{% endif %} {# teplota je v celých číslach (napr. 3 stupne, 10 stupňov) #} {% if temperature_decimal == 0 %}\n  {% if temperature | int | abs == 1 %}\n    {% set degree_name = 'stupeň' %}\n  {% elif temperature | int | abs in [2, 3, 4] %}\n    {% set degree_name = 'stupne' %}\n  {% else %}\n    {% set degree_name = 'stupňov' %}\n  {% endif %}\n{% else %}\n  {# teplota je v desatinných číslach (napr. 12.8 stupňa) #}\n  {% set degree_name = \"stupňa\" %}\n{% endif %} {% if temperature_unit == \"°F\" %}\n  {% set temperature_unit = degree_name ~ \" fahrenheita\" %}\n{% else %}\n  {% set temperature_unit = degree_name ~ \" celzia\" %}\n{% endif %} {{ negative_name }}{{ temperature_sk.replace(\"-\", \"\") }} {{ temperature_unit }} {{ weather_condition.get((state.state | string).lower(), \"\") }}\n"
