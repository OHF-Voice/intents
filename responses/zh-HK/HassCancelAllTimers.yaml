---
language: zh-HK
responses:
  intents:
    HassCancelAllTimers:
      default: >
        {% if slots.canceled < 1: %}
        無計時器被取消。
        {% elif slots.canceled == 1: %}
        已取消 1 個計時器。
        {% else: %}
        已取消 {{ slots.canceled }} 個計時器。
        {% endif %}
      area: >
        {% if slots.canceled < 1: %}
        {{ slots.area }}無計時器被取消。
        {% elif slots.canceled == 1: %}
        已取消 {{ slots.area }} 1 個計時器。
        {% else: %}
        已取消 {{ slots.area }} {{ slots.canceled }} 個計時器。
        {% endif %}
