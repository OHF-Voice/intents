language: sr-Latn
responses:
  intents:
    HassGetWeather:
      default: >
        {% set weather_condition = {
          'clear': 'i vedro',
          'clear-night': 'i vedro',
          'cloudy': 'i oblačno',
          'exceptional': 'i izuzetno',
          'fog': 'sa maglom',
          'hail': 'sa gradom',
          'lightning': 'sa munjama',
          'lightning-rainy': 'sa munjama i kišom',
          'partlycloudy': 'i delimično oblačno',
          'pouring': 'i lije kiša',
          'rainy': 'i kišovito',
          'snowy': 'sa snegom',
          'snowy-rainy': 'sa snegom i kišom',
          'sunny': 'i sunčano',
          'windy': 'i vetrovito',
          'windy-variant': 'sa vetrom i oblacima'
        } %}
        {{ state.attributes.get('temperature') }} {{ state.attributes.get('temperature_unit') }} {{ weather_condition.get((state.state | string).lower(), "") }}
