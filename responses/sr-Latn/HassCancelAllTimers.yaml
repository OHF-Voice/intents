language: sr-Latn
responses:
  intents:
    HassCancelAllTimers:
      default: >
        {% if slots.canceled < 1: %}
        Nijedan tajmer nije poništen.
        {% elif slots.canceled == 1: %}
        Poništen 1 tajmer.
        {% else: %}
        Poništeno {{ slots.canceled }} tajmera.
        {% endif %}
      area: >
        {% if slots.canceled < 1: %}
        Nijedan tajmer nije poništen u {{ slots.area }}.
        {% elif slots.canceled == 1: %}
        Poništen 1 tajmer u {{ slots.area }}.
        {% else: %}
        Poništeno {{ slots.canceled }} tajmera u {{ slots.area }}.
        {% endif %}
