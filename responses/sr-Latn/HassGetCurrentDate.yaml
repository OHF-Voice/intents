language: sr-Latn
responses:
  intents:
    HassGetCurrentDate:
      default: >
        {% set months = {
           1: 'januar',
           2: 'februar',
           3: 'mart',
           4: 'april',
           5: 'maj',
           6: 'jun',
           7: 'jul',
           8: 'avgust',
           9: 'septembar',
           10: 'oktobar',
           11: 'novembar',
           12: 'decembar',
        } %}
        {% set weekday = [
          'ponedeljak',
          'utorak',
          'sreda',
          'četvrtak',
          'petak',
          'subota',
          'nedelja'
        ] %}
        Danas je {{ weekday[slots.date.weekday()] }}, {{ slots.date.day }}. {{ months[slots.date.month] }} {{ slots.date.year }}
