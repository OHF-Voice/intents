language: sr-Latn
responses:
  intents:
    HassGetState:
      default: "{{ state.state_with_unit }}" # used mostly for custom sentences

      # the number of names returned is limited to 4, in case there are more, the first 3 names and the remaining count is returned
      # with 4 names or less, the names are joined with a comma ", " and the last name is joined with " and "
      one: |
        {{ slots.name | capitalize }} je {{ state.state_with_unit }}

      one_yesno: |
        {% if query.matched %}
          Da
        {% else %}
          Ne, {{ state.state_with_unit }}
        {% endif %}

      any: |
        {% if query.matched %}
          {% set match = query.matched | map(attribute="name") | sort | list %}
          {% if match | length > 4 %}
            Da, {{ match[:3] | join(", ") }} i {{ (match | length - 3) }} više
          {%- else -%}
            Da,
            {% for name in match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} i {% endif -%}
              {{ name }}
            {%- endfor -%}
          {% endif %}
        {% else %}
          Ne
        {% endif %}

      all: |
        {% if not query.unmatched: %}
          Da
        {% else %}
          {% set no_match = query.unmatched | map(attribute="name") | sort | list %}
          {% if no_match | length > 4 %}
            Ne, {{ no_match[:3] | join(", ") }} i {{ (no_match | length - 3) }} ne više
          {%- else -%}
            Ne,
            {% for name in no_match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} i {% endif -%}
              {{ name }}
            {%- endfor %} nije
          {% endif %}
        {% endif %}

      which: |
        {% if not query.matched %}
          Nijedan/Nijedna/Nijedno
        {% else: %}
          {% set match = query.matched | map(attribute="name") | sort | list %}
          {% if match | length > 4 %}
            {{ match[:3] | join(", ") }} i {{ (match | length - 3) }} više
          {% else %}
            {%- for name in match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} i {% endif -%}
              {{ name }}
            {%- endfor -%}
          {% endif %}
        {% endif %}

      how_many: |
        {{ query.matched | length }}

      where: |
        {% if not query.matched %}
          Žao mi je, ne poznajem osobu po imenu {{ slots.name | capitalize }}
        {% else: %}
          {% if state == "not_home" %}
            {{ slots.name | capitalize }} nije kod kuće
          {% else %}
            {{ slots.name | capitalize }} je u {{ state.state }}
          {% endif %}
        {% endif %}
