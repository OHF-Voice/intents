language: ga
responses:
  intents:
    HassGetState:
      default: "{{ state.state_with_unit }}"
      one: "Tá {{ slots.name | capitalize }} {{ state.state_with_unit }}"
      one_yesno: |
        {% if query.matched %}
          Tá
        {% else %}
          Níl, {{ state.state_with_unit }}
        {% endif %}
      any: |
        {% if query.matched %}
          {% set match = query.matched | map(attribute="name") | sort | list %}
          {% if match | length > 4 %}
            Tá, {{ match[:3] | join(", ") }} agus {{ (match | length - 3) }} eile
          {%- else -%}
            Tá,
            {% for name in match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} agus {% endif -%}
              {{ name }}
            {%- endfor -%}
          {% endif %}
        {% else %}
          Níl
        {% endif %}
      all: |
        {% if not query.unmatched: %}
          Tá
        {% else %}
          {% set no_match = query.unmatched | map(attribute="name") | sort | list %}
          {% if no_match | length > 4 %}
            Níl, {{ no_match[:3] | join(", ") }} agus {{ (no_match | length - 3) }} eile
          {%- else -%}
            Níl,
            {% for name in no_match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} agus {% endif -%}
              {{ name }}
            {%- endfor %}
          {% endif %}
        {% endif %}
      which: |
        {% if not query.matched %}
          Ceann ar bith
        {% else: %}
          {% set match = query.matched | map(attribute="name") | sort | list %}
          {% if match | length > 4 %}
            {{ match[:3] | join(", ") }} agus {{ (match | length - 3) }} eile
          {% else %}
            {%- for name in match -%}
              {% if not loop.first and not loop.last %}, {% elif loop.last and not loop.first %} agus {% endif -%}
              {{ name }}
            {%- endfor -%}
          {% endif %}
        {% endif %}
      how_many: "{{ query.matched | length }}"
      where: |
        {% if state == "not_home" %}
          Tá {{ slots.name | capitalize }} as baile
        {% else %}
          Tá {{ slots.name | capitalize }} ag {{ state.state }}
        {% endif %}
