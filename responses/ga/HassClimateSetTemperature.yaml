language: ga
responses:
  intents:
    HassClimateSetTemperature:
      # Cardinal numbers mutate the following noun "céim" (degree):
      #   - numbers ending 1-6 take lenition -> "chéim"
      #   - numbers ending 7-9, and 10, take eclipsis -> "gcéim"
      # For 20 and greater we use the simplified system with no mutation -> "céim".
      default: "Teocht socraithe go {{ slots.temperature }} {{ 'céim' if (slots.temperature | int) >= 20 else ('gcéim' if ((slots.temperature | int) == 10 or (slots.temperature | int) % 10 in [7, 8, 9]) else 'chéim') }}"
