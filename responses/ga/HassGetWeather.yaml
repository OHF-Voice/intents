language: ga
responses:
  intents:
    HassGetWeather:
      default: >
        {% set weather_condition = {
          'clear': 'agus glan',
          'clear-night': 'agus glan',
          'cloudy': 'agus scamallach',
          'exceptional': 'agus eisceachtúil',
          'fog': 'le ceo',
          'hail': 'le clocha sneachta',
          'lightning': 'le tintreach',
          'lightning-rainy': 'le tintreach agus báisteach',
          'partlycloudy': 'agus scamallach go páirteach',
          'pouring': 'agus báisteach throm',
          'rainy': 'agus ag cur báistí',
          'snowy': 'agus ag cur sneachta',
          'snowy-rainy': 'le sneachta agus báisteach',
          'sunny': 'agus grianmhar',
          'windy': 'agus gaofar',
          'windy-variant': 'le gaoth agus scamaill'
        } %}
        {{ state.attributes.get('temperature') }} {{ state.attributes.get('temperature_unit') }} {{ weather_condition.get((state.state | string).lower(), "") }}
