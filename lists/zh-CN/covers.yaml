language: zh-CN
lists:
  cover_states:
    values:
      - in: (打开|开着|开了)[的]
        out: open
      - in: (关闭|关着|关了)[的]
        out: closed
      - in: 打开中
        out: opening
      - in: 关闭中
        out: closing
  cover_classes:
    values:
      - in: (遮阳|雨)(蓬|棚)
        out: awning
      - in: (百叶窗|百叶帘|卷帘)
        out: blind
      - in: 窗帘
        out: curtain
      - in: (门|房门|卷闸门)
        out: door
      - in: 车库门
        out: garage
      - in: (大门|院子门|铁门)
        out: gate
      - in: 遮阳帘
        out: shade
      - in: 百叶窗户
        out: shutter
      - in: 窗户
        out: window
  bs_door_states:
    values:
      - in: (打开|开启|开着)
        out: "on"
      - in: (关闭|关上|关着)
        out: "off"
