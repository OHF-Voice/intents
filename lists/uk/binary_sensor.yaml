language: uk
lists:
  bs_open_states:
    values:
      - in: відкрит(ий|а|і|о) | відчинен(ий|а|і|о)
        out: "on"
      - in: закрит(ий|а|і|о) | зачинен(ий|а|і|о)
        out: "off"
  bs_occupancy_states:
    values:
      - in: виявлено | зайнято
        out: "on"
      - in: чисто | вільно
        out: "off"
