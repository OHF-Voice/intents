language: uk
lists:
  on_off_states:
    values:
      - in: (в|у)вімкнен(ий|на|і|их|о) | (в|у)вімкнут(ий|а|і|их|о)
        out: "on"
      - in: вимкнен(ий|на|і|их|о) | вимкнут(ий|а|і|их|о)
        out: "off"
  lock_states:
    values:
      - in: закрит(о|ий|а) | замкнен(о|ий|а) | зачинен(о|ий|а)
        out: locked
      - in: відкрит(о|ий|а) | відімкнен(о|ий|а) | відчинен(о|ий|а)
        out: unlocked
