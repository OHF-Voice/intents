language: zh-HK
lists:
  color:
    values:
      - in: (紅色|红色)
        out: red
      - in: 橙色
        out: orange
      - in: (黃色|黄色)
        out: yellow
      - in: 綠色
        out: green
      - in: 藍色
        out: blue
      - in: 紫色
        out: purple
      - in: 白色
        out: white
      - in: 黑色
        out: black
      - in: 棕色
        out: brown
  brightness_level:
    values:
      - in: (最大|最光|最高|最亮)
        out: 100
      - in: (最小|最暗|最低|最黑)
        out: 1
