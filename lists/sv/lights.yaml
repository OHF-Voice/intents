language: sv
lists:
  color:
    values:
      - in: (vit | vitt)
        out: white
      - in: svart
        out: black
      - in: (röd | rött)
        out: red
      - in: orange
        out: orange
      - in: (gul | gult)
        out: yellow
      - in: (grön | grönt)
        out: green
      - in: (blå | blått)
        out: blue
      - in: (lila | violett)
        out: purple
      - in: (brun | brunt)
        out: brown
      - in: rosa
        out: pink
      - in: turkos
        out: turquoise
  brightness_level:
    values:
      - in: (maximal | max[imum] | högsta | starkaste | intensivaste | full[t])
        out: 100
      - in: (minimal | minimum | minsta | lägsta | svagaste)
        out: 1
