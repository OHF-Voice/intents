      - in: (zavret(รฝ|รก|รฉ|รฝch)|zatvoren(รฝ|รก|รฉ|รฝch)|zatiahnut(รฝ|รก|รฉ|รฝch))
        out: closed
      - in: "[sa] otvรกra[jรบ] [sa]"
        out: opening
      - in: "[sa] zatvรกra[jรบ] [sa]"
        out: closing
  cover_classes:
    values:
      - in: markรญz(a|y|u)
        out: awning
      - in: (ลพalรบzi(e|รญ|a|u)|rol[i]et[(a|y|u)])
        out: blind
      - in: zรกves[y|ov]
        out: curtain
      - in: dver(e|รญ)
        out: door
      - in: ((garรกลพov(รฉ|รก|รฝch) (dver(e|รญ)|brรกn[a|u|y]))|garรกลพ[e])
        out: garage
      - in: brรกn(a|y|u)
        out: gate
      - in: (clon(a|y)|tienidl(o|a))
        out: shade
      - in: okenic(a|e|u)
        out: shutter
      - in: (okien|okn(o|a|รก))
        out: window
  bs_opening_states:
    values:
      - in: otvoren(รฝ|รก|รฉ|รฝch)
        out: "on"
      - in: (zatvoren|zavret)(รฝ|รก|รฉ|รฝch)
        out: "off"
