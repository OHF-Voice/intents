language: ml
lists:
  color:
    values:
      - in: (വെ(ള്ള|ളുത്ത)|ധവള|ശ്വ്വേത)
        out: white
      - in: (ക(റുപ്പ്|റുത്ത))
        out: black
      - in: (ചു(വപ്പ്|വന്ന|മപ്പ്|വന്നത്)|ചെ(മപ്പ്|മപ്പു|മന്ന)|ചുമ(ന്ന|ന്നത്))
        out: red
      - in: ഓറഞ്ച്
        out: orange
      - in: മഞ്ഞ
        out: yellow
      - in: പച്ച
        out: green
      - in: നീല
        out: blue
      - in: (പർപ്പിൾ|ഊത|ധൂമ്ര)
        out: purple
      - in: (ത(വിട്ട്|വിട്|വിട്ടു)|ബ്രൗൺ)
        out: brown
  brightness_level:
    values:
      - in: (കൂടിയത്|പരമാവധി|ഉച്ചനില)
        out: 100
      - in: (കുറ(ഞ്ഞ|ഞ്ഞത്)|ന്യൂനത(മ|മം))
        out: 1
