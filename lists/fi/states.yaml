language: fi
lists:
  on_off_states:
    values:
      - in: (päälle|päällä)
        out: "on"
      - in: (päältä|pois|pois päältä)
        out: "off"
  lock_states:
    values:
      - in: (lukittu|lukossa|lukittuna)
        out: locked
      - in: (auki|avoinna|lukitsematta)
        out: unlocked
