language: fi
lists:
  timer_half:
    values:
      - in: (puoli|puoleksi|puolen|puolen tunnin|puolella tunnilla)
        out: 30
      - in: 1/2
        out: 30
  timer_quarter:
    values:
      - in: (vartin|varttitunnin|vartiksi|varttitunniksi|vartilla|varttitunnilla)
        out: 15
  timer_three_quarter:
    values:
      - in: (3 vartin|3 vartiksi|3 vartilla)
        out: 45
  timer_one_hour:
    values:
      - in: (tunnin|tunti|tunniksi|tunnilla)
        out: 1
