language: de-CH
lists:
  on_off_states:
    values:
      - in: (a|aa|an|anne)
        out: "on"
      - in: (ab|us|uus)
        out: "off"
  lock_states:
    values:
      - in: "[(ab|zue[ ])](gschlosse|bschlosse)"
        out: locked
      - in: ((uf|un|nid )(gschlosse|bschlosse)|offe)
        out: unlocked
