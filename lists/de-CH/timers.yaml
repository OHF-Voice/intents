language: de-CH
lists:
  timer_hour_parts_to_minutes:
    values:
      - in: e viertu S[ch]tu(nd[e]|ng)
        out: 15
      - in: e haub[i] S[ch]tu(nd[e]|ng)
        out: 30
      - in: drüü viertu S[ch]tu(nd|ng)
        out: 45
      - in: eis ei  viertu S[ch]tu(nd|ng)
        out: 75
      - in: ei[s] ei haub[i] S[ch]tu(nd|ng)|a(nd|ng)er[t]haub S[ch]tu(nd|ng)
        out: 90
  timer_minute_parts_to_seconds:
    values:
      - in: e haubi Minute
        out: 30
      - in: (einehaub|a(nd|ng)erthaub) Minute
        out: 90
