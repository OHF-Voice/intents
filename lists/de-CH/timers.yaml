language: de-CH
lists:
  timer_hour_parts_to_minutes:
    values:
      - in: e[s] viertu S[ch]tu(nd[e]|ng)
        out: 15
      - in: e[s] haub[i] S[ch]tu(nd[e]|ng)
        out: 30
      - in: drüü viertu S[ch]tu(nd[e]|ng)
        out: 45
      - in: e[s] eis viertu S[ch]tu(nd[e]|ng)
        out: 75
      - in: e[s] eis haub[i] S[ch]tu(nd[e]|ng)|anderthaub S[ch]tu(nd[e]|ng)
        out: 90
  timer_minute_parts_to_seconds:
    values:
      - in: e[s] haub[i] Minute
        out: 30
      - in: e[s] eis haub[i] Minute|anderthaub Minute
        out: 90
