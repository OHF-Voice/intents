language: de-CH
lists:
  color:
    values:
      - in: wyss
        out: white
      - in: schwarz
        out: black
      - in: rot
        out: red
      - in: (orange|orangsch)
        out: orange
      - in: (gelb|gäub|gälb)
        out: yellow
      - in: grüen
        out: green
      - in: blau
        out: blue
      - in: violett
        out: purple
      - in: (brun|bruun)
        out: brown
  brightness_level:
    values:
      - in: (max[imal[e|i]|imum]|höchste|volle|gröss[t]i|hell[scht]i)
        out: 100
      - in: (min[imal[e|i]|imum]|nidrigschti|chl(y|i)nschti|geringschti)
        out: 1
