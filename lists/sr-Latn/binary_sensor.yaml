language: sr-Latn
lists:
  bs_open_states:
    values:
      - in: otvoren[a|o|i|e|ih]
        out: "on"
      - in: zatvoren[a|o|i|e|ih]
        out: "off"
  bs_occupancy_states:
    values:
      - in: (detektovan|aktiviran|uključen|zauzet[a|o])
        out: "on"
      - in: slobodno
        out: "off"
