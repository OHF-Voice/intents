---
language: "en"

lists:
  cover_classes:
    values:
      - in: awning[s]
        out: awning
      - in: blind[s]
        out: blind
      - in: curtain[s]
        out: curtain
      - in: door[s]
        out: door
      - in: garage door[s]
        out: garage
      - in: gate[s]
        out: gate
      - in: shade[s]
        out: shade
      - in: shutter[s]
        out: shutter
      - in: window[s]
        out: window
  cover_states:
    values:
      - in: "open"
        out: "open"
      - in: "(closed|shut)"
        out: "closed"
      - in: "opening"
        out: "opening"
      - in: "(closing|shutting)"
        out: "closing"
