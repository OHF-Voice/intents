---
language: "en"

lists:
  # open / closed -> on / off (door, garage_door, window)
  bs_open_states:
    values:
      - in: "open"
        out: "on"
      - in: "(closed|shut)"
        out: "off"

  # occupancy
  bs_occupancy_states:
    values:
      - in: "(occupied|detected|triggered|on)"
        out: "on"
      - in: "(empty|clear|unoccupied)"
        out: "off"
