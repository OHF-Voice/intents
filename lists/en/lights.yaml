---
language: "en"

lists:
  color:
    values:
      - in: "white"
        out: "white"
      - in: "black"
        out: "black"
      - in: "red"
        out: "red"
      - in: "orange"
        out: "orange"
      - in: "yellow"
        out: "yellow"
      - in: "green"
        out: "green"
      - in: "blue"
        out: "blue"
      - in: "purple"
        out: "purple"
      - in: "brown"
        out: "brown"
      - in: "pink"
        out: "pink"
      - in: "turquoise"
        out: "turquoise"
  brightness_level:
    values:
      - in: (max|maximum|highest)
        out: 100
      - in: (min|minimum|lowest)
        out: 1
  color_temperature_names:
    values:
      - in: "candle light"
        out: 1900
      - in: "warm white"
        out: 2700
      - in: "(cold|cool) white"
        out: 4000
      - in: "day[ ]light"
        out: 6500
