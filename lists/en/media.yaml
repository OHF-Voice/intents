---
language: "en"

lists:
  volume_step:
    values:
      - in: "(up|increase)"
        out: "up"
      - in: "(down|decrease)"
        out: "down"
  media_class:
    values:
      - in: "artist"
        out: "artist"
      - in: "album"
        out: "album"
      - in: "(track|song)"
        out: "track"
      - in: "playlist"
        out: "playlist"
      - in: "podcast"
        out: "podcast"
      - in: "movie"
        out: "movie"
      - in: "[tv] show"
        out: "tv_show"
