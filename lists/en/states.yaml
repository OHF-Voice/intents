---
language: "en"

lists:
  on_off_states:
    values:
      - in: "on"
        out: "on"
      - in: "off"
        out: "off"
  on_off_domains:
    values:
      - in: light[s]
        out: light
      - in: fan[s]
        out: fan
      - in: switch[es]
        out: switch
  lock_states:
    values:
      - in: "[securely] locked"
        out: "locked"
      - in: "unlocked"
        out: "unlocked"
