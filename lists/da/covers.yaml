language: da
lists:
  cover_classes:
    values:
      - in: markise[(n|r|rne)]
        out: awning
      - in: persienne[(n|r|rne)]
        out: blind
      - in: gardin[(et|er|erne)]
        out: curtain
      - in: dør[(en|e|ene)]
        out: door
      - in: garage(dør|port)[(en|e|ene)]
        out: garage
      - in: låge[(en|r|rne)]
        out: gate
      - in: rullegardin[(et|er|erne)]
        out: shade
      - in: skodde[(n|r|rne)]
        out: shutter
      - in: vindue[(t|r|rne)]
        out: window
  cover_states:
    values:
      - in: (åben[t]|åbne[t])
        out: open
      - in: lukket
        out: closed
      - in: åbner
        out: opening
      - in: lukker
        out: closing
