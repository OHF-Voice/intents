language: da
lists:
  bs_open_states:
    values:
      - in: (åben|åbent|åbne)
        out: "on"
      - in: (lukket|lukkede)
        out: "off"
  bs_occupancy_states:
    values:
      - in: (optaget|i brug|detekteret|registreret)
        out: "on"
      - in: (tom|ledig|ikke detekteret|ikke registreret)
        out: "off"
