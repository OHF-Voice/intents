language: gl
lists:
  color:
    values:
      - in: blanco
        out: white
      - in: negro
        out: black
      - in: (vermello|vermella)
        out: red
      - in: laranxa
        out: orange
      - in: amarelo
        out: yellow
      - in: verde
        out: green
      - in: azul
        out: blue
      - in: (lila|morado|púrpura)
        out: purple
      - in: marrón
        out: brown
      - in: (rosa|rosado)
        out: pink
  brightness_level:
    values:
      - in: (máxim(o|a)|[o |a ]máis alt(o|a)|tope)
        out: 100
      - in: (mínim(o|a)|[o |a ]máis baix(o|a))
        out: 1
