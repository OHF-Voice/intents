language: es
lists:
  color:
    values:
      - in: blanco
        out: white
      - in: negro
        out: black
      - in: rojo
        out: red
      - in: (naranja|anaranjado)
        out: orange
      - in: amarillo
        out: yellow
      - in: verde
        out: green
      - in: azul
        out: blue
      - in: (lila|morado|púrpura)
        out: purple
      - in: (marrón|café)
        out: brown
      - in: (rosa|rosado)
        out: pink
  brightness_level:
    values:
      - in: (máxim(o|a)|[l(o|a)] más alt(a|o)|tope)
        out: 100
      - in: (mínim(o|a)|[l(o|a)] más baj(o|a))
        out: 1
