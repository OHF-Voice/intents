language: es
lists:
  timer_words_seconds:
    values:
      - in: un|una
        out: 1
  timer_words_minutes:
    values:
      - in: un|una
        out: 1
  timer_words_hours:
    values:
      - in: un|una
        out: 1
  timer_half:
    values:
      - in: medi(o|a)
        out: 30
      - in: 1/2
        out: 30
      - in: "[un|1] cuarto [de]"
        out: 15
      - in: (tres|3) cuartos [de]
        out: 45
      - in: 1/4
        out: 15
      - in: 3/4
        out: 45
