language: ga
lists:
  color:
    values:
      - in: "bán"
        out: "white"
      - in: "dubh"
        out: "black"
      - in: "dearg"
        out: "red"
      - in: "oráiste"
        out: "orange"
      - in: "buí"
        out: "yellow"
      - in: "glas"
        out: "green"
      - in: "gorm"
        out: "blue"
      - in: "corcra"
        out: "purple"
      - in: "donn"
        out: "brown"
      - in: "bándearg"
        out: "pink"
      - in: "(turcaid|turcaidghorm)"
        out: "turquoise"
  brightness_level:
    values:
      - in: "(an t-uasmhéid|an t-uasluach|an mhéid is airde|an luach is airde|an leibhéal is airde|an max|suas ar fad)"
        out: 100
      - in: "(an t-íosmhéid|an t-íosluach|an mhéid is ísle|an luach is ísle|síos ar fad)"
        out: 1
  color_temperature_names:
    values:
      - in: "solas coinnle"
        out: 1900
      - in: "(bán te|solas te)"
        out: 2700
      - in: "(bán fuar|solas bán fionnuar)"
        out: 4000
      - in: "solas an lae"
        out: 6500
