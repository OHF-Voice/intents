language: ga
lists:
  cover_classes:
    values:
      - in: "scáthlán[acha]"
        out: "awning"
      - in: "dallóg[a]"
        out: "blind"
      - in: "cuirtín[í]"
        out: "curtain"
      - in: "doras|doirse"
        out: "door"
      - in: "doras [an] gharáiste|doirse [an] gharáiste"
        out: "garage"
      - in: "geata[í]"
        out: "gate"
      - in: "scáth[anna]"
        out: "shade"
      - in: "comhla[í]"
        out: "shutter"
      - in: "fuinneog[a]"
        out: "window"
  cover_states:
    values:
      - in: "oscailte"
        out: "open"
      - in: "dúnta"
        out: "closed"
      - in: "ag oscailt"
        out: "opening"
      - in: "ag dúnadh"
        out: "closing"
