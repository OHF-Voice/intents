language: ga
lists:
  media_class:
    values:
      - in: "ealaíontóir"
        out: "artist"
      - in: "albam"
        out: "album"
      - in: "(amhrán|rian)"
        out: "track"
      - in: "seinmliosta"
        out: "playlist"
      - in: "podchraoladh"
        out: "podcast"
      - in: "scannán"
        out: "movie"
      - in: "clár [teilifíse]"
        out: "tv_show"
