---
language: fr
lists:
  on_off_states:
    values:
      - in: allumé[e][s]
        out: "on"
      - in: éteint[e][s]
        out: "off"
  cover_states:
    values:
      - in: ouvert[e][s]
        out: open
      - in: fermé[e][s]
        out: closed
      - in: ouverture
        out: opening
      - in: fermeture
        out: closing
  lock_states:
    values:
      - in: verrouill[e][er][é][ée][s]
        out: locked
      - in: ferm[e][er][é][ée][s] à (clé|clef)
        out: locked
      - in: déverrouill[e][er][é][ée][s]
        out: unlocked
