---
language: fr
lists:
  # open / closed -> on / off (door, garage_door, window)
  bs_open_states:
    values:
      - in: ouvert[e][s]
        out: "on"
      - in: fermé[e][s]|clos[e][s]
        out: "off"
  bs_occupancy_states:
    values:
      - in: (présent[e][s]|occupé[e][s]|déclenché[e][s]|détecté[e][s]|acti(f|ve)[s])
        out: "on"
      - in: (désactivé[e][s]|non détecté[e][s]|inacti(f|ve)[s])
        out: "off"
