language: de
lists:
  bs_battery_states:
    values:
      - in: (niedrig|gering|schwach)
        out: "on"
      - in: normal
        out: "off"
  bs_battery_charging_states:
    values:
      - in: (lädt|[auf][ge]laden)[ auf]
        out: "on"
      - in: (lädt nicht|nicht[ auf][ge]laden|laden nicht)[ auf]
        out: "off"
  bs_cold_states:
    values:
      - in: kalt
        out: "on"
      - in: normal
        out: "off"
  bs_connectivity_states:
    values:
      - in: verbunden
        out: "on"
      - in: getrennt
        out: "off"
  bs_heat_states:
    values:
      - in: hei(ß|ss)
        out: "on"
      - in: normal
        out: "off"
  bs_safety_states:
    values:
      - in: (unsicher|gefährlich)
        out: "on"
      - in: (sicher|ungefährlich)
        out: "off"
