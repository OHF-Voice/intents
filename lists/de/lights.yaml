      - in: wei(ß|ss)
        out: white
      - in: schwarz
        out: black
      - in: rot
        out: red
      - in: orange
        out: orange
      - in: gelb
        out: yellow
      - in: grün
        out: green
      - in: blau
        out: blue
      - in: violett
        out: purple
      - in: braun
        out: brown
  brightness_level:
    values:
      - in: (max[imal[e]|imum]|höchste|volle|grö(ss|ß)te|hell[ste])
        out: 100
      - in: (min[imal[e]|imum]|niedrigste|kleinste|geringste)
        out: 1
