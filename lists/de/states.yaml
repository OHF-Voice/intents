language: de
lists:
  lock_states:
    values:
      - in: ((((ab|zu)ge|ver)schlossen|([ab|zu]ge|ver)sperrt)|verriegelt|nicht (ent(riegelt|sperrt)|aufge(sperrt|schlossen)))
        out: locked
      - in: (nicht ((((ab|zu)ge|ver)schlossen|([ab|zu]ge|ver)sperrt)|verriegelt)|ent(riegelt|sperrt)|aufge(sperrt|schlossen))
        out: unlocked
  on_off_states:
    values:
      - in: ((an|ein)[geschaltet]|auf|offen|geöffnet|nicht geschlossen)
        out: "on"
      - in: ((aus|ab)[geschaltet]|zu|geschlossen|nicht offen)
        out: "off"
      - in: ausm
        out: "off"
