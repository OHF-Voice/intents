---
lists:
  search_query:
    wildcard: true
  volume:
    range:
      type: "percentage"
      from: 0
      to: 100
  volume_step_up:
    range:
      type: percentage
      from: 0
      to: 100
  volume_step_down:
    range:
      type: percentage
      from: 0
      to: 100
      multiplier: -1
