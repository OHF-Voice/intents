language: hr
lists:
  on_off_states:
    values:
      - in: uključen[a|e|i|o|ih]|upaljen[a|e|i|o|ih]
        out: "on"
      - in: isključen[a|e|i|o|ih]|ugašen[a|e|i|o|ih]
        out: "off"
  lock_states:
    values:
      - in: zaključan[a|i|o|ih]|zaključaj
        out: locked
      - in: otključan[a|i|o|ih]|otključaj
        out: unlocked
