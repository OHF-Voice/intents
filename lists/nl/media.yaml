language: nl
lists:
  volume_step:
    values:
      - in: (hoger|omhoog|verhogen|verhoog|harder)
        out: up
      - in: (lager|omlaag|naar beneden|verlagen|verlaag|zachter)
        out: down
  media_class:
    values:
      - in: (artiest|zanger[es]|band)
        out: artist
      - in: album
        out: album
      - in: (track|nummer|lied[je])
        out: track
      - in: (afspeellijst|playlist)
        out: playlist
      - in: podcast
        out: podcast
      - in: film
        out: movie
      - in: '[tv] (show|serie)'
        out: tv_show
