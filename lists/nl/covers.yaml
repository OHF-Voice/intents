language: nl
lists:
  cover_classes:
    values:
      - in: (luifel[s]|[zonne]scherm[en])
        out: awning
      - in: (jaloezie[ën]|luxaflex)
        out: blind
      - in: (gordijn[en]|vitrage[s])
        out: curtain
      - in: deur[en]
        out: door
      - in: garage[ ]deur[en]
        out: garage
      - in: (hek[ken]|poort[en])
        out: gate
      - in: (screen[s]|rolgordijn[en])
        out: shade
      - in: (rolluik[en]|shutter[s])
        out: shutter
      - in: (raam|ramen)
        out: window
  cover_states:
    values:
      - in: (open|geopend)
        out: open
      - in: (dicht|gesloten)
        out: closed
      - in: (open aan het gaan|aan het (openen|open gaan))
        out: opening
      - in: (dicht aan het gaan|aan het (dicht gaan|sluiten))
        out: closing
