language: bg
lists:
  volume_step:
    values:
      - in: "(усили|увеличи|вдигни|качи|[[още ]по-](силно|високо))"
        out: "up"
      - in: "(намали|свали|смъкни|сниши|[[още ]по-](тихо|тихичко|ниско))"
        out: "down"
  media_class:
    values:
      - in: "(изпълнител[я|ят|ка|ката]|артист[а|ът|ка|ката]|певец[a|ът]|певица[та])"
        out: "artist"
      - in: "албум[а|ът]"
        out: "album"
      - in: "(песен[та]|парче[то]|трак[а|ът])"
        out: "track"
      - in: "плейлист[а|ът]"
        out: "playlist"
      - in: "подкаст[а|ът]"
        out: "podcast"
      - in: "филм[а|ът]"
        out: "movie"
      - in: "(сериал[а|ът]|предаване[то]|шоу[то])"
        out: "tv_show"
      - in: "музика[та]"
        out: "music"
