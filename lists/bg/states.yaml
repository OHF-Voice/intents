language: bg
lists:
  on_off_states:
    values:
      - in: включен[а|о|и|ият|ите|ото|ата]
        out: "on"
      - in: изключен[а|о|и|ият|ите|ото|ата]
        out: "off"
  lock_states:
    values:
      - in: заключен[а|о|и|ия|ят|ата|ото|ите]
        out: locked
      - in: отключен[а|о|и|ия|ят|ата|ото|ите]
        out: unlocked
