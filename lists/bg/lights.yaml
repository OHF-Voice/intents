language: bg
lists:
  color:
    values:
      - in: бял[о|а|ото|ата]|бел(и|ия|ият|ите)
        out: white
      - in: черен|черн(о|на|ото|ата|и|ият|ите)
        out: black
      - in: червен[о|а|ото|ата|и|ия|ият]
        out: red
      - in: оранжев[о|а|ото|ата|и|ия|ият]
        out: orange
      - in: жълт[о|а|ото|и|ия|ият|ата]
        out: yellow
      - in: зелен[о|а|ото|ата|и|ия|ият]
        out: green
      - in: син[ьо|я|ьото|ята|ият|и|ите]
        out: blue
      - in: лилав[о|а|ото|ата|и|ия|ият|ите]
        out: purple
      - in: кафяв[о|а|ото|ата|и|ия|ият|ите]
        out: brown
      - in: розов[о|а|ото|ата|и|ия|ият|ите]
        out: pink
      - in: тюркоазен[о|а|ото|ата|и|ия|ият|ите]
        out: turquoise
  brightness_level:
    values:
      - in: max|максимална[та]|макс|край|най[-]висока[та]
        out: 100
      - in: минимална|минимум|най[-]ниска
        out: 1
  color_temperature_names:
    values:
      - in: свещ[та]|светлина на свещ
        out: 1900
      - in: топл[о|а][ бяло| бяла| светлина]
        out: 2700
      - in: (студен[о|а]|хладн[о|а])[ бяло| бяла| светлина]
        out: 4000
      - in: дневна светлина|дневно
        out: 6500
