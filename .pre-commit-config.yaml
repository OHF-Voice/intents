repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.0.0-alpha.4"
    hooks:
      - id: prettier
        types_or: [yaml]
        exclude: "languages.yaml"
  - repo: local
    hooks:
      - id: format
        name: Format
        entry: script/format
        language: python
      - id: transliterate
        name: Transliterate sr -> sr-Latn
        entry: script/transliterate
        language: python
        pass_filenames: false
        files: ^(sentences|responses|tests|rules|lists)/sr(-Latn)?/
