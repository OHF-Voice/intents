---
# HassTurnOn - name_script
# example: Start ds Script Ga Schlaafe
# slots: {name}

language: "de-CH"
data:
  - sentences:
      - "(Aktivier|Start|Schtart) <name> [Script]"
      - "(Aktivier|Start|Schtart) (ds Script |dr Code )<name>"
      - "(Füehr|Füer) [(ds Script |dr Code )]<name> (us|uus)"
    example: "Start ds Script Ga Schlaafe"
    name_domains:
      - "script"
    response: "script"
