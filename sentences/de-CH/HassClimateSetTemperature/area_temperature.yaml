---
# HassClimateSetTemperature - area_temperature
# example: Schteu d Temperatur im Wohnzimmer uf 20 Grad
# slots: {area}, {temperature}

language: "de-CH"
data:
  - sentences:
      - "(Mach|Schteu) (d |d')Temperatur <area> uf <temp>"
      - "(Mach|Schteu) <area> (d |d')Temperatur uf <temp>"
    example: "Schteu d Temperatur im Wohnzimmer uf 20 Grad"
    response: "temp_area"
