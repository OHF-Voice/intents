---
# HassSetVolume - default
# slots: {volume_level}; context_area: true

language: "de-CH"
data:
  - sentences:
      - "Setz (d Luts[ch]terchi|ds Volume) uf <volume>"
    example: "Setz d Lutschterchi uf 50%"
    response: "default"
  - sentences:
      - "Setz (d Luts[ch]terchi|ds Volume) uf [(d|d')]{volume_mapping:volume_level}"
    example: "Setz d Lutschterchi uf maximal"
    response: "default"
