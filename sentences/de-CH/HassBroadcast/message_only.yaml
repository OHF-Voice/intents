---
# HassBroadcast - message_only
# example: broadcast that dinner is ready
# slots: {message}

language: "de-CH"
data:
  - sentences:
      - "(gib [aune ](bekannt|düre)|lah aui (wüsse|(g|k)höre)) {message}"
      - "(säg|verchünd|mäud)[ (überau|aune)] {message}"
      - "(gib|säg)[ (überau|aune)] Bscheid {message}"
    example: "gib aune bekannt Znacht isch fertig"
    response: "default"
