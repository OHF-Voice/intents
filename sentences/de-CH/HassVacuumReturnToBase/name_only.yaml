---
# HassVacuumReturnToBase - name_only
# example: return rover to base
# slots: {name}

language: "de-CH"
data:
  - sentences:
      - "<name> gang [[zrügg ]zur Basis[station]]"
      - "schick <name> [[zrügg ]zur Basis[station]]"
    example: "Schick der Schtoubsuger zrügg zur Basis"
    name_domains:
      - "vacuum"
    response: "default"
