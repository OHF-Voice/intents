---
# HassSetPosition - name_only
# example: Schteu dr Schlafzimmer Vorhang uf 50%
# slots: {name}, {position}

language: "de-CH"
data:
  - sentences:
      - "<steu> <name> uf <position>"
      - "<mach> <name> uf <position> (uf|zue)"
    example: "Schteu dr Schlafzimmer Vorhang uf 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
