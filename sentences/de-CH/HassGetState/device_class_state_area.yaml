---
# HassGetState - device_class_state_area
# slots:
# - {area}
# - {domain}
# - {device_class}
# - {state}

language: "de-CH"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "Isch (e|ei|es) {cover_classes:device_class} {cover_states:state} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area}"
      - "Isch (e|ei|es) {cover_classes:device_class} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} {cover_states:state}"
      - "Isch (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} (e|ei|es) {cover_classes:device_class} {cover_states:state}"
    example: "Isch e Vorhang zue im Schlafzimmer"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "Sy [(d'[ ]|d |alli |aui )]{cover_classes:device_class} {cover_states:state} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area}"
      - "Sy [(d'[ ]|d |alli |aui )]{cover_classes:device_class} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} {cover_states:state}"
      - "Sy (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} [(d'[ ]|d |alli |aui )]{cover_classes:device_class} {cover_states:state}"
    example: "Sy d Vorhäng offe im Schlafzimmer"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "(Wele|Weli) {cover_classes:device_class} (isch|sy|si) {cover_states:state} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area}"
      - "(Wele|Weli) {cover_classes:device_class} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} (isch|sy|si) {cover_states:state}"
    example: "Wele Vorhang isch offe im Schlafzimmer"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "Wie mäng[s|e|i] {cover_classes:device_class} (isch|sy|si) {cover_states:state} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area}"
      - "Wie mäng[s|e|i] {cover_classes:device_class} (idr|i dr|im|ir|ide|idä|i dä|i de|i der) {area} (isch|sy|si) {cover_states:state}"
    example: "Wie mänge Vorhang isch offe im Schlafzimmer"
    inferred_domain: "cover"
    response: "how_many"
