---
# HassGetState - name_only
# slots: {name}

language: "de-CH"
data:
  - sentences:
      - "Was isch der Status vo[(m|r)] {name}"
    example: "Was isch der Status vom Wohnzimmer Lutsprächer"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
