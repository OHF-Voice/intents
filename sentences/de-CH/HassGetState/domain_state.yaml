---
# HassGetState - domain_state
# slots:
# - {domain}
# - {state}

language: "de-CH"
data:
  # ---- on/off domains (light, fan, switch) ----
  - sentences:
      - "Isch (e|ei) {on_off_domains:domain} {on_off_states:state}"
    example: "Isch e Lampe anne"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "Sy [(d'[ ]|d |aui |alli )]{on_off_domains:domain} {on_off_states:state}"
    example: "Sy aui Lampe anne"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "(Wele|Weli) {on_off_domains:domain} (isch|sy|si) {on_off_states:state}"
    example: "Weli Lampe sy anne"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "Wie mäng[s|e|i] {on_off_domains:domain} (isch|sy|si) {on_off_states:state}"
    example: "Wie mängi Lampe isch anne"
    inferred_domain: "light"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "Isch (e|es|ei) {lock_domains:domain} {lock_states:state}"
    example: "Isch e Türe bschlosse"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "Sy aui {lock_domains:domain} {lock_states:state}"
    example: "Sy aui Türe bschlosse"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "(Weles|Weli) {lock_domains:domain} (isch|sy|si) {lock_states:state}"
    example: "Weli Türe sy bschlosse"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "Wie mäng[s|i] {lock_domains:domain} (isch|sy|si) {lock_states:state}"
    example: "Wie mängi Türe isch bschlosse"
    inferred_domain: "lock"
    response: "how_many"

  # ---- people / zones ----
  - sentences:
      - "isch öpper [(i|y|im|ir|i dr|i der) ]{zone:state}"
    example: "isch öpper deheim"
    inferred_domain: "person"
    response: "any"
  - sentences:
      - "(sy|si) (aui|alli) [(i|y|im|ir|i dr|i der) ]{zone:state}"
    example: "sy aui deheim"
    inferred_domain: "person"
    response: "all"
  - sentences:
      - "wär isch [(i|y|im|ir|i dr|i der) ]{zone:state}"
    example: "wär isch deheim"
    inferred_domain: "person"
    response: "which"
  - sentences:
      - "(wie viu (persone|mösche|lüt)|wie mängi person) (isch|sy) [(i|y|im|ir|i dr|i der) ]{zone:state}"
    example: "wie viu persone sy deheim"
    inferred_domain: "person"
    response: "how_many"
