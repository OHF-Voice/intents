---
# HassVacuumStart - name_only
# example: start rover
# slots: {name}

language: "vi"
data:
  - sentences:
      - "[cái] {name} [bắt đầu] (dọn dẹp|hút bụi)"
      - "(bắt đầu|cho) [cái] {name} (dọn dẹp|hút bụi)"
    example: "rover dọn dẹp"
    name_domains:
      - "vacuum"
    response: "default"
