---
# HassLightSet - name_color
# example: đặt màu đèn phòng ngủ sang đỏ
# slots: {color}, {name}

language: "vi"
data:
  - sentences:
      - "[<set>] [cái] {name} (màu|màu sắc) [lên|đến|sang] {color}"
      - "[<set>] (màu sắc|màu) [của] [cái] {name} [sang|lên|đến] {color}"
    example: "đặt màu đèn phòng ngủ sang đỏ"
    name_domains:
      - "light"
    response: "color"
