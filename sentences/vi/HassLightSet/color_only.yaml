---
# HassLightSet - color_only
# example: thay đổi màu tất cả đèn ở đây sang đỏ
# slots: {color}
# context_area: true

language: "vi"
data:
  - sentences:
      - "[<set>] (màu sắc|màu) [của] [tất cả] <light> [<here>] [sang|lên|đến] {color}"
      - "[<set>] (màu sắc|màu) {color} cho [tất cả] <light> [<here>]"
    example: "thay đổi màu tất cả đèn ở đây sang đỏ"
    inferred_domain: "light"
    response: "color"
