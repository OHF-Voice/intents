---
# HassTurnOn - name_script
# example: run party time script
# slots: {name}

language: "vi"
data:
  - sentences:
      - "[(chạy|bắt đầu|<turn>)] [cái] {name} [kịch bản] [bật]"
      - "[(chạy|bắt đầu|chuyển [sang]|<turn>)] [kịch bản] [cái] {name}"
    example: "chạy kịch bản giờ tiệc"
    name_domains:
      - "script"
    response: "script"
