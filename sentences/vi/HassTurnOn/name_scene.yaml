---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "vi"
data:
  - sentences:
      - "[kích hoạt] [cảnh] {name}"
      - "[cái] {name} cảnh bật"
      - "<turn> ([cảnh] {name};bật)"
      - "(chuyển đổi|chuyển) sang ({name} [cảnh]|cảnh {name})"
    example: "kích hoạt cảnh chế độ tiệc"
    name_domains:
      - "scene"
    response: "scene"
