---
# HassTurnOn - name_only
# example: turn on the overhead light
# slots: {name}

language: "vi"
data:
  # on-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "<turn> [cái] {name}"
      - "<turn> [cái] {name} [thành|sang] bật"
      - "[cái] {name} bật"
    example: "bật đèn trần"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<open> [cái] {name}"
    example: "mở cửa trượt"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> [cái] {name}"
    example: "mở van chính"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "<lock> [cái] {name}"
    example: "khóa cửa trước"
    name_domains:
      - "lock"
    response: "lock"
