---
# HassTurnOff - domain_all
# example: turn off all the lights in the house
# slots: {domain}; context_area: false

language: "vi"
data:
  - sentences:
      - "<turn_off> [<all>] <light> (ở|tại) mọi nơi"
      - "<turn_off> [<all>] <light> trong (nhà|toàn bộ nhà)"
    example: "tắt tất cả đèn trong nhà"
    inferred_domain: "light"
    response: "light_all"
