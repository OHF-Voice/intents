---
# HassSetVolume - name_only
# example: đặt âm lượng TV thành 50 phần trăm
# slots: {name}, {volume_level}

language: "vi"
data:
  - sentences:
      - "<numeric_value_set> [âm lượng] [của] [cái] {name} (thành|lên|đến|tới|xuống) {volume:volume_level}[[ ]%| phần trăm]"
    example: "đặt âm lượng TV thành 50 phần trăm"
    name_domains:
      - "media_player"
    response: "default"
