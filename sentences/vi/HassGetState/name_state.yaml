---
# HassGetState - name_state
# example: đèn nhà bếp có bật không
# slots:
# - {name}
# - {state}

language: "vi"
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "[trạng thái] [của] {name} <state_q> {on_off_states:state} [có] không"
    example: "đèn nhà bếp có bật không"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves (open/closed/...)
  - sentences:
      - "{name} <state_q> {cover_states:state} [hay] [chưa] [không]"
    example: "cửa garage đã mở chưa"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks (locked/unlocked)
  - sentences:
      - "{name} <state_q> {lock_states:state} [hay] [chưa] [không]"
    example: "cửa trước đã khóa chưa"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings (open/closed)
  - sentences:
      - "{name} <state_q> {bs_open_states:state} [hay] [chưa] [không]"
    example: "cửa sân có mở không"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "{name} <state_q> {bs_occupancy_states:state} [hay] [không]"
    example: "cảm biến văn phòng có người không"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
