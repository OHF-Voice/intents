---
# HassMediaNext - name_only
# example: next track on the stereo
# slots: {name}

language: "vi"
data:
  - sentences:
      - "mở tiếp [bài hát|nhạc] [trên|cho] [cái] {name}"
      - "[bài hát|bài|mục] tiếp [theo] [trên|cho] [cái] {name}"
    example: "next track on the stereo"
    name_domains:
      - "media_player"
    response: "default"
