---
# HassTurnOff - name_floor
# example: turn off the overhead light on the first floor
# slots:
# - {name}
# - {floor}

language: "kw"
data:
  # off-able domains
  - sentences:
      - "<turn> yn farow [<the>] {name} <in> [<the>] {floor} [leur]"
      - "[<turn>] [<the>] {name} <in> [<the>] {floor} [leur] [dhe] yn farow"
      - "anbywha [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "skwych yn farow an lugarn chambour war an kynsa leur"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn> yn farow [<the>] {name} <light> <in> [<the>] {floor} [leur]"
      - "[<turn>] [<the>] {name} <light> <in> [<the>] {floor} [leur] [dhe] yn farow"
      - "anbywha [<the>] {name} <light> <in> [<the>] {floor} [leur]"
    example: "skwych yn farow an kornell gwari golow war an kynsa leur"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<close> [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "dege an korglen war an kynsa leur"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "dege an stankell war an kynsa leur"
    name_domains:
      - "valve"
    response: "valve"
