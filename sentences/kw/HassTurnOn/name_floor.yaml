---
# HassTurnOn - name_floor
# example: turn on the overhead light on the first floor
# slots:
# - {name}
# - {floor}

language: "kw"
data:
  # on-able domains
  - sentences:
      - "<turn> yn fyw [<the>] {name} <in> [<the>] {floor} [leur]"
      - "[<turn>] [<the>] {name} <in> [<the>] {floor} [leur] [dhe] yn fyw"
      - "bywha [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "skwych yn fyw an lugarn chambour war an kynsa leur"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn> yn fyw [<the>] {name} <light> <in> [<the>] {floor} [leur]"
      - "[<turn>] [<the>] {name} <light> <in> [<the>] {floor} [leur] [dhe] yn fyw"
      - "bywha [<the>] {name} <light> <in> [<the>] {floor} [leur]"
    example: "skwych yn fyw an kornell gwari golow war an kynsa leur"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<open> [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "ygor an korglen war an kynsa leur"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> [<the>] {name} <in> [<the>] {floor} [leur]"
    example: "ygor an stankell war an kynsa leur"
    name_domains:
      - "valve"
    response: "valve"
