---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "kw"
data:
  - sentences:
      - "[bywha] [<the>] {name} [gwel]"
      - "[<the>] {name} yn fyw"
      - "<turn> yn fyw [<the>] {name} [gwel]"
    example: "bywha an gwel sderts"
    name_domains:
      - "scene"
    response: "scene"
