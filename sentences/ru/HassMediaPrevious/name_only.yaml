---
# HassMediaPrevious - name_only
# example: предыдущая песня на TV
# slots: {name}

language: "ru"
data:
  - sentences:
      - "(включи|верни) (прошл(ый|ую)|предыдущ(ий|ую)) [трек|песню] [на ]{name}"
      - "переключи [на ](прошл(ый|ую)|предыдущ(ий|ую)) [трек|песню] [на ]{name}"
      - "переключи {name} на (прошл(ый|ую)|предыдущ(ий|ую)) [трек|песню]"
      - "предыдущ(ий|ая) (трек|песня) [на ]{name}"
    example: "Предыдущая песня на TV"
    name_domains:
      - "media_player"
    response: "default"
