---
# HassMediaPrevious - area_only
# example: предыдущий трек в кухне
# slots: {area}

language: "ru"
data:
  - sentences:
      - "(переключи[ на]|включи) (прошл(ый|ую)|предыдущ(ий|ую)) [трек|песню] [в|во|на] {area}"
      - "(включи|верни) [в|во|на] {area} (прошл(ый|ую)|предыдущ(ий|ую)) [трек|песню]"
      - "переключи [в|во|на] {area} [на ](прошл(ый|ую)|предыдущ(ий|ую)) (трек|песню)"
      - "предыдущ(ий|ая) (трек|песня) [в|во|на] {area}"
    example: "Предыдущий трек в кухне"
    response: "default"
