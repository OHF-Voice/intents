language: ru
intents:
  HassVacuumCleanArea:
    data:
      - sentences:
          - "<clean> (в|на) {area}"
        example: Убери в гостиной
        response: predlog
      - sentences:
          - "<clean> {area}"
        example: Убери гостиную
        response: vin
      - sentences:
          - "<clean> <here>"
        example: Убери здесь
        requires_context:
          area:
            slot: true
        response: here
      - sentences:
          - "<clean> {area} {name}"
        example: Пропылесось гостиную роботом
        requires_context:
          domain: vacuum
        response: vin
      - sentences:
          - "запусти {name} <area>"
        example: Запусти робота в гостиной
        response: predlog
        requires_context:
          domain: vacuum
