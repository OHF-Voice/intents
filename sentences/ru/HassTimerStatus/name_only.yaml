---
# HassTimerStatus - name_only
# example: how much time is left on the pizza timer
# slots: {name}

language: "ru"
data:
  - sentences:
      - "сколько [времени] осталось (у таймера|на таймере) {timer_name:name}"
      - "[какое] состояние [у ]таймера {timer_name:name}"
      - "что с таймером {timer_name:name}"
    example: "что с таймером пицца"
    response: "default"
