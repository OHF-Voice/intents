---
# HassTurnOff - name_area
# example: выключи лампу в гостиной
# slots: {name}, {area}

language: "ru"
data:
  # off-able domains
  - sentences:
      - "<turn_off> ([в|во|на] {area} {name}|{name} [в|во|на] {area})"
    example: "выключи лампу в гостиной"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<close> {name} [в|во|на] {area}"
    example: "закрой штору в гостиной"
    name_domains:
      - "cover"
    response: "cover_area"

  # valves
  - sentences:
      - "<close> {name} [в|во|на] {area}"
    example: "закрой кран в гостиной"
    name_domains:
      - "valve"
    response: "valve"
