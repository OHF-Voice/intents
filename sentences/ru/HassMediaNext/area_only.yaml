---
# HassMediaNext - area_only
# example: следующий трек в кухне
# slots: {area}

language: "ru"
data:
  - sentences:
      - "(переключи[ на]|включи) следующ(ий|ую) [трек|песню] [в|во|на] {area}"
      - "включи [в|во|на] {area} следующ(ий|ую) [трек|песню]"
      - "переключи [в|во|на] {area} [[на ]следующ(ий|ую)] (трек|песню)"
      - "следующ(ий|ая) (трек|песня) [в|во|на] {area}"
    example: "Следующий трек в кухне"
    response: "default"
