---
# HassSetVolume - area_only
# example: установи на кухне громкость на 90
# slots:
# - {area}
# - {volume_level}

language: "ru"
data:
  - sentences:
      - "[<set>] громкость [в|во|на] {area} [на ]{volume:volume_level}[[ ]%| процентов]"
      - "[<set>] [в|во|на] {area} громкость [на ]{volume:volume_level}[[ ]%| процентов]"
    example: "Установи на кухне громкость на 90"
    response: "default"
