---
# HassLightSet - name_brightness
# example: установи яркость ночной лампы на 50%
# slots: {name}, {brightness}

language: "ru"
data:
  - sentences:
      - "<set> [яркость|яркость света] {name} [на|до] {brightness}[%| процент[ов|а]]"
    example: "установи яркость ночной лампы на 50%"
    name_domains:
      - "light"
    response: "brightness"
