---
# HassMediaUnpause - area_only
# example: возобнови воспроизведение на кухне
# slots: {area}

language: "ru"
data:
  - sentences:
      - "(возобнови|продолж(и|ай))[ воспроизведение] [в|во|на] {area}"
      - "(сними|снять) [музыку|песню|трек] [в|во|на] {area} с паузы"
    example: "Возобнови воспроизведение на кухне"
    response: "default"
