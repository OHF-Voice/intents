language: "af"
data:
  # off-able domains
  - sentences:
      - "<switch> [<the>] {name} af"
      - "<switch> af [<the>] {name}"
      - "<deactivate> [<the>] {name}"
    example: "skakel die plafonlig af"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<switch> [<the>] {name} <light> af"
      - "<switch> af [<the>] {name} <light>"
      - "<deactivate> [<the>] {name} <light>"
    example: "skakel die speelhoek ligte af"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "maak [<the>] {name} toe"
      - "sluit [<the>] {name} toe"
    example: "maak die skuifdeur toe"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "maak [<the>] {name} toe"
      - "sluit [<the>] {name} toe"
    example: "maak die hoofklep toe"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "sluit [<the>] {name} oop"
      - "<unlock> [<the>] {name}"
    example: "sluit die voordeur oop"
    name_domains:
      - "lock"
    response: "lock"
