---
# HassMediaPrevious - name_only
# example: cançó anterior a la sala
# slots: {name}

language: "ca"
data:
  - sentences:
      - "torna[r] [a] [<reproduir_again>] <anterior> [<preposicio_singular>] [<pronom_singular>]{name}"
      - "<reproduir> <anterior> [<element>] [<preposicio_singular>] [<pronom_singular>]{name}"
      - "pista anterior <preposicio> [<pronom_singular>]{name}"
    example: "cançó anterior a la sala"
    name_domains:
      - "media_player"
    response: "default"
