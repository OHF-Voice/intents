---
# HassMediaPlayerMute - name_only
# example: silencia la tele
# slots: {name}

language: "ca"
data:
  - sentences:
      - "silenci[a|ar] [<pronom>]{name}"
      - "muteja [<pronom>]{name}"
      - "silencia (el |l')(altaveu|dispositiu|reproductor) [<pronom_singular>]{name}"
    example: "silencia la tele"
    name_domains:
      - "media_player"
    response: "default"
