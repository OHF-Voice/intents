---
# HassMediaPlayerUnmute - name_only
# example: dessilencia la tele
# slots: {name}

language: "ca"
data:
  - sentences:
      - "dessilenci[a|ar] [<pronom>]{name}"
      - "treu[-li] [el] (silenci|mute) [a] [<pronom>]{name}"
    example: "dessilencia la tele"
    name_domains:
      - "media_player"
    response: "default"
