---
# HassClimateSetTemperature - temperature_only
# example: posa la temperatura a 20 graus
# slots: {temperature}; context_area: true

language: "ca"
data:
  - sentences:
      - "(posa|puja|[a]baixa)[r|t] [la] <temp> a {temperature} [graus]"
      - "(posa|puja|[a]baixa)[r|t] [la] calefacció a {temperature} [graus]"
      - "(posa|puja|[a]baixa)[r|t] [l']aire [a][condicionat] a {temperature} [graus]"
    example: "posa la temperatura a 20 graus"
    response: "default"
