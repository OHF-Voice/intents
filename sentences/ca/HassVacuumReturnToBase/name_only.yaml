---
# HassVacuumReturnToBase - name_only
# example: torna el Rover a la base
# slots: {name}

language: "ca"
data:
  - sentences:
      - "(torn(a|i)) [<pronom_singular>]{name} [a [la] (base|casa)]"
      - "fes que [<pronom_singular>]{name} ([re]torni|vagi) [a [la] (base|casa)]"
    example: "torna el Rover a la base"
    name_domains:
      - "vacuum"
    response: "default"
