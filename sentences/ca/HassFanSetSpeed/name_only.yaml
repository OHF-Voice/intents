---
# HassFanSetSpeed - name_only
# example: posa el ventilador del sostre al 50%
# slots: {name}, {percentage}

language: "ca"
data:
  - sentences:
      - "<configura> la velocitat [de|del] [<pronom_singular>]{name} (a|al) <fan_speed>"
      - "velocitat [de|del] [<pronom_singular>]{name} (a|al) <fan_speed>"
      - "[<pronom_singular>]{name} (a|al) <fan_speed>"
    example: "posa el ventilador del sostre al 50%"
    name_domains:
      - "fan"
    response: "default"
