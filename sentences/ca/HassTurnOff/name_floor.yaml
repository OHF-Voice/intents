---
# HassTurnOff - name_floor
# example: apaga el llum del sostre de la planta baixa
# slots: {name}, {floor}

language: "ca"
data:
  - sentences:
      - "<apaga> [<pronom_singular>]{name} <in> [planta|pis] {floor}"
    example: "apaga el llum del sostre de la planta baixa"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  - sentences:
      - "<tanca> [<pronom_singular>]{name} <in> [planta|pis] {floor}"
    example: "tanca la persiana de la planta baixa"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<tanca> [<pronom_singular>]{name} <in> [planta|pis] {floor}"
    example: "tanca la vàlvula de la planta baixa"
    name_domains:
      - "valve"
    response: "valve"
