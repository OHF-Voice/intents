---
# HassMediaNext - name_only
# example: següent cançó a la sala
# slots: {name}

language: "ca"
data:
  - sentences:
      - "<seguent> [<element>] [<preposicio_base_singular>] [<pronom_singular>]{name}"
      - "<reproduir> [a|al|a la|la] <seguent> [<element>] [<preposicio_base_singular>] [<pronom_singular>]{name}"
    example: "següent cançó a la sala"
    name_domains:
      - "media_player"
    response: "default"
