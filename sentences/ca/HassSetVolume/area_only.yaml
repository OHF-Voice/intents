---
# HassSetVolume - area_only
# example: posa el volum de la sala al 50%
# slots: {area}, {volume_level}

language: "ca"
data:
  - sentences:
      - "(<pujar>|<baixar>|<configura>) ([el] (volum|so)|[la] veu) [<preposicio_singular>]{area} (a|al) {volume:volume_level}[<percent>]"
    example: "posa el volum de la sala al 50%"
    response: "default"
