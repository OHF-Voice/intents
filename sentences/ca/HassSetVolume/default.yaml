---
# HassSetVolume - default
# example: posa el volum al 50%
# slots: {volume_level}; context_area: true

language: "ca"
data:
  - sentences:
      - "(<pujar>|<baixar>|<configura>) ([el] (volum|so)|[la] veu) (a|al) {volume:volume_level}[<percent>]"
    example: "posa el volum al 50%"
    response: "default"
