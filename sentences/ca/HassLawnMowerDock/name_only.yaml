      - "(atura[r]|para[r]|<cancela>) [<pronom_singular>]{name} [tallagespa]"
      - "fes que [<pronom_singular>]{name} ([re]torni|vagi) [a [la] base]"
    example: "fes que el Clippy torni a la base"
    name_domains:
      - "lawn_mower"
    response: "default"
