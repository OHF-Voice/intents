---
# HassClimateGetTemperature - area_only
# example: quina temperatura fa al dormitori
# slots: {area}

language: "ca"
data:
  - sentences:
      - "quina <temp> fa [<actual>] [<preposicio_singular>]{area}"
      - "quina és la <temp> [<actual>] [<preposicio_singular>]{area}"
      - "(quanta|quina) calor [que] fa [<actual>] [<preposicio_singular>]{area}"
    example: "quina temperatura fa al dormitori"
    response: "default"
