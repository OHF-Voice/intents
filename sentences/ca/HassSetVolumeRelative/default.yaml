---
# HassSetVolumeRelative - default
# example: puja el volum
# slots: {volume_step}; context_area: true

language: "ca"
data:
  # relative direction (up/down)
  - sentences:
      - "{volume_step} [el|la|més] (volum|so|veu)"
      - "(volum|so|veu) {volume_step}"
    example: "puja el volum"
    response: "default"
  # by a percentage (up)
  - sentences:
      - "(puja|apuja|aixeca|augmenta|incrementa)[r|-li] [el|la|més] (volum|so|veu) [per|un|al] {volume_step_up:volume_step}[%| per[ ]cent]"
    example: "puja el volum un 10 per cent"
    response: "default"
  # by a percentage (down)
  - sentences:
      - "(baixa|abaixa|disminueix|redueix)[r|-li] [el|la|més] (volum|so|veu) [per|un|al] {volume_step_down:volume_step}[%| per[ ]cent]"
    example: "baixa el volum un 10 per cent"
    response: "default"
