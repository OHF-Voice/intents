---
# HassSetVolumeRelative - area_only
# example: puja el volum a la sala d'estar
# slots: {area}, {volume_step}

language: "ca"
data:
  # relative direction (up/down)
  - sentences:
      - "{volume_step} [el|la|més] (volum|so|veu) [<preposicio_singular>]{area}"
      - "(volum|so|veu) {volume_step} [<preposicio_singular>]{area}"
    example: "puja el volum a la sala d'estar"
    response: "default"
  # by a percentage (up)
  - sentences:
      - "(puja|apuja|aixeca|augmenta|incrementa)[r|-li] [el|la|més] (volum|so|veu) [<preposicio_singular>]{area} [per|un|al] {volume_step_up:volume_step}[%| per[ ]cent]"
    example: "puja el volum de la sala un 10 per cent"
    response: "default"
  # by a percentage (down)
  - sentences:
      - "(baixa|abaixa|disminueix|redueix)[r|-li] [el|la|més] (volum|so|veu) [<preposicio_singular>]{area} [per|un|al] {volume_step_down:volume_step}[%| per[ ]cent]"
    example: "baixa el volum de la sala un 10 per cent"
    response: "default"
