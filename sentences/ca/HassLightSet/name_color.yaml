---
# HassLightSet - name_color
# example: posa el llum del dormitori de color vermell
# slots: {name}, {color}

language: "ca"
data:
  - sentences:
      - "(<configura>|posa|fes|canvia)[r] [el|la] [color] [de|del|de la|d'] [<pronom_singular>]{name} [a|de color|de] {color}"
    example: "posa el llum del dormitori de color vermell"
    name_domains:
      - "light"
    response: "color"
