---
# HassLightSet - color_only
# example: posa els llums de color vermell
# slots: {color}; context_area: true

language: "ca"
data:
  - sentences:
      - "(<configura>|<engega>) [el|la] [color] [de|del|de la|d'] [tots] <llums> [a|de color|de] {color}"
      - "(posa|fes|canvia)[r] <llums> [de color] {color}"
    example: "posa els llums de color vermell"
    inferred_domain: "light"
    response: "color"
