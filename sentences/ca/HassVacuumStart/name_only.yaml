---
# HassVacuumStart - name_only
# example: engega el Rover
# slots: {name}

language: "ca"
data:
  - sentences:
      - "<engega> [<pronom_singular>]{name} [en marxa]"
      - "(arrenca|pasa)[r] [<pronom_singular>]{name} [en marxa]"
    example: "engega el Rover"
    name_domains:
      - "vacuum"
    response: "default"
