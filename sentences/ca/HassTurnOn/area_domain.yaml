---
# HassTurnOn - area_domain
# example: encén els llums de la cuina
# slots: {area}

language: "ca"
data:
  # lights
  - sentences:
      - "<engega> [tot[e]s] [el|la|els|les] (llum|llums) <in> [<pronom_singular>]{area}"
      - "<obre> [tot[e]s] [el|la|els|les] (llum|llums) <in> [<pronom_singular>]{area}"
    example: "encén els llums de la cuina"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<engega> [tot[e]s] [el|els] ventilador[s] <in> [<pronom_singular>]{area}"
    example: "encén els ventiladors de la cuina"
    inferred_domain: "fan"
    response: "fans_area"
