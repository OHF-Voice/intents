---
# HassTurnOn - name_scene
# example: activa l'escena mode festa
# slots: {name}

language: "ca"
data:
  - sentences:
      - "(activa[r]|posa[r])[-li] [l'escena|l'ambient|el mode] [<pronom_singular>]{name} [escena]"
      - "<engega> [l'escena|el mode] [<pronom_singular>]{name}"
    example: "activa l'escena mode festa"
    name_domains:
      - "scene"
    response: "scene"
