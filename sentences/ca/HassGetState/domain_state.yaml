  - sentences:
      - "<are_any> <lockable> [<is>] {lock_states:state}"
    inferred_domain: "lock"
    example: "consulta estat"
    response: "any"
  - sentences:
      - "<are_all> <lockable> [<is>] {lock_states:state}"
    inferred_domain: "lock"
    example: "consulta estat"
