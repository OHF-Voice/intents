---
# HassGetState - domain_state
# slots: {domain}, {state}

language: "ca"
data:
  # persones
  - sentences:
      - "[que] hi ha algú (a|al|en) {zone:state}"
    example: "hi ha algú a casa"
    inferred_domain: "person"
    response: "any"
  - sentences:
      - "qui hi ha (a|al|en) [el|la] {zone:state}"
    example: "qui hi ha a casa"
    inferred_domain: "person"
    response: "which"

  - sentences:
      - "<are_any> [el|la|els|les] (llum|llums) [<is>] {on_off_states:state}"
    inferred_domain: "light"
    example: "llum"
    response: "any"
  - sentences:
      - "<are_all> [el|la|els|les] (llum|llums) [<is>] {on_off_states:state}"
    inferred_domain: "light"
    example: "llum"
    response: "all"
  - sentences:
      - "<which> [el|la|els|les] (llum|llums) <is> {on_off_states:state}"
    inferred_domain: "light"
    example: "llum"
    response: "which"
  - sentences:
      - "<how_many> [el|la|els|les] (llum|llums) <is> {on_off_states:state}"
    inferred_domain: "light"
    example: "llum"
    response: "how_many"
  - sentences:
      - "<are_any> [el|els] ventilador[s] [<is>] {on_off_states:state}"
    inferred_domain: "fan"
    example: "ventilador"
    response: "any"
  - sentences:
      - "<are_all> [el|els] ventilador[s] [<is>] {on_off_states:state}"
    inferred_domain: "fan"
    example: "ventilador"
    response: "all"
  - sentences:
      - "<which> [el|els] ventilador[s] <is> {on_off_states:state}"
    inferred_domain: "fan"
    example: "ventilador"
    response: "which"
  - sentences:
      - "<how_many> [el|els] ventilador[s] <is> {on_off_states:state}"
    inferred_domain: "fan"
    example: "ventilador"
    response: "how_many"
  - sentences:
      - "<are_any> [el|els] interruptor[s] [<is>] {on_off_states:state}"
    inferred_domain: "switch"
    example: "interruptor"
    response: "any"
  - sentences:
      - "<are_all> [el|els] interruptor[s] [<is>] {on_off_states:state}"
    inferred_domain: "switch"
    example: "interruptor"
    response: "all"
  - sentences:
      - "<which> [el|els] interruptor[s] <is> {on_off_states:state}"
    inferred_domain: "switch"
    example: "interruptor"
