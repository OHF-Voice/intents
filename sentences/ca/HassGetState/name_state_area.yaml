---
# HassGetState - name_state_area
# slots: {name}, {state}, {area}

language: "ca"
data:
  # covers
  - sentences:
      - "<is> [<pronom_singular>]{name} {cover_states:state} [<in>] [<pronom_singular>]{area}"
    example: "està la porta del garatge oberta al garatge"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "<is> [<pronom_singular>]{name} {lock_states:state} [<in>] [<pronom_singular>]{area}"
    example: "està la porta principal bloquejada al garatge"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "<is> [<pronom_singular>]{name} {bs_open_states:state} [<in>] [<pronom_singular>]{area}"
    example: "està la finestra oberta al garatge"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "<is> [<pronom_singular>]{name} {bs_occupancy_states:state} [<in>] [<pronom_singular>]{area}"
    example: "està el sensor ocupat al garatge"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
