---
# HassTurnOff - name_floor
# example: sluk loftslyset på første sal
# slots:
# - {name}
# - {floor}

language: "da"
data:
  - sentences:
      - "<sluk> <navn> <i_på> <etage>"
      - "<stop> <navn> <i_på> <etage>"
    example: "sluk loftslyset på første sal"
    name_domains: "default"
    response: "default"

  - sentences:
      - "<sluk> <navn> <lys> <i_på> <etage>"
    example: "sluk legekrogens lys på første sal"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<dække_luk> <navn> [<dække_ned>] <i_på> <etage>"
    example: "luk skydedøren på første sal"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<luk> <navn> <i_på> <etage>"
    example: "luk hovedhanen på første sal"
    name_domains:
      - "valve"
    response: "valve"
