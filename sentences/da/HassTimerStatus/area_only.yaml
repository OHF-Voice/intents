---
# HassTimerStatus - area_only
# example: how much time is left on the kitchen timer
# slots: {area}

language: "da"
data:
  - sentences:
      - "<område> <timer> status"
      - "status (på|for)[ min] <område> <timer>"
      - "status (på|for)[ min] <timer> <i_på> <område>"
    example: "status på køkkennedtælling"
    response: "default"
