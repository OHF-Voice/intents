      - "<spørg_om_værdi> [den <aktuelle>] temperatur[en] på <navn>"
      - "<spørg_om_værdi> <navn> [<aktuelle>] temperatur"
      - "hvor <koldt_varmt> er <navn>"
    example: "hvad er temperaturen på termostaten"
    name_domains:
      - "climate"
    response: "default"
