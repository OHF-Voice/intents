---
# HassRespond - default
# example: hej

language: "da"
data:
  - sentences:
      - "<hilsen> [home assistant]"
    example: "hej"
    response: "hello"
  - sentences:
      - "<opfanger> du <altid>"
    example: "lytter du altid"
    response: "listening"
  - sentences:
      - "<spørg_om_destination> <mine_data> [hen]"
    example: "hvad sker der med mine data"
    response: "data"
  - sentences:
      - "hvad kan jeg (sige|spørge om)"
      - "<hvilke> <kommandoer> (kan jeg bruge|forstår du)"
    example: "hvad kan jeg sige"
    response: "commands"
  - sentences:
      - "hvem <skabte> dig"
    example: "hvem lavede dig"
    response: "creator"
