---
# HassMediaNext - name_only
# example: næste sang på fjernsynet
# slots: {name}

language: "da"
data:
  - sentences:
      - "[<spring_til>] [<den>] næste <sang> på <navn>"
      - "(<spring> over <denne> <sang>;på <navn>)"
      - "(<spring> <denne> <sang> over;på <navn>)"
    example: "næste sang på fjernsynet"
    name_domains:
      - "media_player"
    response: "default"
