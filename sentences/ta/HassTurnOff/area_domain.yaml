---
# HassTurnOff - area_domain
# example: படுக்கையறை லைட்ஸை ஆஃப் செய்யவும்
# slots: {area}, {domain}

language: "ta"
data:
  # lights
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] [<all>] <light> <turn_off>"
    example: "படுக்கையறை லைட்ஸை ஆஃப் செய்யவும்"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] [<all>] (பங்கா|பங்காவை|பங்காக்கள்|பங்காக்களை|பேன்|பேனை|பேன்ஸ்|விசிறி|விசிறியை|விசிறிகள்|விசிறிகளை) <turn_off>"
    example: "படுக்கையறை பங்காவை ஆஃப் செய்யவும்"
    inferred_domain: "fan"
    response: "fans_area"
