---
# HassTurnOff - name_floor
# example: முதல் தளம் மேசை லாம்பு ஆஃப் செய்யவும்
# slots: {name}, {floor}

language: "ta"
data:
  # off-able domains
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <turn_off>"
    example: "முதல் தளம் மேசை லாம்பு ஆஃப் செய்யவும்"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <close>"
    example: "முதல் தளம் ஸ்லைடிங் கதவு மூடவும்"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <close>"
    example: "முதல் தளம் முதன்மை வால்வு மூடவும்"
    name_domains:
      - "valve"
    response: "valve"
