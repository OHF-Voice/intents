---
# HassTurnOn - name_area
# example: படுக்கையறையில் மேசை லாம்பு ஆன் செய்யவும்
# slots: {name}, {area}

language: "ta"
data:
  # on-able domains
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <turn_on>"
    example: "படுக்கையறையில் மேசை லாம்பு ஆன் செய்யவும்"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <open>"
    example: "வரவேற்பறையில் இடது திரை திறக்கவும்"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <open>"
    example: "சமையலறையில் முதன்மை வால்வு திறக்கவும்"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "{area}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <lock>"
    example: "சமையலறையில் முன் கதவு பூட்டவும்"
    name_domains:
      - "lock"
    response: "lock"
