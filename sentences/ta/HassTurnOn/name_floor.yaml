---
# HassTurnOn - name_floor
# example: முதல் தளம் மேசை லாம்பு ஆன் செய்யவும்
# slots: {name}, {floor}

language: "ta"
data:
  # on-able domains
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <turn_on>"
    example: "முதல் தளம் மேசை லாம்பு ஆன் செய்யவும்"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <open>"
    example: "முதல் தளம் ஸ்லைடிங் கதவு திறக்கவும்"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{floor}[(-இல்|–இல்|இல்)] {name}[(-ஐ|–ஐ|ஐ)] <open>"
    example: "முதல் தளம் முதன்மை வால்வு திறக்கவும்"
    name_domains:
      - "valve"
    response: "valve"
