---
# HassTurnOn - name_scene
# example: பார்ட்டி பயன்முறை காட்சி இயக்கவும்
# slots: {name}

language: "ta"
data:
  - sentences:
      - "{name}[(-ஐ|–ஐ|ஐ)] [(காட்சி|சீன்)] <activate>"
      - "{name} (காட்சி|காட்சியை|சீன்|சீனை) <turn_on>"
    example: "பார்ட்டி பயன்முறை காட்சி இயக்கவும்"
    name_domains:
      - "scene"
    response: "scene"
