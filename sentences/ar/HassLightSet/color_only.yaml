---
# HassLightSet - color_only
# example: set the lights in here to red
# slots:
# - {color}
# context_area: true

language: "ar"
data:
  - sentences:
      - "[<turn>] <color> [<all>] <light> [<here>] [<to>] [ال]{color}"
      - "[<turn>] [<all>] <light> [<here>] [<to>] [<color>] [ال]{color}"
    example: "اضبط لون جميع الاضواء الى احمر"
    inferred_domain: "light"
    response: "color"
