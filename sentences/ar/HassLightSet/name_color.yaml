---
# HassLightSet - name_color
# example: set the overhead light to red
# slots:
# - {name}
# - {color}

language: "ar"
data:
  - sentences:
      - "[<turn>] <color> [ال]{name} [<to>] [ال]{color}"
      - "[<turn>] [ال]{name} [<to>] [<color>] [ال]{color}"
    example: "اضبط لون ضوء المطبخ الرئيسي الى احمر"
    name_domains:
      - "light"
    response: "color"
