---
# HassMediaPlayerUnmute - name_only
# example: إلغاء كتم التلفاز
# slots: {name}

language: "ar"
data:
  - sentences:
      - "<cancel> كتم صوت [<to>][ال]{name}"
      - "<cancel> ([ال]كتم) [الصوت|الموسيقى] [<to>][ال]{name}"
    example: "إلغاء كتم التلفاز"
    name_domains:
      - "media_player"
    response: "default"
