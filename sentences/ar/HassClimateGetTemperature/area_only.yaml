---
# HassClimateGetTemperature - area_only
# example: what is the temperature in the living room
# slots: {area}

language: "ar"
data:
  - sentences:
      - "<what_is> <temp> [<in>] [ال]{area}"
      - "<what_is> (حارة|باردة|دافئة|لطيفة) [<temp>] [<in>] [ال]{area}"
      - "<temp> [ال]{area}"
    example: "ما هي درجة الحرارة في غرفة المعيشة"
    response: "default"
