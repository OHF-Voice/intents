---
# HassGetState - name_state
# example: is the garage door open
# slots:
# - {name}
# - {state}

language: "ar"
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "<is> [ال]{name} {on_off_states:state}"
    example: "هل ضوء المطبخ شغال"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves
  - sentences:
      - "هل [ال]{name} {cover_states:state}"
    example: "هل باب الجراج مفتوح"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks
  - sentences:
      - "هل [ال]{name} {lock_states:state}"
    example: "هل الباب الأمامي مقفول"
    name_domains:
      - "lock"
    response: "one_yesno"
