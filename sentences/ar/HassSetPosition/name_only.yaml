---
# HassSetPosition - name_only
# example: set curtain left to 50%
# slots:
# - {name}
# - {position}

language: "ar"
data:
  - sentences:
      - "<numeric_value_set> [(ارتفاع|علو)] [ال]{name} [<to>] <position>"
    example: "اضبط الستارة اليمنى الى 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
