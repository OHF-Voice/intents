---
# HassSetVolume - name_only
# example: set the TV volume to 90 percent
# slots:
# - {name}
# - {volume_level}

language: "ar"
data:
  - sentences:
      - "(<numeric_value_set>|<turn_up>|<turn_down>) ([<to>][مستوى] [ال]صوت [<to>][ال]{name};[<to>]{volume:volume_level}[[ ]%| <procent>])"
      - "(<numeric_value_set>|<turn_up>|<turn_down>) ([<to>][مستوى] [ال]صوت [<to>]{volume:volume_level}[[ ]%| <procent>];[<to>][ال]{name})"
    example: "اضبط صوت التلفاز إلى 90 بالمئة"
    name_domains:
      - "media_player"
    response: "default"
