---
# HassSetVolume - default
# example: set volume to 90 percent
# slots: {volume_level}
# context_area: true

language: "ar"
data:
  - sentences:
      - "(<numeric_value_set>|<turn_up>|<turn_down>) [مستوى] [ال]صوت [<to>]{volume:volume_level}[[ ]%| <procent>]"
    example: "اضبط مستوى الصوت إلى 90 بالمئة"
    response: "default"
