---
# HassClimateSetTemperature - temperature_only
# example: set the temperature to 30 degrees
# slots: {temperature}
# context_area: true

language: "ar"
data:
  - sentences:
      - "(<numeric_value_set>|<turn>) [ال]حرارة [<here>] [<to>] <temperature>"
      - "(<numeric_value_set>|<turn>) درجة [ال]حرارة [<here>] [<to>] <temperature>"
    example: "اضبط درجة الحرارة على 30"
    response: "default"
