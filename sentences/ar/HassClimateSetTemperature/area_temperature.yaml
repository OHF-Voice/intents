---
# HassClimateSetTemperature - area_temperature
# example: set the bedroom temperature to 30 degrees
# slots:
# - {area}
# - {temperature}

language: "ar"
data:
  - sentences:
      - "(<numeric_value_set>|<turn>) درجة [ال]حرارة [<in>] [ال]{area} [<to>] <temperature>"
    example: "اضبط درجة الحرارة في غرفة النوم على 50"
    response: "default"
