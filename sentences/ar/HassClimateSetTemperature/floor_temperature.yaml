---
# HassClimateSetTemperature - floor_temperature
# example: set the temperature of the main floor to 30 degrees
# slots:
# - {floor}
# - {temperature}

language: "ar"
data:
  - sentences:
      - "(<numeric_value_set>|<turn>) درجة [ال]حرارة [<in>] [الطابق] {floor} [<to>] <temperature>"
    example: "اضبط درجة الحرارة في الطابق الأول على 30"
    response: "default"
