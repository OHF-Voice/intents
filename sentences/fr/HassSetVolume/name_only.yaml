---
# HassSetVolume - name_only
# example: règle la TV à 50%
# slots:
# - {name}
# - {volume_level}

language: fr
data:
  - sentences:
      - "(<regle>|<monte>|<baisse>) [<le>]{name} [à|sur] {volume:volume_level}<pourcent>"
      - "(<regle>|<monte>|<baisse>) [<le>]<volume> [<de>] [<le>]{name} [à|sur] {volume:volume_level}<pourcent>"
    example: "règle la TV à 50%"
    name_domains:
      - "media_player"
    response: "default"
