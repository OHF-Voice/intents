---
# HassGetState - domain_state_area
# slots:
# - {area}
# - {domain}
# - {state}

language: fr
data:
  # ---- lights ----
  - sentences:
      - "<gs_any> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "y a-t-il des lumières allumées dans la cuisine"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<gs_all> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "toutes les lumières sont-elles éteintes dans la cuisine"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<gs_which> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "quelles lumières sont allumées dans la cuisine"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<gs_howmany> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "combien de lumières sont allumées dans la cuisine"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "<gs_any> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "y a-t-il des ventilateurs allumés dans le salon"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "<gs_all> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "tous les ventilateurs sont-ils éteints dans le salon"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<gs_which> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "quels ventilateurs sont allumés dans le salon"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<gs_howmany> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "combien de ventilateurs sont allumés dans le salon"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "<gs_any> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "y a-t-il des interrupteurs allumés dans la cuisine"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "<gs_all> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "tous les interrupteurs sont-ils éteints dans la cuisine"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<gs_which> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "quels interrupteurs sont allumés dans la cuisine"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "<gs_howmany> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{area}"
    example: "combien d'interrupteurs sont allumés dans la cuisine"
    inferred_domain: "switch"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "<gs_any> <serrure> [<estil>] {lock_states:state} <dans> [<le>]{area}"
    example: "y a-t-il des portes déverrouillées dans le couloir"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "<gs_all> <serrure> [<estil>] {lock_states:state} <dans> [<le>]{area}"
    example: "toutes les portes sont-elles verrouillées dans le couloir"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "<gs_which> <serrure> [<estil>] {lock_states:state} <dans> [<le>]{area}"
    example: "quelles portes sont verrouillées dans le couloir"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "<gs_howmany> <serrure> [<estil>] {lock_states:state} <dans> [<le>]{area}"
    example: "combien de portes sont verrouillées dans le couloir"
    inferred_domain: "lock"
    response: "how_many"
