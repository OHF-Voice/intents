    example: "quels ventilateurs sont allumés au premier étage"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<gs_howmany> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "combien de ventilateurs sont allumés au premier étage"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "<gs_any> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "y a-t-il des interrupteurs allumés au premier étage"
