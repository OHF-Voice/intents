---
# HassGetState - domain_state_floor
# slots:
# - {floor}
# - {domain}
# - {state}

language: fr
data:
  # ---- lights ----
  - sentences:
      - "<gs_any> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "y a-t-il des lumières allumées au premier étage"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<gs_all> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "toutes les lumières sont-elles éteintes au premier étage"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<gs_which> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "quelles lumières sont allumées au premier étage"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<gs_howmany> <lumiere> [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "combien de lumières sont allumées au premier étage"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "<gs_any> (ventilateur[s]|ventilo[s]|brasseur[s] d'air) [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "y a-t-il des ventilateurs allumés au premier étage"
    inferred_domain: "fan"
    response: "any"
  - sentences:
