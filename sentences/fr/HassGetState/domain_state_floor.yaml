  - sentences:
      - "<gs_which> (interrupteur[s]|prise[s]) [<estil>] {on_off_states:state} <dans> [<le>]{floor}"
    example: "quels interrupteurs sont allumés au premier étage"
    inferred_domain: "switch"
    response: "which"
  - sentences:
