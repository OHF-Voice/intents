---
# HassGetState - name_only
# slots: {name}

language: fr
data:
  - sentences:
      - "<quel> est [(l'(état|etat)|le statut|la valeur) de] [<le>]{name}"
      - "dans <quel> (état|etat) est [<le>]{name}"
      - "comment (va|est) [<le>]{name}"
      - "donne(-| )moi [(l'(état|etat)|le statut|la valeur) de] [<le>]{name}"
    example: "quelle est la température extérieure"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
