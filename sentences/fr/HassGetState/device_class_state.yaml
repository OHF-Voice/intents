---
# HassGetState - device_class_state
# slots:
# - {domain}
# - {device_class}
# - {state}

language: fr
data:
  # ---- covers (by device class) ----
  - sentences:
      - "<gs_any> {cover_classes:device_class} [<estil>] {cover_states:state}"
    example: "y a-t-il des fenêtres ouvertes"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<gs_all> {cover_classes:device_class} [<estil>] {cover_states:state}"
    example: "toutes les fenêtres sont-elles fermées"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<gs_which> {cover_classes:device_class} [<estil>] {cover_states:state}"
    example: "quelles fenêtres sont ouvertes"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<gs_howmany> {cover_classes:device_class} [<estil>] {cover_states:state}"
    example: "combien de fenêtres sont ouvertes"
    inferred_domain: "cover"
    response: "how_many"
