---
# HassBroadcast - message_only
# slots: {message}

language: fr
data:
  - sentences:
      - "<annonce> [<partout>] {message}"
      - "<annonce> [<partout>] le message [suivant] {message}"
      - "<annonce> [<partout>] (que |qu'){message}"
    example: "annonce que le dîner est prêt"
    response: "default"
