---
# HassSetPosition - name_only
language: fr
data:
  # covers
  - sentences:
      - "<regle> [la position] [<de>] [<le>]{name} [(à|sur)] {position}<pourcent>"
      - "(<ouvre>|<ferme>) [<le>]{name} [à] {position}<pourcent>"
    name_domains:
      - "cover"
    response: "default"

  # valves
  - sentences:
      - "<regle> [la position de] [<le>]{name} à {position}<pourcent>"
      - "(<ouvre>|<ferme>) [<le>]{name} à {position}<pourcent>"
    name_domains:
      - "valve"
    response: "default"
