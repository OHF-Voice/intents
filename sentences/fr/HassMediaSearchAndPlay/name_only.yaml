---
# HassMediaSearchAndPlay - name_only
# example: joue Pink Floyd sur la TV
# slots:
# - {name}
# - {search_query}

language: fr
data:
  - sentences:
      - "(<active>|<mets>) {search_query} sur [<le>]{name}"
      - "(<active>|<mets>) [<le>]<media> {search_query} sur [<le>]{name}"
    example: "joue Pink Floyd sur la TV"
    name_domains:
      - "media_player"
    response: "default"
