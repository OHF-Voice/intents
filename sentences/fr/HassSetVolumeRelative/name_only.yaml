language: "fr"
data:
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> [<de>] [<le>]{name}"
      - "(<monte>|<augmente>) [<le>]{name}"
    slots:
      volume_step: "up"
    name_domains:
      - "media_player"
    response: "default"

  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> [<de>] [<le>]{name}"
      - "(<baisse>|<diminue>) [<le>]{name}"
    slots:
      volume_step: "down"
    name_domains:
      - "media_player"
    response: "default"
