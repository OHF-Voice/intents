---
# HassSetVolumeRelative - name_only
# example: monte le volume de la TV
# slots:
# - {volume_step}
# - {name}

language: fr
data:
  # up
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> [<de>] [<le>]{name}"
      - "(<monte>|<augmente>) [<le>]{name}"
      - "<mets> [<le>]{name} plus (fort|forte|haut|haute)"
    slots:
      volume_step: "up"
    name_domains:
      - "media_player"
    response: "default"

  # down
  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> [<de>] [<le>]{name}"
      - "(<baisse>|<diminue>) [<le>]{name}"
      - "<mets> [<le>]{name} moins (fort|forte|bas|basse)"
    slots:
      volume_step: "down"
    name_domains:
      - "media_player"
    response: "default"
