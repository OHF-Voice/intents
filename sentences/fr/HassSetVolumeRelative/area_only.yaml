language: "fr"
data:
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> <dans> [<le>]{area}"
    slots:
      volume_step: "up"
    response: "default"

  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> <dans> [<le>]{area}"
    slots:
      volume_step: "down"
    response: "default"
