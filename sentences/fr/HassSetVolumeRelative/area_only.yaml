---
# HassSetVolumeRelative - area_only
# example: monte le volume dans la cuisine
# slots:
# - {volume_step}
# - {area}

language: fr
data:
  # up
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> <dans> [<le>]{area}"
    slots:
      volume_step: "up"
    response: "default"

  # down
  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> <dans> [<le>]{area}"
    slots:
      volume_step: "down"
    response: "default"
