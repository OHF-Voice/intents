---
# HassSetVolumeRelative - default
# example: monte le volume
# slots: {volume_step}
# context_area: true

language: fr
data:
  # up
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> [<ici>]"
      - "plus (fort|forte|haut|haute) [<ici>]"
      - "les watts [<ici>]"
    slots:
      volume_step: "up"
    response: "default"

  # down
  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> [<ici>]"
      - "moins (fort|forte|bas|basse) [<ici>]"
    slots:
      volume_step: "down"
    response: "default"
