language: "fr"
data:
  - sentences:
      - "(<augmente>|<monte>) [<le>]<volume> [<ici>]"
      - "[tourne] [<le>]<volume> vers le haut [<ici>]"
    slots:
      volume_step: "up"
    requires_context:
      area:
        slot: true
    response: "default"

  - sentences:
      - "(<diminue>|<baisse>) [<le>]<volume> [<ici>]"
      - "[tourne] [<le>]<volume> vers le bas [<ici>]"
    slots:
      volume_step: "down"
    requires_context:
      area:
        slot: true
    response: "default"
