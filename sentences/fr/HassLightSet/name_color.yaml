---
# HassLightSet - name_color
language: fr
data:
  - sentences:
      - "<regle> la couleur [<de>] [<le>]{name} [en] {color}"
      - "(<regle>|<allume>) [<le>]{name} [avec la couleur | de couleur | en] {color}"
    name_domains:
      - "light"
    example: "règle la couleur de la lampe de chevet en rouge"
    response: "color"
