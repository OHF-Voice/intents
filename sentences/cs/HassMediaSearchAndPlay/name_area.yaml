---
# HassMediaSearchAndPlay - name_area
# example: přehraj Bylo nás pět na TV v kuchyni
# slots:
# - {name}
# - {area}
# - {search_query}

language: "cs"
data:
  - sentences:
      - "[s]pusť {search_query} (v|ve|na) {name} <area>"
      - "[pře]hr(e|a)j {search_query} (v|ve|na) {name} <area>"
    example: "přehraj Bylo nás pět na TV v kuchyni"
    name_domains:
      - "media_player"
    response: "default"
