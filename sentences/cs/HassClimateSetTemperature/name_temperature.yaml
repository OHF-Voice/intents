      - "(<nastavit>|<zvysit>|<ztlumit>|<zmenit>|<upravit>) teplotu {name} na <teplota>"
    example: "nastav teplotu termostatu na 20 stupňů"
    name_domains:
      - "climate"
    response: "default"
