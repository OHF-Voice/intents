---
# HassSetVolume - area_only
# example: nastav hlasitost v obýváku na 50 %
# slots:
# - {area}
# - {volume_level}

language: "cs"
data:
  - sentences:
      - "([(<nastavit>|<zvysit>|<ztlumit>|<zmenit>|<upravit>)] hlasitost;<area>) na <volume>"
    example: "nastav hlasitost v obýváku na 50 %"
    response: "default"
