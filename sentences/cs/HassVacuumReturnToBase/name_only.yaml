---
# HassVacuumReturnToBase - name_only
# example: pošli vysavač na základnu
# slots: {name}

language: "cs"
data:
  - sentences:
      - "(vrať|vrátit) {name}[ ][na základnu|domů|do doku]"
      - "(pošli|poslat) {name} (na základnu|domů|do doku)"
    example: "pošli vysavač na základnu"
    name_domains:
      - "vacuum"
    response: "default"
