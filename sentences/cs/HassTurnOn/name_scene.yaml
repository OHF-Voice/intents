---
# HassTurnOn - name_scene
# example: aktivuj scénu párty
# slots: {name}

language: "cs"
data:
  - sentences:
      - "(<aktivovat>|<zapnout>) [scénu] {name}"
      - "(<zmenit>|<prejit>) (scénu;na) {name}"
    example: "aktivuj scénu párty"
    name_domains:
      - "scene"
    response: "scene"
