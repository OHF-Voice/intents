language: eu
data:
  # off-able domains
  - sentences:
      - "<itzali> {name}"
      - "{name} <itzali>"
    example: "itzali logelako lanpara"
    name_domains:
      - light
      - switch
      - fan
      - media_player
      - input_boolean
    response: default

  # covers
  - sentences:
      - "(itxi|jaitsi) {name}"
      - "{name} (itxi|jaitsi)"
    example: "itxi egongelako pertsiana"
    name_domains:
      - cover
    response: cover

  # valves
  - sentences:
      - "(itxi|jaitsi) {name}"
      - "{name} (itxi|jaitsi)"
    example: "itxi ur balbula"
    name_domains:
      - valve
    response: valve

  # locks
  - sentences:
      - "(ireki|desblokeatu) {name}"
      - "{name} (ireki|desblokeatu)"
    example: "ireki sarrerako atea"
    name_domains:
      - lock
    response: lock
