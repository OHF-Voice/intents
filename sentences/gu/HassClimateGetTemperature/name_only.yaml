---
# HassClimateGetTemperature - name_only
# example: ઓફિસ થર્મોસ્ટેટ નું તાપમાન કેટલું છે
# slots: {name}

language: "gu"
data:
  - sentences:
      - "{name} [(નું | નુ | માં)] [હમણાં] <temp> (કેટલું | શું) છે"
      - "{name} [માં] કેટલી (ઠંડી | ગરમી) છે"
      - "{name} કેટલો (ઠંડો | ગરમ) છે"
      - "{name} કેટલું (ઠંડુ | ગરમ) છે"
      - "{name} [(નું | નુ)] <temp> બતાવો"
    example: "ઓફિસ થર્મોસ્ટેટ નું તાપમાન કેટલું છે"
    name_domains:
      - "climate"
    response: "default"
