---
# HassTurnOff - area_domain
# example: રસોડા ની લાઈટ બંધ કરો
# slots: {area}, {domain}

language: "gu"
data:
  # lights
  - sentences:
      - "{area} [ની | ના | માં] [બધી | બધા | તમામ] <light> <bandh>"
