---
# HassClimateSetTemperature - name_temperature
# example: રસોડા નું થર્મોસ્ટૅટ ને 24 ડિગ્રી પર સેટ કરો
# slots: {name}, {temperature}

language: "gu"
data:
  - sentences:
      - "{name} (માં | નું) <temp> {temperature} [ડિગ્રી] [પર] [સેટ] કરો"
      - "{name} ને {temperature} [ડિગ્રી] [પર] [સેટ] કરો"
    example: "રસોડા નું થર્મોસ્ટૅટ ને 24 ડિગ્રી પર સેટ કરો"
    name_domains:
      - "climate"
    response: "default"
