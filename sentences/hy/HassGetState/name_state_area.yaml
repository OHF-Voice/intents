---
# HassGetState - name_state_area
# example: is the garage door open in the garage
# slots: {name}, {state}, {area}

language: hy
data:
  # covers
  - sentences:
      - "[արդյոք] {name}[(ը|ն)] {cover_states:state} {area}[ում]"
    example: "բացված է ավտոտնակի դուռը ավտոտնակում"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "[արդյոք] {name}[(ը|ն)] {lock_states:state} {area}[ում]"
    example: "կողպված է մուտքի դուռը միջանցքում"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "[արդյոք] {name}[(ը|ն)] {bs_open_states:state} {area}[ում]"
    example: "բացված է լուսամուտը ննջասենյակում"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "[արդյոք] {name}[(ը|ն)] {bs_occupancy_states:state} {area}[ում]"
    example: "զբաղված է սենսորը գրասենյակում"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
