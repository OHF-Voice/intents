---
# HassGetState - device_class_state_floor
# example: are all the windows closed on the second floor
# slots: {floor}, {domain}, {device_class}, {state}

language: hy
data:
  # ---- covers (by device class) ----
  - sentences:
      - "[որևէ] {floor}[ի] {cover_classes:device_class} {cover_states:state} <exists>"
      - "<exists> [որևէ] {cover_classes:device_class} {cover_states:state} {floor}[ում]"
    example: "որևէ պատուհան բաց է երկրորդ հարկում"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<all> {floor}[ի] {cover_classes:device_class} {cover_states:state} <is>"
      - "<all> {cover_classes:device_class} {cover_states:state} <is> {floor}[ում]"
    example: "բոլոր պատուհանները փակ են երկրորդ հարկում"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {floor}[ի] {cover_classes:device_class} <is> {cover_states:state}"
      - "<which> {cover_classes:device_class} <is> {cover_states:state} {floor}[ում]"
    example: "որ պատուհաններն են բաց երկրորդ հարկում"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {floor}[ի] {cover_classes:device_class} <is> {cover_states:state}"
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} {floor}[ում]"
    example: "քանի պատուհան է բաց երկրորդ հարկում"
    inferred_domain: "cover"
    response: "how_many"
