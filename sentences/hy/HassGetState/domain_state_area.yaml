---
# HassGetState - domain_state_area
# example: which lights are on in the kitchen
# slots: {area}, {domain}, {state}

language: hy
data:
  # ---- lights ----
  - sentences:
      - "[որևէ] {area}[ի] <light> {on_off_states:state} <exists>"
      - "<exists> [որևէ] <light> {on_off_states:state} {area}[ում]"
    example: "որևէ լույս միացված է խոհանոցում կա"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<all> {area}[ի] <light> {on_off_states:state}"
      - "<all> <light> {on_off_states:state} {area}[ում]"
    example: "բոլոր լույսերը միացված են խոհանոցում"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> {area}[ի] <light> <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} {area}[ում]"
    example: "որ լույսերն են միացված խոհանոցում"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> {area}[ի] <light> <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} {area}[ում]"
    example: "քանի լույս է միացված խոհանոցում"
    inferred_domain: "light"
    response: "how_many"

