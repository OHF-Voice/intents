---
# HassLightSet - floor_color
# example: set the main floor to red
# slots: {floor}, {color}, {domain}

language: hy
data:
  - sentences:
      - "[<set>] {floor}[ի] [գույնը] [դարձրու] {color}"
      - "[<set>] {floor}[ի] <light> [դարձրու] {color}"
    example: "դարձրու առաջին հարկի լույսերը կարմիր"
    inferred_domain: "light"
    response: "color"
