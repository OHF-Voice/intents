---
# HassLightSet - color_only
# example: set the lights in here to red
# slots: {color}, {domain}
# context_area: true

language: hy
data:
  - sentences:
      - "[<set>] [<all>] <light> [<here>] [դարձրու] {color}"
      - "[<set>] <light> գույնը [դարձրու] {color}"
    example: "դարձրու լույսերը կարմիր"
    inferred_domain: "light"
    response: "color"
