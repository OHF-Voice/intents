---
# HassLightSet - area_color
# example: set the living room to red
# slots: {area}, {color}, {domain}

language: hy
data:
  - sentences:
      - "[<set>] {area}[ի] [գույնը] [դարձրու] {color}"
      - "[<set>] {area}[ի] <light> [դարձրու] {color}"
    example: "դարձրու հյուրասենյակի լույսերը կարմիր"
    inferred_domain: "light"
    response: "color"
