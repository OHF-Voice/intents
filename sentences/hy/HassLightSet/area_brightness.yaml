---
# HassLightSet - area_brightness
# example: set the living room brightness to 50%
# slots: {area}, {brightness}, {domain}

language: hy
data:
  - sentences:
      - "[<set>] {area}[ի] պայծառությունը [դարձրու] {brightness}[ %| տոկոս]"
      - "[<set>] պայծառությունը {area}[ում] {brightness}[ %| տոկոս]"
      - "[<set>] {area}[ի] պայծառությունը {brightness_level:brightness}"
    example: "դիր հյուրասենյակի պայծառությունը 50 տոկոս"
    inferred_domain: "light"
    response: "brightness"
