---
# HassLightSet - name_color
# example: set the overhead light to red
# slots: {name}, {color}

language: hy
data:
  - sentences:
      - "[<set>] {name}[(ը|ն)] [գույնը] [դարձրու] {color}"
      - "[<set>] {name}[(ի)] գույնը {color}"
    example: "դարձրու առաստաղի լույսը կարմիր"
    name_domains:
      - "light"
    response: "color"
