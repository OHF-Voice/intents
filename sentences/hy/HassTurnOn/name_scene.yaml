---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: hy
data:
  - sentences:
      - "ակտիվացրու {name}[(ը|ն)] [տեսարան[ը]]"
      - "միացրու {name} տեսարան[ը]"
      - "անցիր {name} տեսարան[ին]"
    example: "ակտիվացրու տրամադրության տեսարանը"
    name_domains:
      - "scene"
    response: "scene"
