---
# HassTurnOff - area_domain
# example: turn off the lights in the kitchen
# slots: {area}, {domain}

language: hy
data:
  # lights
  - sentences:
      - "<turn_off> [<all>] <light> {area}[ում]"
      - "<turn_off> [<all>] {area}[ի] <light>"
      - "[<all>] {area}[ի] <light> անջատիր"
      - "ապաակտիվացրու [<all>] {area}[ի] <light>"
    example: "անջատիր լույսերը խոհանոցում"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn_off> [<all>] <fan> {area}[ում]"
      - "<turn_off> [<all>] {area}[ի] <fan>"
      - "[<all>] {area}[ի] <fan> անջատիր"
      - "ապաակտիվացրու [<all>] {area}[ի] <fan>"
    example: "անջատիր օդափոխիչները խոհանոցում"
    inferred_domain: "fan"
    response: "fans_area"
