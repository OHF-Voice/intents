---
# HassTurnOff - domain_all
# example: turn off all the lights in the house
# slots: {domain}
# context_area: false

language: hy
data:
  - sentences:
      - "<turn_off> <all> <light> <everywhere>"
      - "<all> <light> անջատիր <everywhere>"
      - "ապաակտիվացրու <all> <light> <everywhere>"
    example: "անջատիր բոլոր լույսերը ամբողջ տանը"
    inferred_domain: "light"
    response: "light_all"
