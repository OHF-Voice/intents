      - "(հայտարարի[ր]|հայտարարել|տարածի[ր]|տարածել|ասա|ասել|հաղորդի[ր]|հաղորդել) ամեն տեղ [որ] {message}"
    example: "հայտարարիր որ ընթրիքը պատրաստ է"
    response: "default"
