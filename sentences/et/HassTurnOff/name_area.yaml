---
# HassTurnOff - name_area
# example: lülita välja köögi laelamp
# slots:
# - {name}
# - {area}

language: "et"
data:
  # off-able domains
  - sentences:
      - "<turn_off> [<the>] {area} [<the>] {name}"
      - "lülita [<the>] {area} [<the>] {name} välja"
      - "[<the>] {area} [<the>] {name} välja"
    example: "lülita välja köögi laelamp"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light/lamp" word
  - sentences:
      - "<turn_off> [<the>] {area} [<the>] {name} <light>"
    example: "lülita välja köögi mängunurga tuled"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<close> [<the>] {area} [<the>] {name}"
    example: "sulge elutoa vasak kardin"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> [<the>] {area} [<the>] {name}"
    example: "sulge köögi peakraan"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "ava lukk [<the>] {area} [<the>] {name}"
    example: "ava köögi esiukse lukk"
    name_domains:
      - "lock"
    response: "lock"
