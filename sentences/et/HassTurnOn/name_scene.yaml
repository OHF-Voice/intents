---
# HassTurnOn - name_scene
# example: aktiveeri stseen meeleolu valgustus
# slots: {name}

language: "et"
data:
  - sentences:
      - "aktiveeri [<the>] {name} [stseen]"
      - "[<the>] {name} [stseen] sisse"
      - "lülita sisse [<the>] {name} stseen"
      - "(vaheta|lülitu) [<the>] {name} stseenile"
    example: "aktiveeri stseen meeleolu valgustus"
    name_domains:
      - "scene"
    response: "scene"
