---
# HassTurnOn - domain_only
# example: lülita siin tuled sisse
# context_area: true

language: "et"
data:
  # lights
  - sentences:
      - "<turn_on> [(<all>|<the>)] [<here>] <light> [<here>]"
      - "lülita [(<all>|<the>)] [<here>] <light> [<here>] sisse"
      - "[(<all>|<the>)] [<here>] <light> [<here>] põlema"
    example: "lülita siin tuled sisse"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn_on> [(<all>|<the>)] [<here>] (ventilaator|ventilaatorid) [<here>]"
      - "lülita [(<all>|<the>)] [<here>] (ventilaator|ventilaatorid) [<here>] sisse"
    example: "lülita ventilaatorid sisse"
    inferred_domain: "fan"
    response: "fans_area"
