language: sk
data:
  - sentences:
      - "(<turn_on>|<turn_on_light>) {name} <floor>"
    name_domains: "default"
    response: default
  - sentences:
      - "(<open_door>|<open_curtain>) {name} <floor>"
    name_domains:
      - "cover"
    response: cover
  - sentences:
      - "<open_valve> [ventil] {name} <floor>"
    name_domains:
      - "valve"
    response: valve
