language: sk
data:
  # cover (rolety, žalúzie, závesy ...)
  - sentences:
      - "(<close_curtain>|<open_curtain>|<set>) [(pozíciu|(ná|s)klon|uhol|polohu)] {name} [na] <position>"
    name_domains:
      - "cover"
    response: default
  # valve (ventily, uzávery, rozstrekovače ...)
  - sentences:
      - "(<open_valve>|<close_valve>|<set>) [(pozíciu|polohu)] {name} [na] <position>"
    name_domains:
      - "valve"
    response: default
