language: sk
data:
  - sentences:
      - "(<turn_off>|<turn_off_light>) {name} <floor>"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: default
  - sentences:
      - "(<close_door>|<close_curtain>) {name} <floor>"
    name_domains:
      - "cover"
    response: cover
  - sentences:
      - "<close_valve> [ventil] {name} <floor>"
    name_domains:
      - "valve"
    response: valve
