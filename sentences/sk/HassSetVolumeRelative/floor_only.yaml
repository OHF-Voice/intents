language: sk
data:
  - sentences:
      - "(<floor>;{volume_step} (hlasitosť|zvuk|hlas))"
    example: "zvýš hlasitosť na prvom poschodí"
    response: default
  - sentences:
      - "((<floor>;(zvýš[iť]|prida(j|ť)) hlasitosť);o {volume_step_up:volume_step}[%| percent[o|á]])"
    example: "zvýš hlasitosť na prvom poschodí o 20 percent"
    response: default
  - sentences:
      - "((<floor>;zníž[iť] hlasitosť);o {volume_step_down:volume_step}[%| percent[o|á]])"
    example: "zníž hlasitosť na prvom poschodí o 20 percent"
    response: default
