---
# HassTurnOff - domain_only
# example: چراغ‌ها را خاموش کن
# context_area: true

language: "fa"
data:
  # lights
  - sentences:
      - "[(همه|تمام|تمامی) [ی]] <light> [(را|رو)] <turn_off>"
    example: "چراغ‌ها را خاموش کن"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[(همه|تمام|تمامی) [ی]] <fan> [(را|رو)] <turn_off>"
    example: "پنکه‌ها را خاموش کن"
    inferred_domain: "fan"
    response: "fans_area"
