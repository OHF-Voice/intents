---
# HassTurnOff - name_only
# example: {name} را خاموش کن
# slots: {name}

language: "fa"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "{name} [(را|رو)] <turn_off>"
    example: "چراغ اتاق خواب را خاموش کن"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "{name} [(را|رو)] <close>"
    example: "در کشویی را ببند"
    name_domains:
      - "cover"
    response: "cover"
