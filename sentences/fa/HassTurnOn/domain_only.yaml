---
# HassTurnOn - domain_only
# example: چراغ‌ها را روشن کن
# context_area: true

language: "fa"
data:
  # lights
  - sentences:
      - "[(همه|تمام|تمامی) [ی]] <light> [(را|رو)] <turn_on>"
    example: "چراغ‌ها را روشن کن"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[(همه|تمام|تمامی) [ی]] <fan> [(را|رو)] <turn_on>"
    example: "پنکه‌ها را روشن کن"
    inferred_domain: "fan"
    response: "fans_area"
