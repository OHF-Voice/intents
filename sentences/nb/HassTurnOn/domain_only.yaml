language: "nb"
data:
  # lights
  - sentences:
      - "<turn_on> [(<all>|den)] <light> [<here>]"
      - "<activate> [(<all>|den)] <light> [<here>]"
      - "[(<all>|den)] <light> på [<here>]"
    example: "skru på lysene her inne"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn_on> [(<all>|den)] vifte[r|n[e]] [<here>]"
      - "<activate> [(<all>|den)] vifte[r|n[e]] [<here>]"
      - "[(<all>|den)] vifte[r|n[e]] på [<here>]"
    example: "skru på viftene"
    inferred_domain: "fan"
    response: "fans_area"
