language: "nb"
data:
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state}"
    example: "er noen vinduer åpne"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state}"
    example: "er alle vinduene lukket"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} er {cover_states:state}"
    example: "hvilke vinduer er åpne"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} er {cover_states:state}"
    example: "hvor mange vinduer er åpne"
    inferred_domain: "cover"
    response: "how_many"
