language: "nb"
data:
  # lights
  - sentences:
      - "<are_any> [den ]{area} <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [<in>] [den ]{area}"
    example: "er noen lys på på kjøkkenet"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> [den ]{area} <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [<in>] [den ]{area}"
    example: "er alle kjøkkenlysene av"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> [den ]{area} <light> er {on_off_states:state}"
      - "<which> <light> er {on_off_states:state} [<in>] [den ]{area}"
    example: "hvilke lys er på på kjøkkenet"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> [den ]{area} <light> er {on_off_states:state}"
      - "<how_many> <light> er {on_off_states:state} [<in>] [den ]{area}"
    example: "hvor mange lys er på på kjøkkenet"
    inferred_domain: "light"
    response: "how_many"

