language: "nb"
data:
  # lights
  - sentences:
      - "<are_any> [den ]{floor}[ etasje[n]] <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [<in>] [den ]{floor}[ etasje[n]]"
    example: "er noen lys på i første etasje"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> [den ]{floor}[ etasje[n]] <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [<in>] [den ]{floor}[ etasje[n]]"
    example: "er alle kjøkkenlysene av"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> [den ]{floor}[ etasje[n]] <light> er {on_off_states:state}"
      - "<which> <light> er {on_off_states:state} [<in>] [den ]{floor}[ etasje[n]]"
    example: "hvilke lys er på i første etasje"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> [den ]{floor}[ etasje[n]] <light> er {on_off_states:state}"
