language: "nb"
data:
  - sentences:
      - "<is> [den ]{name} {on_off_states:state}"
    example: "er kjøkkenlyset på"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  - sentences:
      - "<is> [den ]{name} {cover_states:state}"
    example: "er garasjedøren åpen"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  - sentences:
      - "<is> [den ]{name} {lock_states:state}"
    example: "er inngangsdøren låst"
    name_domains:
      - "lock"
    response: "one_yesno"

  - sentences:
      - "<is> [den ]{name} {bs_open_states:state}"
    example: "er terrassedøren åpen"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  - sentences:
      - "<is> [den ]{name} {bs_occupancy_states:state}"
    example: "er kontorsensoren detektert"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
