language: ga
data:
  # off-able domains
  - sentences:
      - "<turn_off> [<the>] {name} <in> [<the>] {area}"
      - "cuir [<the>] {name} <in> [<the>] {area} as"
    example: "múch an solas uachtair sa chistin"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn_off> [<the>] {name} <light> <in> [<the>] {area}"
    example: "múch soilse an chúinne súgartha sa chistin"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<close> [<the>] {name} <in> [<the>] {area}"
    example: "dún an cuirtín clé sa seomra suí"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> [<the>] {name} <in> [<the>] {area}"
    example: "dún an príomhchomhla sa chistin"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "díghlasáil [<the>] {name} <in> [<the>] {area}"
    example: "díghlasáil an doras tosaigh sa chistin"
    name_domains:
      - "lock"
    response: "lock"
