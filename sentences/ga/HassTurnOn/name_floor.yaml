language: ga
data:
  # on-able domains
  - sentences:
      - "<turn_on> [<the>] {name} <in> [<the>] {floor}"
      - "cuir [<the>] {name} <in> [<the>] {floor} ar siúl"
      - "<activate> [<the>] {name} <in> [<the>] {floor}"
    example: "las an solas uachtair ar an gcéad urlár"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn_on> [<the>] {name} <light> <in> [<the>] {floor}"
    example: "las soilse an chúinne súgartha ar an gcéad urlár"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<open> [<the>] {name} <in> [<the>] {floor}"
    example: "oscail an doras sleamhnáin ar an gcéad urlár"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> [<the>] {name} <in> [<the>] {floor}"
    example: "oscail an príomhchomhla ar an gcéad urlár"
    name_domains:
      - "valve"
    response: "valve"
