language: ga
data:
  # on-able domains
  - sentences:
      - "<turn_on> [<the>] {name}"
      - "cuir [<the>] {name} ar siúl"
      - "<activate> [<the>] {name}"
    example: "las an solas uachtair"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn_on> [<the>] {name} <light>"
      - "cuir [<the>] {name} <light> ar siúl"
    example: "las soilse an chúinne súgartha"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<open> [<the>] {name}"
    example: "oscail an doras sleamhnáin"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> [<the>] {name}"
    example: "oscail an príomhchomhla"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "cuir [<the>] {name} faoi ghlas"
    example: "cuir an doras tosaigh faoi ghlas"
    name_domains:
      - "lock"
    response: "lock"
