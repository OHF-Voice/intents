language: ga
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "<is> [<the>] {name} {on_off_states:state}"
    example: "an bhfuil solas na cistine ar siúl"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves (open/closed/...)
  - sentences:
      - "<is> [<the>] {name} {cover_states:state}"
    example: "an bhfuil doras an gharáiste oscailte"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks (locked/unlocked)
  - sentences:
      - "<is> [<the>] {name} {lock_states:state}"
    example: "an bhfuil an doras tosaigh faoi ghlas"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings (open/closed)
  - sentences:
      - "<is> [<the>] {name} {bs_open_states:state}"
    example: "an bhfuil doras an phaitió oscailte"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "<is> [<the>] {name} {bs_occupancy_states:state}"
    example: "an bhfuil braiteoir na hoifige áitithe"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
