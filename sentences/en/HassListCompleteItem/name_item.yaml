---
# HassListCompleteItem - name_item
# example: check off take out the trash from my chores list
# slots:
# - {item}
# - {name}

language: "en"
data:
  - sentences:
      - "(check|complete) (off;{todo_list_item:item}) (from|on|in) [my|the] {name} [list]"
      - "(check|complete) {todo_list_item:item} (off|from|on|in) [my|the] {name} [list]"
    example: "check off take out the trash from my chores list"
    name_domains:
      - "todo"
    response: "item_completed"
