---
# HassMediaUnpause - area_only
# example: resume music in the living room
# slots: {area}

language: "en"
data:
  - sentences:
      - "(unpause|resume) [[the|my] (music|[tv] show[s]|media [player[s]])] [in] [<the>] {area}"
      - "(unpause|resume) [<the>] {area} (music|[tv] show[s]|media [player[s]])"
    example: "resume music in the living room"
    response: "default"
