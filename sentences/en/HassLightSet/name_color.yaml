---
# HassLightSet - name_color
# example: set the bedroom lamp color to red
# slots:
# - {name}
# - {color}

language: "en"
data:
  - sentences:
      - "[<set>] [<the>] {name} [color] [to] {color}"
      - "[<set>] [[the] color of] [<the>] {name} to {color}"
    example: "set the bedroom lamp color to red"
    name_domains:
      - "light"
    response: "color"
