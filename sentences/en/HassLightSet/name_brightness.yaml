---
# HassLightSet - name_brightness
# example: set the bedroom lamp brightness to 50%
# slots:
# - {name}
# - {brightness}

language: "en"
data:
  - sentences:
      - "[<numeric_value_set>] [<the>] {name} brightness [to] {brightness}[([ ]%)| percent]"
      - "[<numeric_value_set>] [the] brightness [of] [<the>] {name} [to] {brightness}[([ ]%)| percent]"
      - "[<numeric_value_set>] [<the>] {name} [to] {brightness}[([ ]%)| percent] [brightness]"
      - "[<numeric_value_set>] [<the>] {name} brightness to [the] {brightness_level:brightness}"
      - "[<numeric_value_set>] [the] brightness of [<the>] {name} to [the] {brightness_level:brightness}"
      - "[<numeric_value_set>] [<the>] {name} [to] [the] {brightness_level:brightness} brightness"
    example: "set the bedroom lamp brightness to 50%"
    name_domains:
      - "light"
    response: "brightness"
