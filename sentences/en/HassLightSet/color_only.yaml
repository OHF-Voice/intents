---
# HassLightSet - color_only
# example: make the lights red
# slots: {color}
# context_area: true

language: "en"
data:
  - sentences:
      - "[<set>] [[the] color of] [(<all>|<the>)] <light> [to] {color}"
      - "[<set>] [[the] color of] [(<all>|<the>)] <light> ([in] here;[to] {color})"
    example: "make the lights red"
    inferred_domain: "light"
    response: "color"
