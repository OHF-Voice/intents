---
# HassLightSet - floor_color
# example: set the first floor color to red
# slots:
# - {floor}
# - {color}

language: "en"
data:
  - sentences:
      - "[<set>] [<the>] {floor} [floor] [color] [to] {color}"
    example: "set the first floor color to red"
    inferred_domain: "light"
    response: "color"
