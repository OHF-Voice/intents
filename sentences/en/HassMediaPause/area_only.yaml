---
# HassMediaPause - area_only
# example: pause music in the living room
# slots: {area}

language: "en"
data:
  - sentences:
      - "pause [[the|my] (music|[tv] show[s]|media [player[s]])] [in] [<the>] {area}"
      - "pause [<the>] {area} (music|[tv] show[s]|media [player[s]])"
    example: "pause music in the living room"
    response: "default"
