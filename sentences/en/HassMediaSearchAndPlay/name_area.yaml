---
# HassMediaSearchAndPlay - name_area
# example: play The Office on the TV in the kitchen
# slots:
# - {name}
# - {area}
# - {search_query}

language: "en"
data:
  - sentences:
      - "play {search_query} on [<the>] {name} in [<the>] {area}"
    example: "play The Office on the TV in the kitchen"
    name_domains:
      - "media_player"
    response: "default"
