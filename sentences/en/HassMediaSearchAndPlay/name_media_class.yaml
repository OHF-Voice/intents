---
# HassMediaSearchAndPlay - name_media_class
# example: play the track Bohemian Rhapsody on the TV
# slots:
# - {name}
# - {search_query}
# - {media_class}

language: "en"
data:
  - sentences:
      - "play [the] {media_class} {search_query} on [<the>] {name}"
    example: "play the track Bohemian Rhapsody on the TV"
    name_domains:
      - "media_player"
    response: "default"
