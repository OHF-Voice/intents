---
# HassMediaSearchAndPlay - name_only
# example: play The Office on the TV
# slots:
# - {name}
# - {search_query}

language: "en"
data:
  - sentences:
      - "play {search_query} on [<the>] {name}"
    example: "play The Office on the TV"
    name_domains:
      - "media_player"
    response: "default"
