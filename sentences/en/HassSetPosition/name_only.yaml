---
# HassSetPosition - name_only
# example: set curtain left to 50%
# slots:
# - {name}
# - {position}

language: "en"
data:
  - sentences:
      - "(<numeric_value_set>|<open>|<close>) [<the>] {name} [position] to {position}[([ ]%)| percent]"
    example: "set curtain left to 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
