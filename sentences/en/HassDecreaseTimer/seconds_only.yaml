---
# HassDecreaseTimer - seconds_only

language: "en"
data:
  - sentences:
      - "<timer_remove> {timer_seconds:seconds}( |-)second[s] (from|off) [the|my] timer"
      - "decrease [the|my] timer by {timer_seconds:seconds}( |-)second[s]"
      - "<timer_remove> {timer_half:seconds} a minute[s] (from|off) [the|my] timer"
      - "decrease [the|my] timer by {timer_half:seconds} a minute[s]"
    example: "remove 30 seconds from timer"
    response: "default"
    speech_to_phrase: true
