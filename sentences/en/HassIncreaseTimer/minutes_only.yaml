---
# HassIncreaseTimer - minutes_only

language: "en"
data:
  - sentences:
      - "add {timer_minutes:minutes}( |-)minute[s] to [the|my] timer"
      - "increase [the|my] timer by {timer_minutes:minutes}( |-)minute[s]"
      - "add {timer_half:minutes} an hour[s] to [the|my] timer"
      - "increase [the|my] timer by {timer_half:minutes} an hour[s]"
    example: "add 5 minutes to timer"
    response: "default"
    speech_to_phrase: true
