---
# HassGetState - device_class_state_floor
# example: are all the windows closed on the second floor
# slots:
# - {floor}
# - {domain}
# - {device_class}
# - {state}

language: "en"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "<are_any> {floor} {cover_classes:device_class} {cover_states:state}"
      - "<are_any> {cover_classes:device_class} {cover_states:state} [<in>] [<the>] {floor}"
    example: "are any windows open on the second floor"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {floor} {cover_classes:device_class} {cover_states:state}"
      - "<are_all> {cover_classes:device_class} {cover_states:state} [<in>] [<the>] {floor}"
    example: "are all the windows closed on the second floor"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {floor} {cover_classes:device_class} <is> {cover_states:state}"
      - "<which> {cover_classes:device_class} <is> {cover_states:state} [<in>] [<the>] {floor}"
    example: "which windows are open on the second floor"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {floor} {cover_classes:device_class} <is> {cover_states:state}"
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} [<in>] [<the>] {floor}"
    example: "how many windows are open on the second floor"
    inferred_domain: "cover"
    response: "how_many"
