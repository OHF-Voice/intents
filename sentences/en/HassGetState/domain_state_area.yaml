---
# HassGetState - domain_state_area
# example: which lights are on in the kitchen
# slots:
# - {area}
# - {domain}
# - {state}

language: "en"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> {area} <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [<in>] [<the>] {area}"
    example: "are any lights on in the kitchen"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> {area} <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [<in>] [<the>] {area}"
    example: "are all the kitchen lights off"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> {area} <light> <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} [<in>] [<the>] {area}"
    example: "which lights are on in the kitchen"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> {area} <light> <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} [<in>] [<the>] {area}"
    example: "how many lights are on in the kitchen"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
