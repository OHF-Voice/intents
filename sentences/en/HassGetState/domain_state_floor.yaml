---
# HassGetState - domain_state_floor
# example: are all the lights off on the first floor
# slots:
# - {floor}
# - {domain}
# - {state}

language: "en"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> {floor} <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [<in>] [<the>] {floor}"
    example: "are any lights on on the first floor"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> {floor} <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [<in>] [<the>] {floor}"
    example: "are all the lights off on the first floor"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> {floor} <light> <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} [<in>] [<the>] {floor}"
    example: "which lights are on on the first floor"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> {floor} <light> <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} [<in>] [<the>] {floor}"
    example: "how many lights are on on the first floor"
    inferred_domain: "light"
    response: "how_many"

