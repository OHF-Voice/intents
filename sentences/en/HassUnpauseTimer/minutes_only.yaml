# HassUnpauseTimer - minutes_only

language: "en"
data:
  - sentences:
      - "(resume|continue) [the|my] {timer_minutes:start_minutes}( |-)minute[s] timer"
      - "(resume|continue) [the|my] timer for {timer_minutes:start_minutes}( |-)minute[s]"
    example: "resume 5 minutes timer"
    response: "default"
