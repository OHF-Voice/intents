---
# HassClimateGetTemperature - area_only
# example: what is the temperature in the living room
# slots: {area}

language: "en"
data:
  - sentences:
      - "(<what_is>|<how_is>) [the] [current] <temp> <in> [<the>] {area}"
      - "(<what_is>|<how_is>) [<the>] {area} [current] <temp>"
      - "how (hot|cold|warm|cool) is [it <in>] [<the>] {area}"
    example: "what is the temperature in the living room"
    response: "default"
