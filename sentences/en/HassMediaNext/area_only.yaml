---
# HassMediaNext - area_only
# example: next track in the living room
# slots: {area}

language: "en"
data:
  - sentences:
      - "next [track|item] [in] [<the>] {area}"
      - "(skip [(to [the] next [(song|track)]|([the] (song|track)|this [(song|track)]) )];[in] [<the>] {area})"
    example: "next track in the living room"
    response: "default"
