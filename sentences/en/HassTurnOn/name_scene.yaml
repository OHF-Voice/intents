---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "en"
data:
  - sentences:
      - "[activate] [<the>] {name} [scene]"
      - "[<the>] {name} on"
      - "<turn> ([<the>] {name} [scene];on)"
      - "(change|transition) to [<the>] {name} [scene]"
      - "(change|transition) to scene [<the>] {name}"
    example: "activate movie night scene"
    name_domains:
      - "scene"
    response: "scene"
