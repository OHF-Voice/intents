---
# HassStartTimer - command_minutes_seconds
# example: 5 minutes 30 seconds

language: "en"
data:
  - sentences:
      - "{timer_command:conversation_command} (in|after) {timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s]"
      - "(in|after) {timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s] {timer_command:conversation_command}"
    example: "turn off the lights in 5 minutes 30 seconds"
    response: "command"
