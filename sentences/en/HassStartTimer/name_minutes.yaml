---
# HassStartTimer - name_minutes
# example: 5 minutes

language: "en"
data:
  - sentences:
      - "<timer_set> [a|an|the|my] {timer_minutes:minutes}( |-)minute[s] timer (named|called|for) {timer_name:name}"
      - "<timer_set> [a|an|the|my] timer for {timer_minutes:minutes}( |-)minute[s] (named|called) {timer_name:name}"
      - "<timer_set> [a|an|the|my] timer (named|called) {timer_name:name} for {timer_minutes:minutes}( |-)minute[s]"
      - "{timer_minutes:minutes}( |-)minute[s] timer for {timer_name:name}"
      - "timer for {timer_minutes:minutes}( |-)minute[s] (named|called) {timer_name:name}"
    example: "5 minutes timer named pizza"
    response: "default"
