---
# HassStartTimer - command_hours
# example: 1 hour

language: "en"
data:
  - sentences:
      - "{timer_command:conversation_command} (in|after) {timer_hours:hours}( |-)hour[s]"
      - "(in|after) {timer_hours:hours}( |-)hour[s] {timer_command:conversation_command}"
    example: "turn off the lights in 1 hour"
    response: "command"
