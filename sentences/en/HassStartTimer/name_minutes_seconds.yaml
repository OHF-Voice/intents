---
# HassStartTimer - name_minutes_seconds
# example: 5 minutes 30 seconds

language: "en"
data:
  - sentences:
      - "<timer_set> [a|an|the|my] {timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s] timer (named|called|for) {timer_name:name}"
      - "<timer_set> [a|an|the|my] timer for {timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s] (named|called) {timer_name:name}"
      - "{timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s] timer for {timer_name:name}"
      - "timer for {timer_minutes:minutes}( |-)minute[s] [and] {timer_seconds:seconds}( |-)second[s] (named|called) {timer_name:name}"
    example: "5 minutes 30 seconds timer named pizza"
    response: "default"
