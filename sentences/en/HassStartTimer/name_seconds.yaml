---
# HassStartTimer - name_seconds
# example: 30 seconds

language: "en"
data:
  - sentences:
      - "<timer_set> [a|an|the|my] {timer_seconds:seconds}( |-)second[s] timer (named|called|for) {timer_name:name}"
      - "<timer_set> [a|an|the|my] timer for {timer_seconds:seconds}( |-)second[s] (named|called) {timer_name:name}"
      - "{timer_seconds:seconds}( |-)second[s] timer for {timer_name:name}"
      - "timer for {timer_seconds:seconds}( |-)second[s] (named|called) {timer_name:name}"
    example: "30 seconds timer named pizza"
    response: "default"
