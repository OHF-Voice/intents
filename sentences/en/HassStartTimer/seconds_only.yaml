---
# HassStartTimer - seconds_only
# example: 30 seconds

language: "en"
data:
  - sentences:
      - "<timer_set> [a|an|the|my] timer for {timer_seconds:seconds}( |-)second[s]"
      - "<timer_set> [a|an|the|my] {timer_seconds:seconds}( |-)second[s] timer"
      - "{timer_seconds:seconds}( |-)second[s] timer"
      - "timer for {timer_seconds:seconds}( |-)second[s]"
      - "<timer_set> [a|an|the|my] timer for {timer_half:seconds} a minute[s]"
      - "timer for {timer_half:seconds} a minute[s]"
    example: "timer for 30 seconds"
    response: "default"
  # Speech-to-Phrase: lean subset of the block above.
  - sentences:
      - "set a timer for {timer_seconds:seconds} second[s]"
      - "timer for {timer_seconds:seconds} second[s]"
    response: "default"
    speech_to_phrase: true
