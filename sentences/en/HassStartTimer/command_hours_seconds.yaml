---
# HassStartTimer - command_hours_seconds
# example: 1 hour 30 seconds

language: "en"
data:
  - sentences:
      - "{timer_command:conversation_command} (in|after) {timer_hours:hours}( |-)hour[s] [and] {timer_seconds:seconds}( |-)second[s]"
      - "(in|after) {timer_hours:hours}( |-)hour[s] [and] {timer_seconds:seconds}( |-)second[s] {timer_command:conversation_command}"
    example: "turn off the lights in 1 hour 30 seconds"
    response: "command"
