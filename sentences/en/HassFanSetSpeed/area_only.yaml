---
# HassFanSetSpeed - area_only
# example: set kitchen fans to 50%
# slots:
# - {area}
# - {percentage}

language: "en"
data:
  - sentences:
      - "[<set>] [<the>] {area} fan[s] [speed] [to] {fan_speed:percentage}[%| percent]"
      - "[<set>] [the] speed [of] [<the>] {area} fan[s] [to] {fan_speed:percentage}[%| percent]"
      - "[<set>] [the] speed [of] fan[s] (in|on) [<the>] {area} [to] {fan_speed:percentage}[%| percent]"
    example: "set kitchen fans to 50%"
    response: "default"
