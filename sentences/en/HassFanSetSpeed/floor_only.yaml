---
# HassFanSetSpeed - floor_only
# example: set first floor fans to 50%
# slots:
# - {floor}
# - {percentage}

language: "en"
data:
  - sentences:
      - "[<set>] [<the>] {floor} [floor] fan[s] [speed] [to] {fan_speed:percentage}[%| percent]"
      - "[<set>] [the] speed [of] [<the>] {floor} [floor] fan[s] [to] {fan_speed:percentage}[%| percent]"
      - "[<set>] [the] speed [of] fan[s] (in|on) [<the>] {floor} [floor] [to] {fan_speed:percentage}[%| percent]"
    example: "set first floor fans to 50%"
    response: "default"
