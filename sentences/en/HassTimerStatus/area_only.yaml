---
# HassTimerStatus - area_only
# example: status of timer in the kitchen

language: "en"
data:
  - sentences:
      - "[how much] time [is] left on [the|my] timer[s] in [<the>] {area}"
      - "how long [is] left on [the|my] timer[s] in [<the>] {area}"
      - "status of [the|my] timer[s] in [<the>] {area}"
    example: "status of timer in the kitchen"
    response: "default"
