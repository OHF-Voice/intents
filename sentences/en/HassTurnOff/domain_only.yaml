---
# HassTurnOff - domain_only
# example: turn off the lights in here
# context_area: true

language: "en"

data:
  - sentences:
      # Explicit <here> optional all
      - "<turn> [(<all>|<the>)] <light> ((off|out);<here>)"
      - "<turn> (off|out) [(<all>|<the>)] <light> <here>"
      - "deactivate [(<all>|<the>)] <light> <here>"
      - "[<all>] [<the>] <light> (off|out) <here>"

      # Implicit <here> no all
      - "<turn> [<the>] <light> ((off|out);[<here>])"
      - "<turn> (off|out) [<the>] <light> [<here>]"
      - "deactivate [<the>] <light> [<here>]"
      - "<light> (off|out) [<here>]"
    example: "turn off the lights in here"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn> off [(<all>|<the>)] fan[s] [<here>]"
      - "<turn> [(<all>|<the>)] fan[s] (off;[<here>])"
      - "deactivate [(<all>|<the>)] fan[s] [<here>]"
      - "[(<all>|<the>)] fan[s] off [<here>]"
    example: "turn off the fans"
    inferred_domain: "fan"
    response: "fans_area"
  # Speech-to-Phrase: lean subset of the blocks above.
  - sentences:
      - "turn off [the] lights"
      - "turn [the] lights off"
      - "lights off"
    inferred_domain: "light"
    response: "lights_area"
    speech_to_phrase: true
