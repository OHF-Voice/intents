---
# HassTurnOff - area_device_class_cover
# example: close the curtains in the living room
# slots:
# - {area}
# - {domain}
# - {device_class}

language: "en"
data:
  - sentences:
      - "<close> [<the>] {cover_classes:device_class} <in> [<the>] {area}"
      - "<close> [<the>] {area} {cover_classes:device_class}"
    example: "close the curtains in the living room"
    inferred_domain: "cover"
    response: "cover_device_class"
