---
# HassVacuumCleanArea - name_area
# example: vacuum the kitchen with rover
# slots:
# - {name}
# - {area}

language: "en"
data:
  - sentences:
      - "<clean> [<the>] {area} with [<the>] {name}"
      - "start [<the>] {name} <in> [<the>] {area}"
    example: "vacuum the living room with rover"
    name_domains:
      - "vacuum"
    response: "default"
