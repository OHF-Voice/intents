---
# HassMediaPrevious - area_only
# example: previous track in the living room
# slots: {area}

language: "en"
data:
  - sentences:
      - "previous (track|item) [in] [<the>] {area}"
      - "go back [to the (previous|last) (song|track)] [in] [<the>] {area}"
      - "(replay [the (previous|last) (song|track)] [again];[in] [<the>] {area})"
      - "(play [the] (previous|last) [(song|track) ][again];[in] [<the>] {area})"
    example: "previous track in the living room"
    response: "default"
