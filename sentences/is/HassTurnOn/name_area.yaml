language: is
data:
  # on-able domains
  - sentences:
      - "(<turn_on>|<activate>) [á|í] {name}[(inu|nu|ið|ð|inni|nni|num)] (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
      - "[(settu|sett þú|setja)] {name}[(inn|inu|nu|ið|ð|inni|nni|num|una|na)] (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)] í gang"
    example: "kveikja á gólflampanum í stofunni"
    name_domains: "default"
    response: default

  # lights named with a trailing "light/lamp" word
  - sentences:
      - "<turn_on> [á|í] {name}[(inu|nu|ið|ð|inni|nni|num|s)]<light> (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "kveikja leikhornsljósið í stofunni"
    name_domains:
      - light
    response: default

  # covers
  - sentences:
      - "<open> {name}[(inu|nu|ið|ð|inni|nni|num|na|una)] (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "Opna vinstri gardínu í stofunni"
    name_domains:
      - cover
    response: cover
