language: is
data:
  # off-able domains
  - sentences:
      - "(<turn_off>|<deactivate>) [á|í] {name}[(inu|nu|ið|ð|inni|nni|num)] (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "slökkt þú á gólflampanum í stofunni"
    name_domains: "default"
    response: default

  # lights named with a trailing "light/lamp" word
  - sentences:
      - "<turn_off> [á|í] {name}[(inu|nu|ið|ð|inni|nni|num|s)]<light> (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "slökktu á leikhornsljósinu í stofunni"
    name_domains:
      - light
    response: default

  # covers
  - sentences:
      - "<close> {name}[(inu|nu|ið|ð|inni|nni|num|na|una)] (í|á) {area}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "lokaðu vinstri gardínunni í stofunni"
    name_domains:
      - cover
    response: cover
