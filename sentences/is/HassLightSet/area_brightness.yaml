  # max/min brightness level
  - sentences:
      - "<set> <bright> [(á|í)] {area}[(inu|nu|ið|ð|inni|nni|num)] [(á|í)] {brightness_level:brightness} [stillingu]"
      - "<set> <bright> [(á|í)] {area}[(inu|nu|ið|ð|inni|nni|num)] eins {brightness_level:brightness} og hægt er"
      - "<set> {area}[(inu|nu|ið|ð|inni|nni|num)] [(á|í)] {brightness_level:brightness} (<bright>|stillingu|birtu)"
      - "{area}[(inu|nu|ið|ð|inni|nni|num)] {brightness_level:brightness} <bright>"
    example: "settu birtuna í svefnherberginu í hámark"
    inferred_domain: light
    response: brightness
