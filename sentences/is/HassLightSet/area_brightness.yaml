      - "<set> <bright> (á|í) {area}[(inu|nu|ið|ð|inni|nni|num)] (á|í) {brightness}[ ][%|prósent][ (birtu|birta|bjarma|birtustig|birtustillingu)]"
      - "<set> [á|í] {brightness}[ ][%|prósent][ (birtu|birta|bjarma|birtustig|birtustillingu)] (á|í) {area}[(inu|nu|ið|ð|inni|nni|num)]"
      - "<set> {area}[(inu|nu|ið|ð|inni|nni|num)] [(á|í)] [<bright>] {brightness}[ ][%|prósent][ (birtu|birta|bjarma|birtustig|birtustillingu)]"
