language: is
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "er {on_off_states:state} (í|á) {name}[(inu|nu|ið|ð|inni|nni|num)]"
    example: "Er kveikt á náttlampanum?"
    name_domains:
      - light
      - switch
      - fan
    response: one_yesno

  # covers and valves (open/closed/...)
  - sentences:
      - "er {name}[(inu|nu|ið|ð|inni|nni|num|an|in|na)] {cover_states:state}"
    example: "er vinstri gardínan opin?"
    name_domains:
      - cover
      - valve
    response: one_yesno
