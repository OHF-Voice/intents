---
# HassTurnOff - area_device_class_cover
# example: close the curtains in the living room
# slots:
# - {area}
# - {domain}
# - {device_class}

language: "ne"
data:
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] [<all>] {cover_classes:device_class} (<apply_v>|बन्द <do_v>)"
    example: "बैठकको परदा बन्द गर्नु"
    inferred_domain: "cover"
    response: "cover_device_class"
