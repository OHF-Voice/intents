---
# HassGetState - name_state_area
# example: के ग्यारेजमा ग्यारेजको ढोका खुल्ला छ
# slots:
# - {name}
# - {state}
# - {area}

language: "ne"
data:
  # covers
  - sentences:
      - "के {area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} {cover_states:state} छ"
    example: "के ग्यारेजमा ग्यारेजको ढोका खुल्ला छ"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "के {area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} {lock_states:state} छ"
    example: "के प्रवेशद्वारमा अगाडिको ढोका बन्द छ"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "के {area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} {bs_open_states:state} छ"
    example: "के सुत्ने कोठामा झ्याल खुल्ला छ"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "के {area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} {bs_occupancy_states:state} छ"
    example: "के अफिसमा मोसन सेन्सर उपस्थित छ"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
