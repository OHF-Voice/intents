---
# HassGetState - device_class_state_floor
# example: के पहिलो तल्लामा कुनै छायाँहरू खुल्ला छन्
# slots:
# - {floor}
# - {domain}
# - {device_class}
# - {state}

language: "ne"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "के {floor}[ तल्ला| तह| फ्लोर][को|मा[ भऐको]| भित्र| भित्रको] कुनै {cover_classes:device_class} {cover_states:state} (छ|छन्|छन)"
    example: "के पहिलो तल्लामा कुनै छायाँहरू खुल्ला छन्"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "के {floor}[ तल्ला| तह| फ्लोर][को|मा[ भऐको]| भित्र| भित्रको] <all> {cover_classes:device_class} {cover_states:state} (छ|छन्|छन)"
    example: "के पहिलो तल्लामा सबै परदा खुल्ला छन्"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "{floor}[ तल्ला| तह| फ्लोर][को|मा[ भऐको]| भित्र| भित्रको] कुन {cover_classes:device_class} {cover_states:state} (छ|छन्|छन)"
    example: "पहिलो तल्लामा कुन परदाहरू बन्द छन्"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "{floor}[ तल्ला| तह| फ्लोर][को|मा[ भऐको]| भित्र| भित्रको] कति ओटा {cover_classes:device_class} {cover_states:state} (छ|छन्|छन)"
    example: "पहिलो तल्लामा कति ओटा परदाहरू बन्द छन्"
    inferred_domain: "cover"
    response: "how_many"
