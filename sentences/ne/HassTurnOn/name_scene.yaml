---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "ne"
data:
  - sentences:
      - "{name} [सिन] (सुरू <do_v>|चलाउनु)"
      - "{name} सिन (अन|चालु) [<do_v>]"
    example: "पार्टी मोड सुरू गर्नु"
    name_domains:
      - "scene"
    response: "scene"
