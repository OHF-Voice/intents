---
# HassTurnOn - name_area
# example: turn on the overhead light in the kitchen
# slots:
# - {name}
# - {area}

language: "ne"
data:
  # on-able domains
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} (<kindle_v>|<apply_v>|<open_v>)"
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} (अन|चालु|सुरू) [<do_v>|<strike_v>]"
    example: "भान्साको ओभरहेड बत्ती बाल्नु"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light(s)" word
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} <light> (<kindle_v>|<open_v>)"
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} <light> (अन|चालु|सुरू) [<do_v>|<strike_v>]"
    example: "भान्साको खेल्ने कुना बत्ती बाल्नु"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} <open_v>"
    example: "बैठकको पर्दा खोल्नु"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} <open_v>"
    example: "भान्साको मुख्य भल्भ खोल्नु"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "{area}[ कोठा| क्षेत्र| कक्क्ष][को|मा[ (भऐको|रहेको)]| भित्र| भित्रको] {name} (ताल्चा लगाउनु|बन्द <do_v>)"
    example: "भान्साको अगाडिको ढोका ताल्चा लगाउनु"
    name_domains:
      - "lock"
    response: "lock"
