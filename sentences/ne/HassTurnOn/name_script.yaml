---
# HassTurnOn - name_script
# example: run party time script
# slots: {name}

language: "ne"
data:
  - sentences:
      - "{name} [स्क्रिप्ट] (चलाउनु|सुरू <do_v>)"
      - "{name} स्क्रिप्ट (अन|चालु) [<do_v>]"
    example: "स्टेल्थ मोड स्क्रिप्ट चलाउनु"
    name_domains:
      - "script"
    response: "script"
