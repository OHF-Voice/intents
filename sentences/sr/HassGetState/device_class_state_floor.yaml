---
# HassGetState - device_class_state_floor
# example: да ли су сви прозори затворени на другом спрату
# slots:
# - {floor}
# - {domain}
# - {device_class}
# - {state}

language: "sr"
data:
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state} (на|у) {floor}"
    example: "да ли је неки прозор отворен на другом спрату"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state} (на|у) {floor}"
    example: "да ли су сви прозори затворени на другом спрату"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} [је|су] {cover_states:state} (на|у) {floor}"
    example: "који прозори су отворени на другом спрату"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} [је|су] {cover_states:state} (на|у) {floor}"
    example: "колико прозора је отворено на другом спрату"
    inferred_domain: "cover"
    response: "how_many"
