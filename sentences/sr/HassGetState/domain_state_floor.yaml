---
# HassGetState - domain_state_floor
# example: да ли су сва светла угашена на првом спрату
# slots:
# - {floor}
# - {domain}
# - {state}

language: "sr"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> {on_off_states:state} (на|у) {floor}"
    example: "да ли је неко светло укључено на првом спрату"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <light> {on_off_states:state} (на|у) {floor}"
    example: "да ли су сва светла угашена на првом спрату"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <light> [је|су] {on_off_states:state} (на|у) {floor}"
    example: "која светла су укључена на првом спрату"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <light> [је|су] {on_off_states:state} (на|у) {floor}"
    example: "колико светала је укључено на првом спрату"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "<are_any> вентилатор[а|и|е] {on_off_states:state} (на|у) {floor}"
    example: "да ли је неки вентилатор укључен на другом спрату"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "<are_all> вентилатор[а|и|е] {on_off_states:state} (на|у) {floor}"
    example: "да ли су сви вентилатори искључени на другом спрату"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which> вентилатор[а|и|е] [је|су] {on_off_states:state} (на|у) {floor}"
    example: "који вентилатори су укључени на другом спрату"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<how_many> вентилатор[а|и|е] [је|су] {on_off_states:state} (на|у) {floor}"
    example: "колико вентилатора је укључено на другом спрату"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "<are_any> (прекидач[а|и|е]|склопк[а|е|и]) {on_off_states:state} (на|у) {floor}"
    example: "да ли је неки прекидач укључен на првом спрату"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "<are_all> (прекидач[а|и|е]|склопк[а|е|и]) {on_off_states:state} (на|у) {floor}"
    example: "да ли су сви прекидачи искључени на првом спрату"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<which> (прекидач[а|и|е]|склопк[а|е|и]) [је|су] {on_off_states:state} (на|у) {floor}"
    example: "који прекидачи су укључени на првом спрату"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "<how_many> (прекидач[а|и|е]|склопк[а|е|и]) [је|су] {on_off_states:state} (на|у) {floor}"
    example: "колико прекидача је укључено на првом спрату"
    inferred_domain: "switch"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "<are_any> <lockable> {lock_states:state} (на|у) {floor}"
    example: "да ли су нека врата откључана на првом спрату"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "<are_all> <lockable> {lock_states:state} (на|у) {floor}"
    example: "да ли су сва врата закључана на првом спрату"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "<which> <lockable> [је|су] {lock_states:state} (на|у) {floor}"
    example: "која врата су откључана на првом спрату"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "<how_many> <lockable> [је|су] {lock_states:state} (на|у) {floor}"
    example: "колико врата је закључано на првом спрату"
    inferred_domain: "lock"
    response: "how_many"
