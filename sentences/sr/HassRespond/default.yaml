---
# HassRespond - default
# example: здраво хоме ассистант

language: "sr"
data:
  - sentences:
      - "(здраво|Ћао) [хоме ассистант]"
    example: "здраво хоме ассистант"
    response: "hello"

  - sentences:
      - "да ли увек (слушаш|снимаш)"
    example: "да ли увек слушаш"
    response: "listening"

  - sentences:
      - "где иду моји подаци"
    example: "где иду моји подаци"
    response: "data"

  - sentences:
      - "шта могу да (кажем|питам)"
    example: "шта могу да кажем"
    response: "commands"

  - sentences:
      - "ко те је (направио|створио)"
    example: "ко те је направио"
    response: "creator"
