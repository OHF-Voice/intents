---
# HassTurnOff - area_domain
# example: искључи светла у дневној соби
# slots:
# - {area}
# - {domain}

language: "sr"
data:
  # lights
  - sentences:
      - "<deactivate> [сва] <light> (у|на) [просторији] {area}"
      - "<deactivate> (у|на) [просторији] {area} [сва] <light>"
    example: "искључи светла у дневној соби"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<deactivate> [све] вентилатор[е] (у|на) [просторији] {area}"
      - "<deactivate> (у|на) [просторији] {area} [све] вентилатор[е]"
    example: "искључи вентилаторе у дневној соби"
    inferred_domain: "fan"
    response: "fans_area"
