---
# HassPauseTimer - name_only
# example: pause the pizza timer
# slots: {name}

language: "sr"
data:
  - sentences:
      - "паузирај [(мој|мог[а])] {timer_name:name} тајмер[а]"
      - "паузирај [(мој|мог[а])] тајмер назван {timer_name:name}"
    example: "паузирај пица тајмер"
    response: "default"
