---
# HassUnpauseTimer - name_only
# example: resume the pizza timer
# slots: {name}

language: "sr"
data:
  - sentences:
      - "настави [(мој|мог[а])] тајмер[а] назван {timer_name:name}"
      - "настави [(мој|мог[а])] {timer_name:name} тајмер[а]"
    example: "настави pizza тајмер"
    response: "default"
