---
# HassTurnOn - domain_only
# example: укључи светла
# context_area: true

language: "sr"
data:
  # lights
  - sentences:
      - "<activate> [сва] <light>"
      - "<activate> [сва] <light> [овде|у овој просторији]"
      - "[сва] <light> укључено"
    example: "укључи светла"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<activate> [све] вентилатор[е]"
      - "<activate> [све] вентилатор[е] [овде|у овој просторији]"
    example: "укључи вентилаторе"
    inferred_domain: "fan"
    response: "fans_area"
