---
# HassTurnOn - area_domain
# example: укључи светла у дневној соби
# slots:
# - {area}
# - {domain}

language: "sr"
data:
  # lights
  - sentences:
      - "<активирај> [сва] <светла> (у|на) [просторији] {area}"
      - "<активирај> (у|на) [просторији] {area} [сва] <светла>"
    example: "укључи светла у дневној соби"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<активирај> [све] вентилатор[е] (у|на) [просторији] {area}"
      - "<активирај> (у|на) [просторији] {area} [све] вентилатор[е]"
    example: "укључи вентилаторе у дневној соби"
    inferred_domain: "fan"
    response: "fans_area"
