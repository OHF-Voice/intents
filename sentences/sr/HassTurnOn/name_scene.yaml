---
# HassTurnOn - name_scene
# example: активирај сцену опуштање
# slots: {name}

language: "sr"
data:
  - sentences:
      - "[активирај] {name} [сцен(а|у)]"
      - "активирај сцен(а|у) {name}"
      - "(пређи|промени) на [сцену] {name}"
    example: "активирај сцену опуштање"
    name_domains:
      - "scene"
    response: "scene"
