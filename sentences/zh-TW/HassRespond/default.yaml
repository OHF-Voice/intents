language: zh-TW
data:
  - sentences:
      - "(你好|哈囉|嗨)"
    example: "你好"
    response: "hello"

  - sentences:
      - "你(會|是)[不會|不是]一直[在](聽|錄音)嗎"
    example: "你會一直聽嗎"
    response: "listening"

  - sentences:
      - "我的資料[會](傳|送)到哪[裡|邊]"
    example: "我的資料會傳到哪裡"
    response: "data"

  - sentences:
      - "我(可以|能)(說|問)什麼"
    example: "我可以說什麼"
    response: "commands"

  - sentences:
      - "你是誰(創造|製作|做)的"
    example: "你是誰創造的"
    response: "creator"
