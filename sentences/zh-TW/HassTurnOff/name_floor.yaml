language: zh-TW
data:
  # on-able domains
  - sentences:
      - "<turn_off>{floor}[的]{name}[的][(<light>|<switch>)]"
      - "[把|將]{floor}[的]{name}[的][(<light>|<switch>)]<turn_off>"
    example: "打開二樓的吊扇"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<close>{floor}[的]{name}[的]"
      - "[把|將]{floor}[的]{name}[的]<close>"
    example: "打開二樓的窗簾"
    name_domains:
      - "cover"
    response: "cover"
