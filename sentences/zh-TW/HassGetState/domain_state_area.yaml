language: zh-TW
data:
  # lights
  - sentences:
      - "{area}[的][(有|有沒有)][任何][的]<light>[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "廚房有任何燈是開著的嗎"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "{area}[的]<all><light>[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "廚房所有的燈都是關著嗎"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which>{area}[的]<light>[是]{on_off_states:state}[著][的][嗎]"
    example: "廚房哪一盞燈是開著的"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "{area}[的]<how_many>[(盞|個)]<light>[是]{on_off_states:state}[著][的][嗎]"
    example: "廚房有多少盞燈是打開的"
    inferred_domain: "light"
    response: "how_many"

  # fans
  - sentences:
      - "{area}[的][(有|有沒有)][任何][的](風扇|電扇|吊扇)[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "客廳有任何風扇是開著的嗎"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "{area}[的]<all>(風扇|電扇|吊扇)[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "客廳所有的風扇都是關著嗎"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which>{area}[的](風扇|電扇|吊扇)[是]{on_off_states:state}[著][的][嗎]"
    example: "客廳哪一台風扇是開著的"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "{area}[的]<how_many>[(台|個)](風扇|電扇|吊扇)[是]{on_off_states:state}[著][的][嗎]"
    example: "客廳有多少台風扇是打開的"
    inferred_domain: "fan"
    response: "how_many"

  # switches
  - sentences:
      - "{area}[的][(有|有沒有)][任何][的]<switch>[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "廚房有任何開關是打開著嗎"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "{area}[的]<all><switch>[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "廚房所有的開關都是打開的嗎"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<which>{area}[的]<switch>[是]{on_off_states:state}[著][的][嗎]"
    example: "廚房哪一個開關是打開的"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "{area}[的]<how_many>[個]<switch>[是]{on_off_states:state}[著][的][嗎]"
    example: "廚房有多少個開關是打開的"
    inferred_domain: "switch"
    response: "how_many"

  # locks
  - sentences:
      - "{area}[的][(有|有沒有)][任何]<door>[(是|是不是)]{lock_states:state}[著][(的|了)][嗎]"
    example: "入口有任何門是上鎖嗎"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "{area}[的]<all><door>[(都|都是|是|是不是)]{lock_states:state}[著][(的|了)][嗎]"
    example: "入口所有的門都上鎖了嗎"
    inferred_domain: "lock"
