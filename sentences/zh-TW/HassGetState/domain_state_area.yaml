  - sentences:
      - "<which>{area}[的]<door>[是]{lock_states:state}[著][(的|了)][嗎]"
    example: "入口哪一道門上鎖了"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "{area}[的]<how_many>[(扇|道)]<door>[是]{lock_states:state}[著][的][嗎]"
    example: "入口有多少道門是鎖著的"
    inferred_domain: "lock"
    response: "how_many"
