language: zh-TW
data:
  # lights
  - sentences:
      - "[(有|有沒有)][任何][的]<light>[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "有任何燈是開著的嗎"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<all><light>[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "所有的燈都是關著嗎"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which><light>[是]{on_off_states:state}[著][的][嗎]"
    example: "哪一盞燈是開著的"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many>[(盞|個)]<light>[是]{on_off_states:state}[著][的][嗎]"
    example: "有多少盞燈是打開的"
    inferred_domain: "light"
    response: "how_many"

  # fans
  - sentences:
      - "[(有|有沒有)][任何][的](風扇|電扇|吊扇)[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "有任何風扇是開著的嗎"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "<all>(風扇|電扇|吊扇)[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "所有的風扇都是關著嗎"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which>(風扇|電扇|吊扇)[是]{on_off_states:state}[著][的][嗎]"
    example: "哪一個風扇是開著的"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<how_many>[(台|個)](風扇|電扇|吊扇)[是]{on_off_states:state}[著][的][嗎]"
    example: "有多少台風扇是打開的"
    inferred_domain: "fan"
    response: "how_many"

  # switches
  - sentences:
      - "[(有|有沒有)][任何][的]<switch>[(是|是不是)]{on_off_states:state}[著][的][嗎]"
    example: "有任何開關是打開著嗎"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "<all><switch>[(是|是不是)][都是]{on_off_states:state}[著][的][嗎]"
    example: "全部的開關都是打開的嗎"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<which><switch>[是]{on_off_states:state}[著][的][嗎]"
    example: "哪一個開關是打開的"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "<how_many>[個]<switch>[是]{on_off_states:state}[著][的][嗎]"
    example: "有多少個開關是打開的"
    inferred_domain: "switch"
    response: "how_many"

  # locks
  - sentences:
      - "[(有|有沒有)][任何]<door>[(是|是不是)]{lock_states:state}[著][(的|了)][嗎]"
    example: "有任何門是上鎖嗎"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "<all><door>[(都|都是|是|是不是)]{lock_states:state}[著][(的|了)][嗎]"
    example: "所有的門都上鎖了嗎"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "<which><door>[是]{lock_states:state}[著][(的|了)][嗎]"
    example: "哪一道門上鎖了"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "<how_many>[(扇|道)]<door>[是]{lock_states:state}[著][的][嗎]"
    example: "有多少道門是鎖著的"
    inferred_domain: "lock"
    response: "how_many"
