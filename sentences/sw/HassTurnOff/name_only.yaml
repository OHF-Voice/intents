---
# HassTurnOff - name_only
# example: zima Taa Ofisini
# slots: {name}

language: "sw"
data:
  # off-able domains
  - sentences:
      - "<turn_off> {name}"
    example: "zima Taa Ofisini"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<close> {name}"
    example: "funga Pazia"
    name_domains:
      - "cover"
    response: "cover"
