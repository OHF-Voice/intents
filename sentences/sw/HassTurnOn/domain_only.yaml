---
# HassTurnOn - domain_only
# example: washa taa
# context_area: true

language: "sw"
data:
  # lights
  - sentences:
      - "<turn_on> <light> [<all>]"
    example: "washa taa"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn_on> <fan> [<all>]"
    example: "washa feni"
    inferred_domain: "fan"
    response: "fans_area"
