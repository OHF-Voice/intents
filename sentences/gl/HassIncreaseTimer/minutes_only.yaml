---
# HassIncreaseTimer - minutes_only
# example: añadir 5 minutos al temporizador

language: "gl"
data:
  - sentences:
      - "(<engadir>|<sube>) <nb_minutes> minuto[s] [ao|o] [<meu>] <temporizador>"
      - "(<engadir>|<sube>) {timer_half:minutes} hora [ao|o] [<meu>] <temporizador>"
      - "(<engadir>|<sube>) [ao|o] [<meu>] <temporizador> [en|de] <nb_minutes> minuto[s]"
      - "(<engadir>|<sube>) [ao|o] [<meu>] <temporizador> [en|de] {timer_half:minutes} hora"
    example: "engadir 5 minutos ao temporizador"
    response: "default"
