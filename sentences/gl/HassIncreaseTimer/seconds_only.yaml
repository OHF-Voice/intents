---
# HassIncreaseTimer - seconds_only
# example: añadir 30 segundos al temporizador

language: "gl"
data:
  - sentences:
      - "(<engadir>|<sube>) <nb_seconds> segundo[s] [ao|o] [<meu>] <temporizador>"
      - "(<engadir>|<sube>) {timer_half:seconds} minuto [ao|o] [<meu>] <temporizador>"
      - "(<engadir>|<sube>) [ao|o] [<meu>] <temporizador> [en|de] <nb_seconds> segundo[s]"
      - "(<engadir>|<sube>) [ao|o] [<meu>] <temporizador> [en|de] {timer_half:seconds} minuto"
    example: "engadir 30 segundos ao temporizador"
    response: "default"
