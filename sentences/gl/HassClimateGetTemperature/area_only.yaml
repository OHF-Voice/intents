---
# HassClimateGetTemperature - area_only
# example: cal é a temperatura na cociña
# slots: {area}

language: "gl"
data:
  - sentences:
      - "cal é <temp> [en |no |na |de |do |da |o |a ]{area}"
      - "qué <temp> fai (en|na|no) [o |a |os |as ]{area}"
      - "qué <temp> vai (en|na|no) [o |a |os |as ]{area}"
    example: "cal é a temperatura na cociña"
    response: "default"
