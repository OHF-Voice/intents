---
# HassUnpauseTimer - name_only
# example: continuar temporizador de pizza

language: "gl"
data:
  - sentences:
      - "<continúa> [<con>] [<meu>] <temporizador> (de|con nome|chamad(o|a)|denominad(o|a)|para) {timer_name:name}"
      - "<continúa> [<con>] [<meu>] <temporizador> {timer_name:name}"
    example: "continuar temporizador de pizza"
    response: "default"
