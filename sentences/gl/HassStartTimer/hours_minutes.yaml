---
# HassStartTimer - hours_minutes
# example: temporizador de 1 hora e 45 minutos

language: "gl"
data:
  - sentences:
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_hours> hora[s] [e] <nb_minutes> minuto[s]"
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_hours> hora[s] e {timer_half:minutes}"
    example: "temporizador de 1 hora e 45 minutos"
    response: "default"
