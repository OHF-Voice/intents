---
# HassStartTimer - minutes_seconds
# example: temporizador de 5 minutos e 10 segundos

language: "gl"
data:
  - sentences:
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_minutes> minuto[s] [e] <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_minutes> minuto[s] e {timer_half:seconds}"
    example: "temporizador de 5 minutos e 10 segundos"
    response: "default"
