---
# HassStartTimer - command_hours_minutes
# example: abrir porta do garaxe dentro de 1 hora e 5 minutos

language: "gl"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_hours> hora[s] [e] <nb_minutes> minuto[s]"
      - "(dentro de|en) <nb_hours> hora[s] [e] <nb_minutes> minuto[s] {timer_command:conversation_command}"
    example: "abrir porta do garaxe dentro de 1 hora e 5 minutos"
    response: "command"
