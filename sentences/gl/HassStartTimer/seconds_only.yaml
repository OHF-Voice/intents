---
# HassStartTimer - seconds_only
# example: temporizador de 30 segundos

language: "gl"
data:
  - sentences:
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] {timer_half:seconds} minuto"
    example: "inicia temporizador de 30 segundos"
    response: "default"
