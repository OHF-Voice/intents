---
# HassStartTimer - command_hours_minutes_seconds
# example: abrir porta do garaxe dentro de 1 hora 5 minutos e 30 segundos

language: "gl"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_hours> hora[s] [e] <nb_minutes> minuto[s] [e] <nb_seconds> segundo[s]"
      - "(dentro de|en) <nb_hours> hora[s] [e] <nb_minutes> minuto[s] [e] <nb_seconds> segundo[s] {timer_command:conversation_command}"
    example: "abrir porta do garaxe dentro de 1 hora 5 minutos e 30 segundos"
    response: "command"
