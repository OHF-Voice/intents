---
# HassStartTimer - minutes_only
# example: temporizador en 10 minutos

language: "gl"
data:
  - sentences:
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] <nb_minutes> minuto[s]"
      - "[<timer_set>] [un|unha|<meu>] <temporizador> [dentro de|de|en|para] {timer_half:minutes} hora"
    example: "temporizador en 10 minutos"
    response: "default"
