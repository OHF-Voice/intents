---
# HassStartTimer - command_seconds
# example: abrir porta do garaxe dentro de 30 segundos

language: "gl"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_seconds> segundo[s]"
      - "(dentro de|en) <nb_seconds> segundo[s] {timer_command:conversation_command}"
    example: "abrir porta do garaxe dentro de 30 segundos"
    response: "command"
