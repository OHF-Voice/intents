---
# HassLightSet - color_only
# context_area: true
# slots: {color}, {domain}

language: gl
data:
  - sentences:
      - "[<establece> ][[a ]cor d(e|o|a)[s] ][<todos> ]<luces> [a |ao |á |en ]{color}"
      - "[<establece> ][[a ]cor d(e|o|a)[s] ][<todos> ]<luces> <de_aqui> [a |ao |á |en ]{color}"
      - "pon <luces> [d(e|a)[s] ]cor {color}"
    example: pon as luces de cor vermello
    inferred_domain: light
    response: color
