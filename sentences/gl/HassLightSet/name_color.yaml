---
# HassLightSet - name_color
# slots: {name}, {color}

language: gl
data:
  - sentences:
      - "[<establece> ][o |a ]{name} [a |ao |á |en ][cor ]{color}"
      - "[<establece> ][[a ]cor d(e|o|a) ][o |a ]{name} [a |ao |á |en ]{color}"
    example: pon a lámpada do dormitorio en vermello
    name_domains:
      - light
    response: color
