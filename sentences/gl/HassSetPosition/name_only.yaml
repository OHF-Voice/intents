---
# HassSetPosition - name_only
# example: abre a cortina dormitorio ao 50%
# slots:
# - {name}
# - {position}

language: "gl"
data:
  - sentences:
      - "<establece_abre_pecha> [[a ]posición [d[e|o|a] ]][o |a |os |as |do |da ]{name} (ao|ó) <posición>"
    example: "abre a cortina dormitorio ao 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
