---
# HassDecreaseTimer - seconds_only
# example: quitar 30 segundos del temporizador

language: "gl"
data:
  - sentences:
      - "<baixa> [en|por|de] <nb_seconds> segundo[s] [ao|o|do|de] [<meu>] <temporizador>"
      - "<baixa> [ao|o|do|de] [<meu>] <temporizador> [en|por|de] <nb_seconds> segundo[s]"
      - "<baixa> [en|por|de] {timer_half:seconds} minuto [ao|o|do|de] [<meu>] <temporizador>"
      - "<baixa> [ao|o|do|de] [<meu>] <temporizador> [en|por|de] {timer_half:seconds} minuto"
    example: "baixar 30 segundos do temporizador"
    response: "default"
