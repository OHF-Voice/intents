---
# HassGetState - domain_state_area
# slots: {area}, {domain}, {state}

language: gl
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> {on_off_states:state} [en |no |na |d(o|a) ]{area}"
    example: hai algunha luz acendida na cociña
    inferred_domain: light
    response: any
  - sentences:
      - "<are_all> <light> {on_off_states:state} [en |no |na |d(o|a) ]{area}"
    example: están todas as luces apagadas na cociña
    inferred_domain: light
    response: all
  - sentences:
      - "<which> <light> <is> {on_off_states:state} [en |no |na |d(o|a) ]{area}"
    example: que luces están acendidas na cociña
    inferred_domain: light
    response: which
  - sentences:
      - "<how_many> <light> <is> {on_off_states:state} [en |no |na |d(o|a) ]{area}"
    example: cantas luces están acendidas na cociña
    inferred_domain: light
    response: how_many

  # ---- fans ----
