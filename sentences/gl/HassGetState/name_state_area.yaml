---
# HassGetState - name_state_area
# slots: {name}, {state}, {area}

language: gl
data:
  # covers
  - sentences:
      - "[se] <is> [o |a |os |as ]{name} {cover_states:state} [en |no |na |d(o|a) ]{area}"
    example: está a porta do garaxe aberta no garaxe
    name_domains:
      - cover
    response: one_yesno

  # locks
  - sentences:
      - "[se] <is> [o |a |os |as ]{name} {lock_states:state} [en |no |na |d(o|a) ]{area}"
    example: está a porta de entrada pechada na entrada
    name_domains:
      - lock
    response: one_yesno

  # binary sensors - openings
  - sentences:
      - "[se] <is> [o |a |os |as ]{name} {bs_open_states:state} [en |no |na |d(o|a) ]{area}"
    example: está a claraboia aberta no dormitorio
    name_domains:
      - binary_sensor
    response: one_yesno

  # binary sensors - occupancy
  - sentences:
      - "[se] <is> [o |a |os |as ]{name} {bs_occupancy_states:state} [en |no |na |d(o|a) ]{area}"
    example: está o sensor de movemento ocupado na oficina
    name_domains:
      - binary_sensor
    response: one_yesno
