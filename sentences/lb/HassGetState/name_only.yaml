language: lb
data:
  - sentences:
      - "Wat [ass] [de Status vun] [<the>] [d']{name}"
      - "(so mer | sot mer) [de Status vun] [<the>] [d']{name}"
    example: "Wat ass d'Baussentemperatur"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
