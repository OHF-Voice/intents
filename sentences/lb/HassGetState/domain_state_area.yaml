language: lb
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> {on_off_states:state} [<in>] [<the>] [d']{area}"
    example: "Sinn iergendeng Luuten un an der Kichen"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <light> {on_off_states:state} [<in>] [<the>] [d']{area}"
    example: "Sinn all d'Luuten aus an der Kichen"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <light> <is> {on_off_states:state} [<in>] [<the>] [d']{area}"
    example: "Wéi eng Luuchten sinn un an der Kichen"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <light> <is> {on_off_states:state} [<in>] [<the>] [d']{area}"
    example: "Wéi vill Luuchten sinn un an der Kichen"
    inferred_domain: "light"
    response: "how_many"

