language: cy
data:
  # Dyfeisiau y gellir eu diffodd / off-able domains
  - sentences:
      - "<troi>[ <y>|<y>| <fy>| <ein>] {name} (i ffwrdd|bant|allan) ar [<y>] {floor} [llawr]"
      - "<diffodd>[ <y>|<y>| <fy>| <ein>] {name} ar [<y>] {floor} [llawr]"
    example: "troi'r golau uwchben i ffwrdd ar y llawr cyntaf"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # Goleuadau ag enw yn cynnwys gair golau / lights with trailing light word
  - sentences:
      - "<troi>[ <y>|<y>| <fy>| <ein>] {name} <golau> (i ffwrdd|bant|allan) ar [<y>] {floor} [llawr]"
      - "<diffodd>[ <y>|<y>| <fy>| <ein>] {name} <golau> ar [<y>] {floor} [llawr]"
    example: "troi golau'r gornel chwarae i ffwrdd ar y llawr cyntaf"
    name_domains:
      - "light"
    response: "default"

  # Caeadau / covers
  - sentences:
      - "<cau>[ <y>|<y>| <fy>| <ein>] {name} ar [<y>] {floor} [llawr]"
    example: "cau'r drws llithro ar y llawr cyntaf"
    name_domains:
      - "cover"
    response: "cover"

  # Falfiau / valves
  - sentences:
      - "<cau>[ <y>|<y>| <fy>| <ein>] {name} ar [<y>] {floor} [llawr]"
    example: "cau'r falf brif ar y llawr cyntaf"
    name_domains:
      - "valve"
    response: "valve"
