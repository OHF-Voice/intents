---
# HassClimateSetTemperature - area_temperature
# example: imposta la temperatura in camera da letto a 20 gradi
# slots:
# - {area}
# - {temperature}

language: "it"
data:
  - sentences:
      - "<numeric_value_set> [<the>] <temp> <in> {area} <to> {temperature}[([ ]°)| grad(o|i)]"
      - "<numeric_value_set> [<the>|<some>] <temp> <of> {temperature}[([ ]°)| grad(o|i)] <in> {area}"
      - "<numeric_value_set> <in> {area} [<the>|<some>] <temp> (<to>|<of>) {temperature}[([ ]°)| grad(o|i)]"
    example: "imposta la temperatura in camera da letto a 20 gradi"
    response: "default"
