---
# HassBroadcast - message_only
# example: annuncia che la cena è pronta
# slots: {message}

language: "it"
data:
  - sentences:
      - "<announce> [<everywhere>] [che] {message}"
      - "<announce> [<everywhere>] (il|questo) [(prossimo|seguente)] messaggio {message}"
    example: "annuncia che la cena è pronta"
    response: "default"
