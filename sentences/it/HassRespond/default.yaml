---
# HassRespond - default
# example: ciao

language: "it"
data:
  - sentences:
      - "<hello> [home assistant]"
    example: "ciao"
    response: "hello"
  - sentences:
      - "(ascolti|registri) sempre"
    example: "ascolti sempre"
    response: "listening"
  - sentences:
      - "dove finiscono (<my>|<the>) dati"
    example: "dove finiscono i miei dati"
    response: "data"
  - sentences:
      - "cosa posso <ask>"
    example: "cosa posso chiederti"
    response: "commands"
  - sentences:
      - "chi ti ha (<made>|<created>)"
    example: "chi ti ha creato"
    response: "creator"
