---
# HassTurnOff - floor_device_class_cover
# example: close the curtains on the first floor
# slots:
# - {floor}
# - {domain}
# - {device_class}

language: "it"
data:
  - sentences:
      - "<close> [<all>] [<the>] {cover_classes:device_class} (<in>|<of>|<at>|<on>) [<the>] {floor}"
      - "<close> [<all>] [<the>] {floor} {cover_classes:device_class}"
    example: "chiudi le tende al primo piano"
    inferred_domain: "cover"
    response: "cover_device_class"
