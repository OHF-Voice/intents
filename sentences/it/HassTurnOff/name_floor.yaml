---
# HassTurnOff - name_floor
# example: turn off the overhead light on the first floor
# slots:
# - {name}
# - {floor}

language: "it"
data:
  # off-able domains
  - sentences:
      - "<turn_off> [<the>] {name} (<in>|<of>|<at>|<on>) [<the>] {floor}"
    example: "spegni la luce a soffitto al primo piano"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn_off> [<the>] {name} <light> (<in>|<of>|<at>|<on>) [<the>] {floor}"
    example: "spegni le luci dell'angolo gioco al primo piano"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<close> [<the>] {name} (<in>|<of>|<at>|<on>) [<the>] {floor}"
    example: "chiudi la porta scorrevole al primo piano"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> [<the>] {name} (<in>|<of>|<at>|<on>) [<the>] {floor}"
    example: "chiudi la valvola principale al primo piano"
    name_domains:
      - "valve"
    response: "valve"
