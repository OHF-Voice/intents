---
# HassTurnOff - area_device_class_cover
# example: close the curtains in the living room
# slots:
# - {area}
# - {domain}
# - {device_class}

language: "it"
data:
  - sentences:
      - "<close> [<all>] [<the>] {cover_classes:device_class} (<in>|<of>) [<the>] {area}"
      - "<close> [<all>] [<the>] {area} {cover_classes:device_class}"
    example: "chiudi le tende in cucina"
    inferred_domain: "cover"
    response: "cover_device_class"
