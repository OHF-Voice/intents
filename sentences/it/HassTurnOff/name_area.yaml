---
# HassTurnOff - name_area
# example: turn off the overhead light in the kitchen
# slots:
# - {name}
# - {area}

language: "it"
data:
  # off-able domains
  - sentences:
      - "<turn_off> [<the>] {name} (<in>|<of>) [<the>] {area}"
      - "<turn_off> (<in>|<of>) [<the>] {area} [<the>] {name}"
      - "(<in>|<of>) [<the>] {area} <turn_off> [<the>] {name}"
    example: "spegni la luce a soffitto in cucina"
    name_domains: "default"
    response: "default"

  # lights named with a trailing "light(s)/lamp(s)" word
  - sentences:
      - "<turn_off> [<the>] {name} <light> (<in>|<of>) [<the>] {area}"
      - "<turn_off> (<in>|<of>) [<the>] {area} [<the>] {name} <light>"
    example: "spegni le luci dell'angolo gioco in cucina"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<close> [<the>] {name} (<in>|<of>) [<the>] {area}"
    example: "chiudi la tenda sinistra in soggiorno"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> [<the>] {name} (<in>|<of>) [<the>] {area}"
    example: "chiudi la valvola principale in cucina"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "<unlock> [<the>] {name} (<in>|<of>) [<the>] {area}"
    example: "apri la serratura d'ingresso in cucina"
    name_domains:
      - "lock"
    response: "lock"
