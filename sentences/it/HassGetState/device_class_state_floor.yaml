---
# HassGetState - device_class_state_floor
# example: tutte le finestre sono chiuse al secondo piano
# slots:
# - {floor}
# - {domain}
# - {device_class}
# - {state}

language: "it"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state} (<in>|<at>) [<the>] {floor}"
    example: "ci sono finestre aperte al secondo piano"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} <is> {cover_states:state} (<in>|<at>) [<the>] {floor}"
    example: "tutte le finestre sono chiuse al secondo piano"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} <is> {cover_states:state} (<in>|<at>) [<the>] {floor}"
    example: "quali finestre sono aperte al secondo piano"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} (<in>|<at>) [<the>] {floor}"
    example: "quante finestre sono aperte al secondo piano"
    inferred_domain: "cover"
    response: "how_many"
