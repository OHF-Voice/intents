---
# HassGetState - name_state_floor
# example: la finestra della camera è aperta al primo piano
# slots:
# - {name}
# - {state}
# - {floor}

language: "it"
data:
  # covers
  - sentences:
      - "<is> [<the>] {name} {cover_states:state} (<in>|<at>) [<the>] {floor}"
      - "[<the>] {name} <is> {cover_states:state} (<in>|<at>) [<the>] {floor}"
    example: "la porta del garage è aperta al primo piano"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "<is> [<the>] {name} {lock_states:state} (<in>|<at>) [<the>] {floor}"
      - "[<the>] {name} <is> {lock_states:state} (<in>|<at>) [<the>] {floor}"
    example: "la porta d'ingresso è chiusa al primo piano"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "<is> [<the>] {name} {bs_open_states:state} (<in>|<at>) [<the>] {floor}"
      - "[<the>] {name} <is> {bs_open_states:state} (<in>|<at>) [<the>] {floor}"
    example: "il lucernario è aperto al secondo piano"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "<is> [<the>] {name} {bs_occupancy_states:state} (<in>|<at>) [<the>] {floor}"
      - "[<the>] {name} <is> {bs_occupancy_states:state} (<in>|<at>) [<the>] {floor}"
    example: "il sensore di movimento è occupato al secondo piano"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
