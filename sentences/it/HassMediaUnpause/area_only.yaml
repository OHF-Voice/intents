---
# HassMediaUnpause - area_only
# example: resume music in kitchen
# slots: {area}

language: "it"
data:
  - sentences:
      - "riprendi [[la [mia ]]musica|[il [mio ]](programma|episodio)] <in> [area ]{area}"
      - "riprendi [il |i |su |sul |sui ]media player <in> [area ]{area}"
    example: "resume music in kitchen"
    response: "default"
