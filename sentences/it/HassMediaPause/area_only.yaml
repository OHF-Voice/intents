---
# HassMediaPause - area_only
# example: pause music in kitchen
# slots: {area}

language: "it"
data:
  - sentences:
      - "(metti in pausa|pausa) [[la [mia ]]musica|[il [mio ]](programma|episodio)] <in> [area ]{area}"
      - "(metti in pausa|pausa) [il |i |su |sul |sui ]media player <in> [area ]{area}"
    example: "pause music in kitchen"
    response: "default"
