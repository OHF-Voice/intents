---
# HassTurnOn - domain_only
# example: turn on the lights in here
# slots: {domain}; context_area: true

language: "it"

data:
  # lights
  - sentences:
      - "<turn_on> [<all>] [<the>] <light> [<in_here>]"
      - "[<all>] [<the>] <light> [<in_here>]"
      - "illumin[a|are] [<in_here>]"
    example: "accendi le luci qua"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<turn_on> [<all>] [<the>] <fan> [<in_here>]"
      - "[<all>] [<the>] <fan> [<in_here>]"
    example: "accendi le ventole"
    inferred_domain: "fan"
    response: "fans_area"
