---
# HassTurnOn - name_only
# example: turn on the overhead light
# slots: {name}

language: "it"

data:
  # on-able domains
  - sentences:
      - "<turn_on> [<the>] {name}"
      - "[<the>] {name}"
    example: "accendi la luce centrale"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a "light(s)/lamp(s)" word
  - sentences:
      - "<turn_on> [<the>] <light> [<of>][<the>]{name}"
    example: "accendi le luci dell'angolo gioco"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<open> [<the>] {name}"
    example: "apri la porta scorrevole"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> [<the>] {name}"
    example: "apri la valvola principale"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "<to_lock> [a chiave] [<the>] {name}"
    example: "chiudi a chiave la porta d'ingresso"
    name_domains:
      - "lock"
    response: "lock"
