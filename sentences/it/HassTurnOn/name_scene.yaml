---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "it"

data:
  - sentences:
      - "<turn_on> [<the>] [scena] {name}"
      - "[<the>] [scena] {name}"
      - "(passa|cambia) (a|<to>|in|con) [<the>] [scena] {name}"
    example: "attiva la scena festa"
    name_domains:
      - "scene"
    response: "scene"
