---
# HassTurnOn - floor_device_class_cover
# example: open the curtains on the first floor
# slots:
# - {floor}
# - {domain}
# - {device_class}

language: "it"

data:
  - sentences:
      - "<open> [<all>] [<the>] {cover_classes:device_class} (<in>|<of>|<at>|<to>) [<the>] {floor}"
      - "<open> [<all>] [<the>] {floor} {cover_classes:device_class}"
    example: "apri le tende al primo piano"
    inferred_domain: "cover"
    response: "cover_device_class"
