---
# HassSetPosition - area_device_class
# example: imposta la tapparella in camera da letto al 50%
# slots:
# - {area}
# - {domain}
# - {device_class}
# - {position}

language: "it"
data:
  - sentences:
      - "(<numeric_value_set>|<open>|<close>|<set>) [([la] posizione|[l']apertura)] [<of>|<the>] {cover_classes:device_class} (<to> {position}[<percent>];(<in>|<of>) {area})"
      - "(<numeric_value_set>|<open>|<close>|<set>) <to> {position}[<percent>] [([la] posizione|[l']apertura)] [<of>|<the>] {cover_classes:device_class} (<in>|<of>) {area}"
      - "(<numeric_value_set>|<open>|<close>|<set>) [([la] posizione|[l']apertura)] [<of>|<the>] {cover_classes:device_class} ({position_level:position};(<in>|<of>) {area})"
      - "(<numeric_value_set>|<open>|<close>|<set>) {position_level:position} [([la] posizione|[l']apertura)] [<of>|<the>] {cover_classes:device_class} (<in>|<of>) {area}"
    example: "imposta la tapparella in camera da letto al 50%"
    inferred_domain: "cover"
    response: "cover_device_class"
