---
# HassTurnOn - name_area
# example: 거실 왼쪽 커튼 열어
# slots: {name}, {area}

language: "ko"
data:
  # on-able domains
  - sentences:
      - "{area} {name} [<turn>] 켜[줘|줄래]"
    example: "거실 무드등 켜줘"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "{area} {name} <open>"
    example: "거실 왼쪽 커튼 열어"
    name_domains:
      - "cover"
    response: "cover"

  # locks
  - sentences:
      - "{area} {name} 잠가[줘]"
    example: "현관 앞문 잠가"
    name_domains:
      - "lock"
    response: "lock"
