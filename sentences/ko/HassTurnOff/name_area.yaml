---
# HassTurnOff - name_area
# example: 거실 왼쪽 커튼 닫아
# slots: {name}, {area}

language: "ko"
data:
  # off-able domains
  - sentences:
      - "{area} {name} [<turn>] 꺼[줘|줄래]"
    example: "거실 무드등 꺼줘"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "{area} {name} <close>"
    example: "거실 왼쪽 커튼 닫아"
    name_domains:
      - "cover"
    response: "cover"

  # locks
  - sentences:
      - "{area} {name} 잠금 해제[해|해줘]"
    example: "현관 앞문 잠금 해제"
    name_domains:
      - "lock"
    response: "lock"
