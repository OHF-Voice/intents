---
# HassGetState - device_class_state
# example: 창문이 열려있어
# slots: {domain}, {device_class}, {state}

language: "ko"
data:
  - sentences:
      - "{cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "창문이 열려있어"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "모든 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "모든 창문이 열려있어"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "(어떤|어디) {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "어떤 창문이 열려있어"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "얼마나 많은 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "얼마나 많은 창문이 열려있어"
    inferred_domain: "cover"
    response: "how_many"
