---
# HassGetState - device_class_state_area
# example: 거실에 커튼이 열려있어
# slots: {area}, {domain}, {device_class}, {state}

language: "ko"
data:
  - sentences:
      - "{area}에 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "거실에 커튼이 열려있어"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "{area}에 모든 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "거실에 모든 커튼이 열려있어"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "(어떤|어디) {area}에 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "어떤 거실에 커튼이 열려있어"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "{area}에 얼마나 많은 {cover_classes:device_class}(이|가) {cover_states:state}있어"
    example: "거실에 얼마나 많은 커튼이 열려있어"
    inferred_domain: "cover"
    response: "how_many"
