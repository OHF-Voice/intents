---
# HassLightSet - name_color
# example: 침실 무드등 색상 빨강으로 설정
# slots: {name}, {color}

language: "ko"
data:
  - sentences:
      - "{name} [색상] {color}[로|으로] [<set>]"
      - "{name}의 [색상] {color}[로|으로] [<set>]"
    example: "침실 무드등 색상 빨강으로 설정"
    name_domains:
      - "light"
    response: "color"
