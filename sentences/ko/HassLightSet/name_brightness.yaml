---
# HassLightSet - name_brightness
# example: 침실 무드등 밝기 50%로 설정
# slots: {name}, {brightness}

language: "ko"
data:
  # numeric brightness
  - sentences:
      - "{name} 밝기 {brightness}[ ][%|퍼센트|프로][로] [<numeric_value_set>]"
      - "{name}의 밝기 {brightness}[ ][%|퍼센트|프로][로] [<numeric_value_set>]"
      - "{name} {brightness}[ ][%|퍼센트|프로] 밝기[로] [<numeric_value_set>]"
      - "{name} {brightness}[ ][%|퍼센트|프로]로 <numeric_value_set>"
    example: "침실 무드등 밝기 50%로 설정"
    name_domains:
      - "light"
    response: "brightness"

  # max/min brightness
  - sentences:
      - "{name} 밝기 {brightness_level:brightness}[로] [<numeric_value_set>]"
      - "{name}의 밝기 {brightness_level:brightness}[로] [<numeric_value_set>]"
      - "{name} {brightness_level:brightness} 밝기[로] [<numeric_value_set>]"
      - "{name} {brightness_level:brightness}"
    example: "침실 무드등 밝기 최대로 설정"
    name_domains:
      - "light"
    response: "brightness"
