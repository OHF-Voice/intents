---
# HassTurnOn - name_area
# example: włącz lampę w salonie
# slots: {name}, {area}

language: "pl"
data:
  - sentences:
      - "(<turn_on>|<turn_on_light>) {name} <area>"
      - "<area> (<turn_on>|<turn_on_light>) {name}"
    example: "włącz lampę w salonie"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"
