---
# HassGetState - name_only
# example: jaki jest stan czujnika
# slots: {name}

language: "pl"
data:
  - sentences:
      - "(<what_is>|<how_is>) {name}"
      - "(stan|status|wartość) {name}"
    example: "jaki jest stan czujnika"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
