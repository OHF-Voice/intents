---
# HassGetState - device_class_state_area
# example: czy wszystkie okna są zamknięte w salonie

language: "pl"
data:
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state} <area>"
    example: "czy wszystkie okna są zamknięte w salonie"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state} <area>"
    example: "sprawdź stan urządzeń"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} (jest|są) {cover_states:state} <area>"
    example: "sprawdź stan urządzeń"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} (jest|są) {cover_states:state} <area>"
    example: "sprawdź stan urządzeń"
    inferred_domain: "cover"
    response: "how_many"
