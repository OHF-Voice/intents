---
# HassGetState - domain_state_area
# example: które światła są włączone w salonie

language: "pl"
data:
  - sentences:
      - "<are_any> (<light>|<lights>) {on_off_states:state} <area>"
    example: "które światła są włączone w salonie"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> (<light>|<lights>) {on_off_states:state} <area>"
    example: "sprawdź stan urządzeń"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> (<light>|<lights>) (jest|są) {on_off_states:state} <area>"
    example: "sprawdź stan urządzeń"
    inferred_domain: "light"
    response: "which"
