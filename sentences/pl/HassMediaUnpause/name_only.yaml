---
# HassMediaUnpause - name_only
# example: wznów muzykę na telewizor
# slots: {name}

language: "pl"
data:
  - sentences:
      - "(wznów|przywróć) [(muzykę|granie|odtwarzanie)] (w|na|przez) {name}"
    example: "wznów muzykę na telewizor"
    name_domains:
      - "media_player"
    response: "default"
