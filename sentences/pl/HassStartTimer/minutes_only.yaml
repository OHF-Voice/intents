      - "[<timer_set> ](minutnik|timer|stoper|licznik) [na |trwający ]{timer_minutes:minutes} minut[a|ę|y|owy]"
      - "[<timer_set> ]{timer_minutes:minutes} minut[a|ę|y|owy] (minutnik|timer|stoper|licznik)"
    example: "minutnik na 5 minut"
    response: "default"
