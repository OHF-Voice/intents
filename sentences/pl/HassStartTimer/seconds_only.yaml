---
# HassStartTimer - seconds_only
# example: minutnik na 30 sekund

language: "pl"
data:
  - sentences:
      - "[<timer_set> ](minutnik|timer|stoper|licznik) [na |trwający ]{timer_seconds:seconds} sekund[a|ę|y|owy]"
      - "[<timer_set> ]{timer_seconds:seconds} sekund[a|ę|y|owy] (minutnik|timer|stoper|licznik)"
    example: "minutnik na 30 sekund"
    response: "default"
