---
# HassStartTimer - command_minutes
# example: wyłącz światło za 5 minut

language: "pl"
data:
  - sentences:
      - "{timer_command:conversation_command} za {timer_minutes:minutes} minut[a|ę|y|owy]"
      - "za {timer_minutes:minutes} minut[a|ę|y|owy] {timer_command:conversation_command}"
    example: "wyłącz światło za 5 minut"
    response: "command"
