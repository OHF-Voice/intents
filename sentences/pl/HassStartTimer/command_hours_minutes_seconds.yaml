# HassStartTimer - command_hours_minutes_seconds
# example: wyłącz światło za 1 godzinę 5 minut 30 sekund

language: "pl"
data:
  - sentences:
      - "{timer_command:conversation_command} za {timer_hours:hours} godzin[a|ę|y|ny] [i ]{timer_minutes:minutes} minut[a|ę|y|owy] [i ]{timer_seconds:seconds} sekund[a|ę|y|owy]"
      - "za {timer_hours:hours} godzin[a|ę|y|ny] [i ]{timer_minutes:minutes} minut[a|ę|y|owy] [i ]{timer_seconds:seconds} sekund[a|ę|y|owy] {timer_command:conversation_command}"
    example: "wyłącz światło za 1 godzinę 5 minut 30 sekund"
    response: "command"
