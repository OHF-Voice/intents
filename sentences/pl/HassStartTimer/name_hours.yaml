      - "[<timer_set> ](minutnik|timer|stoper|licznik) (o nazwie|zwany|nazwany) {timer_name:name} na {timer_hours:hours} godzin[a|ę|y|ny]"
      - "[<timer_set> ]{timer_hours:hours} godzin[a|ę|y|ny] (minutnik|timer|stoper|licznik) (o nazwie|zwany|nazwany) {timer_name:name}"
    example: "minutnik na 2 godziny o nazwie pizza"
    response: "default"
