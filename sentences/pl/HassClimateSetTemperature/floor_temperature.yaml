---
# HassClimateSetTemperature - floor_temperature
# example: ustaw temperaturę na piętrze na 20 stopni
# slots: {floor}, {temperature}

language: "pl"
data:
  - sentences:
      - "(<numeric_value_set>|wyreguluj|reguluj) [<temp> ]{floor} [piętro] na <temperature>"
      - "{floor} [piętro] (<numeric_value_set>|wyreguluj|reguluj) [<temp>] na <temperature>"
    example: "ustaw temperaturę na piętrze na 20 stopni"
    response: "default"
