      - "(<numeric_value_set>|wyreguluj|reguluj) [<temp> ]<area> na <temperature>"
      - "<area> (<numeric_value_set>|wyreguluj|reguluj) [<temp>] na <temperature>"
    example: "ustaw temperaturę w salonie na 20 stopni"
    response: "default"
