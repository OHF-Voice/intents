---
# HassLightSet - color_only
# example: ustaw kolor światła na czerwony
# slots: {color}
# context_area: true

language: "pl"
data:
  - sentences:
      - "[<set>] [<in_here> ]kolor [<light>|<lights> ]na {color}"
      - "[<set>] [<in_here> ]{color} kolor [<light>|<lights>]"
    example: "ustaw kolor światła na czerwony"
    inferred_domain: "light"
    response: "color"
