---
# HassBroadcast - message_only
# example: broadcast that dinner is ready
# slots: {message}

language: "pl"
data:
  - sentences:
      - "(komunikat|ogłoszenie|powiadomienie|powiadom) [że] {message}"
      - "rozgłoś [wiadomość] [że] {message}"
    example: "ogłoś że obiad gotowy"
    response: "default"
