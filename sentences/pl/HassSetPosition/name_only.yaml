---
# HassSetPosition - name_only
# example: ustaw zasłonę na 50%
# slots: {name}, {position}

language: "pl"
data:
  - sentences:
      - "(<numeric_value_set>|<open>|<close>) [pozycję |wartość |wysokość ]{name} na <position>"
    example: "ustaw zasłonę na 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
