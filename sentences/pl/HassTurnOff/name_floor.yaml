---
# HassTurnOff - name_floor
# example: wyłącz lampę na piętrze
# slots: {name}, {floor}

language: "pl"
data:
  - sentences:
      - "(<turn_off>|<turn_off_light>) {name} {floor} [piętro]"
      - "{floor} [piętro] (<turn_off>|<turn_off_light>) {name}"
    example: "wyłącz lampę na piętrze"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"
