---
# HassTurnOff - name_only
# example: wyłącz lampę
# slots: {name}

language: "pl"
data:
  - sentences:
      - "(<turn_off>|<turn_off_light>) {name}"
    example: "wyłącz lampę"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  - sentences:
      - "(<close>|<close_blind>) {name}"
    example: "zamknij roletę"
    name_domains:
      - "cover"
    response: "cover"
