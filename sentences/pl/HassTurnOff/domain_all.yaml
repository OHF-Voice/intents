---
# HassTurnOff - domain_all
# example: wyłącz wszystkie światła w domu
# slots: {domain}

language: "pl"
data:
  - sentences:
      - "(<turn_off>|<turn_off_light>) [<all> ](<light>|<lights>) <everywhere>"
    example: "wyłącz wszystkie światła w domu"
    inferred_domain: "light"
    response: "lights_all"
