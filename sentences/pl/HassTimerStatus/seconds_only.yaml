---
# HassTimerStatus - seconds_only
# example: status 30 sekundowego minutnika

language: "pl"
data:
  - sentences:
      - "<timer_state> {timer_seconds:start_seconds} sekund[a|ę|y|owy] (minutnik[a]|timer[a]|stoper[a]|licznik[a])"
      - "ile czasu [po]zostało na {timer_seconds:start_seconds} sekund[a|ę|y|owy] (minutnik[u]|timer[ze]|stoper[ze]|licznik[u])"
    example: "status 30 sekundowego minutnika"
    response: "default"
