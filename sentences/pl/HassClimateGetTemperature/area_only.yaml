---
# HassClimateGetTemperature - area_only
# example: jaka jest temperatura w salonie
# slots: {area}

language: "pl"
data:
  - sentences:
      - "(<what_is>|<how_many_is>) [aktualna |obecna ]<temp> <area>"
      - "(<what_is>|<how_many_is>) <area> [aktualna |obecna ]<temp>"
      - "czy [jest |bardzo ](ciepło|gorąco|zimno|chłodno) <area>"
    example: "jaka jest temperatura w salonie"
    response: "default"
