---
# HassTurnOn - name_scene
# example: aktivoi tunnelmavalaistus

language: "fi"
data:
  - sentences:
      - "(aktivoi|ota käyttöön) {name} [tunnelma]"
      - "vaihda [tunnelmaan] {name}"
      - "{name} <päälle>"
    example: "aktivoi tunnelmavalaistus"
    name_domains:
      - "scene"
    response: "scene"
