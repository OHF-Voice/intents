---
# HassTurnOff - name_only
# example: kytke kattokruunu pois p채채lt채

language: "fi"
data:
  # off-able domains
  - sentences:
      - "[<laita>] {name} <p채채lt채>"
      - "[<laita>] <p채채lt채> {name}"
      - "<pys채yt채> {name}"
    example: "kytke kattokruunu pois p채채lt채"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<sulje> {name}"
    example: "sulje liukuovi"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<sulje> {name}"
    example: "sulje p채채venttiili"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "avaa [lukko|lukitus] {name}"
    example: "avaa lukko etuovi"
    name_domains:
      - "lock"
    response: "lock"
