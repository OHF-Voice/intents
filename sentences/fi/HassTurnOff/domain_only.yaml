---
# HassTurnOff - domain_only
# example: kytke valot pois päältä

language: "fi"
data:
  # lights
  - sentences:
      - "[<laita>] [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>) <päältä> [<here>]"
      - "[<laita>] <päältä> [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>) [<here>]"
      - "<pysäytä> [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>) [<here>]"
      - "pimennä [<here>]"
    example: "kytke valot pois päältä"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[<laita>] [kaikki|jokainen] (<tuuletin>|<tuulettimet>) <päältä> [<here>]"
      - "[<laita>] <päältä> [kaikki|jokainen] (<tuuletin>|<tuulettimet>) [<here>]"
      - "<pysäytä> [kaikki|jokainen] (<tuuletin>|<tuulettimet>) [<here>]"
    example: "sammuta tuuletin"
    inferred_domain: "fan"
    response: "fans_area"
