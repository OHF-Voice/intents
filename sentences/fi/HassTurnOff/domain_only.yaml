---
# HassTurnOff - domain_only
# example: kytke valot pois päältä

language: "fi"
data:
  # lights
  - sentences:
      - "[<laita>] [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>) <päältä>"
      - "[<laita>] <päältä> [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>)"
      - "<pysäytä> [kaikki|jokainen] (<valo>|<valot>|<valaistus>|<valaistukset>)"
      - "pimennä"
    example: "kytke valot pois päältä"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[<laita>] [kaikki|jokainen] (<tuuletin>|<tuulettimet>) <päältä>"
      - "[<laita>] <päältä> [kaikki|jokainen] (<tuuletin>|<tuulettimet>)"
      - "<pysäytä> [kaikki|jokainen] (<tuuletin>|<tuulettimet>)"
    example: "sammuta tuuletin"
    inferred_domain: "fan"
    response: "fans_area"
