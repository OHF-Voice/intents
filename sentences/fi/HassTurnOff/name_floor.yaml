---
# HassTurnOff - name_floor
# example: kytke kattokruunu kerroksessa ensimmäinen pois päältä

language: "fi"
data:
  # off-able domains
  - sentences:
      - "[<laita>] <päältä> {name} (kerroksessa|kerroksen) {floor}"
      - "[<laita>] {name} (kerroksessa|kerroksen) {floor} <päältä>"
      - "<pysäytä> {name} (kerroksessa|kerroksen) {floor}"
    example: "kytke kattokruunu kerroksessa ensimmäinen pois päältä"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<sulje> {name} (kerroksessa|kerroksen) {floor}"
    example: "sulje liukuovi kerroksessa ensimmäinen"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<sulje> {name} (kerroksessa|kerroksen) {floor}"
    example: "sulje pääventtiili kerroksessa ensimmäinen"
    name_domains:
      - "valve"
    response: "valve"
