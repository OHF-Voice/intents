      - "edellinen [raita|biisi|kappale|jakso] [laitteelle|laitteella] {name}"
      - "((palaa|siirry) edelliseen [raitaan|biisiin|kappaleeseen|jaksoon];[laitteelle|laitteella] {name})"
    example: "edellinen kappale laitteella TV"
    name_domains:
      - "media_player"
    response: "default"
