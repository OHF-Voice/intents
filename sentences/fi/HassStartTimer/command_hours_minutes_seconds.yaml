---
# HassStartTimer - command_hours_minutes_seconds

language: "fi"
data:
  - sentences:
      - "{timer_hours:hours} tunnin [ja] {timer_minutes:minutes} minuutin [ja] {timer_seconds:seconds} sekunnin (kuluttua|päästä|jälkeen) {timer_command:conversation_command}"
    example: "1 tunnin 15 minuutin ja 30 sekunnin kuluttua sammuta valot"
    response: "command"
