---
# HassClimateSetTemperature - temperature_only
# example: aseta lämpötila 20 asteeseen
# slots: {temperature}
# context_area: true

language: "fi"
data:
  - sentences:
      - "(<kytke>|säädä|käännä|aseta|laita) <lämpötila> {temperature}[([ ]°)|([ ](asteeseen|astetta|asteen|astetta))]"
    example: "aseta lämpötila 20 asteeseen"
    response: "default"
