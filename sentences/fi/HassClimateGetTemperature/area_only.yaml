---
# HassClimateGetTemperature - area_only
# example: paljonko on l채mp철tila olohuoneessa
# slots: {area}

language: "fi"
data:
  # area name with locative suffix
  - sentences:
      - "[<kerro>] [<paljonko>] [on] {area}[e][ssa|ss채|sta|st채|lla|ll채|lta|lt채|n] [(<nyt>|nykyinen)] <l채mp철tila> [on] [<nyt>]"
      - "[<kerro>] [<paljonko>] [on] [(<nyt>|nykyinen)] <l채mp철tila> {area}[e][ssa|ss채|sta|st채|lla|ll채|lta|lt채] [on] [<nyt>]"
      - "[<kerro>] <kuinka> (<kuuma>|<kuumaa>|<kylm채>|<kylm채채>) {area}[e][ssa|ss채|sta|st채|lla|ll채|lta|lt채] on [<nyt>]"
    example: "paljonko on l채mp철tila olohuoneessa"
    response: "default"

  # area name with area noun (alueella X)
  - sentences:
      - "[<kerro>] [<paljonko>] [on] (<alueessa>|<alueesta>|<alueella>|<alueelta>|<alueelle>|<alueen>) {area} [(<nyt>|nykyinen)] <l채mp철tila> [on] [<nyt>]"
      - "[<kerro>] [<paljonko>] [on] [(<nyt>|nykyinen)] <l채mp철tila> (<alueessa>|<alueesta>|<alueella>|<alueelta>|<alueelle>) {area} [on] [<nyt>]"
      - "[<kerro>] <kuinka> (<kuuma>|<kuumaa>|<kylm채>|<kylm채채>) on (<alueessa>|<alueesta>|<alueella>|<alueelta>|<alueelle>) {area} [<nyt>]"
    example: "paljonko on l채mp철tila alueella olohuone"
    response: "default"
