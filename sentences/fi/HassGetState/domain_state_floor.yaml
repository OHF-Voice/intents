---
# HassGetState - domain_state_floor
# example: ovatko kaikki valot pois päältä kerroksessa yksi
# slots:
# - {floor}
# - {domain}
# - {state}

language: "fi"
data:
  # ---- lights ----
  - sentences:
      - "(<onko>|<ovatko>) (<jokin>|<jotkut>) (<valo>|<valot>) {on_off_states:state} kerroksessa {floor}"
    example: "onko jokin valo päällä kerroksessa yksi"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "(<onko>|<ovatko>) <kaikki> (<valo>|<valot>) {on_off_states:state} kerroksessa {floor}"
    example: "ovatko kaikki valot pois päältä kerroksessa yksi"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "(mikä|mitkä) (<valo>|<valot>) (on|ovat) {on_off_states:state} kerroksessa {floor}"
    example: "mitkä valot ovat päällä kerroksessa yksi"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<montako> (<valo>|<valot>|valoa|valoja) on {on_off_states:state} kerroksessa {floor}"
    example: "montako valoa on päällä kerroksessa yksi"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
