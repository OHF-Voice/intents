---
# HassVacuumReturnToBase - name_only
# example: palauta imuri rover takaisin
# slots: {name}

language: "fi"
data:
  - sentences:
      - "(pyydä|käske) [imuri] {name} palaamaan [takaisin|kotiin]"
      - "palauta [imuri] {name} [takaisin|kotiin]"
    example: "palauta imuri rover takaisin"
    name_domains:
      - "vacuum"
    response: "default"
