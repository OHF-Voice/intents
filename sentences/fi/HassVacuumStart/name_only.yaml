---
# HassVacuumStart - name_only
# example: käynnistä imuri rover
# slots: {name}

language: "fi"
data:
  - sentences:
      - "käynnistä [imuri] {name}"
      - "aloita imurointi [laitteelle|laitteella|imurilla] {name}"
      - "imuroi [imurilla] {name}"
    example: "käynnistä imuri rover"
    name_domains:
      - "vacuum"
    response: "default"
