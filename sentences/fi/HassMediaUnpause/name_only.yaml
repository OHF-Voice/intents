---
# HassMediaUnpause - name_only
# example: jatka laitteen TV toistoa
# slots: {name}

language: "fi"
data:
  - sentences:
      - "jatka [laitteen|soittimen] {name} [toistoa]"
      - "[palauta] toisto [laitteelle|laitteella] {name}"
    example: "jatka laitteen TV toistoa"
    name_domains:
      - "media_player"
    response: "default"
