---
# HassStartTimer - command_hours_minutes
# example: Öffne die Garagentür in 1 Stunde und 3 Minuten

language: "de"
data:
  - sentences:
      - "{timer_command:conversation_command} (in|nach) {timer_hours:hours} Stunde[n] [und ]{timer_minutes:minutes} Minute[n]"
      - "[(mach[e]|fahr[e]|schalt[e]) ](in|nach) {timer_hours:hours} Stunde[n] [und ]{timer_minutes:minutes} Minute[n] {timer_command:conversation_command}"
    example: "Öffne die Garagentür in 1 Stunde und 3 Minuten"
    response: "command"
