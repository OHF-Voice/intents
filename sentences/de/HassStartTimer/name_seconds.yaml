      - "[einen ]{timer_name:name} Timer (auf|für) {timer_seconds:seconds} Sekunde[n]"
      - "<timer_set>[ einen] {timer_name:name} Timer (auf|für) {timer_seconds:seconds} Sekunde[n]"
      - "<timer_set>[ einen] Timer (namens|für[ (<possessivpronom_mein>|<possessivpronom_unser>|<artikel_bestimmt>)]) {timer_name:name} (auf|für) {timer_seconds:seconds} Sekunde[n]"
