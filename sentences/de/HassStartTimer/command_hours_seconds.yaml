---
# HassStartTimer - command_hours_seconds
# example: Öffne die Garagentür in 1 Stunde und 30 Sekunden

language: "de"
data:
  - sentences:
      - "{timer_command:conversation_command} (in|nach) {timer_hours:hours} Stunde[n] [und ]{timer_seconds:seconds} Sekunde[n]"
      - "[(mach[e]|fahr[e]|schalt[e]) ](in|nach) {timer_hours:hours} Stunde[n] [und ]{timer_seconds:seconds} Sekunde[n] {timer_command:conversation_command}"
    example: "Öffne die Garagentür in 1 Stunde und 30 Sekunden"
    response: "command"
