---
# HassSetVolume - area_only
# example: Stelle die Lautstärke im Wohnzimmer auf 50 Prozent
# slots: {area}, {volume_level}

language: "de"
data:
  - sentences:
      - "<setzen> [die ]Lautstärke[ (in|im)] <area>[ auf] {volume_level}[ (Prozent|%)]"
      - "<stelle> [die ]Lautstärke[ (in|im)] <area>[ auf] {volume_level}[ (Prozent|%)] ein"
      - "[die ]Lautstärke[ (in|im)] <area>[ (auf|zu)] {volume_level}[ (Prozent|%)][ <setzen_end_of_sentence>]"
    example: "Stelle die Lautstärke im Wohnzimmer auf 50 Prozent"
    response: "default"
