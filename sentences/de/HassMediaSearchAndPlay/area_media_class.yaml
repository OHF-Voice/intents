      - "(den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class} <area> <starten_end_of_sentence>"
      - "<area> (den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class} <starten_end_of_sentence>"
