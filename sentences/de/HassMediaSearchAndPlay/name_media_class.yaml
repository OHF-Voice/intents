---
# HassMediaSearchAndPlay - name_media_class
# example: spiele die Serie Diese Drombuschs auf dem TV
# slots: {name}, {media_class}, {search_query}

language: de
data:
  # media_class prefix, name after the query
  - sentences:
      - "spiel[e] {media_class} {search_query} (<an>|am) [<artikel_bestimmt> ]{name}[ ab]"
      - "{media_class} {search_query} (<an>|am) [<artikel_bestimmt> ]{name} <starten_end_of_sentence>"
    example: spiele die Serie Diese Drombuschs auf dem TV
    name_domains:
      - media_player
    response: default

  # my-query-class suffix, name after the query
  - sentences:
      - "spiel[e] (den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class} (<an>|am) [<artikel_bestimmt> ]{name}[ ab]"
      - "(den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class} (<an>|am) [<artikel_bestimmt> ]{name} <starten_end_of_sentence>"
    name_domains:
      - media_player
    response: default

  # name first, my-query-class after the name
  - sentences:
      - "spiel[e] [(<an>|am) ][<artikel_bestimmt> ]{name} (den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class}[ ab]"
      - "[(<an>|am) ][<artikel_bestimmt> ]{name} (den|die|meine[n]|unsere[n]) {search_query}[ |-]{media_class_my_split:media_class} <starten_end_of_sentence>"
    name_domains:
      - media_player
    response: default
