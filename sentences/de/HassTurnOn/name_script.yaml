---
# HassTurnOn - name_script
# example: führe das Skript Batteriewarnung aus
# slots: {name}

language: "de"
data:
  - sentences:
      - "[<skript> ][<artikel_bestimmt> ]{name} (<ausfuehren>|<aktivieren>)"
      - "[<artikel_bestimmt> ]{name} <skript> (<ausfuehren>|<aktivieren>)"
      - "führe[ <skript>] [<artikel_bestimmt> ]{name} aus"
      - "führe [<artikel_bestimmt> ]{name} <skript> aus"
      - "<aktivieren>[ <skript>] [<artikel_bestimmt> ]{name}"
      - "<aktivieren> [<artikel_bestimmt> ]{name} <skript>"
    example: "führe das Skript Batteriewarnung aus"
    name_domains:
      - "script"
    response: "script"
