      - "<luefter> <area> (an|(ein|an)schalten|anmachen)"
      - "<area> <luefter> (an|(ein|an)schalten|anmachen)"
      - "<schalten> <alle_luefter> <area> (an|ein)"
      - "<schalten> <area> <alle_luefter> (an|ein)"
      - "starte <alle_luefter> <area>"
      - "starte <area> <alle_luefter>"
      - "<machen> <alle_luefter> <area> an"
      - "<machen> <area> <alle_luefter> an"
