      - "(änder[e]|veränder[e]) [[die ]Farbe[ (von|vom)] ][<artikel_bestimmt> ]{name} zu {color}"
      - "[die ]Farbe[ (von|vom)] [<artikel_bestimmt> ]{name}[ (auf|zu)] {color} <setzen_end_of_sentence>"
      - "[<artikel_bestimmt> ]{name}[ Farbe][ (auf|zu)] {color}[ <setzen_end_of_sentence>]"
      - "Lass[e] [<artikel_bestimmt> ]{name} {color}[ er]leuchten"
      - "[<artikel_bestimmt> ]{name} [in [Farbe ]]{color} <leuchten_lassen>"
