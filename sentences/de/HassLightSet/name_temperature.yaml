---
# HassLightSet - name_temperature
# example: Stelle die Farbtemperatur der Schlafzimmerlampe auf warmweiß
# slots:
# - {name}
# - {temperature}

language: "de"
data:
  # color temperature in Kelvin
  - sentences:
      - "[<setze> ][[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name}[ auf] {color_temperature:temperature}[([ ]K| Kelvin)]"
      - "<stelle> [[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name}[ auf] {color_temperature:temperature}[([ ]K| Kelvin)][ ein]"
      - "(änder[e]|veränder[e]) [[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name} zu {color_temperature:temperature}[([ ]K| Kelvin)]"
      - "[die ]Farbtemperatur[ (von|vom)] [<artikel_bestimmt> ]{name}[ (auf|zu)] {color_temperature:temperature}[([ ]K| Kelvin)] <setzen_end_of_sentence>"
      - "[<artikel_bestimmt> ]{name}[ Farbtemperatur][ (auf|zu)] {color_temperature:temperature}[([ ]K| Kelvin)][ <setzen_end_of_sentence>]"
    example: "Stelle die Farbtemperatur der Schlafzimmerlampe auf 2700 Kelvin"
    name_domains:
      - "light"
    response: "temperature"

  # color temperature by name (warm white, cold white, ...)
  - sentences:
      - "[<setze> ][[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name}[ auf] {color_temperature_names:temperature}"
      - "<stelle> [[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name}[ auf] {color_temperature_names:temperature}[ ein]"
      - "(änder[e]|veränder[e]) [[die ]Farbtemperatur[ (von|vom)] ][<artikel_bestimmt> ]{name} zu {color_temperature_names:temperature}"
      - "[die ]Farbtemperatur[ (von|vom)] [<artikel_bestimmt> ]{name}[ (auf|zu)] {color_temperature_names:temperature} <setzen_end_of_sentence>"
      - "[<artikel_bestimmt> ]{name}[ Farbtemperatur][ (auf|zu)] {color_temperature_names:temperature}[ <setzen_end_of_sentence>]"
      - "Lass[e] [<artikel_bestimmt> ]{name} {color_temperature_names:temperature}[ er]leuchten"
      - "[<artikel_bestimmt> ]{name} [in [Farbtemperatur ]]{color_temperature_names:temperature} <leuchten_lassen>"
      - "Färbe [<artikel_bestimmt> ]{name} {color_temperature_names:temperature}[ ein]"
    example: "Stelle die Farbtemperatur der Schlafzimmerlampe auf warmweiß"
    name_domains:
      - "light"
    response: "temperature"
