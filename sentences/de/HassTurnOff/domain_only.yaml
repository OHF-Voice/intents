---
# HassTurnOff - domain_only
# example: schalte das Licht aus
# context_area: true
# slots: {domain}

language: "de"
data:
  # lights in the satellite's area
  - sentences:
      - "(<schalten>|<machen>) (<licht>|<lichter>)[ <hier>] aus"
      - "(<schalten>|dreh[e]) (<licht>|<lichter>)[ <hier>] ab"
      - "(<schalten>|<machen>) <hier> (<licht>|<lichter>) aus"
      - "(<schalten>|dreh[e]) <hier> (<licht>|<lichter>) ab"
      - "(<licht>|<lichter>)[ <hier>] (aus[schalten]|abschalten|ausmachen|abdrehen)"
      - "<hier> (<licht>|<lichter>) (aus[schalten]|abschalten|ausmachen|abdrehen)"
    example: "schalte das Licht aus"
    inferred_domain: "light"
    response: "lights_area"

  # fans in the satellite's area
  - sentences:
      - "<schalten>[ <hier>] <luefter> (aus|ab)"
      - "<schalten> <luefter> <hier> (aus|ab)"
      - "<schalten> <luefter> <aus> <hier>"
      - "stoppe[ <hier>] <luefter>"
      - "stoppe <luefter> <hier>"
      - "<machen>[ <hier>] <luefter> aus"
      - "<machen> <luefter> <hier> aus"
      - "<machen> <luefter> <aus> <hier>"
      - "[<hier> ]<luefter> (aus|aus(schalten|machen)|abschalten)"
      - "<luefter> <hier> (aus|aus(schalten|machen)|abschalten)"
      - "<luefter> (aus|aus(schalten|machen)|abschalten) <hier>"
    example: "schalte den Ventilator aus"
    inferred_domain: "fan"
    response: "fans_area"
