---
# HassTurnOff - area_domain
# example: schalte alle Lichter in der Küche aus
# slots:
# - {area}
# - {domain}

language: "de"
data:
  # lights
  - sentences:
      - "(<schalten>|<machen>) (<licht>|<lichter>|<alle_lichter>) <area> aus"
      - "(<schalten>|dreh[e]) (<licht>|<lichter>|<alle_lichter>) <area> ab"
      - "(<schalten>|<machen>) <area> (<licht>|<lichter>|<alle_lichter>) aus"
      - "(<schalten>|dreh[e]) <area> (<licht>|<lichter>|<alle_lichter>) ab"
      - "(<licht>|<lichter>|<alle_lichter>) <area> (aus[schalten]|abschalten|ausmachen|abdrehen)"
      - "<area> (<licht>|<lichter>|<alle_lichter>) (aus[schalten]|abschalten|ausmachen|abdrehen)"
    example: "schalte alle Lichter in der Küche aus"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<schalten> <luefter> <area> (aus|ab)"
      - "<schalten> <area> <luefter> (aus|ab)"
      - "stoppe <luefter> <area>"
      - "stoppe <area> <luefter>"
      - "<machen> <luefter> <area> aus"
      - "<machen> <area> <luefter> aus"
      - "<luefter> <area> (aus|aus(schalten|machen)|abschalten)"
      - "<area> <luefter> (aus|aus(schalten|machen)|abschalten)"
      - "<schalten> <alle_luefter> <area> (aus|ab)"
      - "<schalten> <area> <alle_luefter> (aus|ab)"
      - "stoppe <alle_luefter> <area>"
      - "stoppe <area> <alle_luefter>"
      - "<machen> <alle_luefter> <area> aus"
      - "<machen> <area> <alle_luefter> aus"
      - "<alle_luefter> <area> (aus|aus(schalten|machen)|abschalten)"
      - "<area> <alle_luefter> (aus|aus(schalten|machen)|abschalten)"
    example: "schalte den Ventilator im Wohnzimmer aus"
    inferred_domain: "fan"
    response: "fans_area"
