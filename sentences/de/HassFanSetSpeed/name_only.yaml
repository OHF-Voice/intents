---
# HassFanSetSpeed - name_only
# slots: {name}, {percentage}

language: "de"
data:
  - sentences:
      - "[<setzen> [die ]]Geschwindigkeit [<von_dem> ][<artikel_bestimmt> ]{name} (auf|zu) {fan_speed:percentage}[%| Prozent]"
      - "<stelle> [die ]Geschwindigkeit [<von_dem> ][<artikel_bestimmt> ]{name} auf {fan_speed:percentage}[%| Prozent] ein"
      - "[Geschwindigkeit ][<von_dem> ][<artikel_bestimmt> ]{name}[ auf] {fan_speed:percentage}[%| Prozent][ <setzen_end_of_sentence>]"
    example: "Ändere die Geschwindigkeit des Deckenventilator auf 50%"
    name_domains:
      - "fan"
    response: "default"
