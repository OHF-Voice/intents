---
# HassGetState - device_class_state
# example: 所有窗帘都是打开的吗

language: "zh-CN"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "(有|有没有|有任何){cover_classes:device_class}[是|处于]{cover_states:state}[的][吗]"
      - "{cover_classes:device_class}(有|有没有){cover_states:state}[的][吗]"
    example: "有没有窗户是打开的"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "[<all>]{cover_classes:device_class}(都是|都|是不是都|是否都){cover_states:state}[的][吗]"
    example: "所有窗帘都是打开的吗"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which>{cover_classes:device_class}(是|处于){cover_states:state}[的]"
    example: "哪些窗户是打开的"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many_is>{cover_classes:device_class}(是|处于){cover_states:state}[的]"
    example: "有多少窗户是打开的"
    inferred_domain: "cover"
    response: "how_many"
