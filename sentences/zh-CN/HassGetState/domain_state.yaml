---
# HassGetState - domain_state
# example: 所有灯都关着吗

language: "zh-CN"
data:
  # ---- lights ----
  - sentences:
      - "(有|有没有)<light>[是|处于]{on_off_states:state}[的][吗]"
      - "<light>(有|有没有){on_off_states:state}[的][吗]"
    example: "有没有灯开着"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "[<all>]<light>(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "所有灯都关着吗"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which><light>(是|处于){on_off_states:state}[的]"
    example: "哪些灯是开着的"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many_is><light>(是|处于){on_off_states:state}[的]"
    example: "有多少灯是开着的"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "(有|有没有)(风扇|电扇|塔扇|吊扇)[是|处于]{on_off_states:state}[的][吗]"
      - "(风扇|电扇|塔扇|吊扇)(有|有没有){on_off_states:state}[的][吗]"
    example: "有没有风扇开着"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "[<all>](风扇|电扇|塔扇|吊扇)(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "所有风扇都关着吗"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which>(风扇|电扇|塔扇|吊扇)(是|处于){on_off_states:state}[的]"
    example: "哪些风扇是开着的"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<how_many_is>(风扇|电扇|塔扇|吊扇)(是|处于){on_off_states:state}[的]"
    example: "有多少风扇是开着的"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "(有|有没有)(开关|电源|插座|通断器)[是|处于]{on_off_states:state}[的][吗]"
      - "(开关|电源|插座|通断器)(有|有没有){on_off_states:state}[的][吗]"
    example: "有没有开关开着"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "[<all>](开关|电源|插座|通断器)(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "所有开关都关着吗"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<which>(开关|电源|插座|通断器)(是|处于){on_off_states:state}[的]"
    example: "哪些开关是开着的"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "<how_many_is>(开关|电源|插座|通断器)(是|处于){on_off_states:state}[的]"
    example: "有多少开关是开着的"
    inferred_domain: "switch"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "(有|有没有)(门|锁|门锁)[是|处于]{lock_states:state}[的][吗]"
      - "(门|锁|门锁)(有|有没有){lock_states:state}[的][吗]"
    example: "有没有门是解锁的"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "[<all>](门|锁|门锁)(都是|都|是不是都|是否都){lock_states:state}[的][吗]"
    example: "所有门都锁着吗"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "(<which>|哪[一]扇)(门|锁|门锁)(是|处于){lock_states:state}[的]"
    example: "哪些门是解锁的"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "(<how_many_is>|有几扇)(门|锁|门锁)(是|处于){lock_states:state}[的]"
    example: "有多少门是锁着的"
    inferred_domain: "lock"
    response: "how_many"

  # ---- people / zones ----
  - sentences:
      - "(有人|有谁|是否有人|有没有人)(在|是){zone:state}[吗]"
    example: "有人在家吗"
    inferred_domain: "person"
    response: "any"
  - sentences:
      - "(是不是每个人|是否所有人|所有人|大家)(都)[在]{zone:state}[吗]"
    example: "所有人都在家吗"
    inferred_domain: "person"
    response: "all"
  - sentences:
      - "(谁|有谁|哪些人)(在|是){zone:state}"
    example: "谁在家"
    inferred_domain: "person"
    response: "which"
  - sentences:
      - "<how_many_is>(人|个人)[在]{zone:state}"
    example: "有多少人在家"
    inferred_domain: "person"
    response: "how_many"
