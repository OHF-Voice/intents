---
# HassGetState - domain_state_floor
# example: 一楼所有灯都关着吗

language: "zh-CN"
data:
  # ---- lights ----
  - sentences:
      - "{floor}[楼|层][的](有|有没有)<light>[是|处于]{on_off_states:state}[的][吗]"
      - "{floor}[楼|层][的]<light>(有|有没有){on_off_states:state}[的][吗]"
    example: "一楼有没有灯开着"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "{floor}[楼|层][的][<all>]<light>(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "一楼所有灯都关着吗"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which>{floor}[楼|层][的]<light>(是|处于){on_off_states:state}[的]"
    example: "一楼哪些灯是开着的"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "{floor}[楼|层][的]<how_many_is><light>(是|处于){on_off_states:state}[的]"
    example: "一楼有多少灯是开着的"
    inferred_domain: "light"
    response: "how_many"

