---
# HassGetState - domain_state_area
# example: 厨房有哪些灯是开着的

language: "zh-CN"
data:
  # ---- lights ----
  - sentences:
      - "{area}[的](有|有没有)<light>[是|处于]{on_off_states:state}[的][吗]"
      - "{area}[的]<light>(有|有没有){on_off_states:state}[的][吗]"
    example: "厨房有没有灯开着"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "{area}[的][<all>]<light>(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "厨房所有灯都关着吗"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which>{area}[的]<light>(是|处于){on_off_states:state}[的]"
    example: "厨房哪些灯是开着的"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "{area}[的]<how_many_is><light>(是|处于){on_off_states:state}[的]"
    example: "厨房有多少灯是开着的"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "{area}[的](有|有没有)(风扇|电扇|塔扇|吊扇)[是|处于]{on_off_states:state}[的][吗]"
      - "{area}[的](风扇|电扇|塔扇|吊扇)(有|有没有){on_off_states:state}[的][吗]"
    example: "厨房有没有风扇开着"
    inferred_domain: "fan"
