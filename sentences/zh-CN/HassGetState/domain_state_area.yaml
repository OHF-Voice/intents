  # ---- locks ----
  - sentences:
      - "{area}[的](有|有没有)(门|锁|门锁)[是|处于]{lock_states:state}[的][吗]"
      - "{area}[的](门|锁|门锁)(有|有没有){lock_states:state}[的][吗]"
    example: "走廊有没有门是解锁的"
    inferred_domain: "lock"
