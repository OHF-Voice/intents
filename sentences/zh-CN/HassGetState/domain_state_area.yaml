  - sentences:
      - "{area}[的][<all>](风扇|电扇|塔扇|吊扇)(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "客厅所有风扇都关着吗"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which>{area}[的](风扇|电扇|塔扇|吊扇)(是|处于){on_off_states:state}[的]"
    example: "厨房哪些风扇是开着的"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "{area}[的]<how_many_is>(风扇|电扇|塔扇|吊扇)(是|处于){on_off_states:state}[的]"
    example: "厨房有多少风扇是开着的"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "{area}[的](有|有没有)(开关|电源|插座|通断器)[是|处于]{on_off_states:state}[的][吗]"
      - "{area}[的](开关|电源|插座|通断器)(有|有没有){on_off_states:state}[的][吗]"
    example: "厨房有没有开关开着"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "{area}[的][<all>](开关|电源|插座|通断器)(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
    example: "厨房所有开关都关着吗"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "<which>{area}[的](开关|电源|插座|通断器)(是|处于){on_off_states:state}[的]"
    example: "厨房哪些开关是开着的"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "{area}[的]<how_many_is>(开关|电源|插座|通断器)(是|处于){on_off_states:state}[的]"
    example: "厨房有多少开关是开着的"
