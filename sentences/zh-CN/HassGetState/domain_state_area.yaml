  - sentences:
      - "<which>{area}[的](门|锁|门锁)(是|处于){lock_states:state}[的]"
    example: "走廊哪些门是解锁的"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "{area}[的](<how_many_is>|有几扇)(门|锁|门锁)(是|处于){lock_states:state}[的]"
    example: "走廊有多少门是锁着的"
