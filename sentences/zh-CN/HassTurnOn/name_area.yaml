language: "zh-CN"
data:
  # on-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "<turn_on>{area}[的]{name}[的][(<light>|(开关|电源|插座|通断器))]"
      - "[把|将|让|给]{area}[的]{name}[的][(<light>|(开关|电源|插座|通断器))]<turn_on>"
    example: "打开客厅吊扇"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<open>{area}[的]{name}[的]"
      - "[把|将|让|给]{area}[的]{name}[的]<open>"
    example: "打开客厅左侧窗帘"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open>{area}[的]{name}[的]"
      - "[把|将|让|给]{area}[的]{name}[的]<open>"
    example: "打开厨房主阀门"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "(关上|锁上|上锁){area}[的]{name}[的][锁]"
      - "[把|将|让|给]{area}[的]{name}[的][锁](关上|锁上|上锁)"
    example: "锁上客厅大门"
    name_domains:
      - "lock"
    response: "lock"
