language: zh-CN
intents:
  HassClimateSetTemperature:
    data:
      # 当前区域（例如卫星所在区域），避免按全局空调类别批量修改
      - sentences:
          - "[(把|将)]空调(设置为|设为|调到|调成){temperature:temperature}[(度|摄氏度)]"
        requires_context:
          area:
            slot: true

      # 按区域名设置
      - sentences:
          - "[(把|将)]{area}[的][空调][温度](设置为|设为|调到|调成){temperature:temperature}[(度|摄氏度)]"
          - "{area}[的][空调][温度](设置为|设为|调到|调成){temperature:temperature}[(度|摄氏度)]"

      # 按设备名称设置（只作用于该设备，不按类别批量修改）
      - sentences:
          - "[(把|将)]{name}的温度(设置为|设为|调到|调成){temperature:temperature}[(度|摄氏度)]"
          - "{name}温度(设置为|设为|调到|调成){temperature:temperature}[(度|摄氏度)]"
        requires_context:
          domain: climate
