language: zh-CN
intents:
  HassMediaSearchAndPlay:
    data:
      - sentences:
          - "播放{search_query}"
          - "我想听{search_query}"
          - "放{search_query}"
          - "搜索并播放{search_query}"
          - "帮我播放{search_query}"
        slots:
          search_query:
            wildcard: true
      - sentences:
          - "在{area} 播放{search_query}"
          - "在{area} 放{search_query}"
          - "{area} 播放{search_query}"
        slots:
          area:
            wildcard: true
          search_query:
            wildcard: true
      - sentences:
          - "在{name} 播放{search_query}"
          - "用{name} 播放{search_query}"
          - "在{name} 上播放{search_query}"
        slots:
          name:
            wildcard: true
          search_query:
            wildcard: true
      - sentences:
          - "在{area} 的{name} 播放{search_query}"
          - "用{area} 的{name} 播放{search_query}"
        slots:
          area:
            wildcard: true
          name:
            wildcard: true
          search_query:
            wildcard: true
