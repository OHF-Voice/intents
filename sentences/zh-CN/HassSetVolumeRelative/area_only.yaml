language: "zh-CN"
data:
  # relative direction (up)
  - sentences:
      - "{area}[的]音量调高"
      - "[把|将|让|给]{area}[的]声音调大"
      - "[把|将|让|给]{area}[的]音量大一点"
    slots:
      volume_step: "up"
    example: "客厅音量调高"
    response: "default"

  # by a percentage (up)
  - sentences:
      - "{area}[的]音量调高{volume_step_up:volume_step}"
      - "{area}[的]音量调高{volume_step_up:volume_step}%"
      - "{area}[的]音量调高百分之{volume_step_up:volume_step}"
      - "[把|将|让|给]{area}[的]声音调大{volume_step_up:volume_step}"
      - "[把|将|让|给]{area}[的]声音调大{volume_step_up:volume_step}%"
      - "[把|将|让|给]{area}[的]声音调大百分之{volume_step_up:volume_step}"
      - "[把|将|让|给]{area}[的]音量提高{volume_step_up:volume_step}"
      - "[把|将|让|给]{area}[的]音量提高{volume_step_up:volume_step}%"
      - "[把|将|让|给]{area}[的]音量提高百分之{volume_step_up:volume_step}"
    example: "客厅音量调高20"
    response: "default"

  # relative direction (down)
  - sentences:
      - "{area}[的]音量调低"
      - "[把|将|让|给]{area}[的]声音调小"
      - "[把|将|让|给]{area}[的]音量小一点"
    slots:
      volume_step: "down"
    example: "客厅音量调低"
    response: "default"

  # by a percentage (down)
  - sentences:
      - "{area}[的]音量调低{volume_step_down:volume_step}"
      - "{area}[的]音量调低{volume_step_down:volume_step}%"
      - "{area}[的]音量调低百分之{volume_step_down:volume_step}"
      - "[把|将|让|给]{area}[的]声音调小{volume_step_down:volume_step}"
      - "[把|将|让|给]{area}[的]声音调小{volume_step_down:volume_step}%"
      - "[把|将|让|给]{area}[的]声音调小百分之{volume_step_down:volume_step}"
      - "[把|将|让|给]{area}[的]音量降低{volume_step_down:volume_step}"
      - "[把|将|让|给]{area}[的]音量降低{volume_step_down:volume_step}%"
      - "[把|将|让|给]{area}[的]音量降低百分之{volume_step_down:volume_step}"
    example: "客厅音量调低20"
    response: "default"
