language: zh-CN
intents:
  HassGetState:
    data:
      # https://www.home-assistant.io/integrations/person/
      - sentences:
          - "{name}在哪[里]"
          - "{name}[现在]在什么地方"
          - "{name}[的]位置<what_is>"
          - "{name}人呢"
        response: where
        requires_context:
          domain: "person"
        slots:
          name:
            wildcard: true
          domain: "person"
