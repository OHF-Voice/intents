language: "zh-CN"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "<turn_off>{floor}[楼|层][的]{name}[的][(<light>|(开关|电源|插座|通断器))]"
      - "[把|将|让|给]{floor}[楼|层][的]{name}[的][(<light>|(开关|电源|插座|通断器))]<turn_off>"
    example: "关闭一楼吊扇"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<close>{floor}[楼|层][的]{name}[的]"
      - "[把|将|让|给]{floor}[楼|层][的]{name}[的]<close>"
    example: "关闭一楼左侧窗帘"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close>{floor}[楼|层][的]{name}[的]"
      - "[把|将|让|给]{floor}[楼|层][的]{name}[的]<close>"
    example: "关闭一楼主阀门"
    name_domains:
      - "valve"
    response: "valve"
