language: "zh-CN"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "<turn_off>{area}[的]{name}[的][(<light>|(开关|电源|插座|通断器))]"
      - "[把|将|让|给]{area}[的]{name}[的][(<light>|(开关|电源|插座|通断器))]<turn_off>"
    example: "关闭客厅吊扇"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<close>{area}[的]{name}[的]"
      - "[把|将|让|给]{area}[的]{name}[的]<close>"
    example: "关闭客厅左侧窗帘"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close>{area}[的]{name}[的]"
      - "[把|将|让|给]{area}[的]{name}[的]<close>"
    example: "关闭厨房主阀门"
    name_domains:
      - "valve"
    response: "valve"

  # locks (turning a lock "off" means unlocking it)
  - sentences:
      - "(打开|解锁){area}[的]{name}[的][锁]"
      - "[把|将|让|给]{area}[的]{name}[的][锁](打开|解锁)"
    example: "解锁客厅大门"
    name_domains:
      - "lock"
    response: "lock"
