language: zh-CN
intents:
  HassTurnOff:
    data:
      - sentences:
          - "<turn_off>[<area>]{name}"
          - "[<let>][<area>]{name}<turn_off>"
          - "关闭 [<area>]{name}"
          - "[<let>][<area>]{name} 关闭"
        excludes_context:
          domain:
            - binary_sensor
            - cover
            - lock
            - scene
            - script
            - sensor
      - sentences:
          - "关闭 [<area>]{name}"
          - "[<let>][<area>]{name} 关闭"
        slots:
          name:
            wildcard: true
          domain:
            values:
              - "cover"
              - "valve"
