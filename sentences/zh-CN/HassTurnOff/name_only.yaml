language: "zh-CN"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "<turn_off>{name}[的][(<light>|(开关|电源|插座|通断器))]"
      - "[把|将|让|给]{name}[的][(<light>|(开关|电源|插座|通断器))]<turn_off>"
    example: "关闭易来吸顶灯"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<close>{name}[的]"
      - "[把|将|让|给]{name}[的]<close>"
      - "[把|将|让|给]{name}[的]关上"
    example: "关闭左侧窗帘"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close>{name}[的]"
      - "[把|将|让|给]{name}[的]<close>"
    example: "关闭主阀门"
    name_domains:
      - "valve"
    response: "valve"

  # locks (turning a lock "off" means unlocking it)
  - sentences:
      - "(打开|解锁){name}[的][锁]"
      - "[把|将|让|给]{name}[的][锁](打开|解锁)"
    example: "解锁前门"
    name_domains:
      - "lock"
    response: "lock"
