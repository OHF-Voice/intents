---
# HassTurnOn - area_device_class_cover
# example: open the curtains in the living room
# slots:
# - {area}
# - {domain}
# - {device_class}

language: "pa"
data:
  - sentences:
      - "{area} <in> [<the>] {cover_classes:device_class} [ਨੂੰ] <open>"
      - "{area} ਦੇ [<the>] {cover_classes:device_class} [ਨੂੰ] <open>"
    example: "ਲਿਵਿੰਗ ਰੂਮ ਵਿੱਚ ਪਰਦੇ ਖੋਲ੍ਹੋ"
    inferred_domain: "cover"
    response: "cover_device_class"
