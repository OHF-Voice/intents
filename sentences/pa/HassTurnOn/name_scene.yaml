---
# HassTurnOn - name_scene
# example: activate mood lighting scene
# slots: {name}

language: "pa"
data:
  - sentences:
      - "[<the>] {name} [ਸੀਨ] [ਨੂੰ] <activate>"
      - "[<the>] {name} [ਸੀਨ] ਲਾਗੂ ਕਰੋ"
    example: "ਪਾਰਟੀ ਮੋਡ ਸਰਗਰਮ ਕਰੋ"
    name_domains:
      - "scene"
    response: "scene"
