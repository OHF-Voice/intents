---
# HassTurnOff - domain_all
# example: turn off all the lights in the house
# slots: {domain}
# context_area: false

language: "pa"
data:
  - sentences:
      - "<everywhere> [<all>] <light> [ਨੂੰ] <turn_off>"
      - "<all> <light> <everywhere> [ਨੂੰ] <turn_off>"
      - "<light> <everywhere> [ਨੂੰ] <turn_off>"
    example: "ਪੂਰੇ ਘਰ ਵਿੱਚ ਸਾਰੀਆਂ ਲਾਈਟਾਂ ਬੰਦ ਕਰੋ"
    inferred_domain: "light"
    response: "light_all"
