---
# HassMediaNext - name_only
# example: next track on the stereo
# slots: {name}

language: "sl"
data:
  - sentences:
      - "[predvajaj] naslednj(o|i|e) [pesem|skladbo|oddajo|element|posnetek|epizodo|komad] [na] {name}"
      - "(preskoči [na naslednj(i|o|a|o)] [pesem|skladbo|komad|štiklc|epizodo] ;[na ]{name})"
    example: "naslednjo epizodo na TV"
    name_domains:
      - "media_player"
    response: "default"
