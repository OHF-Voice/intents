---
# HassLightSet - temperature_only
# example: nastavi barvno temperaturo na 2700 kelvinov
language: "sl"
data:
  - sentences:
      - "[<numeric_value_set>] [barvno] temperaturo [na] {color_temperature:temperature}[[ ](k|kelvin|kelvinov)]"
    example: "nastavi barvno temperaturo na 2700 kelvinov"
    inferred_domain: "light"
    response: "temperature"
