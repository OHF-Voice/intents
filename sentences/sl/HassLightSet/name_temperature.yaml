---
# HassLightSet - name_temperature
# example: nastavi barvno temperaturo spalniške luči na 2700 kelvinov
language: "sl"
data:
  - sentences:
      - "[<numeric_value_set>] [barvno] temperaturo {name} [na] {color_temperature:temperature}[[ ](k|kelvin|kelvinov)]"
      - "[<numeric_value_set>] {name} [barvno] temperaturo [na] {color_temperature:temperature}[[ ](k|kelvin|kelvinov)]"
    example: "nastavi barvno temperaturo spalniške luči na 2700 kelvinov"
    name_domains:
      - "light"
    response: "temperature"
