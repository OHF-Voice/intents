---
# HassLightSet - name_color
# example: nastavi barvo spalniške luči na rdečo
language: "sl"
data:
  - sentences:
      - "[<set>] [barvo] {name} [na] {color} [barvo]"
      - "[<set>] {color} {name}"
    example: "nastavi barvo spalniške luči na rdečo"
    name_domains:
      - "light"
    response: "color"
