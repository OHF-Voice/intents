---
# HassLightSet - area_color
# example: nastavi barvo v dnevni sobi na rdečo
language: "sl"
data:
  - sentences:
      - "[<set>] [barvo] [v|na] {area} [na|v] {color} [barvo]"
      - "[<set>] {color} [<luč>] [v|na] {area}"
    example: "nastavi barvo v dnevni sobi na rdečo"
    inferred_domain: "light"
    response: "color"
