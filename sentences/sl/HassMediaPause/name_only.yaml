---
# HassMediaPause - name_only
# example: pause TV
# slots: {name}

language: "sl"
data:
  - sentences:
      - "((zaustavi| [daj] na pavzo| [daj] [na] premor);{name})"
      - "([daj] {name} [na] (pavzo|premor))"
    example: "zaustavi TV"
    name_domains:
      - "media_player"
    response: "default"
