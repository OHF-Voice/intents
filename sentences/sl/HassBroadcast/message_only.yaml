---
# HassBroadcast - message_only
# example: broadcast that dinner is ready
# slots: {message}

language: "sl"
data:
  - sentences:
      - "(oznani|naznani|oddaj|napovej|sporoči|objavi|brodkastaj|daj na (zvočnik[u|ih]|satelit[u|ih])) [povsod|[na] (vsakem[u]|vseh) [satelit(u|ih)]] [da je] {message}"
    example: "oznani da je večerja pripravljena"
    response: "default"
