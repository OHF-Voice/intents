---
# HassClimateSetTemperature - name_temperature
# example: nastavi termostat na 20 stopinj
# slots:
# - {name}
# - {temperature}

language: "sl"
data:
  - sentences:
      - "<set> <temp> [na] {name} [na] <temperature>"
      - "<set> {name} [<temp>] [na] <temperature>"
    example: "nastavi termostat na 20 stopinj"
    name_domains:
      - "climate"
    response: "default"
