---
# HassClimateGetTemperature - area_only
# example: kakšna je temperatura v dnevni sobi
# slots: {area}

language: "sl"
data:
  - sentences:
      - "(kakšna|kaksna) je <temp> [v|na] {area}"
      - "koliko stopinj je [v|na] {area}"
      - "povej mi <temp> [v|na] {area}"
      - "ali je (toplo|hladno|vroče|vroce) [v|na] {area}"
      - "<temp> [v|na] {area}"
    example: "kakšna je temperatura v dnevni sobi"
    response: "default"
