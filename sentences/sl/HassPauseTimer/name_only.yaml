---
# HassPauseTimer - name_only
# example: pavziraj časovnik za pico
# slots: name

language: "sl"
data:
  - sentences:
      - "(pavziraj|[daj na] premor|[daj] na pavzo) [moj] {timer_name:name} (časovnik|timer|tajmer|štoparico|odštevalnik)"
      - "(pavziraj|[daj na] premor|[daj] na pavzo) [moj] (časovnik|timer|tajmer|štoparico|odštevalnik) (poimenovan|po imenu|imenovan) {timer_name:name}"
    example: "pavziraj časovnik za pico"
    response: "default"
