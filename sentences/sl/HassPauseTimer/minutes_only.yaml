      - "(pavziraj|[daj na] premor|[daj] na pavzo) [moj] {timer_minutes:start_minutes} minutni (časovnik|timer|tajmer|štoparico|odštevalnik)"
      - "(pavziraj|[daj na] premor|[daj] na pavzo) [moj] (časovnik|timer|tajmer|štoparico|odštevalnik) [za] {timer_minutes:start_minutes} minut[a|e|i]"
    example: "pavziraj 10 minutni časovnik"
    response: "default"
