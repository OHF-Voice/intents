---
# HassUnpauseTimer - minutes_only
# example: nadaljuj 10 minutni časovnik
# slots: start_minutes

language: "sl"
data:
  - sentences:
      - "nadaljuj [moj] {timer_minutes:start_minutes} minutni (časovnik|timer|tajmer|štoparico|odštevalnik)"
      - "nadaljuj [moj] (časovnik|timer|tajmer|štoparico|odštevalnik) [za] {timer_minutes:start_minutes} minut[a|e|i]"
    example: "nadaljuj 10 minutni časovnik"
    response: "default"
