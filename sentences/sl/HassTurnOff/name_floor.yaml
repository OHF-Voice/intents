---
# HassTurnOff - name_floor
# example: izklopi stropno luč v pritličju
# slots:
# - name
# - floor

language: "sl"
data:
  - sentences:
      - "<izklopi> {name} [v|na] {floor} [nadstropju]"
    example: "izklopi stropno luč v pritličju"
    name_domains: "default"
    response: "default"

  - sentences:
      - "<izklopi> {name} <luč> [v|na] {floor} [nadstropju]"
    example: "izklopi luč v igralnem kotu v pritličju"
    name_domains:
      - "light"
    response: "default"

  - sentences:
      - "<zapri> {name} [v|na] {floor} [nadstropju]"
    example: "zapri drsna vrata v pritličju"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<zapri> {name} [v|na] {floor} [nadstropju]"
    example: "zapri glavni ventil v pritličju"
    name_domains:
      - "valve"
    response: "valve"
