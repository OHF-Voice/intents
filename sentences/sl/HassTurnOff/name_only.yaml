---
# HassTurnOff - name_only
# example: izklopi stropno luč
# slots: {name}

language: "sl"
data:
  - sentences:
      - "<izklopi> {name}"
    example: "izklopi stropno luč"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  - sentences:
      - "<izklopi> {name} <luč>"
    example: "izklopi luč v igralnem kotu"
    name_domains:
      - "light"
    response: "default"

  - sentences:
      - "<zapri> {name}"
    example: "zapri drsna vrata"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<zapri> {name}"
    example: "zapri glavni ventil"
    name_domains:
      - "valve"
    response: "valve"

  - sentences:
      - "odkleni {name}"
    example: "odkleni vhodna vrata"
    name_domains:
      - "lock"
    response: "lock"
