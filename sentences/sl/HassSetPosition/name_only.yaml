---
# HassSetPosition - name_only
# example: nastavi zaveso na 50%
# slots:
# - {name}
# - {position}

language: "sl"
data:
  - sentences:
      - "(<numeric_value_set>|<odpri>|<zapri>) {name} [na] [položaj|pozicijo] {position}[[ ]%| odstotkov|procentov]"
    example: "nastavi zaveso na 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
