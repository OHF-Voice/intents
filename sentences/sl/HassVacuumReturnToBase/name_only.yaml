---
# HassVacuumReturnToBase - name_only
# example: return rover to base
# slots: {name}

language: "sl"
data:
  - sentences:
      - "(vrni|pošlji) {name} [nazaj] [v] [bazo]"
      - "{name} vrni [se] [nazaj] v bazo"
    example: "vrni rover v bazo"
    name_domains:
      - "vacuum"
    response: "default"
