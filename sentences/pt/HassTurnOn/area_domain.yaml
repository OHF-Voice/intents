---
# HassTurnOn - area_domain
# example: liga as luzes da cozinha
# slots:
# - {area}
# - {domain}

language: "pt"

data:
  # lights
  - sentences:
      - "<ligar> [tod(as|os)] [(o|a|os|as)] <luz> (em|no|na|do|da) {area}"
      - "<ligar> [tod(as|os)] [(o|a|os|as)] {area} <luz>"
    example: "liga as luzes da cozinha"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<ligar> [tod(as|os)] [(o|a|os|as)] ventoinha[s] (em|no|na|do|da) {area}"
      - "<ligar> [tod(as|os)] [(o|a|os|as)] {area} ventoinha[s]"
    example: "liga as ventoinhas da cozinha"
    inferred_domain: "fan"
    response: "fans_area"
