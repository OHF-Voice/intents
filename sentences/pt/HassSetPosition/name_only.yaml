      - "(<mudar>|<abrir>|<fechar>) [a posição [(de|do|da)]] [(o|a|os|as)] {name} (a|para|até) {position}[[ ]%| porcento]"
    example: "abre a Cortina Esquerda a 50%"
    name_domains:
      - "cover"
    response: "default"

  # valves
