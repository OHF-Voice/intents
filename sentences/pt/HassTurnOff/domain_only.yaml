---
# HassTurnOff - domain_only
# example: desliga as luzes
# context_area: true

language: "pt"

data:
  # lights in the satellite's area (implicit/explicit "here")
  - sentences:
      - "<desligar> [(o|a|os|as)] <luz>"
      - "<desligar> [tod(as|os)] [(o|a|os|as)] <luz> (aqui|nesta divisão|nesta sala)"
      - "<desligar> [(o|a|os|as)] (interruptor[es]|tomada[s]) [aqui]"
    example: "desliga as luzes"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<desligar> [tod(as|os)] [(o|a|os|as)] ventoinha[s] [aqui]"
      - "<desligar> [tod(as|os)] [(o|a|os|as)] ventoinha[s] (aqui|nesta divisão|nesta sala)"
    example: "desliga as ventoinhas"
    inferred_domain: "fan"
    response: "fans_area"
