---
# HassGetState - name_state_area
# example: a porta da garagem está aberta na garagem
# slots:
# - {name}
# - {state}
# - {area}

language: "pt"
data:
  # covers
  - sentences:
      - "[(o|a|os|as)] {name} <is> {cover_states:state} [(em|no|na|do|da)] {area}"
      - "<is> [(o|a|os|as)] {name} {cover_states:state} [(em|no|na|do|da)] {area}"
    example: "a porta da garagem está aberta na garagem"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "[(o|a|os|as)] {name} <is> {lock_states:state} [(em|no|na|do|da)] {area}"
      - "<is> [(o|a|os|as)] {name} {lock_states:state} [(em|no|na|do|da)] {area}"
    example: "a porta está trancada na entrada"
    name_domains:
      - "lock"
    response: "one_yesno"
