---
# HassGetState - domain_state_area
# example: que luzes estão ligadas na cozinha
# slots:
# - {area}
# - {domain}
# - {state}

language: "pt"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_any> <light> [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "há alguma luz ligada na cozinha"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <light> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_all> <light> [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "estão todas as luzes da cozinha desligadas"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <light> <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<which> <light> [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
    example: "que luzes estão ligadas na cozinha"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <light> <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<how_many> <light> [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
    example: "quantas luzes estão ligadas na cozinha"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "<are_any> ventoinha[s] {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_any> ventoinha[s] [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "há alguma ventoinha ligada na cozinha"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "<are_all> ventoinha[s] {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_all> ventoinha[s] [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "estão todas as ventoinhas da sala desligadas"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which> ventoinha[s] <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<which> ventoinha[s] [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
    example: "que ventoinhas estão ligadas na cozinha"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "<how_many> ventoinha[s] <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<how_many> ventoinha[s] [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
    example: "quantas ventoinhas estão ligadas na cozinha"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "<are_any> (interruptor[es]|tomada[s]) {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_any> (interruptor[es]|tomada[s]) [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "há algum interruptor ligado na cozinha"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "<are_all> (interruptor[es]|tomada[s]) {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<are_all> (interruptor[es]|tomada[s]) [(em|no|na|do|da)] {area} {on_off_states:state}"
    example: "estão todos os interruptores da cozinha desligados"
