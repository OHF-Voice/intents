    response: "all"
  - sentences:
      - "<which> (interruptor[es]|tomada[s]) <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<which> (interruptor[es]|tomada[s]) [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
    example: "que interruptores estão ligados na cozinha"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "<how_many> (interruptor[es]|tomada[s]) <is> {on_off_states:state} [(em|no|na|do|da)] {area}"
      - "<how_many> (interruptor[es]|tomada[s]) [(em|no|na|do|da)] {area} <is> {on_off_states:state}"
