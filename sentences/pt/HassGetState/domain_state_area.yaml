    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "<are_all> <lockable> {lock_states:state} [(em|no|na|do|da)] {area}"
      - "<are_all> <lockable> [(em|no|na|do|da)] {area} {lock_states:state}"
    example: "estão todas as portas da garagem trancadas"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "<which> <lockable> <is> {lock_states:state} [(em|no|na|do|da)] {area}"
      - "<which> <lockable> [(em|no|na|do|da)] {area} <is> {lock_states:state}"
    example: "que portas estão destrancadas no corredor"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "<how_many> <lockable> <is> {lock_states:state} [(em|no|na|do|da)] {area}"
      - "<how_many> <lockable> [(em|no|na|do|da)] {area} <is> {lock_states:state}"
    example: "quantas portas estão trancadas no corredor"
    inferred_domain: "lock"
