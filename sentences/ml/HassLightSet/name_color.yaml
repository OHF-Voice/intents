---
# HassLightSet - name_color
# example: കിടപ്പറ വിളക്ക് ചുവപ്പ് ആക്കുക
# slots: {color}, {name}

language: "ml"
data:
  - sentences:
      - "<set> {name} {color} [<colour>] [<to>]"
      - "<set> [<the>] [<colour>] {name}<of> {color} [<to>]"
    example: "കിടപ്പറ വിളക്ക് ചുവപ്പ് ആക്കുക"
    name_domains:
      - "light"
    response: "color"
