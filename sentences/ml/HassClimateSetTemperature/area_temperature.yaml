---
# HassClimateSetTemperature - area_temperature
# example: കിടപ്പറയിലെ താപനില 30 ഡിഗ്രി ആയി ക്രമീകരിക്കുക
# slots: {area}, {temperature}

language: "ml"
data:
  - sentences:
      - "<set> <temp> {area}<in> {temperature}[°| ഡിഗ്രി| ഡിഗ്രീസ്] [<to>]"
    example: "കിടപ്പറയിലെ താപനില 30 ഡിഗ്രി ആയി ക്രമീകരിക്കുക"
    response: "default"
