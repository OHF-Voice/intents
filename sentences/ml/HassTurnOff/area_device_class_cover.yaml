# slots: {area}, {device_class}, {domain}

language: "ml"
data:
  - sentences:
      - "<close> [<the>] {cover_classes:device_class} {area}<in>"
      - "<close> {area}<in> {cover_classes:device_class}"
      - "<close> {area} {cover_classes:device_class}"
