---
# HassClimateGetTemperature - area_only
# example: സ്വീകരണമുറിയിലെ താപനില എന്താണ്

language: "ml"
data:
  - sentences:
      - "<what_is> {area}[<in>] <temp>"
      - "{area}[<in>] <temp> <what_is>"
      - "<what_is> <temp> {area}<in>"
    example: "സ്വീകരണമുറിയിലെ താപനില എന്താണ്"
    response: "default"
