---
# HassRespond - default

language: "hr"
data:
  - sentences:
      - "(pozdrav|bok|dobar dan) [home assistant]"
    example: "bok"
    response: "hello"

  - sentences:
      - "(slušaš|snimaš) li uvijek"
    example: "slušaš li uvijek"
    response: "listening"

  - sentences:
      - "(gdje|kamo) idu (moji|ovi) podaci"
    example: "kamo idu moji podaci"
    response: "data"

  - sentences:
      - "što mogu (reći|pitati)"
    example: "što mogu pitati"
    response: "commands"

  - sentences:
      - "tko te (napravio|stvorio)"
    example: "tko te napravio"
    response: "creator"
