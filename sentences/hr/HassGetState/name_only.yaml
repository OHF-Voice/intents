---
# HassGetState - name_only

language: "hr"
data:
  - sentences:
      - "(koja je|koji je|reci mi) [status|vrijednost] {name}"
    example: "koja je temperatura vani"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
