---
# HassGetState - name_state

language: "hr"
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "<je_li> {name} {on_off_states:state}"
    example: "je li svjetlo u kuhinji uključeno"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves (open/closed/...)
  - sentences:
      - "<je_li> {name} {cover_states:state}"
    example: "je li garažna vrata otvorena"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks (locked/unlocked)
  - sentences:
      - "<je_li> {name} {lock_states:state}"
    example: "je li ulazna vrata zaključana"
    name_domains:
      - "lock"
    response: "one_yesno"
