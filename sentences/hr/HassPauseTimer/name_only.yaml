      - "(pauziraj|privremeno zaustavi) [moj[u]] {timer_name:name} <timer>"
      - "(pauziraj|privremeno zaustavi) [moj[u]] <timer> (nazvan|zvan|po imenu|po nazivu|za) {timer_name:name}"
      - "stavi [moj[u]] {timer_name:name} <timer> (na pauzu|na čekanje)"
    example: "pauziraj pizza timer"
    response: "default"
