---
# HassVacuumReturnToBase - name_only
# example: vrati Roborock u bazu
# slots: {name}

language: "hr"
data:
  - sentences:
      - "(vrati|pošlji|prekini [čišćenje|usisavanje]) [na] {name} [nazad] [u] [bazu]"
      - "{name} (vrati [se]|prekini [čišćenje|usisavanje]) [nazad|natrag] [u bazu]"
    example: "vrati Roborock u bazu"
    name_domains:
      - "vacuum"
    response: "default"
