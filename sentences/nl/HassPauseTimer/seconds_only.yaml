---
# HassPauseTimer - seconds_only

language: "nl"
data:
  - sentences:
      - "pauzeer [<my>] {timer_seconds:start_seconds} seconde[s|n] <timer>"
      - "pauzeer [<my>] <timer> (van|voor) {timer_seconds:start_seconds} seconde[s|n]"
      - "[<my>] {timer_seconds:start_seconds} seconde[s|n] <timer> (pauzeren|op pauze zetten)"
    example: "pauzeer 30 seconden timer"
    response: "default"
