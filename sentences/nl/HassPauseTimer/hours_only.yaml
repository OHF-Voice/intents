      - "pauzeer [<my>] {timer_hours:start_hours} (uur|uren) <timer>"
      - "pauzeer [<my>] <timer> (van|voor) {timer_hours:start_hours} (uur|uren)"
      - "[<my>] {timer_hours:start_hours} (uur|uren) <timer> (pauzeren|op pauze zetten)"
    example: "pauzeer 1 uur timer"
    response: "default"
