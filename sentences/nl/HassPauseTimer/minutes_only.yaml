---
# HassPauseTimer - minutes_only

language: "nl"
data:
  - sentences:
      - "pauzeer [<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer>"
      - "pauzeer [<my>] <timer> (van|voor) {timer_minutes:start_minutes} (minuut|minuten)"
      - "[<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer> (pauzeren|op pauze zetten)"
    example: "pauzeer 5 minuten timer"
    response: "default"
