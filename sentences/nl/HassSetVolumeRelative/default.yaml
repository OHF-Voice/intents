---
# HassSetVolumeRelative - default
# slots: {volume_step}; context_area: true

language: "nl"
data:
  - sentences:
      # relative direction (up/down)
      - "[(draai|zet) [het]] volume {volume_step}"
      - "[het] volume {volume_step} (zetten|draaien)"
      - "{volume_step} [het] volume"
      # by a percentage (up)
      - "[(draai|zet) [het]] volume (omhoog|hoger) [met] {volume_step_up:volume_step}[%| procent]"
      - "verhoog [het] volume [met] {volume_step_up:volume_step}[%| procent]"
      - "[het] volume [met] {volume_step_up:volume_step}[%| procent] (omhoog|hoger) (zetten|draaien)"
      # by a percentage (down)
      - "[(draai|zet) [het]] volume (omlaag|lager|naar beneden) [met] {volume_step_down:volume_step}[%| procent]"
      - "verlaag [het] volume [met] {volume_step_down:volume_step}[%| procent]"
      - "[het] volume [met] {volume_step_down:volume_step}[%| procent] (omlaag|lager|naar beneden) (zetten|draaien)"
    example: "verhoog het volume"
    response: "default"
