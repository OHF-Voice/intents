---
# HassSetVolumeRelative - floor_only
# slots: {volume_step}, {floor}

language: "nl"
data:
  - sentences:
      # relative direction (up/down)
      - "[de|het] {floor} volume {volume_step}"
      - "[het] volume {volume_step} [in|op|van|bij] [de|het] {floor}"
      - "{volume_step} [het] volume [in|op|van|bij] [de|het] {floor}"
      - "{volume_step} [de|het] {floor} volume"
      # by a percentage (up)
      - "[de|het] {floor} volume (omhoog|hoger) [met] {volume_step_up:volume_step}[%| procent]"
      - "verhoog [het] volume [in|op|van|bij] [de|het] {floor} [met] {volume_step_up:volume_step}[%| procent]"
      - "verhoog [de|het] {floor} volume [met] {volume_step_up:volume_step}[%| procent]"
      # by a percentage (down)
      - "[de|het] {floor} volume (omlaag|lager|naar beneden) [met] {volume_step_down:volume_step}[%| procent]"
      - "verlaag [het] volume [in|op|van|bij] [de|het] {floor} [met] {volume_step_down:volume_step}[%| procent]"
      - "verlaag [de|het] {floor} volume [met] {volume_step_down:volume_step}[%| procent]"
    example: "verhoog volume op de eerste verdieping"
    response: "default"
