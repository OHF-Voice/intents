---
# HassCancelTimer - minutes_only

language: "nl"
data:
  - sentences:
      - "(annuleer|stop) [<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer>"
      - "(annuleer|stop) [<my>] <timer> (van|voor) {timer_minutes:start_minutes} (minuut|minuten)"
      - "[<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer> (stoppen|annuleren|[op] stop zetten)"
    example: "annuleer 5 minuten timer"
    response: "default"
