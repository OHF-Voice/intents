      - "[[de|het] (lied[je[s]]|nummer[s]|track[s]|item[s]|aflevering[en]|video[s]|film[pje][s]|muziek[je[s]]|playlist[s]|afspeellijst[en]) [op]] [de|het] {name} (op (pauze|stop) zetten|pauzeren|stoppen)"
