---
# HassRespond - default
# example: hoi home assistant

language: "nl"
data:
  - sentences:
      - "(hallo|hoi) home assistant"
    example: "hoi home assistant"
    response: "hello"
  - sentences:
      - "ben je altijd aan het (luisteren|opnemen)"
      - "luister je altijd"
      - "neem je altijd op"
    example: "luister je altijd"
    response: "listening"
  - sentences:
      - "wat gebeurt er met (mijn|de) data"
      - "waar gaat (mijn|de) data heen"
    example: "wat gebeurt er met mijn data"
    response: "data"
  - sentences:
      - "wat kan ik [allemaal] (zeggen|vragen)"
      - "wat [allemaal] doen"
    example: "wat kan ik allemaal zeggen"
    response: "commands"
  - sentences:
      - "wie heeft je (gemaakt|gecreëerd)"
    example: "wie heeft je gemaakt"
    response: "creator"
