---
# HassUnpauseTimer - minutes_only

language: "nl"
data:
  - sentences:
      - "(hervat|ga verder met) [<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer>"
      - "(hervat|ga verder met) [<my>] <timer> (van|voor) {timer_minutes:start_minutes} (minuut|minuten)"
      - "[<my>] {timer_minutes:start_minutes} (minuut|minuten) <timer> (hervatten|weer aan zetten)"
    example: "hervat 5 minuten timer"
    response: "default"
