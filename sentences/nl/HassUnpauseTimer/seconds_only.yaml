# HassUnpauseTimer - seconds_only

language: "nl"
data:
  - sentences:
      - "(hervat|ga verder met) [<my>] {timer_seconds:start_seconds} seconde[s|n] <timer>"
      - "(hervat|ga verder met) [<my>] <timer> (van|voor) {timer_seconds:start_seconds} seconde[s|n]"
      - "[<my>] {timer_seconds:start_seconds} seconde[s|n] <timer> (hervatten|weer aan zetten)"
    example: "hervat 30 seconden timer"
    response: "default"
