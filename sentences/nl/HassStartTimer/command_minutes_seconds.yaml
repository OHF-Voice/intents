---
# HassStartTimer - command_minutes_seconds

language: "nl"
data:
  - sentences:
      - "{timer_command:conversation_command} over {timer_minutes:minutes} (minuut[je[s]]|minuten) [en] {timer_seconds:seconds} seconde[s|n]"
      - "over {timer_minutes:minutes} (minuut[je[s]]|minuten) [en] {timer_seconds:seconds} seconde[s|n] {timer_command:conversation_command}"
    example: "doe de lichten uit over 5 minuten en 10 seconden"
    response: "command"
