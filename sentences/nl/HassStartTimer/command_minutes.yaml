---
# HassStartTimer - command_minutes

language: "nl"
data:
  - sentences:
      - "{timer_command:conversation_command} over {timer_minutes:minutes} (minuut[je[s]]|minuten)"
      - "over {timer_minutes:minutes} (minuut[je[s]]|minuten) {timer_command:conversation_command}"
    example: "doe de lichten uit over 5 minuten"
    response: "command"
