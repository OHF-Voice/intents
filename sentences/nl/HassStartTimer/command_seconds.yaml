---
# HassStartTimer - command_seconds

language: "nl"
data:
  - sentences:
      - "{timer_command:conversation_command} over {timer_seconds:seconds} seconde[s|n]"
      - "over {timer_seconds:seconds} seconde[s|n] {timer_command:conversation_command}"
    example: "doe de lichten uit over 30 seconden"
    response: "command"
