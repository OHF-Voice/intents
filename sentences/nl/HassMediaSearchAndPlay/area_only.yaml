---
# HassMediaSearchAndPlay - area_only
# example: speel Barry White in de slaapkamer
# slots: {area}, {search_query}

language: "nl"
data:
  - sentences:
      - "(luister|kijk) (naar {search_query};[in|op|van|bij] [de|het] {area})"
      - "speel {search_query} [in|op|van|bij] [de|het] {area} [af]"
      - "speel {search_query} af [in|op|van|bij] [de|het] {area}"
    example: "speel Barry White in de slaapkamer"
    response: "default"
