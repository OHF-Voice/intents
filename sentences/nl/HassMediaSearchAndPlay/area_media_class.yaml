---
# HassMediaSearchAndPlay - area_media_class
# example: luister naar het lied Bohemian Rhapsody in de keuken
# slots: {area}, {media_class}, {search_query}

language: "nl"
data:
  - sentences:
      - "(luister|kijk) (naar [de|het] ({media_class};{search_query});[in|op|van|bij] [de|het] {area})"
      - "speel [de|het] ({media_class};{search_query}) [in|op|van|bij] [de|het] {area} [af]"
      - "speel [de|het] ({media_class};{search_query}) af [in|op|van|bij] [de|het] {area}"
    example: "luister naar het lied Bohemian Rhapsody in de keuken"
    response: "default"
