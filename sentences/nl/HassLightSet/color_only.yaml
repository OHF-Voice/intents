---
# HassLightSet - color_only
# example: maak de lampen blauw
# slots: {color}
# context_area: true

language: "nl"
data:
  - sentences:
      - "[<change>] [[de] kleur van] [[alle] <light>] [<here>] [<to>] {color}"
      - "[<change>] [[de] kleur van] [[alle] <light>] [<to>] {color} [<here>]"
    example: "maak de lampen blauw"
    inferred_domain: "light"
    response: "color"
