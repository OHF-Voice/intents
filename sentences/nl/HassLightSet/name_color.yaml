---
# HassLightSet - name_color
# example: maak het slaapkamerlampje blauw
# slots:
# - {name}
# - {color}

language: "nl"
data:
  - sentences:
      - "[<change>] [de|het] {name}[ <light_no_article>][ kleur] [<to>] {color}"
      - "[<change>] [[de] kleur van] [de|het] {name}[ <light_no_article>] [<to>] {color}"
      - "[de|het] {name}[ <light_no_article>][ kleur] [<to>] {color} (zetten|doen|veranderen|maken)"
    example: "maak het slaapkamerlampje blauw"
    name_domains:
      - "light"
    response: "color"
