---
# HassLightSet - floor_color
# example: maak de eerste verdieping blauw
# slots:
# - {floor}
# - {color}

language: "nl"
data:
  - sentences:
      - "[<change>] [[de] kleur van] [[alle] <light>] [in|op|van|bij] [de|het] {floor} [<to>] {color}"
      - "[<change>] [[de] kleur van] [de|het] {floor}[ <light_no_article>] [<to>] {color}"
      - "[[de] kleur van] [de|het] {floor}[ <light_no_article>] [<to>] {color} (zetten|doen|veranderen|maken)"
    example: "maak de eerste verdieping blauw"
    inferred_domain: "light"
    response: "color"
