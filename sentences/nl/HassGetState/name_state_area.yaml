---
# HassGetState - name_state_area
# example: is de garagedeur open in de garage
# slots:
# - {name}
# - {state}
# - {area}

language: "nl"
data:
  # covers
  - sentences:
      - "<is> [de|het] {name} {cover_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is de garagedeur open in de garage"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "<is> [de|het] {name} {lock_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is de voordeur op slot in de hal"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "<is> [de|het] {name} {bs_open_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is het raam open in de slaapkamer"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "<is> [de|het] {name} {bs_occupancy_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is de sensor bezet in het kantoor"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
