---
# HassGetState - domain_state_floor
# example: welke lampen zijn aan op de eerste verdieping
# slots:
# - {floor}
# - {domain}
# - {state}

language: "nl"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> {floor} <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [in|op|van|bij] [de|het] {floor}"
    example: "is er een lamp aan op de eerste verdieping"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> {floor} <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [in|op|van|bij] [de|het] {floor}"
    example: "zijn alle lampen uit op de eerste verdieping"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> {floor} <light> <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} [in|op|van|bij] [de|het] {floor}"
    example: "welke lampen zijn aan op de eerste verdieping"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> {floor} <light> <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} [in|op|van|bij] [de|het] {floor}"
    example: "hoeveel lampen zijn aan op de eerste verdieping"
    inferred_domain: "light"
    response: "how_many"

