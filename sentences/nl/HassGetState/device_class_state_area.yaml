---
# HassGetState - device_class_state_area
# example: zijn alle ramen dicht in de slaapkamer
# slots:
# - {area}
# - {domain}
# - {device_class}
# - {state}

language: "nl"
data:
  # ---- covers (by device class) ----
  - sentences:
      - "<are_any> {area} {cover_classes:device_class} {cover_states:state}"
      - "<are_any> {cover_classes:device_class} {cover_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is er een raam open in de slaapkamer"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {area} {cover_classes:device_class} {cover_states:state}"
      - "<are_all> {cover_classes:device_class} {cover_states:state} [in|op|van|bij] [de|het] {area}"
    example: "zijn alle ramen dicht in de slaapkamer"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {area} {cover_classes:device_class} <is> {cover_states:state}"
      - "<which> {cover_classes:device_class} <is> {cover_states:state} [in|op|van|bij] [de|het] {area}"
    example: "welke ramen zijn open in de slaapkamer"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {area} {cover_classes:device_class} <is> {cover_states:state}"
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} [in|op|van|bij] [de|het] {area}"
    example: "hoeveel ramen zijn open in de slaapkamer"
    inferred_domain: "cover"
    response: "how_many"
