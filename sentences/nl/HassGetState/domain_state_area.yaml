---
# HassGetState - domain_state_area
# example: welke lampen zijn aan in de keuken
# slots:
# - {area}
# - {domain}
# - {state}

language: "nl"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> {area} <light> {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is er een lamp aan in de keuken"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> {area} <light> {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "zijn alle lampen uit in de keuken"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> {area} <light> <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "welke lampen zijn aan in de keuken"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> {area} <light> <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "hoeveel lampen zijn aan in de keuken"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
