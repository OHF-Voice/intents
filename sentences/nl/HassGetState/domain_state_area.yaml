      - "<how_many> <fan> <is> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "hoeveel ventilatoren zijn aan in de slaapkamer"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "<are_any> {area} <switch> {on_off_states:state}"
      - "<are_any> <switch> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "is er een schakelaar aan in het kantoor"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "<are_all> {area} <switch> {on_off_states:state}"
      - "<are_all> <switch> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "zijn alle schakelaars uit in het kantoor"
    inferred_domain: "switch"
