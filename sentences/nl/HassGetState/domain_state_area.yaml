      - "<are_all> <fan> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "zijn alle ventilatoren uit in de slaapkamer"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "<which> {area} <fan> <is> {on_off_states:state}"
      - "<which> <fan> <is> {on_off_states:state} [in|op|van|bij] [de|het] {area}"
    example: "welke ventilatoren zijn aan in de slaapkamer"
    inferred_domain: "fan"
    response: "which"
  - sentences:
