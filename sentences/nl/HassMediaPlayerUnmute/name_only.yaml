---
# HassMediaPlayerUnmute - name_only
# example: mute opheffen op TV
# slots: {name}

language: "nl"
data:
  - sentences:
      - "(dempen|mute) (opheffen|uit[ ]zetten) op [de|het] {name}"
      - "zet het geluid van [de|het] {name} [weer] aan"
      - "zet het geluid van [de] (muziek|media) [op] [de|het] {name} [weer] aan"
    example: "mute opheffen op TV"
    name_domains:
      - "media_player"
    response: "default"
