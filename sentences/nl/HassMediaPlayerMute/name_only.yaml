---
# HassMediaPlayerMute - name_only
# example: mute de TV
# slots: {name}

language: "nl"
data:
  - sentences:
      - "mute [de|het] {name}"
      - "(demp|mute) [[de] (muziek|media)] op [de|het] {name}"
      - "zet [[de] (muziek|media) [op]] [de|het] {name} op stil"
      - "zet het geluid van [de|het] {name} uit"
      - "zet het geluid van [de] (muziek|media) [op] [de|het] {name} uit"
    example: "mute de TV"
    name_domains:
      - "media_player"
    response: "default"
