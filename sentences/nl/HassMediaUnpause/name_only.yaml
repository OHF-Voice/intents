---
# HassMediaUnpause - name_only
# example: hervat TV
# slots: {name}

language: "nl"
data:
  - sentences:
      - "hervat [[de|het] <media_item> [op]] [de|het] {name}"
      - "[[de|het] <media_item> [op]] [de|het] {name} hervatten"
      - "[zet] [de|het] {name} [weer] [op] ([af]spelen|play)"
      - "ga verder met [de|het] <media_item> op [de|het] {name}"
    example: "hervat TV"
    name_domains:
      - "media_player"
    response: "default"
