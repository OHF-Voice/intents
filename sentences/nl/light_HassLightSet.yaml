language: nl
intents:
  HassLightSet:
    data:
      # Brightness value or max/min brightness (there should always be (a specific) light or brightness or dim mentioned in the sentence)
      # Per light <name>
      - sentences: # helderheid van lamp naar 50%/naar 50% van lamp, lamphelderheid naar 50%, lamp naar 50% helderheid
          - "[<numeric_value_set>|dim] <brightness> ([van] <name>[[ ]<light_no_article>];[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] <name>[[ ]<brightness_no_article>|[ ]<light_composed>[ ]<brightness_no_article>|[ ]<light_no_article>] [<to>] <brightness_value>"
          - "[<numeric_value_set>|dim] <name>[[ ]<light_no_article>] [<to>] <brightness_value> <brightness_no_article>"
          - "<brightness> ([van] <name>[[ ]<light_no_article>];[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "<name>[[ ]<brightness_no_article>|[ ]<light_composed>[ ]<brightness_no_article>|[ ]<light_no_article>] [<to>] <brightness_value> (<change_infinitive>|dimmen)"
          - "<name>[[ ]<light_no_article>] [<to>] <brightness_value> <brightness_no_article> (<change_infinitive>|dimmen)"
        response: "brightness"
        requires_context:
          domain: light

      # Per room <area>|<floor>
      - sentences:
          # helderheid van de kamer[lampen] naar 50%/naar 50% van de kamer[lampen],
          # helderheid van de/alle lampen in de kamer naar 50%/naar 50% in de kamer
          # lamp[helderheid] in de kamer naar 50%/naar 50% in de kamer
          # [[alle] lampen] in de kamer naar 50% helderheid/naar 50% helderheid in de kamer
          # de kamer(helderheid/lampen) naar 50%
          # de kamer[lampen] naar 50% helderheid
          # dim de kamer naar 50%
          - "[<numeric_value_set>|dim] <brightness> (<in_area_floor>[[ ]<light_no_article>];[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] <brightness> [van] (<light>|<all_light>) (<in_area_floor>;[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] (<light>|[de] <light_composed>[ ]<brightness_no_article>) (<in_area_floor>;[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] [<light>|<all_light>] (<in_area_floor>;[<to>] <brightness_value> <brightness_no_article>)"
          - "[<numeric_value_set>|dim] <area_floor>([ ]<brightness_no_article>|[ ]<light_composed>[ ]<brightness_no_article>|[ ]<light_no_article>) [<to>] <brightness_value>"
          - "[<numeric_value_set>|dim] <area_floor>[[ ]<light_no_article>] [<to>] <brightness_value> <brightness_no_article>"
          - "dim (<in_area_floor>;[<to>] <brightness_value>)"
          - "<brightness> (<in_area_floor>[[ ]<light_no_article>];[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "<brightness> [van] (<light>|<all_light>) (<in_area_floor>;[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "(<light>|[de] <light_composed>[ ]<brightness_no_article>) (<in_area_floor>;[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "[<light>|<all_light>] (<in_area_floor>;[<to>] <brightness_value> <brightness_no_article> (<change_infinitive>|dimmen))"
          - "<area_floor>([ ]<brightness_no_article>|[ ]<light_composed>[ ]<brightness_no_article>|[ ]<light_no_article>) [<to>] <brightness_value> (<change_infinitive>|dimmen)"
          - "<area_floor>[[ ]<light_no_article>] [<to>] <brightness_value> <brightness_no_article> (<change_infinitive>|dimmen)"
          - "(<in_area_floor>;[<to>] <brightness_value> dimmen)"
        response: "brightness"

      # In this room/ satellite device area
      - sentences:
          # helderheid [van de lampen] [in deze kamer] naar 50%/naar 50% [in deze kamer]
          # helderheid [van] alle lampen] in deze kamer naar 50%/naar 50% in deze kamer
          # helderheid van de kamerlampen naar 50%
          # de lamp[helderheid] [in deze kamer] naar 50%/naar 50% [in deze kamer]
          # [de lampen] [in] deze kamer naar 50% helderheid/naar 50% helderheid in deze maker
          # de kamer[lamp]helderheid naar 50%
          # dim [in deze kamer] naar 50%/naar 50% [in deze kamer]
          - "[<numeric_value_set>|dim] <brightness> [[van] <light>] ([<here>];[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] <brightness> [van] <all_light> (<here>;[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] <brightness> [van] <room_light> [<to>] <brightness_value>"
          - "[<numeric_value_set>|dim] (<light>|[de] <light_composed>[ ]<brightness_no_article>) ([<here>];[<to>] <brightness_value>)"
          - "[<numeric_value_set>|dim] [<light>] ([de[ze] kamer|<here>];[<to>] <brightness_value> <brightness_no_article>)"
          - "[<numeric_value_set>|dim] <all_light> (<here>;[<to>] <brightness_value> [<brightness_no_article>])"
          - "[<numeric_value_set>|dim] [de|het] kamer[[ ]<light_composed>][ ]<brightness_no_article> [<to>] <brightness_value>"
          - "[<numeric_value_set>|dim] <room_light> [<to>] <brightness_value> [<brightness_no_article>]"
          - "dim ([de[ze] kamer|<here>];[<to>] <brightness_value>)"
          - "<brightness> [[van] <light>] ([<here>];[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "<brightness> [van] <all_light> (<here>;[<to>] <brightness_value> (<change_infinitive>|dimmen))"
          - "<brightness> [van] <room_light> [<to>] <brightness_value> (<change_infinitive>|dimmen)"
          - "(<light>|[de] <light_composed>[ ]<brightness_no_article>) ([<here>];[<to>] <brightness_value> (<change_infinitive>|dimmen)) "
          - "[<light>] ([de[ze] kamer|<here>];[<to>] <brightness_value> <brightness_no_article> (<change_infinitive>|dimmen))"
          - "<all_light> (<here>;[<to>] <brightness_value> [<brightness_no_article>] (<change_infinitive>|dimmen))"
          - "[de|het] kamer[[ ]<light_composed>][ ]<brightness_no_article> [<to>] <brightness_value> (<change_infinitive>|dimmen)"
          - "<room_light> [<to>] <brightness_value> [<brightness_no_article>] (<change_infinitive>|dimmen)"
          - "([de[ze] kamer|<here>];[<to>] <brightness_value> dimmen)"
        response: "brightness"
        requires_context:
          area:
            slot: true

      # Color
      - sentences:
          - "[<change>] <name>[ ][<light>][ ][kleur] [<to>] {color}"
          - "[<change>] [[de] kleur van] <name>[ ][<light>] [<to>] {color}"
          - "<name>[ ][<light>][ ][kleur] [<to>] {color} (zetten|doen|veranderen|maken)"
          - "[[de] kleur van] <name>[ ][<light>] [<to>] {color} (zetten|doen|veranderen|maken)"
        response: "color"

      - sentences:
          - "[<change>] [[de] kleur van] ([[<all>] <light>] [<in>] (<area>|<floor>)|(<area>|<floor>)[[ ]<light>]) [<to>] {color}"
          - "[[de] kleur van] ([[<all>] <light>] [<in>] (<area>|<floor>)|(<area>|<floor>)[[ ]<light>]) [<to>] {color} (zetten|doen|veranderen|maken)"
        response: "color"

      # Color temperature
      # Per light <name>
      - sentences:
          # #verb #property #target #value (P T V, T P V, P V T) and (V P T, T V P) with als
          - "[<numeric_value_set>] ([de] <light_temp>;[<of>] <name_light>) [<to>] <color_temp>"
          - "[<numeric_value_set>] [de] <light_temp> [<to>] <color_temp> [<of>] <name_light>"
          - "[stel] (<color_temp> [in] als <light_temp> [in];[<of>] <name_light>)"

          # #verb #target_property #value
          - "[<numeric_value_set>] <name_temp> [<to>] <color_temp>"
          - "[<numeric_value_set>] [<to>] <color_temp> [<of>] <name_temp>"
          - "[stel] <color_temp> [in] als <name_temp> [in]"

          # #property #target #value #infinitive_verb
          - "([de] <light_temp>;[<of>] <name_light>) [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[de] <light_temp> [<to>] <color_temp> <numeric_value_set_infinitive> [<of>] <name_light>"
          - "([<to>] <color_temp> als <light_temp>;[<of>] <name_light>) <numeric_value_set_infinitive>"
          - "[<to>] <color_temp> <numeric_value_set_infinitive> als <light_temp> [<of>] <name_light>"

          # #target_property #value #infinitive_verb
          - "<name_temp> [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[<to>] <color_temp> als <name_temp> <numeric_value_set_infinitive>"
        expansion_rules:
          light_temp: "[<light_composed>[ ]][kleur[ ]]temperatuur"
          name_light: "<name>[[ ]<light_no_article>]"
          name_temp: "<name>[[ ]<light_composed>][[ ]kleur][[ ]temperatuur]"
        requires_context:
          domain: light
        response: "temperature"

      # Per room <area>|<floor>
      - sentences:
          # #verb #property #domain #target_area #value (P T V, T P V, P V T) and (V P T, T V P) with 'als' and P D or D T together
          - "[<numeric_value_set>] ([de] <light_temp> [[<of>] <all_lights>];<in_area_floor>) [<to>] <color_temp>"
          - "[<numeric_value_set>] [[<of>] <all_lights>] <in_area_floor> [[de] <light_temp>] [<to>] <color_temp>"
          - "[<numeric_value_set>] [de] <light_temp> ([[<of>] <all_lights>];[<to>] <color_temp>) <in_area_floor>"
          - "[stel] (<color_temp> [in] als [de] <light_temp> [in];[[<of>] <all_lights>] <in_area_floor>)"

          # #verb #property #target_area_domain #value (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          - "[<numeric_value_set>] ([de] <light_temp>;[<of>] <area_light>) [<to>] <color_temp>"
          - "[<numeric_value_set>] [de] <light_temp> [<to>] <color_temp> [<of>] <area_light>"
          - "[stel] (<color_temp> [in] als [de] <light_temp> [in];[<of>] <area_light> [in])"

          # #verb #target_area_domain_property #value (T V) and (V T) with 'als'
          - "[<numeric_value_set>] [de] <area_temp> [<to>] <color_temp>"
          - "[stel] <color_temp> [in] als [de] <area_temp> [in]"

          # #property #domain #target_area #value #infinitive_verb (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          #     and P D or D T together and infinitive at the end or after the value
          - "([de] <light_temp> [[<of>] <all_lights>];<in_area_floor>) [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[[<of>] <all_lights>] <in_area_floor> [[de] <light_temp>] [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[de] <light_temp> [[<of>] <all_lights>] [<to>] <color_temp> (<in_area_floor>;<numeric_value_set_infinitive>)"
          - "[de] <light_temp> [<to>] <color_temp> ([[<of>] <all_lights>] <in_area_floor>;<numeric_value_set_infinitive>)"
          - "(<color_temp> [instellen] als [de] <light_temp> [instellen];[[<of>] <all_lights>] <in_area_floor> [instellen])"

          # #property #target_area_domain #value #infinitive_verb (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          #     and infinitive at the end or after the value
          - "([de] <light_temp>;[<of>] <area_light>) [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[de] <light_temp> [<to>] <color_temp> ([<of>] <area_light>;<numeric_value_set_infinitive>)"
          - "(<color_temp> [instellen] als [de] <light_temp> [instellen];[<of>] <area_light>)"

          # #target_area_domain_property #value #infinitive_verb (T V) and (V T) with 'als'
          - "[de] <area_temp> [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "<color_temp> [instellen] als [de] <area_temp> [instellen]"
        expansion_rules:
          light_temp: "[<light_composed>[ ]][kleur[ ]]temperatuur" # temperatuur
          area_light: "<area_floor>[ ]<light_no_article>"
          area_temp: "<area_floor>[ ]<light_temp>"
          all_lights: "(<light>|<all_light>)"
        response: "temperature"

      # In this room/ satellite device area
      - sentences:
          # #verb #property #domain #target_area #value (P T V, T P V, P V T) and (V P T, T V P) with 'als' and P D or D T together
          - "[<numeric_value_set>] ([de] <light_temp> [[<of>] <all_lights>];[<here>]) [<to>] <color_temp>"
          - "[<numeric_value_set>] [[<of>] <all_lights>] [<here>] [[de] <light_temp>] [<to>] <color_temp>"
          - "[<numeric_value_set>] [de] <light_temp> ([[<of>] <all_lights>];[<to>] <color_temp>) [<here>]"
          - "[stel] (<color_temp> [in] als [de] <light_temp> [in];[[<of>] <all_lights>] [<here>])"

          # #verb #property #target_area_domain #value (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          - "[<numeric_value_set>] ([de] <light_temp>;[<of>] <room_light>) [<to>] <color_temp>"
          - "[<numeric_value_set>] [de] <light_temp> [<to>] <color_temp> [<of>] <room_light>"
          - "[stel] (<color_temp> [in] als [de] <light_temp> [in];[<of>] <room_light> [in])"

          # #verb #target_area_domain_property #value (T V) and (V T) with 'als'
          - "[<numeric_value_set>] [de] <room_temp> [<to>] <color_temp>"
          - "[stel] <color_temp> [in] als [de] <room_temp> [in]"

          # #property #domain #target_area #value #infinitive_verb (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          #     and P D or D T together and infinitive at the end or after the value
          - "([de] <light_temp> [[<of>] <all_lights>];[<here>]) [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[[<of>] <all_lights>] [<here>] [[de] <light_temp>] [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[de] <light_temp> [[<of>] <all_lights>] [<to>] <color_temp> ([<here>];<numeric_value_set_infinitive>)"
          - "[de] <light_temp> [<to>] <color_temp> ([[<of>] <all_lights>] [<here>];<numeric_value_set_infinitive>)"
          - "(<color_temp> [instellen] als [de] <light_temp> [instellen];[[<of>] <all_lights>] [<here>] [instellen])"

          # #property #target_area_domain #value #infinitive_verb (P T V, T P V, P V T) and (V P T, T V P) with 'als'
          #     and infinitive at the end or after the value
          - "([de] <light_temp>;[<of>] <room_light>) [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "[de] <light_temp> [<to>] <color_temp> ([<of>] <room_light>;<numeric_value_set_infinitive>)"
          - "(<color_temp> [instellen] als [de] <light_temp> [instellen];[<of>] <room_light>)"

          # #target_area_domain_property #value #infinitive_verb (T V) and (V T) with 'als'
          - "[de] <room_temp> [<to>] <color_temp> <numeric_value_set_infinitive>"
          - "<color_temp> [instellen] als [de] <room_temp> [instellen]"

        expansion_rules:
          light_temp: "[<light_composed>[ ]][kleur[ ]]temperatuur" # temperatuur
          room_temp: "(kamer|ruimte)[ ]<light_temp>"
          all_lights: "(<light>|<all_light>)"
        response: "temperature"
        requires_context:
          area:
            slot: true
