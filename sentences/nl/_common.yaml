  - "alsjeblieft"
  - "aub"
  - "ajb"
  - "graag"
  - "ik wil"
  - "voor mij"
  - "voor me"
  - "kan je"
  - "kun je"
  - "kunt u"
  - "wil je"
  - "zou je"
  - "kan jij"
  - "kun jij"
  - "wil jij"
