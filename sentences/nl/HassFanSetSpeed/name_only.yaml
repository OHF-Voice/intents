---
# HassFanSetSpeed - name_only
# slots: {name}, {percentage}

language: "nl"
data:
  - sentences:
      - "[<numeric_value_set>] [de|het] {name}[ ][snelheid] [<to>] {fan_speed:percentage}[%| procent]"
      - "[<numeric_value_set>] [de] snelheid [van] [de|het] {name} [<to>] {fan_speed:percentage}[%| procent]"
    example: "zet plafondventilator snelheid op 50%"
    name_domains:
      - "fan"
    response: "default"
