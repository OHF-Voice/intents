---
# HassTurnOff - name_only
# example: turn off the overhead light
# slots: {name}

language: "tr"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <kapat>"
    example: "Yatak Odası Lambasını kapat"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <kapat_kapak>"
    example: "Sol Perdeyi kapat"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <kapat_kapak>"
    example: "Ana vanayı kapat"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] (kilidini aç|kilit aç)"
    example: "Ön kapının kilidini aç"
    name_domains:
      - "lock"
    response: "lock"
