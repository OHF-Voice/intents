---
# HassTurnOn - name_only
# example: turn on the overhead light
# slots: {name}

language: "tr"
data:
  # on-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <ac>"
    example: "Yatak Odası Lambasını aç"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <ac_kapak>"
    example: "Sol Perdeyi aç"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] <ac_kapak>"
    example: "Ana vanayı aç"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "{name}[(ler|leri|lar|ları)][([(n|ın|in|un|ün|y|t|d|nd|nt)]ı|[(n|ın|in|un|ün|y|t|d|nd|nt)]i|[(n|ın|in|un|ün|y|t|d|nd|nt)]ü|[(n|ın|in|un|ün|y|t|d|nd|nt)]u|[(n|ın|in|un|ün|y|t|d|nd|nt)]e|[(n|ın|in|un|ün|y|t|d|nd|nt)]a)][n][ki] kilitle"
    example: "Ön kapıyı kilitle"
    name_domains:
      - "lock"
    response: "lock"
