---
# HassRespond - default
# example: sveiks home assistant

language: "lv"
data:
  - sentences:
      - "(sveik(s|i)|čau) [home assistant]"
    example: "sveiks home assistant"
    response: "hello"

  - sentences:
      - "vai tu vienmēr (klausies|ieraksti)"
    example: "vai tu vienmēr klausies"
    response: "listening"

  - sentences:
      - "kur (paliek|nokļūst) [mani] [runas] [balss] dati"
    example: "kur nokļūst mani dati"
    response: "data"

  - sentences:
      - "ko es varu (teikt|prasīt|vaicāt|jautāt)"
    example: "ko es varu jautāt"
    response: "commands"

  - sentences:
      - "kas tevi izveidoja"
    example: "kas tevi izveidoja"
    response: "creator"
