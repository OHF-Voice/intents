---
# HassLightSet - name_brightness
# example: uzstādi naktslampas spilgtumu uz 50%
# slots:
# - {name}
# - {brightness}

language: "lv"
data:
  - sentences:
      - "<set> {name} [gaismas] (spilgtumu|spožumu|gaišumu) [uz] {brightness}[%| procent(i|iem|u|us)]"
      - "<set> {name} uz {brightness}[%| procent(i|iem|u|us)] [spilgtuma]"
    example: "uzstādi naktslampas spilgtumu uz 50%"
    name_domains:
      - "light"
    response: "brightness"
