---
# HassLightSet - name_color
# example: uzstādi naktslampas krāsu uz sarkano
# slots:
# - {name}
# - {color}

language: "lv"
data:
  - sentences:
      - "<set> {name} [krāsu] uz {color}"
      - "<set> {name} uz {color} krāsu"
    example: "uzstādi naktslampas krāsu uz sarkano"
    name_domains:
      - "light"
    response: "color"
