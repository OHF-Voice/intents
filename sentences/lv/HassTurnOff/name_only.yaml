---
# HassTurnOff - name_only
# example: izslēdz naktslampu
# slots: {name}

language: "lv"
data:
  # off-able domains
  - sentences:
      - "<izslēgt> {name}"
    example: "izslēdz naktslampu"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<close> {name}"
    example: "aizver aizkarus"
    name_domains:
      - "cover"
    response: "cover"
