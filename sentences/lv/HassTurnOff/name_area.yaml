---
# HassTurnOff - name_area
# example: izslēdz virtuvē naktslampu
# slots:
# - {name}
# - {area}

language: "lv"
data:
  # off-able domains
  - sentences:
      - "<izslēgt> {area} {name}"
      - "<izslēgt> {name} {area}"
    example: "izslēdz virtuvē naktslampu"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<close> {name} {area}"
      - "<close> {area} {name}"
    example: "aizver aizkarus viesistabā"
    name_domains:
      - "cover"
    response: "cover"
