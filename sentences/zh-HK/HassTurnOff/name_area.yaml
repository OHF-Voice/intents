language: "zh-HK"
data:
  # off-able domains (light, switch, fan, media_player, input_boolean)
  - sentences:
      - "(關閉|關掉|關|閂){area}[的|嘅]{name}[的|嘅]"
      - "[把|將|請]{area}[的|嘅]{name}[的|嘅](關閉|關掉|關|閂)"
    example: "關閉客廳吊扇"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "(關閉|關掉|關|閂){area}[的|嘅]{name}[的|嘅]"
      - "[把|將|請]{area}[的|嘅]{name}[的|嘅](關閉|關掉|關|閂)"
    example: "關閉客廳左邊窗簾"
    name_domains:
      - "cover"
    response: "cover"

  # locks (unlock)
  - sentences:
      - "(打開|解鎖|解開){area}[的|嘅]{name}[的|嘅][鎖]"
      - "[把|將|請]{area}[的|嘅]{name}[的|嘅][鎖](打開|解鎖|解開)"
    example: "解鎖客廳大門"
    name_domains:
      - "lock"
    response: "lock"
