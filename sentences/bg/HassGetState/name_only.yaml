---
# HassGetState - name_only
# slots: {name}

language: "bg"
data:
  - sentences:
      - "как(ъв|ва|во|ви) (е|са) [състояни(ето|ята) на] {name}"
    example: "каква е външна температура"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
