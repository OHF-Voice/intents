---
# HassGetState - domain_state
# slots:
# - {domain}
# - {state}

language: "bg"
data:
  # ---- lights ----
  - sentences:
      - "има ли {on_off_states:state} светлин(а|и)"
    example: "има ли включени светлини"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "всички[те] лампи ли са {on_off_states:state}"
    example: "всички лампи ли са изключени"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "(ко(и|я|е|й)|как(ъв|ва|во|ви)) ламп(а|и) (е|са) {on_off_states:state}"
    example: "кои лампи са включени"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "колко лампи са {on_off_states:state}"
    example: "колко лампи са включени"
    inferred_domain: "light"
    response: "how_many"

  # ---- fans ----
  - sentences:
      - "има ли {on_off_states:state} вентилатор[и]"
    example: "има ли включени вентилатори"
    inferred_domain: "fan"
    response: "any"
  - sentences:
      - "всички[те] вентилатори ли са {on_off_states:state}"
    example: "всички вентилатори ли са изключени"
    inferred_domain: "fan"
    response: "all"
  - sentences:
      - "(ко(и|я|е|й)|как(ъв|ва|во|ви)) вентилатор[и] (е|са) {on_off_states:state}"
    example: "кои вентилатори са включени"
    inferred_domain: "fan"
    response: "which"
  - sentences:
      - "колко вентилатори са {on_off_states:state}"
    example: "колко вентилатори са включени"
    inferred_domain: "fan"
    response: "how_many"

  # ---- switches ----
  - sentences:
      - "има ли {on_off_states:state} ключ[ове]"
    example: "има ли включени ключове"
    inferred_domain: "switch"
    response: "any"
  - sentences:
      - "всички[те] ключове ли са {on_off_states:state}"
    example: "всички ключове ли са изключени"
    inferred_domain: "switch"
    response: "all"
  - sentences:
      - "(ко(и|я|е|й)|как(ъв|ва|во|ви)) ключ[ове] (е|са) {on_off_states:state}"
    example: "кои ключове са включени"
    inferred_domain: "switch"
    response: "which"
  - sentences:
      - "колко ключове са {on_off_states:state}"
    example: "колко ключове са включени"
    inferred_domain: "switch"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "има ли {lock_states:state} (брав(а|и)|врат(а|и))"
    example: "има ли отключени врати"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "всички[те] (брави|врати) ли са {lock_states:state}"
    example: "всички врати ли са заключени"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "(ко(и|я|е|й)|как(ъв|ва|во|ви)) (брав(а|и)|врат(а|и)) (е|са) {lock_states:state}"
    example: "кои врати са отключени"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "колко (брави|врати) са {lock_states:state}"
    example: "колко врати са заключени"
    inferred_domain: "lock"
    response: "how_many"
