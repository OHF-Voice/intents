language: bg
data:
  - sentences:
      - "(здравей) [home assistant]"
    example: здравей home assistant
    response: hello

  - sentences:
      - "винаги ли [ме|ни] (слушаш|записваш)"
    example: винаги ли ме записваш
    response: listening

  - sentences:
      - "къде (отиват|се изпращат) (моите данни|данните ми)"
    example: къде отиват данните ми
    response: data

  - sentences:
      - "какво мога да [ти|те] (кажа|[по]питам)"
    example: какво мога да те питам
    response: commands

  - sentences:
      - "кой те [е] (направи[л]|създа(л|де))"
    example: кой те създаде
    response: creator
