language: bg
intents:
  HassMediaSearchAndPlay:
    data:
      # текуща област - само заявка
      - sentences:
          - "[я [ми ]](пусни[ ми]|изсвири[ ми]|изпълни[ ми]|искам да (чуя|слушам)) [нещо (от|на) ]{search_query}" # пусни bangaranga | пусни ми нещо на Дара
          - "[я [ми ]](пусни|[из]свири|пусни|изпълни) [ми ]{media_class} [на ]{search_query}" # пусни ми песента bangaranga | пусни ми песен на Дара
          - "[я [ми ]](пусни|[из]свири|пусни|изпълни) [ми ]{search_query} {media_class}" # пусни ми bangaranga песента
          - "искам да [ми ](пуснеш|изсвириш|изпълниш) {search_query}" # искам да ми пуснеш bangaranga
          - "искам {media_class} [(от|на) ]{search_query}" # искам песента bangaranga | искам албума на Дара
        requires_context:
          area:
            slot: true
        response: default
      # на конкретен плейър
      - sentences:
          # пусни ми на тонколонката в хола някоя песен на Дара
          # пусни ми на тонколонката в хола нещo на Дара
          # пусни ми през тонколонката в хола нещo на Дара
          # пусни ми през тонколонката в хола нещo на Дара
          # искам да чуя по тонколонката в хола bangaranga
          - "[я [ми ]](пусни[ ми]|[из]свири[ ми]|изпълни[ ми]|искам да (чуя|слушам)) (на|по|през|в[ъв]) <name> [някой|някоя ][{media_class} ][нещо ][(от|на) ]{search_query}"
            # Пусни ми bangaranga на тонколонката в хола
          - "[я [ми ]](пусни[ ми]|[из]свири[ ми]|изпълни[ ми]|искам да (чуя|слушам)) [някой|някоя ][{media_class} ][нещо ][(от|на) ]{search_query} (на|по|през|в[ъв]) <name>"
          - "искам да [ми ](пуснеш|изсвириш|изпълниш) {search_query} (на|по|през|в[ъв]) <name>" # искам да ми пуснеш bangaranga на тонколонката в хола
          - "искам да [ми ](пуснеш|изсвириш|изпълниш) (на|по|през|в[ъв]) <name> {search_query}" # искам да ми пуснеш на тонколонката в хола bangaranga
          - "искам {media_class} [(от|на) ]{search_query} (на|по|през|в[ъв]) <name>" # искам песента bangaranga на тонколонката в хола | искам албума на Дарана тонколонката в хола
          - "искам (на|по|през|в[ъв]) <name> {media_class} [(от|на) ]{search_query}" # искам на тонколонката в хола песента bangaranga | искам тонколонката в хола албума на Дарана | искам песен от евровизия
        requires_context:
          domain: media_player
        response: default
