language: bg
responses:
  errors:
    no_intent: 小褗卸邪谢褟胁邪屑, 薪械 屑芯卸邪褏 写邪 褉邪蟹斜械褉邪 褌芯胁邪
    no_area: 袧褟屑邪 芯斜谢邪褋褌 褋 懈屑械 {{ area }}
    no_domain_in_area: 袙 芯斜谢邪褋褌褌邪 {{ area }} 薪褟屑邪 {{ domain }}
    no_device_class_in_area: 袙 芯斜谢邪褋褌褌邪 {{ area }} 薪褟屑邪 {{ device_class }}
    no_entity: 袧褟屑邪 褍褋褌褉芯泄褋褌胁芯 懈谢懈 芯斜械泻褌 褋 懈屑械 {{ entity }}
    handle_error: 袙褗蟹薪懈泻薪邪 薪械芯褔邪泻胁邪薪邪 谐褉械褕泻邪 锌褉懈 懈蟹锌褗谢薪械薪懈械 薪邪 泻芯屑邪薪写邪褌邪
lists:
  color:
    values:
      - in: "斜褟谢[芯|邪|芯褌芯|邪褌邪]|斜械谢(懈|懈褟|懈褟褌|懈褌械)"
        out: "white"
      - in: "褔械褉械薪|褔械褉薪(芯|薪邪|芯褌芯|邪褌邪|懈|懈褟褌|懈褌械)"
        out: "black"
      - in: "褔械褉胁械薪[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌]"
        out: "red"
      - in: "芯褉邪薪卸械胁[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌]"
        out: "orange"
      - in: "卸褗谢褌[芯|邪|芯褌芯|懈|懈褟|懈褟褌|邪褌邪]"
        out: "yellow"
      - in: "蟹械谢械薪[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌]"
        out: "green"
      - in: "褋懈薪[褜芯|褟|褜芯褌芯|褟褌邪|懈褟褌|懈|懈褌械]"
        out: "blue"
      - in: "谢懈谢邪胁[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌|懈褌械]"
        out: "purple"
      - in: "泻邪褎褟胁[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌|懈褌械]"
        out: "brown"
      - in: "褉芯蟹芯胁[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌|懈褌械]"
        out: "pink"
      - in: "褌褞褉泻芯邪蟹械薪[芯|邪|芯褌芯|邪褌邪|懈|懈褟|懈褟褌|懈褌械]"
        out: "turquoise"
  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  on_off_states:
    values:
      - in: "胁泻谢褞褔械薪[邪|芯|懈|懈褟褌|懈褌械|芯褌芯|邪褌邪]"
        out: "on"
      - in: "懈蟹泻谢褞褔械薪[邪|芯|懈|懈褟褌|懈褌械|芯褌芯|邪褌邪]"
        out: "off"
  on_off_domains:
    values:
      - in: 褋胁械褌谢懈薪(邪|懈|邪褌邪|懈褌械)|谢邪屑锌(邪|懈|邪褌邪|懈褌械)|泻褉褍褕泻(邪|懈|邪褌邪|懈褌械)|芯褋胁械褌谢械薪(懈褟|懈械|懈械褌芯|懈褟褌邪)
        out: light
      - in: 胁械薪褌懈谢邪褌芯褉[懈|邪|褗褌|懈褌械]
        out: fan
      - in: 泻谢褞褔[芯胁械|芯胁械褌械]
        out: switch
  cover_states:
    values:
      - in: "芯褌胁芯褉械薪[邪|懈|芯|懈褌械]|胁写懈谐薪邪褌[邪|芯|懈|懈褌械]|芯褌泻褉懈褌[邪|芯|懈|懈褌械]"
        out: "open"
      - in: "蟹邪褌胁芯褉械薪[邪|懈|芯|懈褌械]|褋屑褗泻薪邪褌[邪|芯|懈|懈褌械]|褋锌褍褋薪邪褌[邪|芯|懈|懈褌械]|蟹邪泻褉懈褌[邪|芯|懈|懈褌械]|褋胁邪谢械薪[邪|芯|懈|懈褌械]"
        out: "closed"
      - in: "芯褌胁邪褉褟[褌]|胁写懈谐邪[褌]|芯褌泻褉懈胁邪[褌]"
        out: "opening"
      - in: "蟹邪褌胁邪褉褟[褌]|褋屑褗泻胁邪[褌]|褋锌褍褋泻邪[褌]|蟹邪泻褉懈胁邪[褌]|褋胁邪谢褟[褌]"
        out: "closing"
  cover_classes:
    values:
      - in: 褌械薪褌(a|懈|邪褌邪|懈褌械)
        out: awning
      - in: 褖芯褉(邪|懈|邪褌邪|懈褌械)
        out: blind
      - in: 锌械褉写械[褌邪|褌芯|褌邪褌邪]|蟹邪胁械褋(邪|懈|邪褌邪|懈褌械)
        out: curtain
      - in: 胁褉邪褌(邪|懈|褌邪|懈褌械)
        out: door
      - in: 谐邪褉邪卸[邪|懈|褗褌|懈褌械]|(谐邪褉邪卸(薪邪|薪邪褌邪|薪懈|薪懈褌械) 胁褉邪褌(邪|懈))
        out: garage
      - in: 锌芯褉褌(邪|懈|邪褌邪|懈褌械)
        out: gate
      - in: 褋械薪薪懈(泻|褑懈|泻邪|泻褗褌|褑懈褌械)
        out: shade
      - in: 泻械锌械薪褑懈[褌械]|泻邪锌邪(泻|泻邪|泻褗褌|褑懈|褑懈褌械)
        out: shutter
      - in: 锌褉芯蟹芯褉(械褑|褑懈|械褑邪|褑懈褌械|械褑褗褌)
        out: window
  lock_states:
    values:
      - in: "蟹邪泻谢褞褔械薪[邪|芯|懈|懈褟|褟褌|邪褌邪|芯褌芯|懈褌械]"
        out: "locked"
      - in: "芯褌泻谢褞褔械薪[邪|芯|懈|懈褟|褟褌|邪褌邪|芯褌芯|懈褌械]"
        out: "unlocked"

  # binary_sensor
  bs_battery_states:
    values:
      - in: "(薪懈褋(褗泻|泻邪|泻芯|泻懈|泻懈褟|泻懈褟褌|泻邪褌邪|泻芯褌芯|泻懈褌械)|褋谢邪斜[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械|芯褌芯]|褉邪蟹褉械写械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|懈蟹褌芯褖械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|锌褉邪蟹(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)|懈蟹褔械褉锌邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械])"
        out: "on"
      - in: "(薪芯褉屑邪谢(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)|蟹邪褉械写械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械|芯褌芯]|锌褗谢(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械))"
        out: "off"

  bs_battery_charging_states:
    values:
      - in: "(蟹邪褉械卸写邪[褌]|褋械 蟹邪褉械卸写邪[褌]|蟹邪褉械卸写邪薪械)"
        out: "on"
      - in: "薪械 [褋械] 蟹邪褉械卸写邪[褌]"
        out: "off"

  bs_carbon_monoxide_states:
    values:
      - in: "(蟹邪褋械褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|蟹邪褋懈褔邪[褌]|蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|胁泻谢褞褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|芯褌褔械褌械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|芯褌褔懈褌邪[褌])"
        out: "on"
      - in: "(薪械 (械|褋邪) 蟹邪褋械褔械薪[邪|芯|懈]||薪械 蟹邪褋懈褔邪[褌]|褔懈褋褌[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|懈蟹泻谢褞褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械 [械] 芯褌褔械褌械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械 芯褌褔懈褌邪[褌])"
        out: "off"

  bs_cold_states:
    values:
      - in: "褋褌褍写[械薪邪|械薪芯|械薪懈|械薪懈褟|械薪懈褟褌|械薪邪褌邪|械薪懈褌械]"
        out: "on"
      - in: "薪芯褉屑邪谢(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)"
        out: "off"

  bs_connectivity_states:
    values:
      - in: "(褋胁褗褉蟹邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|蟹邪泻邪褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械])"
        out: "on"
      - in: "(薪械 褋胁褗褉蟹邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|褉邪蟹泻邪褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|锌褉械泻褗褋薪邪褌[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械])"
        out: "off"

  bs_door_states:
    values:
      - in: "芯褌胁芯褉械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]"
        out: "off"

  bs_garage_door_states:
    values:
      - in: "芯褌胁芯褉械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]"
        out: "off"

  bs_gas_states:
    values:
      - in: "(蟹邪褋懈褔邪[ 褋械]|蟹邪褋械褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|胁泻谢褞褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|懈屑邪|芯褌褔懈褌邪[褌][ 褋械])"
        out: "on"
      - in: "(薪械[ 褋械] 蟹邪褋懈褔邪|褔懈褋褌[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|懈蟹泻谢褞褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪褟屑邪|薪械 [褋械 ]芯褌褔懈褌邪[褌])"
        out: "off"

  bs_heat_states:
    values:
      - in: "谐芯褉械褖[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]"
        out: "on"
      - in: "薪芯褉屑邪谢(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)"
        out: "off"

  bs_light_states:
    values:
      - in: "(蟹邪褋械褔械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|褋胁械褌褗谢|褋胁械褌谢(邪|芯|懈|懈褟|懈褟褌|邪褌邪|芯褌芯|懈褌械)|芯褌褔懈褌邪[褌][ 褋械]|芯褌褔械褌械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|芯褌芯|懈褌械]|褋胁械褌(褟|褟褌|懈|褟|薪邪褌|薪邪褌懈|薪邪褌懈褌械|薪邪褌芯|薪邪褌邪|薪邪褌邪褌邪|薪邪褌芯褌芯|薪邪褌懈褟褌))"
        out: "on"
      - in: "((薪褟屑邪|斜械蟹) 褋胁械褌谢懈薪邪|薪械芯褋胁械褌械薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|褌褗屑(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)|屑褉邪褔(械薪|薪邪|薪芯|薪懈|薪懈褟|薪懈褟褌|薪邪褌邪|薪芯褌芯|薪懈褌械)|褔懈褋褌[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械蟹邪写械泄褋褌胁邪薪[邪|芯|懈|懈褟|懈褟褌|邪褌邪|懈褌械]|薪械 [褋械 ]芯褌褔懈褌邪[褌])"
        out: "off"

  bs_lock_states:
    values:
      - in: "蟹邪泻谢褞褔械薪[邪|芯|懈|懈褟|褟褌|邪褌邪|芯褌芯|懈褌械]"
        out: "off"
      - in: "芯褌泻谢褞褔械薪[邪|芯|懈|懈褟|褟褌|邪褌邪|芯褌芯|懈褌械]"
        out: "on"

