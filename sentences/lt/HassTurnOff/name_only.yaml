language: "lt"
data:
  # off-able domains
  - sentences:
      - "<turn_off> {name}"
    example: "išjunk lubų ventiliatorių"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<close> {name}"
    example: "uždaryk žaliuzes"
    name_domains:
      - "cover"
    response: "cover"
