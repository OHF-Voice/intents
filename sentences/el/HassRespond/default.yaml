language: el
data:
  - sentences:
      - (γεια [σου] | χαίρετε) [home assistant]
    example: γεια σου
    response: hello

  - sentences:
      - ακούς (πάντα | συνεχώς) [(όσα | τι) λέω]
      - καταγράφεις (πάντα | συνεχώς) ότι λέω
    example: ακούς πάντα όσα λέω
    response: listening

  - sentences:
      - πού (πηγαίνουν | πάνε | καταλήγουν) (τα δεδομένα μου | τα δεδομένα [μου])
    example: πού πηγαίνουν τα δεδομένα μου
    response: data

  - sentences:
      - τι μπορώ να (πω | ρωτήσω)
      - ποιες είναι οι διαθέσιμες εντολές
    example: τι μπορώ να ρωτήσω
    response: commands

  - sentences:
      - ποιος σε (έφτιαξε | δημιούργησε | κατασκεύασε)
    example: ποιος σε έφτιαξε
    response: creator
