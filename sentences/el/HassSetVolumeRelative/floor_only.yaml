      - (μείωσε | κατέβασε) [την] ένταση (στον | στο) [<the>] {floor} [όροφο] [κατά] {volume_step_down:volume_step}[%| τοις εκατό]
    example: μείωσε την ένταση στον πρώτο όροφο κατά 10%
    response: default
