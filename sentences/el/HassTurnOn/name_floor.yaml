language: el
data:
  - sentences:
      - "<turn_on> [<the>] {name} <in> [<the>] {floor} [όροφο]"
    example: άναψε το φως οροφής στον πρώτο όροφο
    name_domains:
      - light
      - switch
      - fan
      - media_player
      - input_boolean
    response: default
  - sentences:
      - "<open> [<the>] {name} <in> [<the>] {floor} [όροφο]"
    example: άνοιξε τη συρόμενη πόρτα στον πρώτο όροφο
    name_domains:
      - cover
      - valve
    response: cover
