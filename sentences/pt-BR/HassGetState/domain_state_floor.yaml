---
# HassGetState - domain_state_floor
# example: estão todas as luzes desligadas no primeiro andar
# slots:
# - {floor}
# - {domain}
# - {state}

language: pt-BR
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> {on_off_states:state} [(em|no|na|do|da)] {floor}"
      - "<are_any> <light> [(em|no|na|do|da)] {floor} {on_off_states:state}"
    example: "há alguma luz ligada no primeiro andar"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <light> {on_off_states:state} [(em|no|na|do|da)] {floor}"
      - "<are_all> <light> [(em|no|na|do|da)] {floor} {on_off_states:state}"
    example: "estão todas as luzes do primeiro andar desligadas"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <light> <is> {on_off_states:state} [(em|no|na|do|da)] {floor}"
      - "<which> <light> [(em|no|na|do|da)] {floor} <is> {on_off_states:state}"
