---
# HassGetState - device_class_state_floor
# example: estão todas as janelas no primeiro andar fechadas
# slots:
# - {floor}
# - {domain}
# - {device_class}
# - {state}

language: pt-BR
data:
  # ---- covers (by device class) ----
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state} [(em|no|na|do|da)] {floor}"
      - "<are_any> {cover_classes:device_class} [(em|no|na|do|da)] {floor} {cover_states:state}"
    example: "há alguma janela aberta no primeiro andar"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state} [(em|no|na|do|da)] {floor}"
      - "<are_all> {cover_classes:device_class} [(em|no|na|do|da)] {floor} {cover_states:state}"
    example: "estão todas as janelas no primeiro andar fechadas"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} <is> {cover_states:state} [(em|no|na|do|da)] {floor}"
      - "<which> {cover_classes:device_class} [(em|no|na|do|da)] {floor} <is> {cover_states:state}"
    example: "que janelas estão abertas no primeiro andar"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} [(em|no|na|do|da)] {floor}"
      - "<how_many> {cover_classes:device_class} [(em|no|na|do|da)] {floor} <is> {cover_states:state}"
    example: "quantas janelas estão abertas no primeiro andar"
    inferred_domain: "cover"
    response: "how_many"
