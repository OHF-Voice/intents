---
# HassTurnOn - name_area
# example: liga a luz de teto da cozinha
# slots:
# - {name}
# - {area}

language: pt-BR
data:
  # on-able domains
  - sentences:
      - "<ligar> [(o|a|os|as)] {name} (em|no|na|do|da) {area}"
      - "<ligar> [(o|a|os|as)] {area} [(o|a|os|as)] {name}"
    example: "liga a luz de teto da cozinha"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a leading "luz/luzes/candeeiro/lâmpada" word
  - sentences:
      - "<ligar> [(o|a|os|as)] [luz[es]|candeeiro[s]|lâmpada[s]] [de|do|da] [(o|a|os|as)] {name} (em|no|na|do|da) {area}"
    example: "liga as luzes do cantinho de leitura da cozinha"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<abrir> [(o|a|os|as)] {name} (em|no|na|do|da) {area}"
    example: "abre a cortina esquerda da sala de estar"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<abrir> [(o|a|os|as)] {name} (em|no|na|do|da) {area}"
    example: "abre a válvula principal da cozinha"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "tranca[r] [(o|a|os|as)] {name} (em|no|na|do|da) {area}"
    example: "tranca a porta da entrada da cozinha"
    name_domains:
      - "lock"
    response: "lock"
