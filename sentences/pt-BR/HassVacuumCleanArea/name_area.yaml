---
# HassVacuumCleanArea - name_area
# example: vacuum the kitchen with rover
# slots: {area}, {name}

language: "pt-BR"
data:
  - sentences:
      - "<limpar> [(o|a|os|as)] {area} com {name}"
      - "<iniciar> {name} (no|na|do|da|em [o|a]) {area}"
    example: "vacuum the kitchen with rover"
    name_domains:
      - "vacuum"
    response: "default"
