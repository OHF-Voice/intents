language: pt-BR
data:
  - sentences:
      - "(olá|oi|bom dia|boa tarde|boa noite|hey) [home assistant]"
    example: "olá"
    response: "hello"

  - sentences:
      - "você está sempre (ouvindo|gravando|escutando)"
    example: "você está sempre ouvindo"
    response: "listening"

  - sentences:
      - "(para|pra) onde vão [os] [meus] dados"
      - "(para|pra) onde vai [a] [minha] informação"
    example: "para onde vão os meus dados"
    response: "data"

  - sentences:
      - "o que eu posso (dizer|perguntar)"
      - "quais são os comandos que você aceita"
    example: "o que eu posso dizer"
    response: "commands"

  - sentences:
      - "quem (fez|criou|é) você"
    example: "quem criou você"
    response: "creator"
