language: pt-BR
data:
  - sentences:
      - "{volume_step} [o ]volume (no|na|do|da|em [o|a]) [piso |andar ]{floor} [piso|andar]"
    example: "aumentar volume no primeiro andar"
    response: "default"
  - sentences:
      - "(aumentar|subir|aumenta|sobe) [o ]volume (no|na|do|da|em [o|a]) [piso |andar ]{floor} [piso|andar] [em] {volume_step_up:volume_step}[%|por cento]"
    example: "aumentar volume no primeiro andar em 10 por cento"
    response: "default"
  - sentences:
      - "(diminuir|baixar|diminua|baixa|abaixar) [o ]volume (no|na|do|da|em [o|a]) [piso |andar ]{floor} [piso|andar] [em] {volume_step_down:volume_step}[%|por cento]"
    example: "diminuir volume no primeiro andar em 10 por cento"
    response: "default"
