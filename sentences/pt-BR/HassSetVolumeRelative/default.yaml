language: pt-BR
data:
  # relative direction (up/down)
  - sentences:
      - "{volume_step} [o ]volume"
    example: "aumentar volume"
    response: "default"
  # by a percentage (up)
  - sentences:
      - "(aumentar|subir|aumenta|sobe) [o ]volume [em] {volume_step_up:volume_step}[%|por cento]"
    example: "aumentar volume em 10 por cento"
    response: "default"
  # by a percentage (down)
  - sentences:
      - "(diminuir|baixar|diminua|baixa|abaixar) [o ]volume [em] {volume_step_down:volume_step}[%|por cento]"
    example: "diminuir volume em 10 por cento"
    response: "default"
