language: pt-BR
data:
  - sentences:
      - "{volume_step} [o ]volume (no|na|do|da|em [o|a]) {area}"
    example: "aumentar volume na cozinha"
    response: "default"
  - sentences:
      - "(aumentar|subir|aumenta|sobe) [o ]volume (no|na|do|da|em [o|a]) {area} [em] {volume_step_up:volume_step}[%|por cento]"
    example: "aumentar volume na cozinha em 10 por cento"
    response: "default"
  - sentences:
      - "(diminuir|baixar|diminua|baixa|abaixar) [o ]volume (no|na|do|da|em [o|a]) {area} [em] {volume_step_down:volume_step}[%|por cento]"
    example: "diminuir volume na cozinha em 10 por cento"
    response: "default"
