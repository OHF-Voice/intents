language: "te"
data:
  # on-able domains
  - sentences:
      - "[<the>] {name} <turn_on>"
    example: "Bedroom Lamp on చెయ్యి"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "[<the>] {name} <open>"
    example: "Garage Door తెరువు"
    name_domains:
      - "cover"
    response: "cover"
