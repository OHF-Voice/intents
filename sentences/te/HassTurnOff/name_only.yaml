language: "te"
data:
  # off-able domains
  - sentences:
      - "[<the>] {name} <turn_off>"
    example: "Bedroom Lamp off చెయ్యి"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "[<the>] {name} <close>"
    example: "Garage Door మూసివేయి"
    name_domains:
      - "cover"
    response: "cover"
