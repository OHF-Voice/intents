---
# HassUnpauseTimer - name_only
# example: continuar temporizador de pizza

language: "es"
data:
  - sentences:
      - "<continúa> [con] [mi] <temporizador> (de|con nombre|llamado|denominado) {timer_name:name}"
      - "<continúa> [con] [mi] <temporizador> {timer_name:name}"
    example: "continuar temporizador de pizza"
    response: "default"
