---
# HassSetPosition - name_only
# example: abre la cortina dormitorio al 50%
# slots:
# - {name}
# - {position}

language: "es"
data:
  - sentences:
      - "<establece_abre_cierra> [[la ]posición [de[l]] ][el|la|los|las] {name} a[l] {position} [<porciento>]"
    example: "abre la cortina dormitorio al 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
