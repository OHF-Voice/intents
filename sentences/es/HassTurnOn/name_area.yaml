---
# HassTurnOn - name_area
# example: enciende la luz de techo de la cocina
# slots:
# - {name}
# - {area}

language: "es"
data:
  # on-able domains
  - sentences:
      - "<enciende> [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
    example: "enciende la luz de techo de la cocina"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with a leading "luces/lámparas" word
  - sentences:
      - "<enciende> <luces> [de [l(a|o)[s]]|del] [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
    example: "enciende las luces del rincón de juego de la cocina"
    name_domains:
      - "light"
    response: "default"

  # covers
  - sentences:
      - "<abre> [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
    example: "abre la cortina izquierda del salón"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<abre> [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
    example: "abre la llave de paso de la cocina"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "(cierr(a|e)|cerr(á|ar)) [con|el|la[s]|los] (llave|cerrojo|pestillo|cerradura|candado|cierre)[s] [de] [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
      - "(ech(a|e|á|ar)) [el|la[s]|los] (llave|cerrojo|pestillo|cerradura|candado|cierre)[s] (en|de) [el|la|los|las] {name} [[en|de] [el|la]|del] {area}"
    example: "cierra con pestillo la puerta principal de la cocina"
    name_domains:
      - "lock"
    response: "lock"
