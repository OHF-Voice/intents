---
# HassIncreaseTimer - seconds_start_minutes
# example: añadir 30 segundos al temporizador de 5 minutos

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador> (para|de) <nb_start_minutes> minuto[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de) <nb_start_minutes> minuto[s] en <nb_seconds> segundo[s]"
    example: "añadir 30 segundos al temporizador de 5 minutos"
    response: "default"
