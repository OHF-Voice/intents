---
# HassIncreaseTimer - minutes_seconds
# example: añadir 5 minutos y 30 segundos al temporizador

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador>"
      - "(<añadir>|<sube>) <nb_minutes> minuto[s] y {timer_half:seconds} ([a] [mi]|al) <temporizador>"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> [en] <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> [en] <nb_minutes> minuto[s] y {timer_half:seconds}"
    example: "añadir 5 minutos y 30 segundos al temporizador"
    response: "default"
