---
# HassIncreaseTimer - area_seconds
# example: añadir 30 segundos al temporizador de la cocina

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador> ([en|de] [el|la]|del) {area}"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> ([en|de] [el|la]|del) {area} en <nb_seconds> segundo[s]"
    example: "añadir 30 segundos al temporizador de la cocina"
    response: "default"
