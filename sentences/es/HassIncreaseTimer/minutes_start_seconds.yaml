---
# HassIncreaseTimer - minutes_start_seconds
# example: añadir 5 minutos al temporizador de 30 segundos

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_minutes> minuto[s] ([a] [mi]|al) <temporizador> (para|de) <nb_start_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de) <nb_start_seconds> segundo[s] en <nb_minutes> minuto[s]"
    example: "añadir 5 minutos al temporizador de 30 segundos"
    response: "default"
