---
# HassIncreaseTimer - seconds_start_hours
# example: añadir 30 segundos al temporizador de 1 hora

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador> (para|de) <nb_start_hours> hora[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de) <nb_start_hours> hora[s] en <nb_seconds> segundo[s]"
    example: "añadir 30 segundos al temporizador de 1 hora"
    response: "default"
