---
# HassIncreaseTimer - seconds_start_seconds
# example: añadir 30 segundos al temporizador de 30 segundos

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador> (para|de) <nb_start_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de) <nb_start_seconds> segundo[s] en <nb_seconds> segundo[s]"
    example: "añadir 30 segundos al temporizador de 30 segundos"
    response: "default"
