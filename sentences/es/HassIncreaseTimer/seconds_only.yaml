---
# HassIncreaseTimer - seconds_only
# example: añadir 30 segundos al temporizador

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador>"
      - "(<añadir>|<sube>) {timer_half:seconds} minuto ([a] [mi]|al) <temporizador>"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> [en] <nb_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> [en] {timer_half:seconds} minuto"
    example: "añadir 30 segundos al temporizador"
    response: "default"
