---
# HassIncreaseTimer - name_seconds
# example: añadir 30 segundos al temporizador pizza

language: "es"
data:
  - sentences:
      - "(<añadir>|<sube>) <nb_seconds> segundo[s] ([a] [mi]|al) <temporizador> [para|de|con nombre|llamad(o|a)|denominad(o|a)] {timer_name:name}"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de|con nombre|llamad(o|a)|denominad(o|a)) {timer_name:name} en <nb_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> {timer_name:name} en <nb_seconds> segundo[s]"
    example: "añadir 30 segundos al temporizador pizza"
    response: "default"
