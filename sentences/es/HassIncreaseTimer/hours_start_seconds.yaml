      - "(<añadir>|<sube>) <nb_hours> hora[s] ([a] [mi]|al) <temporizador> (para|de) <nb_start_seconds> segundo[s]"
      - "(<añadir>|<sube>) [[a] [mi]|al] <temporizador> (para|de) <nb_start_seconds> segundo[s] en <nb_hours> hora[s]"
    example: "añadir 1 hora al temporizador de 30 segundos"
    response: "default"
