      - "[<establece>] [el|los] ventilador[es] [[en|de] [el|la]|del] {area} [velocidad] [al] {fan_speed:percentage}[%| por[ ]cien[to]]"
      - "[<establece>] [la] velocidad [del|de los] ventilador[es] [[en|de] [el|la]|del] {area} [al] {fan_speed:percentage}[%| por[ ]cien[to]]"
    example: "pon el ventilador de la cocina al 50%"
    response: "default"
