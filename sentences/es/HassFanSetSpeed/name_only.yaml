---
# HassFanSetSpeed - name_only
# example: pon el ventilador de techo al 50%
# slots:
# - {name}
# - {percentage}

language: "es"
data:
  - sentences:
      - "[<establece>] [el|la|los|las] {name} [velocidad] [al] {fan_speed:percentage}[%| por[ ]cien[to]]"
      - "[<establece>] [la] velocidad [del|de] [el|la|los|las] {name} [al] {fan_speed:percentage}[%| por[ ]cien[to]]"
    example: "pon el ventilador de techo al 50%"
    name_domains:
      - "fan"
    response: "default"
