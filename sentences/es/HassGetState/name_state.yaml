---
# HassGetState - name_state
# example: está la puerta del garaje abierta
# slots:
# - {name}
# - {state}

language: "es"
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "<is> [el|la|los|las] {name} {on_off_states:state}"
    example: "está la luz de la cocina encendida"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves (open/closed/...)
  - sentences:
      - "<is> [el|la|los|las] {name} {cover_states:state}"
    example: "está la puerta del garaje abierta"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks (locked/unlocked)
  - sentences:
      - "<is> [el|la|los|las] {name} {lock_states:state}"
    example: "está la puerta principal cerrada con llave"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings (open/closed)
  - sentences:
      - "<is> [el|la|los|las] {name} {bs_open_states:state}"
    example: "está la ventana abierta"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "<is> [el|la|los|las] {name} {bs_occupancy_states:state}"
    example: "está la oficina ocupada"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
