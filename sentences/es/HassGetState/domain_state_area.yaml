---
# HassGetState - domain_state_area
# example: qué luces están encendidas en la cocina
# slots:
# - {area}
# - {domain}
# - {state}

language: "es"
data:
  # ---- lights ----
  - sentences:
      - "<are_any> <light> [[en|de] [el|la]|del] {area} {on_off_states:state}"
      - "<are_any> <light> {on_off_states:state} [[en|de] [el|la]|del] {area}"
    example: "hay alguna luz de la cocina encendida"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <light> [[en|de] [el|la]|del] {area} {on_off_states:state}"
      - "<are_all> <light> {on_off_states:state} [[en|de] [el|la]|del] {area}"
    example: "están todas las luces de la cocina apagadas"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <light> [[en|de] [el|la]|del] {area} <is> {on_off_states:state}"
      - "<which> <light> <is> {on_off_states:state} [[en|de] [el|la]|del] {area}"
    example: "qué luces están encendidas en la cocina"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <light> [[en|de] [el|la]|del] {area} <is> {on_off_states:state}"
      - "<how_many> <light> <is> {on_off_states:state} [[en|de] [el|la]|del] {area}"
    example: "cuántas luces están encendidas en la cocina"
    inferred_domain: "light"
    response: "how_many"

