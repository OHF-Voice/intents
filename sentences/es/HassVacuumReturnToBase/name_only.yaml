---
# HassVacuumReturnToBase - name_only
# example: devuelve la aspiradora a la base
# slots: {name}

language: "es"
data:
  - sentences:
      - "<devuelve> [el|la|los|las] {name} [a [la] base]"
      - "(mand(a|e|ar|á)|env(ía|íe|iar|iá)) [el|la|los|las] {name} [a [la] base]"
      - "que [el|la|los|las] {name} (vuelva|regrese|retorne) [a [la] base]"
    example: "devuelve la aspiradora a la base"
    name_domains:
      - "vacuum"
    response: "default"
