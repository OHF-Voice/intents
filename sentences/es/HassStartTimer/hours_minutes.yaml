---
# HassStartTimer - hours_minutes
# example: temporizador de 1 hora y 45 minutos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] [y] <nb_minutes> minuto[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] y {timer_half:minutes}"
    example: "temporizador de 1 hora y 45 minutos"
    response: "default"
