---
# HassStartTimer - command_minutes_seconds
# example: apaga las luces dentro de 5 minutos y 30 segundos

language: "es"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s]"
      - "(dentro de|en) <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s] {timer_command:conversation_command}"
    example: "apaga las luces dentro de 5 minutos y 30 segundos"
    response: "command"
