---
# HassStartTimer - hours_minutes_seconds
# example: temporizador de 1 hora 15 minutos y 30 segundos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] [y] <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] [y] <nb_minutes> minuto[s] y {timer_half:seconds}"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] y {timer_half:minutes} [y] <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] y {timer_half:minutes} y {timer_half:seconds} minuto"
    example: "temporizador de 1 hora 15 minutos y 30 segundos"
    response: "default"
