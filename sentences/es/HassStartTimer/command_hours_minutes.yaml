---
# HassStartTimer - command_hours_minutes
# example: apaga las luces dentro de 1 hora y 5 minutos

language: "es"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_hours> hora[s] [y] <nb_minutes> minuto[s]"
      - "(dentro de|en) <nb_hours> hora[s] [y] <nb_minutes> minuto[s] {timer_command:conversation_command}"
    example: "apaga las luces dentro de 1 hora y 5 minutos"
    response: "command"
