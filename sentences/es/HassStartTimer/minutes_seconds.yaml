---
# HassStartTimer - minutes_seconds
# example: temporizador de 5 minutos y 10 segundos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_minutes> minuto[s] [y] <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_minutes> minuto[s] y {timer_half:seconds}"
    example: "temporizador de 5 minutos y 10 segundos"
    response: "default"
