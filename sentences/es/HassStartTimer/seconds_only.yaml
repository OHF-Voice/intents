---
# HassStartTimer - seconds_only
# example: temporizador de 30 segundos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_seconds> segundo[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) {timer_half:seconds} minuto"
    example: "inicia temporizador de 30 segundos"
    response: "default"
