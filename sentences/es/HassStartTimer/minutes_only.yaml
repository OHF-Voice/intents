---
# HassStartTimer - minutes_only
# example: temporizador en 10 minutos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_minutes> minuto[s]"
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) {timer_half:minutes} hora"
    example: "temporizador en 10 minutos"
    response: "default"
