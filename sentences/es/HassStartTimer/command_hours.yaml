---
# HassStartTimer - command_hours
# example: apaga las luces dentro de 1 hora

language: "es"
data:
  - sentences:
      - "{timer_command:conversation_command} (en|dentro de) <nb_hours> hora[s]"
      - "(dentro de|en) <nb_hours> hora[s] {timer_command:conversation_command}"
    example: "apaga las luces dentro de 1 hora"
    response: "command"
