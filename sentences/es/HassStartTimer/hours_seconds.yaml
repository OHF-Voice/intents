---
# HassStartTimer - hours_seconds
# example: temporizador de 1 hora y 30 segundos

language: "es"
data:
  - sentences:
      - "[<timer_set>] [un|una|mi] <temporizador> (dentro de|de|en|para) <nb_hours> hora[s] [y] <nb_seconds> segundo[s]"
    example: "temporizador de 1 hora y 30 segundos"
    response: "default"
