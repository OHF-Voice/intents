---
# HassMediaSearchAndPlay - area_only
# example: reproduce rock en el salón
# slots: {area}, {search_query}

language: "es"
data:
  - sentences:
      - "<reproduce> {search_query} (en|de) [el|la] {area}"
      - "<reproduce> {search_query} del {area}"
    example: "reproduce rock en el salón"
    response: "default"
