---
# HassMediaSearchAndPlay - name_area
# example: reproduce mi lista favorita en Reproductor del salón en Dormitorio
# slots: {area}, {name}, {search_query}

language: "es"
data:
  - sentences:
      - "<reproduce> {search_query} en [el|la|los|las] {name} (en|de) [el|la] {area}"
    example: "reproduce mi lista favorita en Reproductor del salón en Dormitorio"
    name_domains:
      - "media_player"
    response: "default"
