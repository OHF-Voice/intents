      - "([<cual_es>] (estado|tiempo restante)|<cual_es>) [de[l]|para] [mi] <temporizador> [de] <nb_start_seconds> segundo[s]"
      - "(cu(a|á)nto|qu(é|e)) [tiempo] [le] (falta|queda|resta) (para|a[l]|de[l]) [mi] <temporizador> [de] <nb_start_seconds> segundo[s]"
    example: "estado del temporizador de 30 segundos"
    response: "default"
