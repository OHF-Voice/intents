      - "<close> {name} [в|у|на] {area}"
    example: "закрий розсувні двері у вітальні"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> {name} [в|у|на] {area}"
    example: "закрий головний вентиль на кухні"
    name_domains:
      - "valve"
