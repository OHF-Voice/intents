---
# HassTurnOff - name_floor
language: "uk"
data:
  # off-able domains
  - sentences:
      - "<turn_off> {name} [в|у|на] {floor}"
    example: "вимкни кондиціонер на другому поверсі"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # covers
  - sentences:
      - "<close> {name} [в|у|на] {floor}"
    example: "закрий розсувні двері на другому поверсі"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<close> {name} [в|у|на] {floor}"
    example: "закрий головний вентиль на другому поверсі"
    name_domains:
      - "valve"
    response: "valve"
