---
# HassStartTimer - command_hours_seconds
# example: 1 hour 30 seconds

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_hours:hours} годин[у|и] [і |та ]{timer_seconds:seconds} секунд[у|и]"
      - "через {timer_hours:hours} годин[у|и] [і |та ]{timer_seconds:seconds} секунд[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 1 годину та 30 секунд"
    response: "command"
