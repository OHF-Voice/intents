---
# HassStartTimer - command_hours
# example: 1 hour

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_hours:hours} годин[у|и]"
      - "через {timer_hours:hours} годин[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 1 годину"
    response: "command"
