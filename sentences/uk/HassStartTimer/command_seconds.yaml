---
# HassStartTimer - command_seconds
# example: 30 seconds

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_seconds:seconds} секунд[у|и]"
      - "через {timer_seconds:seconds} секунд[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 30 секунд"
    response: "command"
