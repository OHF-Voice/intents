---
# HassStartTimer - command_minutes
# example: 5 minutes

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_minutes:minutes} хвилин[у|и]"
      - "через {timer_minutes:minutes} хвилин[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 5 хвилин"
    response: "command"
