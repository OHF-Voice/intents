---
# HassStartTimer - command_hours_minutes
# example: 1 hour 5 minutes

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_hours:hours} годин[у|и] [і |та ]{timer_minutes:minutes} хвилин[у|и]"
      - "через {timer_hours:hours} годин[у|и] [і |та ]{timer_minutes:minutes} хвилин[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 1 годину та 5 хвилин"
    response: "command"
