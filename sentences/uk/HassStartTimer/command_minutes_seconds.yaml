---
# HassStartTimer - command_minutes_seconds
# example: 5 minutes 30 seconds

language: "uk"
data:
  - sentences:
      - "{timer_command:conversation_command} через {timer_minutes:minutes} хвилин[у|и] [і |та ]{timer_seconds:seconds} секунд[у|и]"
      - "через {timer_minutes:minutes} хвилин[у|и] [і |та ]{timer_seconds:seconds} секунд[у|и] {timer_command:conversation_command}"
    example: "вимкни світло через 5 хвилин та 30 секунд"
    response: "command"
