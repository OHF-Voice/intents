---
# HassTurnOn - name_only
language: "uk"
data:
  # on-able domains
  - sentences:
      - "<turn_on> {name}"
      - "активуй {name}"
    example: "ввімкни настільну лампу"
    name_domains: "default"
    response: "default"

  # covers
  - sentences:
      - "<open> {name}"
    example: "відкрий розсувні двері"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> {name}"
    example: "відкрий головний вентиль"
    name_domains:
      - "valve"
    response: "valve"
