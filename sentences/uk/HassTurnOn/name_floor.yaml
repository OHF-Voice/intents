---
# HassTurnOn - name_floor
language: "uk"
data:
  # on-able domains
  - sentences:
      - "<turn_on> {name} [в|у|на] {floor}"
      - "активуй {name} [в|у|на] {floor}"
    example: "ввімкни настільну лампу на другому поверсі"
    name_domains: "default"
    response: "default"

  # covers
