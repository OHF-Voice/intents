      - "<open> {name} [в|у|на] {floor}"
    example: "відкрий розсувні двері на другому поверсі"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<open> {name} [в|у|на] {floor}"
    example: "відкрий головний вентиль на другому поверсі"
    name_domains:
      - "valve"
    response: "valve"
