---
# HassGetState - name_state_area
# example: чи відкрито гаражні двері в гаражі
# slots:
# - {name}
# - {state}
# - {area}

language: "uk"
data:
  # covers
  - sentences:
      - "чи {cover_states:state} {name} [в|у|на] {area}"
    example: "чи відкрито гаражні двері в гаражі"
    name_domains:
      - "cover"
    response: "one_yesno"

  # locks
  - sentences:
      - "чи {lock_states:state} {name} [в|у|на] {area}"
    example: "чи замкнено вхідні двері в передпокої"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings
  - sentences:
      - "чи {bs_open_states:state} {name} [в|у|на] {area}"
    example: "чи відкрито вікно в спальні"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "чи {bs_occupancy_states:state} {name} [в|у|на] {area}"
    example: "чи зайнято датчик в офісі"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
