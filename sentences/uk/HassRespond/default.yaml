---
# HassRespond - default
# example: привіт

language: "uk"
data:
  - sentences:
      - "(привіт|вітаю) [home assistant]"
    example: "привіт"
    response: "hello"

  - sentences:
      - "ти завжди (слухаєш|записуєш) [мене]"
    example: "ти завжди слухаєш мене"
    response: "listening"

  - sentences:
      - "куди (надсилаються|відправляються) [мої] дані"
    example: "куди надсилаються мої дані"
    response: "data"

  - sentences:
      - "що я можу (сказати|спитати) [в тебе]"
    example: "що я можу спитати в тебе"
    response: "commands"

  - sentences:
      - "хто (розробив|створив) тебе"
    example: "хто створив тебе"
    response: "creator"
