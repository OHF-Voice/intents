---
# HassGetState - name_state
# example: är garageporten öppen
# slots:
# - {name}
# - {state}

language: "sv"
data:
  # on/off domains (light, switch, fan)
  - sentences:
      - "är <name> {on_off_states:state}"
    example: "är kökslampan på"
    name_domains:
      - "light"
      - "switch"
      - "fan"
    response: "one_yesno"

  # covers and valves (open/closed)
  - sentences:
      - "är <name> {cover_states:state}"
    example: "är garageporten öppen"
    name_domains:
      - "cover"
      - "valve"
    response: "one_yesno"

  # locks (locked/unlocked)
  - sentences:
      - "är <name> {lock_states:state}"
    example: "är ytterdörren låst"
    name_domains:
      - "lock"
    response: "one_yesno"

  # binary sensors - openings (open/closed)
  - sentences:
      - "är <name> {bs_door_states:state}"
    example: "är altandörren öppen"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  # binary sensors - occupancy
  - sentences:
      - "är <name> {bs_occupancy_states:state}"
    example: "är kontorssensorn utlöst"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
