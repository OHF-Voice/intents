---
# HassGetState - domain_state
# example: är alla lampor släckta
# slots:
# - {domain}
# - {state}

language: "sv"
data:
  # ---- on/off domains (light, fan, switch) ----
  - sentences:
      - "<are_any> {on_off_domains:domain} {on_off_states:state}"
    example: "är någon lampa tänd"
    response: "any"
  - sentences:
      - "<are_all> {on_off_domains:domain} {on_off_states:state}"
    example: "är alla lampor släckta"
    response: "all"
  - sentences:
      - "<which_are> {on_off_domains:domain} är {on_off_states:state}"
    example: "vilka lampor är tända"
    response: "which"
  - sentences:
      - "<how_many> {on_off_domains:domain} är {on_off_states:state}"
    example: "hur många lampor är tända"
    response: "how_many"

  # ---- locks ----
  - sentences:
      - "<are_any> <låsbar> {lock_states:state}"
    example: "är någon dörr olåst"
    inferred_domain: "lock"
    response: "any"
  - sentences:
      - "<are_all> <låsbar> {lock_states:state}"
    example: "är alla dörrar låsta"
    inferred_domain: "lock"
    response: "all"
  - sentences:
      - "<which_are> <låsbar> är {lock_states:state}"
    example: "vilka dörrar är olåsta"
    inferred_domain: "lock"
    response: "which"
  - sentences:
      - "<how_many> <låsbar> är {lock_states:state}"
    example: "hur många dörrar är låsta"
    inferred_domain: "lock"
    response: "how_many"

  # ---- people / zones ----
  - sentences:
      - "är det (någon | några) [personer] (i | vid | på) {zone:state}"
    example: "är det någon hemma"
    inferred_domain: "person"
    response: "any"
  - sentences:
      - "är alla (i | vid | på) {zone:state}"
    example: "är alla hemma"
    inferred_domain: "person"
    response: "all"
  - sentences:
      - "vem är (i | vid | på) {zone:state}"
    example: "vem är hemma"
    inferred_domain: "person"
    response: "which"
  - sentences:
      - "hur många (personer | människor) (är | befinner sig) (i | vid | på) {zone:state}"
    example: "hur många personer är hemma"
    inferred_domain: "person"
    response: "how_many"
