---
# HassLightSet - name_color
# example: färga garagelampan röd
# slots: {color}, {name}

language: "sv"
data:
  - sentences:
      - "<färga> <name> [till] {color}"
      - "<ändra> färg på <name> till {color}"
    example: "färga garagelampan röd"
    name_domains:
      - "light"
    response: "color"
