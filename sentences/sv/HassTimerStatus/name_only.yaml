---
# HassTimerStatus - name_only
# example: how much time is left on the pizza timer
# slots: {name}

language: "sv"
data:
  - sentences:
      - "[<time_left> ]tid[ är det] kvar på[ min|mitt ] {timer_name:name}[ ]<timer>"
      - "status på[min[a] |mitt ] {timer_name:name}[ ]<timers>"
      - "{timer_name:name}[ ]<timer>[ ]status"
    example: "hur mycket tid är kvar på pizzatimern"
    response: "default"
