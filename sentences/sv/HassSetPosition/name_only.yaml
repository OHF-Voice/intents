---
# HassSetPosition - name_only
# example: sätt sovrumsgardinen till 50%
# slots: {name}, {position}

language: "sv"
data:
  - sentences:
      - "(<sätt_numeriskt_värde>|<öppna_gardiner>|<stäng_gardiner>) <name> [position] till <position_pct>"
    example: "sätt sovrumsgardinen till 50%"
    name_domains:
      - "cover"
      - "valve"
    response: "default"
