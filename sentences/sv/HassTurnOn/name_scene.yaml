---
# HassTurnOn - name_scene
# example: aktivera festläge
# slots: {name}

language: "sv"
data:
  - sentences:
      - "aktivera [scenen | scene] <name>"
      - "aktivera <name> scene"
      - "[scene] <name> på"
      - "(ändra | övergå) till (<name> [scene] | scene <name>)"
    example: "aktivera festläge"
    name_domains:
      - "scene"
    response: "scene"
