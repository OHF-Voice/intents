---
# HassUnpauseTimer - name_only
# example: resume the pizza timer
# slots: {name}

language: "sv"
data:
  - sentences:
      - "<timer_resume> <timer> [<timer_named> ]{timer_name:name}"
      - "<timer_resume> {timer_name:name} <timer>"
    example: "återuppta pizzatimern"
    response: "default"
