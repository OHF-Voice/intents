---
# HassSetVolume - area_only
# example: állítsd a nappali hangerejét 50%-ra
# slots:
# - {area}
# - {volume_level}

language: "hu"
data:
  - sentences:
      - "(<numeric_value_set>;<area>;[a] hanger(ejét|őt);<volume>)"
      - "(<area>;[a] hangerő[t];<volume>)"
    example: "állítsd a nappali hangerejét 50%-ra"
    response: "default"
