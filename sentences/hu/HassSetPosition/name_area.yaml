---
# HassSetPosition - name_area
# example: állítsd a nappali középső függöny pozícióját 30%-ra
# slots:
# - {name}
# - {area}
# - {position}

language: "hu"
data:
  - sentences:
      - "(<numeric_value_set>;<name>;<area>;[a ]pozícióját;<position>)"
      - "(<open_close_dev>;<name>;<area>;<position>)"
    name_domains:
      - "cover"
    example: "állítsd a nappali középső függöny pozícióját 30%-ra"
    response: "default"
