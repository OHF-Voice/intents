---
# HassSetPosition - name_only
# example: állítsd a háló függöny pozícióját 50%-ra
# slots:
# - {name}
# - {position}

language: "hu"
data:
  - sentences:
      - "(<numeric_value_set>;<name>;[a ]pozícióját;<position>)"
      - "(<open_close_dev>;<name>;<position>)"
    name_domains:
      - "cover"
      - "valve"
    example: "állítsd a háló függöny pozícióját 50%-ra"
    response: "default"
