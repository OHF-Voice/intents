---
# HassLightSet - floor_color_temperature
# example: az első emeleten állítsd a színhőmérsékletet nappali fényre
# slots:
# - {floor}
# - {temperature}

language: "hu"

data:
  - sentences:
      - "(<set>;<floor>;[<minden>] [<light>];<színhőmérséklet>;<color_temp>)"
    inferred_domain: "light"
    response: "temperature_több"
