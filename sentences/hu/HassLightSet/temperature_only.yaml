---
# HassLightSet - color_temperature_only
# example: állítsd a színhőmérsékletet meleg fehérre
# slots:
# - {temperature}
# context area: true

language: "hu"

data:
  - sentences:
      - "(<in_here>;<set>;[<minden>] <light>;<színhőmérséklet>;<color_temp>)"
      - "(<set>;[<minden>] <light>;<színhőmérséklet>;<color_temp>)"
      - "(<set>;<színhőmérséklet>;<color_temp>)"
      - "(<színhőmérséklet>;<color_temp>)"
    inferred_domain: "light"
    response: "temperature_több"
    requires_context:
      area:
        slot: true
