---
# HassLightSet - color_only
# example: állítsd a lámpák színét pirosra
# slots:
# - {color}
# context area: true

language: "hu"

data:
  - sentences:
      - "(<in_here>;<set>;[<minden>] <light>;szín(űre|e|re|ét);{color})"
      - "(<set>;[<minden>] <light>;szín(űre|e|re|ét);{color})"
      - "([<minden>] <light>;szín(űre|e|re|ét);{color})"
    inferred_domain: "light"
    response: "color_több"
