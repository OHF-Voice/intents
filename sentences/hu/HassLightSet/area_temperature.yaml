---
# HassLightSet - area_color_temperature
# example: állítsd a háló színhőmérsékletét meleg fehérre
# slots:
# - {area}
# - {temperature}

language: "hu"

data:
  - sentences:
      - "(<set>;<area>;[<minden>] [<light>];<színhőmérséklet>;<color_temp>)"
      - "(<area>;[<minden>] [<light>];<színhőmérséklet>;<color_temp>)"
    inferred_domain: "light"
    response: "temperature_több"
