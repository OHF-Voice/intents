---
# HassLightSet - area_color
# example: állítsd a háló összes lámpáját pirosra
# slots:
# - {area}
# - {color}

language: "hu"

data:
  - sentences:
      - "(<set>;<area>;[<minden>] [<light>];szín(űre|e|re|ét);{color})"
      - "(<area>;[<minden>] [<light>];szín(űre|e|re|ét);{color})"
    inferred_domain: "light"
    response: "color_több"
