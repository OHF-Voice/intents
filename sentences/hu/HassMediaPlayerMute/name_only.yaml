---
# HassMediaPlayerMute - name_only
# example: némítsd le a TV-t
# slots: {name}

language: "hu"
data:
  - sentences:
      - "(némítsd [le];<name>)"
      - "(némítsd [le] [a] (zenét|médiá[t]|lejátszó[t]);<name>)"
    name_domains:
      - "media_player"
    example: "némítsd le a TV-t"
    response: "default"
