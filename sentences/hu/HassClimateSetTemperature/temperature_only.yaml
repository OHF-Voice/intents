---
# HassClimateSetTemperature - temperature_only
# example: állítsd a hőmérsékletet 20 fokra
# slots: {temperature}
# context_area: true

language: "hu"
data:
  - sentences:
      - "[<numeric_value_set>] <temp> {temperature}[ ][°] fok[ra]"
    example: "állítsd a hőmérsékletet 20 fokra"
    response: "default"
