---
# HassRespond - default
# example: szia

language: "hu"
data:
  - sentences:
      - "(hello|szia) [home assistant]"
    example: "szia"
    response: "hello"
  - sentences:
      - "[Te] mindig (hallgat(sz|ózol)|rögzítesz)"
    example: "te mindig hallgatsz"
    response: "listening"
  - sentences:
      - "Hová kerülnek az adataim"
    example: "hová kerülnek az adataim"
    response: "data"
  - sentences:
      - "Mit (mondhatok|kérdezhetek|tudsz [csinálni])"
    example: "mit mondhatok"
    response: "commands"
  - sentences:
      - "Ki készített [téged]"
    example: "ki készített téged"
    response: "creator"
