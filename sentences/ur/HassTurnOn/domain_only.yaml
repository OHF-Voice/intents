language: "ur"
data:
  # lights
  - sentences:
      - "[<all>] (لایٹ | لایٹیں | light[s] | بتی) [کو] <turn_on> [<set>]"
      - "<turn_on> [<set>] [<all>] (لایٹ | لایٹیں | light[s] | بتی)"
    example: "لایٹیں کھولو"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[<all>] (پنکھے | پنکھا) [کو] <turn_on> [<set>]"
      - "<turn_on> [<set>] [<all>] (پنکھے | پنکھا)"
    example: "پنکھے کھولو"
    inferred_domain: "fan"
    response: "fans_area"
