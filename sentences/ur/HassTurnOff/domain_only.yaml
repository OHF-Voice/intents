language: "ur"
data:
  # lights
  - sentences:
      - "[<all>] (لایٹ | لایٹیں | light[s] | بتی) [کو] (<turn_off> | بجھادو) [<set>]"
      - "(<turn_off> | بجھادو) [<set>] [<all>] (لایٹ | لایٹیں | light[s] | بتی)"
    example: "لایٹیں بند کرو"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "[<all>] (پنکھے | پنکھا) [کو] <turn_off> [<set>]"
      - "<turn_off> [<set>] [<all>] (پنکھے | پنکھا)"
    example: "پنکھے بند کرو"
    inferred_domain: "fan"
    response: "fans_area"
