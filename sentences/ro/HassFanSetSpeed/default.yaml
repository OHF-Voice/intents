---
# HassFanSetSpeed - default
# example: set fans to 50%
# slots: {percentage}
# context_area: true

language: "ro"
data:
  - sentences:
      - "[<seteaza>] ((<ventilatorul>|<ventilatoarele>) [<de_aici>];[<pana_la>] [(valoarea|<viteza>) [de]] <fan_speed>)"
      - "[<seteaza>] (<viteza> (<ventilatorului>|<ventilatoarelor>) [<de_aici>];[<pana_la>] <fan_speed>)"
    example: "setează ventilatorul la 50%"
    response: "default"
