---
# HassFanSetSpeed - floor_only
# example: set first floor fans to 50%
# slots: {floor}, {percentage}

language: "ro"
data:
  - sentences:
      - "[<seteaza>] ((<ventilatorul>|<ventilatoarele>) [<din>] <floor>;[<pana_la>] [(valoarea|<viteza>) [de]] <fan_speed>)"
      - "[<seteaza>] (<viteza> (<ventilatorului>|<ventilatoarelor>) [<din>] <floor>;[<pana_la>] <fan_speed>)"
    example: "setează ventilatoarele de la etaj la 50%"
    response: "default"
