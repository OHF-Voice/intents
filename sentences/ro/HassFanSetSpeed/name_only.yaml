---
# HassFanSetSpeed - name_only
# example: set ceiling fan to 50%
# slots: <name>, {percentage}

language: "ro"
data:
  - sentences:
      - "[<seteaza>] ([<ventilatorul> [<numit>]] <name>;[<pana_la> [(valoarea|<viteza>) [de]] ] <fan_speed>)"
      - "[<seteaza>] (<viteza> <ventilatorului> [<numit>] <name>;[<pana_la> [(valoarea|<viteza>) [de]]] <fan_speed>)"
    example: "setează ventilatorul din tavan la 50%"
    name_domains:
      - "fan"
    response: "default"
