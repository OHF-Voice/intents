---
# HassFanSetSpeed - area_only
# example: set kitchen fans to 50%
# slots: {area}, {percentage}

language: "ro"
data:
  - sentences:
      - "[<seteaza>] ((<ventilatorul>|<ventilatoarele>) <din_zona>;[<pana_la>] [(valoarea|<viteza>) [de]] <fan_speed>)"
      - "[<seteaza>] (<viteza> (<ventilatorului>|<ventilatoarelor>) <din_zona>;[<pana_la>] <fan_speed>)"
    example: "setează ventilatoarele din bucătărie la 50%"
    response: "default"
