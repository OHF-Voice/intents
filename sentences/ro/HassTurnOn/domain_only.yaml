---
# HassTurnOn - domain_only
# example: turn on the lights in here
# context_area: true

language: "ro"
data:
  # lights
  - sentences:
      - "<porneste> (<lumina>|[toate ]<luminile>)[ <de_aici>]"
    example: "aprinde luminile"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<porneste> (<ventilatorul>|[toate ]<ventilatoarele>)[ <de_aici>]"
    example: "pornește ventilatoarele"
    inferred_domain: "fan"
    response: "fans_area"
