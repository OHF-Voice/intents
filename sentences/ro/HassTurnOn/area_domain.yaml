---
# HassTurnOn - area_domain
# example: turn on the lights in the kitchen
# slots: {area}

language: "ro"
data:
  # lights
  - sentences:
      - "<porneste> (<lumina>|[toate ]<luminile>) [<din>] {area}"
    example: "aprinde luminile din bucătărie"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<porneste> (<ventilatorul>|[toate ]<ventilatoarele>) [<din>] {area}"
    example: "pornește ventilatoarele din bucătărie"
    inferred_domain: "fan"
    response: "fans_area"
