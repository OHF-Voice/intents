---
# HassTurnOn - name_only
# example: turn on the overhead light
# slots: {name}

language: "ro"
data:
  # on-able domains
  - sentences:
      - "<porneste> {name}"
    example: "pornește lampa"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  # lights named with trailing light word
  - sentences:
      - "<porneste> <lumina> {name}"
    example: "aprinde lampa din colț"
    name_domains:
      - "light"
    response: "light"

  # covers
  - sentences:
      - "<deschide> {name}"
    example: "deschide ușa glisantă"
    name_domains:
      - "cover"
    response: "cover"

  # valves
  - sentences:
      - "<deschide> {name}"
    example: "deschide valva principală"
    name_domains:
      - "valve"
    response: "valve"

  # locks
  - sentences:
      - "(încuie|incuie) {name}"
    example: "încuie ușa de la intrare"
    name_domains:
      - "lock"
    response: "lock"
