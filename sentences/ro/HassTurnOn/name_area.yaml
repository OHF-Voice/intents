---
# HassTurnOn - name_area
# example: turn on the overhead light in the kitchen
# slots: <name>, {area}

language: "ro"
data:
  - sentences:
      - "<porneste> <name> <din_zona>"
    example: "pornește lampa din bucătărie"
    name_domains: "default"
    response: "default"

  - sentences:
      - "<porneste> <lumina> <name> <din_zona>"
    example: "aprinde lampa din colț din bucătărie"
    name_domains:
      - "light"
    response: "light"

  - sentences:
      - "<deschide> <name> <din_zona>"
    example: "deschide ușa glisantă din sufragerie"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<deschide> <name> <din_zona>"
    example: "deschide valva principală din bucătărie"
    name_domains:
      - "valve"
    response: "valve"

  - sentences:
      - "(încuie|incuie) <name> <din_zona>"
    example: "încuie ușa din bucătărie"
    name_domains:
      - "lock"
    response: "lock"
