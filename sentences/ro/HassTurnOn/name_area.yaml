---
# HassTurnOn - name_area
# example: turn on the overhead light in the kitchen
# slots: {name}, {area}

language: "ro"
data:
  - sentences:
      - "<porneste> {name} [<din>] {area}"
    example: "pornește lampa din bucătărie"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  - sentences:
      - "<porneste> <lumina> {name} [<din>] {area}"
    example: "aprinde lampa din colț din bucătărie"
    name_domains:
      - "light"
    response: "light"

  - sentences:
      - "<deschide> {name} [<din>] {area}"
    example: "deschide ușa glisantă din sufragerie"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<deschide> {name} [<din>] {area}"
    example: "deschide valva principală din bucătărie"
    name_domains:
      - "valve"
    response: "valve"

  - sentences:
      - "(încuie|incuie) {name} [<din>] {area}"
    example: "încuie ușa din bucătărie"
    name_domains:
      - "lock"
    response: "lock"
