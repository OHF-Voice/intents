---
# HassTurnOn - name_scene
# example: activate movie scene
# slots: {name}

language: "ro"
data:
  - sentences:
      - "<porneste> [scena ]{name}"
      - "(comut(ă|a)|treci|schimb(ă|a)) la [scena ]{name}"
    example: "activează scena de film"
    name_domains:
      - "scene"
    response: "scene"
