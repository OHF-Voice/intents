---
# HassClimateSetTemperature - floor_temperature
# example: set the first floor temperature to 20 degrees
# slots: {floor}, {temperature}

language: "ro"
data:
  - sentences:
      - "<seteaza> ([<din>] <floor>;[<pana_la>] <temperature>)"
      - "<seteaza> ((temperatur(ă|a)[ aerului][ <din>]|<in>) <floor>;[<pana_la>] <temperature>)"
      - "<modifica_temperatura> ([<din>] <floor>;[<pana_la>] <temperature>)"
      - "<modifica_temperatura> ((temperatur(ă|a) [aerului] [<din>]|aerul[ <din>]|[temperatura ]<in>) <floor>;[<pana_la>] <temperature>)"
    example: "setează temperatura la etaj la 20 de grade"
    response: "default"
