---
# HassClimateSetTemperature - area_temperature
# example: set the bedroom temperature to 20 degrees
# slots: {area}, {temperature}

language: "ro"
data:
  - sentences:
      - "<seteaza> (<din_zona>;[<pana_la>] <temperature>)"
      - "<seteaza> ((temperatur(ă|a)[ aerului][ <din>]|<in>) {area};[<pana_la>] <temperature>)"
      - "<modifica_temperatura> (<din_zona>;[<pana_la>] <temperature>)"
      - "<modifica_temperatura> ((temperatur(ă|a) [aerului] [<din>]|aerul[ <din>]|[temperatura ]<in>) {area};[<pana_la>] <temperature>)"
    example: "setează temperatura în dormitor la 20 de grade"
    response: "default"
