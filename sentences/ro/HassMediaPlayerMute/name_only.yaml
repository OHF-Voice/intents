---
# HassMediaPlayerMute - name_only
# example: mute the TV
# slots: <name>

language: "ro"
data:
  - sentences:
      - "pune (pe mut;[(muzica|filmul|volumul|sunetul) <din>] <name>)"
      - "<opreste> (volumul|sunetul) <din> <name>"
    example: "pune pe mut televizorul"
    name_domains:
      - "media_player"
    response: "default"
