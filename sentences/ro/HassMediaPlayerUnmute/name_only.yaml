---
# HassMediaPlayerUnmute - name_only
# example: unmute the TV
# slots: <name>

language: "ro"
data:
  - sentences:
      - "scoate (de pe mut;[(muzica|filmul|volumul|sunetul) <din>] <name>)"
      - "[re]<porneste> (volumul|sunetul) <din> <name>"
    example: "scoate de pe mut televizorul"
    name_domains:
      - "media_player"
    response: "default"
