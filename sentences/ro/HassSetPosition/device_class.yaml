---
# HassSetPosition - device_class
# example: set the curtains to 50%
# slots: {domain}, {device_class}, {position}
# context_area: true

language: "ro"
data:
  - sentences:
      - "[<seteaza> ]{cover_classes:device_class} [position ]<pana_la> [(<pozitia>|valoare[a])[ de] ]<position>"
      - "[<seteaza> ]<pozitia> <din> {cover_classes:device_class} [<pana_la> ][(<pozitia>|valoare[a]) ][de ]<position>"
      - "(<deschide>|<inchide>) {cover_classes:device_class} <pana_la> [(<pozitia>|valoare[a])[ de] ]<position>"
    example: "setează perdelele la 50%"
    inferred_domain: "cover"
    response: "cover_device_class"
