---
# HassGetState - domain_state

# slots: domain, state
language: "ro"
data:
  # lights
  - sentences:
      - "<are_any> <luminile> {on_off_states:state}"
    example: "sunt lumini aprinse"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <luminile> {on_off_states:state}"
    example: "sunt toate luminile aprinse"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <luminile> sunt {on_off_states:state}"
    example: "care lumini sunt aprinse"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <luminile> sunt {on_off_states:state}"
    example: "câte lumini sunt aprinse"
    inferred_domain: "light"
    response: "how_many"

