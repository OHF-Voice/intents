  # persons
  - sentences:
      - "(este|e) (cineva|careva) [<in>] {zone:state}"
    example: "este cineva acasă"
    inferred_domain: "person"
    response: "any"
  - sentences:
      - "(sunt|e) to(ț|t)i [<in>] {zone:state}"
