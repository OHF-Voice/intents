---
# HassGetState - domain_state_floor

# slots: floor, domain, state
language: "ro"
data:
  # lights
  - sentences:
      - "<are_any> <luminile> {on_off_states:state} [<din>] <floor>"
    example: "sunt lumini aprinse de la etaj"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <luminile> {on_off_states:state} [<din>] <floor>"
    example: "sunt toate luminile aprinse de la etaj"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <luminile> sunt {on_off_states:state} [<din>] <floor>"
    example: "care lumini sunt aprinse de la etaj"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <luminile> sunt {on_off_states:state} [<din>] <floor>"
    example: "câte lumini sunt aprinse de la etaj"
    inferred_domain: "light"
    response: "how_many"

