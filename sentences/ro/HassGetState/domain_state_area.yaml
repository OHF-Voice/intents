---
# HassGetState - domain_state_area

# slots: area, domain, state
language: "ro"
data:
  # lights
  - sentences:
      - "<are_any> <luminile> {on_off_states:state} <din_zona>"
    example: "sunt lumini aprinse din bucătărie"
    inferred_domain: "light"
    response: "any"
  - sentences:
      - "<are_all> <luminile> {on_off_states:state} <din_zona>"
    example: "sunt toate luminile aprinse din bucătărie"
    inferred_domain: "light"
    response: "all"
  - sentences:
      - "<which> <luminile> sunt {on_off_states:state} <din_zona>"
    example: "care lumini sunt aprinse din bucătărie"
    inferred_domain: "light"
    response: "which"
  - sentences:
      - "<how_many> <luminile> sunt {on_off_states:state} <din_zona>"
    example: "câte lumini sunt aprinse din bucătărie"
    inferred_domain: "light"
    response: "how_many"

