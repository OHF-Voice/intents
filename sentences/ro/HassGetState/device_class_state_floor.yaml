---
# HassGetState - device_class_state_floor

# slots: floor, domain, device_class, state
language: "ro"
data:
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "X X etajul nivelul X"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "X X etajul nivelul X"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} <is> {cover_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "X X etajul nivelul X"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} <is> {cover_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "X X etajul nivelul X"
    inferred_domain: "cover"
    response: "how_many"
