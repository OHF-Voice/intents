---
# HassGetState - name_state_floor
# example: is the bedroom window open on the second floor
# slots: {name}, {state}, {floor}

language: "ro"
data:
  - sentences:
      - "<is> {name} {cover_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "este ușa de garaj deschisă la parter"
    name_domains:
      - "cover"
    response: "one_yesno"

  - sentences:
      - "<is> {name} {lock_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "este ușa din față încuiată la parter"
    name_domains:
      - "lock"
    response: "one_yesno"

  - sentences:
      - "<is> {name} {bs_open_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "este geamul din dormitor deschis la etaj"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"

  - sentences:
      - "<is> {name} {bs_occupancy_states:state} [<din>] [(etajul|nivelul) ]{floor}"
    example: "este senzorul ocupat la etaj"
    name_domains:
      - "binary_sensor"
    response: "one_yesno"
