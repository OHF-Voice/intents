---
# HassGetState - name_only
# example: what is the outside temperature
# slots: {name}

language: "ro"
data:
  - sentences:
      - "(<what_is>|spune-mi) [(starea|valoarea) [(lui|pentru)]] {name}"
      - "<how_is> {name}"
    example: "care este temperatura de afară"
    name_domains:
      - "sensor"
      - "light"
      - "switch"
      - "fan"
      - "cover"
      - "lock"
      - "valve"
      - "climate"
      - "media_player"
    response: "one"
