---
# HassVacuumCleanArea - name_area
# example: vacuum the kitchen with rover
# slots: {area}, {name}

language: "ro"
data:
  - sentences:
      - "<aspira> [<din>] {area} cu {name}"
      - "<porneste> {name} [<din>] {area}"
    example: "aspiră bucătăria cu rover"
    name_domains:
      - "vacuum"
    response: "default"
