---
# HassLawnMowerStartMowing - name_only
# example: start clippy
# slots: {name}

language: "ro"
data:
  - sentences:
      - "<porneste> {name}"
      - "cose(s|ș)te [(gazonul|peluza|iarba)] <cu> {name}"
      - "tunde (gazonul|peluza|iarba) <cu> {name}"
    example: "pornește clippy"
    name_domains:
      - "lawn_mower"
    response: "default"
