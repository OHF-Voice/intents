---
# HassSetVolume - name_only
# example: set the TV volume to 90 percent
# slots: <name>, {volume_level}

language: "ro"
data:
  - sentences:
      - "[<seteaza> ]<volumul> [<din>] <name> [<pana_la> ][valoarea[ de] ]<volume>"
      - "[<seteaza> ]<name> [<pana_la> ]<volumul> [de ]<volume>"
      - "[<seteaza> ][<in>|<pana_la> ]<volume> <volumul> [<din> ]<name>"
    example: "setează volumul televizorului la 90 la sută"
    name_domains:
      - "media_player"
    response: "default"
