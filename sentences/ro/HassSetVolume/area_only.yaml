---
# HassSetVolume - area_only
# example: set living room volume to 90 percent
# slots: {area}, {volume_level}

language: "ro"
data:
  - sentences:
      - "[<seteaza> ]<volumul> [<pana_la> ][valoarea[ de] ]<volume> <din_zona>"
      - "[<seteaza> ][<pana_la> ]<volumul> [de ]<volume> <din_zona>"
      - "[<seteaza> ][<in>|<pana_la> ]<volume> <volumul> <din_zona>"
    example: "setează volumul în sufragerie la 90 la sută"
    response: "default"
