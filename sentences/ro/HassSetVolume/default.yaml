---
# HassSetVolume - default
# example: set volume to 90 percent
# slots: {volume_level}
# context_area: true

language: "ro"
data:
  - sentences:
      - "[<seteaza> ]<volumul> [<pana_la> ][valoarea[ de] ]<volume>"
      - "[<seteaza> ][<pana_la> ]<volumul> [de ]<volume>"
      - "[<seteaza> ][<in>|<pana_la> ]<volume> <volumul>"
    example: "setează volumul la 90 la sută"
    response: "default"
