---
# HassTurnOff - area_domain
# example: turn off the lights in the kitchen
# slots: {area}

language: "ro"
data:
  - sentences:
      - "<opreste> (<lumina>|[toate ]<luminile>) <din_zona>"
    example: "stinge luminile din bucătărie"
    inferred_domain: "light"
    response: "lights_area"

  - sentences:
      - "<opreste> (<ventilatorul>|[toate ]<ventilatoarele>) <din_zona>"
    example: "oprește ventilatoarele din bucătărie"
    inferred_domain: "fan"
    response: "fans_area"
