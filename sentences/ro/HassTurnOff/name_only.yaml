---
# HassTurnOff - name_only
# example: turn off the overhead light
# slots: {name}

language: "ro"
data:
  - sentences:
      - "<opreste> {name}"
    example: "oprește lampa"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
    response: "default"

  - sentences:
      - "<opreste> <lumina> {name}"
    example: "stinge lampa din colț"
    name_domains:
      - "light"
    response: "light"

  - sentences:
      - "<inchide> {name}"
    example: "închide ușa glisantă"
    name_domains:
      - "cover"
    response: "cover"

  - sentences:
      - "<inchide> {name}"
    example: "închide valva principală"
    name_domains:
      - "valve"
    response: "valve"

  - sentences:
      - "descuie {name}"
    example: "descuie ușa de la intrare"
    name_domains:
      - "lock"
    response: "lock"
