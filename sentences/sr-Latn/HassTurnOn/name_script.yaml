---
# HassTurnOn - name_script
# example: pokreni skriptu za žurku
# slots: {name}

language: "sr-Latn"
data:
  - sentences:
      - "(pokreni|izvrši|aktiviraj|započni) {name} [skript(a|u)]"
      - "(pokreni|izvrši) skript(a|u) {name}"
    example: "pokreni skriptu za žurku"
    name_domains:
      - "script"
    response: "script"
