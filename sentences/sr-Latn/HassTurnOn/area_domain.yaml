---
# HassTurnOn - area_domain
# example: uključi svetla u dnevnoj sobi
# slots:
# - {area}
# - {domain}

language: "sr-Latn"
data:
  # lights
  - sentences:
      - "<activate> [sva] <light> (u|na) [prostoriji] {area}"
      - "<activate> (u|na) [prostoriji] {area} [sva] <light>"
    example: "uključi svetla u dnevnoj sobi"
    inferred_domain: "light"
    response: "lights_area"

  # fans
  - sentences:
      - "<activate> [sve] ventilator[e] (u|na) [prostoriji] {area}"
      - "<activate> (u|na) [prostoriji] {area} [sve] ventilator[e]"
    example: "uključi ventilatore u dnevnoj sobi"
    inferred_domain: "fan"
    response: "fans_area"
