---
# HassTurnOn - name_scene
# example: aktiviraj scenu opuštanje
# slots: {name}

language: "sr-Latn"
data:
  - sentences:
      - "[aktiviraj] {name} [scen(a|u)]"
      - "aktiviraj scen(a|u) {name}"
      - "(pređi|promeni) na [scenu] {name}"
    example: "aktiviraj scenu opuštanje"
    name_domains:
      - "scene"
    response: "scene"
