---
# HassPauseTimer - name_only
# example: pause the pizza timer
# slots: {name}

language: "sr-Latn"
data:
  - sentences:
      - "pauziraj [(moj|mog[a])] {timer_name:name} tajmer[a]"
      - "pauziraj [(moj|mog[a])] tajmer nazvan {timer_name:name}"
    example: "pauziraj pizza tajmer"
    response: "default"
