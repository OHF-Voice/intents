---
# HassGetState - device_class_state
# example: da li su svi prozori zatvoreni
# slots:
# - {domain}
# - {device_class}
# - {state}

language: "sr-Latn"
data:
  - sentences:
      - "<are_any> {cover_classes:device_class} {cover_states:state}"
    example: "da li je neki prozor otvoren"
    inferred_domain: "cover"
    response: "any"
  - sentences:
      - "<are_all> {cover_classes:device_class} {cover_states:state}"
    example: "da li su svi prozori zatvoreni"
    inferred_domain: "cover"
    response: "all"
  - sentences:
      - "<which> {cover_classes:device_class} [je|su] {cover_states:state}"
    example: "koji prozori su otvoreni"
    inferred_domain: "cover"
    response: "which"
  - sentences:
      - "<how_many> {cover_classes:device_class} [je|su] {cover_states:state}"
    example: "koliko prozora je otvoreno"
    inferred_domain: "cover"
    response: "how_many"
