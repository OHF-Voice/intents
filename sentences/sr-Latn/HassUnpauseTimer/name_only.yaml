---
# HassUnpauseTimer - name_only
# example: resume the pizza timer
# slots: {name}

language: "sr-Latn"
data:
  - sentences:
      - "nastavi [(moj|mog[a])] tajmer[a] nazvan {timer_name:name}"
      - "nastavi [(moj|mog[a])] {timer_name:name} tajmer[a]"
    example: "nastavi pica tajmer"
    response: "default"
