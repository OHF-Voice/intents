---
# HassRespond - default
# example: zdravo home assistant

language: "sr-Latn"
data:
  - sentences:
      - "(zdravo|Ćao) [home assistant]"
    example: "zdravo home assistant"
    response: "hello"

  - sentences:
      - "da li uvek (slušaš|snimaš)"
    example: "da li uvek slušaš"
    response: "listening"

  - sentences:
      - "gde idu moji podaci"
    example: "gde idu moji podaci"
    response: "data"

  - sentences:
      - "šta mogu da (kažem|pitam)"
    example: "šta mogu da kažem"
    response: "commands"

  - sentences:
      - "ko te je (napravio|stvorio)"
    example: "ko te je napravio"
    response: "creator"
