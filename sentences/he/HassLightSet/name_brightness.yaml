---
# HassLightSet - name_brightness
# example: set the bedroom lamp brightness to 50%
# slots:
# - {name}
# - {brightness}

language: "he"
data:
  - sentences:
      - "(קבע[י]|שנ[ה|י]|הגדר|הגדירי) [את] [ה]בהירות [של] [ה]{name} ל{brightness}[[ ]%| אחוז]"
    example: "קבע את הבהירות של מנורת חדר השינה ל50%"
    name_domains:
      - "light"
    response: "brightness"
