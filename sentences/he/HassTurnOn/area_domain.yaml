      - "(讛讚诇拽|讛讚诇讬拽讬|讛讚诇拽讛|诇讛讚诇讬拽|转讚诇讬拽[讬]) [砖诇] [讗转] [讻诇] [讛](讗讜专|讗讜专讜转) 讘{area}"
    example: "讛讚诇拽 讗转 讛讗讜专讜转 讘诪讟讘讞"
