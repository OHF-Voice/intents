      - "(讛讚诇拽|讛讚诇讬拽讬|讛讚诇拽讛|诇讛讚诇讬拽|转讚诇讬拽[讬]) [砖诇] [讗转] [讻诇] [讛](诪讗讜讜专专|诪讗讜专专|诪讗讜讜专专讬诐|诪讗讜专专讬诐) 讘{area}"
